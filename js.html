        </td>
        <td class="editable-cell" onclick="startInlineEditDate(event,'${sid}','submitDate','${_esc(it.submitDate||'')}','checklist')" style="padding:7px 8px;font-size:11px;color:var(--text-sub);white-space:nowrap;">${it.submitDate||'<span style="color:var(--text-muted);">—</span>'}</td>
        <td class="editable-cell" onclick="startInlineEdit(event,'${sid}','quoteAmount','${it.quoteAmount||''}','checklist')" style="padding:7px 8px;text-align:right;color:var(--danger);font-weight:600;">${amtDisplay}</td>
        <td style="padding:7px 8px;text-align:right;color:var(--success);font-size:11px;">${marginDisplay}</td>
        <td class="editable-cell" onclick="startInlineEdit(event,'${sid}','quoteNo','${_esc(it.quoteNo||'')}','checklist')" style="padding:7px 8px;font-size:11px;font-family:monospace;">${_esc(it.quoteNo||'—')}</td>
        <td style="padding:7px 8px;text-align:center;" onclick="event.stopPropagation();">${pdfDisplay}</td>
        <td style="padding:7px 8px;text-align:center;white-space:nowrap;" onclick="event.stopPropagation();">
          <button class="btn btn-outline btn-sm" onclick="openClEditModal('${sid}')" title="詳細編集">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteClItem('${sid}')" title="削除" style="margin-left:2px;">🗑️</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div></div></div>`;
  });
  wrap.innerHTML = html;
}

function quickUpdateClStatus(itemId, newStatus) {
  google.script.run.withSuccessHandler(res => {
    if (res.success) {
      showToast('ステータスを更新しました');
      // メモリ更新（再描画不要でアイコンがちらつかない）
      for (const sec of (_clSections||[])) {
        const it = sec.items.find(x => x.itemId === itemId);
        if (it) { it.status = newStatus; break; }
      }
    } else showToast('更新失敗: ' + res.error, true);
  }).handleApiRequest('checklistSaveItem', { itemId: itemId, status: newStatus });
}

function openClAddItemModal(section) {
  if (!_clCurrentModel) { showToast('先に機種コードを読み込んでください', true); return; }
  document.getElementById('cl-modal-title').textContent = '見積セット項目 追加';
  document.getElementById('cl-modal-item-id').value = '';
  ['cl-f-section','cl-f-itemname','cl-f-format','cl-f-submitto','cl-f-quoteno','cl-f-orderno','cl-f-pdfurl','cl-f-memo'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  ['cl-f-amount','cl-f-cost'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('cl-f-status').value = '未提出';
  document.getElementById('cl-f-submitdate').value = '';
  if (section) document.getElementById('cl-f-section').value = section;
  document.getElementById('cl-item-modal').style.display = 'flex';
}
function openClAddItemModalSection(section) { openClAddItemModal(section); }

function openClEditModal(itemId) {
  let found = null;
  for (const sec of _clSections) { found = sec.items.find(it => it.itemId === itemId); if (found) break; }
  if (!found) { showToast('項目が見つかりません', true); return; }
  document.getElementById('cl-modal-title').textContent = '見積セット項目 編集';
  document.getElementById('cl-modal-item-id').value = found.itemId;
  document.getElementById('cl-f-section').value   = found.section || '';
  document.getElementById('cl-f-itemname').value  = found.itemName || '';
  document.getElementById('cl-f-format').value    = found.format || '';
  document.getElementById('cl-f-submitto').value  = found.submitTo || '';
  document.getElementById('cl-f-status').value    = found.status || '未提出';
  document.getElementById('cl-f-submitdate').value= found.submitDate ? found.submitDate.replace(/\//g,'-') : '';
  document.getElementById('cl-f-amount').value    = found.quoteAmount || '';
  document.getElementById('cl-f-cost').value      = found.costAmount || '';
  document.getElementById('cl-f-quoteno').value   = found.quoteNo || '';
  document.getElementById('cl-f-orderno').value   = found.orderNo || '';
  document.getElementById('cl-f-pdfurl').value    = found.pdfUrl || '';
  document.getElementById('cl-f-memo').value      = found.memo || '';
  document.getElementById('cl-item-modal').style.display = 'flex';
}

function closeClModal() { document.getElementById('cl-item-modal').style.display = 'none'; }

function saveClItem() {
  const itemId = document.getElementById('cl-modal-item-id').value;
  const v = id => (document.getElementById(id).value || '').trim();
  const payload = {
    itemId: itemId || undefined,
    modelCode: _clCurrentModel,
    section:    v('cl-f-section'),
    itemName:   v('cl-f-itemname'),
    format:     v('cl-f-format'),
    submitTo:   v('cl-f-submitto'),
    status:     v('cl-f-status'),
    submitDate: v('cl-f-submitdate').replace(/-/g,'/'),
    quoteAmount: Number(v('cl-f-amount')) || 0,
    costAmount:  Number(v('cl-f-cost')) || 0,
    quoteNo:    v('cl-f-quoteno'),
    orderNo:    v('cl-f-orderno'),
    pdfUrl:     v('cl-f-pdfurl'),
    memo:       v('cl-f-memo'),
  };
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('保存しました'); closeClModal(); loadChecklist(); }
    else showToast('保存失敗: ' + res.error, true);
  }).handleApiRequest('checklistSaveItem', payload);
}

function deleteClItem(itemId) {
  if (!confirm('この項目を削除しますか？')) return;
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('削除しました'); loadChecklist(); }
    else showToast('削除失敗', true);
  }).handleApiRequest('checklistDeleteItem', { itemId });
}

function openClTemplateModal() {
  if (!_clCurrentModel) { showToast('先に機種コードを読み込んでください', true); return; }
  const tmpl = prompt('テンプレートとしてコピーする機種コードを入力してください:');
  if (!tmpl) return;
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('テンプレートからコピーしました (' + (res.count||0) + '件)'); loadChecklist(); }
    else showToast('コピー失敗: ' + res.error, true);
  }).handleApiRequest('checklistCopyTemplate', { fromModelCode: tmpl, toModelCode: _clCurrentModel });
}

let _qcItems = [];

    <div><h2>🔍 見積書チェック（単価照合）</h2><p>注文書と見積書の単価を自動照合して受注判定します</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-outline btn-sm" onclick="exportQuoteCheckCsv()" style="color:#16a34a;border-color:#16a34a;">📥 CSV</button>
      <button class="btn btn-outline btn-sm" onclick="exportQuoteCheckPdf()" style="color:#dc2626;border-color:#dc2626;">🖨️ PDF</button>
      <button class="btn btn-outline btn-sm" onclick="rebuildUnitPriceDB()">🔄 単価DB再構築</button>

    <select id="qc-status-filter" onchange="filterQcItems()" style="padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;">
      <option value="">全ステータス</option>
      <option value="✅ 全行一致">✅ 全行一致</option>
      <option value="⚠️ 一部差異">⚠️ 一部差異</option>
      <option value="❌ 未対応品目あり">❌ 未対応品目あり</option>
      <option value="📋 見積未紐づけ">📋 見積未紐づけ</option>
    </select>
  </div>
  <div id="qc-result-list" style="min-height:200px;"><div class="loading" style="text-align:center;padding:40px;color:var(--text-muted);">「一括チェック実行」または対象の注文書個別チェックで照合します<br><br><button class="btn btn-primary" onclick="runBatchQuoteCheck()">⚡ 今すぐ一括チェック</button></div></div>
  <!-- 照合詳細モーダル -->
  <div id="qc-detail-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center;">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 id="qc-detail-title" style="margin:0;">照合結果詳細</h3>
        <button onclick="closeQcDetail()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-sub);">✕</button>
      </div>
      <div id="qc-detail-body"></div>
    </div>
  </div>`;
  // 案件一覧からデータを流用してすぐ表示
  _buildQcItemList();
}

function _buildQcItemList() {
  if (!S.all || S.all.length === 0) {
    // 案件データ未ロードの場合はサーバから取得
    const wrap = document.getElementById('qc-result-list');
    if (wrap) wrap.innerHTML = '<div class="loading"><div class="spinner"></div><br>案件データを読み込み中...</div>';
    google.script.run.withSuccessHandler(res => {
      if (res && res.success) { S.all = res.items || []; S.filtered = S.all.slice(); }
      _buildQcItemList();
    }).withFailureHandler(() => {
      if (wrap) wrap.innerHTML = '<div class="loading" style="color:var(--danger);">データ読み込みエラー。ページを再読み込みしてください。</div>';
    }).handleApiRequest('getAll', null);
    return;
  }
  _qcItems = S.all.filter(r => r.orderNo).map(r => ({
    mgmtId: r.id,
    subject: r.subject || '',
    client: r.client || r.destCompany || '',
    orderNo: r.orderNo || '',
    quoteNo: r.quoteNo || '',
    compareStatus: r.compareStatus || null,
    compareResult: null,
  }));
  _renderQcList();
}

function _qcStatusColor(st) {
  if (!st) return '#94a3b8';
  if (st.includes('全行一致')) return '#16a34a';
  if (st.includes('一部差異')) return '#f59e0b';
  if (st.includes('未対応')) return '#dc2626';
  if (st.includes('未紐づけ')) return '#6366f1';
  return '#64748b';
}

function _renderQcList() {
  const wrap = document.getElementById('qc-result-list'); if (!wrap) return;
  const kw = ((document.getElementById('qc-search')||{}).value||'').toLowerCase();
  const sf = ((document.getElementById('qc-status-filter')||{}).value||'');
  let data = _qcItems.filter(r => {
    const txt = (r.subject + r.client + r.orderNo + r.quoteNo).toLowerCase();
    return (!kw || txt.includes(kw)) && (!sf || r.compareStatus === sf);
  });
  if (data.length === 0) { wrap.innerHTML = '<div class="loading" style="color:var(--text-muted);text-align:center;padding:30px;">対象案件がありません（注文書が登録された案件が表示されます）</div>'; return; }
  let html = `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:8px;box-shadow:var(--shadow-sm);overflow:hidden;">
    <thead><tr style="background:#f0f2f5;">
      <th style="padding:10px 14px;text-align:left;">件名</th>
      <th>顧客</th><th>注文No.</th><th>見積No.</th>
      <th style="min-width:140px;">照合結果</th>
      <th style="min-width:110px;text-align:center;">操作</th>
    </tr></thead><tbody>`;
  data.forEach((r, idx) => {
    const color = _qcStatusColor(r.compareStatus);
    const badge = r.compareStatus
      ? `<span style="font-size:11px;font-weight:700;color:${color};background:${color}18;border:1px solid ${color}30;border-radius:4px;padding:2px 8px;">${r.compareStatus}</span>`
      : '<span style="font-size:11px;color:var(--text-muted);">未チェック</span>';
    html += `<tr style="border-bottom:1px solid #f0f0f0;">
      <td style="padding:9px 14px;font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${_esc(r.subject)}">${_esc(r.subject)||'—'}</td>
      <td style="padding:9px 8px;color:var(--text-sub);">${_esc(r.client)||'—'}</td>
      <td style="padding:9px 8px;font-family:monospace;color:var(--primary);">${_esc(r.orderNo)}</td>
      <td style="padding:9px 8px;font-family:monospace;">${_esc(r.quoteNo)||'—'}</td>
      <td style="padding:9px 8px;">${badge}</td>
      <td style="padding:9px 8px;text-align:center;white-space:nowrap;">
        <button class="btn btn-outline btn-sm" onclick="runSingleQuoteCheck('${_esc(r.mgmtId)}',${idx})">🔍 チェック</button>
        ${r.compareResult ? `<button class="btn btn-outline btn-sm" onclick="showQcDetail(${idx})" style="margin-left:2px;">📋 詳細</button>` : ''}
      </td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  wrap.innerHTML = html;
}

function filterQcItems() { _renderQcList(); }

function runSingleQuoteCheck(mgmtId, idx) {
  showToast('照合中...');
  google.script.run.withSuccessHandler(res => {
    if (!res.success) { showToast('エラー: ' + res.error, true); return; }
    const result = res.result || {};
    if (_qcItems[idx]) {
      _qcItems[idx].compareStatus = result.status || null;
      _qcItems[idx].compareResult = result;
    }
    showToast('照合完了: ' + (result.status || ''));
    _renderQcList();
  }).handleApiRequest('orderPriceCompare', { mgmtId });
}

function runBatchQuoteCheck() {
  const wrap = document.getElementById('qc-result-list');
  if (wrap) wrap.innerHTML = '<div class="loading"><div class="spinner"></div><br>一括照合中（時間がかかる場合があります）...</div>';
  google.script.run.withSuccessHandler(res => {
    if (!res.success) { showToast('エラー: ' + res.error, true); return; }
    const batchRes = res.result || {};
    const results = batchRes.results || [];
    results.forEach(r => {
      const item = _qcItems.find(it => it.mgmtId === r.mgmtId);
      if (item) { item.compareStatus = r.status; item.compareResult = r; }
    });
    showToast('一括照合完了 ' + results.length + '件');
    if (_qcItems.length === 0) _buildQcItemList();
    _renderQcList();
  }).handleApiRequest('batchOrderPriceCompare', {});
}

function rebuildUnitPriceDB() {
  showToast('単価DB再構築中...');
  google.script.run.withSuccessHandler(res => {
    if (res.success) showToast('単価DB再構築完了');
    else showToast('エラー: ' + res.error, true);
  }).handleApiRequest('rebuildUnitPrice', {});
}

function showQcDetail(idx) {
  const r = _qcItems[idx]; if (!r || !r.compareResult) return;
  const res = r.compareResult;
  const color = _qcStatusColor(res.status);
  let html = `<div style="margin-bottom:16px;padding:12px 16px;background:${color}10;border:1px solid ${color}30;border-radius:8px;">
    <strong style="color:${color};font-size:14px;">${res.status}</strong>
    <span style="margin-left:12px;font-size:12px;color:var(--text-sub);">注文No: ${_esc(res.orderNo)} / 見積No: ${_esc(res.quoteNo||'—')}</span>
    ${res.message ? `<div style="margin-top:6px;font-size:12px;color:var(--text-sub);">${_esc(res.message)}</div>` : ''}
  </div>`;
  if (res.lineResults && res.lineResults.length) {
    html += `<table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead><tr style="background:#f0f2f5;">
        <th style="padding:6px 10px;text-align:left;">品名</th>
        <th style="text-align:right;">注文単価</th><th style="text-align:right;">見積単価</th>
        <th style="text-align:right;">差額</th><th>判定</th>
      </tr></thead><tbody>`;
    res.lineResults.forEach(line => {
      const ok = line.matchStatus === 'ok';
      const diff = line.matchStatus === 'price_diff';
      const rowColor = ok ? '' : diff ? '#fffbeb' : '#fef2f2';
      const icon = ok ? '✅' : diff ? '⚠️' : '❌';
      const diffAmt = (line.orderUnitPrice||0) - (line.quoteUnitPrice||0);
      html += `<tr style="border-bottom:1px solid #f0f0f0;background:${rowColor};">
        <td style="padding:6px 10px;">${_esc(line.itemName||'—')}</td>
        <td style="padding:6px 10px;text-align:right;">¥${Number(line.orderUnitPrice||0).toLocaleString()}</td>
        <td style="padding:6px 10px;text-align:right;">¥${Number(line.quoteUnitPrice||0).toLocaleString()}</td>
        <td style="padding:6px 10px;text-align:right;${diffAmt!==0?'color:var(--danger);font-weight:600;':''};">${diffAmt !== 0 ? (diffAmt > 0 ? '+' : '') + '¥' + Number(diffAmt).toLocaleString() : '—'}</td>
        <td style="padding:6px 10px;">${icon} ${line.matchStatus||''}</td>
      </tr>`;
    });
    html += '</tbody></table>';
  }
  document.getElementById('qc-detail-title').textContent = '照合詳細: ' + (r.subject || r.mgmtId);
  document.getElementById('qc-detail-body').innerHTML = html;
  document.getElementById('qc-detail-modal').style.display = 'flex';
}
function closeQcDetail() { document.getElementById('qc-detail-modal').style.display = 'none'; }

function loadChecklist() {
  var modelCode = document.getElementById('cl-model-input').value.trim();
  if (!modelCode) { showToast('機種コードを入力してください'); return; }
  var container = document.getElementById('checklist-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  google.script.run
    .withSuccessHandler(function(res) { renderChecklist(res); })
    .withFailureHandler(function(e) { container.innerHTML = '<div style="color:red;padding:24px;">エラー: ' + e.message + '</div>'; })
    .handleApiRequest('checklistGetByModel', { modelCode: modelCode });
}

function renderChecklist(res) {
  var container = document.getElementById('checklist-container');
  if (!res.success) { container.innerHTML = '<div style="color:red;padding:24px;">エラー: ' + res.error + '</div>'; return; }
  var s = res.summary;
  var html = '<div class="summary-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">'
    + '<div class="summary-card"><div class="lbl">総合計（税抜）</div><div class="val c-blue">' + s.grandTotal.toLocaleString() + '</div><div class="sub">円</div></div>'
    + '<div class="summary-card"><div class="lbl">粗利率</div><div class="val c-green">' + (s.grossMargin !== null ? s.grossMargin + '%' : '—') + '</div></div>'
    + '<div class="summary-card"><div class="lbl">進捗</div><div class="val">' + s.doneCount + ' / ' + s.totalCount + '</div><div class="sub">提出済み</div></div>'
    + '<div class="summary-card"><div class="lbl">消費税（10%）</div><div class="val">' + s.tax.toLocaleString() + '</div><div class="sub">円</div></div>'
    + '</div>';
  res.sections.forEach(function(sec) {
    html += '<div class="table-wrap" style="margin-bottom:16px;">'
      + '<div class="table-toolbar"><h2>📂 ' + sec.name + '</h2>'
      + '<span class="pg-info">' + sec.doneCount + '/' + sec.totalCount + '件 完了 ／ 小計: ¥' + sec.subtotal.toLocaleString() + '</span></div>'
      + '<table><thead><tr>'
      + '<th>品名・仕様</th><th>フォーマット</th><th>提出先</th><th>ステータス</th>'
      + '<th>見積No</th><th>見積金額</th><th>原価</th><th>粗利率</th><th>提出日</th><th>備考</th>'
      + '</tr></thead><tbody>';
    sec.items.forEach(function(it) {
      var statusColor = it.status === '承認済' || it.status === '提出済' ? 'badge-done'
        : it.status === '却下' ? 'badge-received' : 'badge-planned';
      html += '<tr>'
        + '<td>' + it.itemName + '</td>'
        + '<td>' + it.format + '</td>'
        + '<td>' + it.submitTo + '</td>'
        + '<td><span class="badge ' + statusColor + '">' + it.status + '</span></td>'
        + '<td>' + (it.quoteNo || '—') + '</td>'
        + '<td class="r">' + (it.quoteAmount ? '¥' + it.quoteAmount.toLocaleString() : '—') + '</td>'
        + '<td class="r">' + (it.costAmount ? '¥' + it.costAmount.toLocaleString() : '—') + '</td>'
        + '<td>' + (it.grossMargin !== null ? it.grossMargin + '%' : '—') + '</td>'
        + '<td>' + (it.submitDate || '—') + '</td>'
        + '<td>' + (it.memo || '') + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
  });
  if (res.sections.length === 0) {
    html += '<div style="text-align:center;padding:40px;color:var(--text-sub);">この機種のチェックリストデータがありません</div>';
  }
  container.innerHTML = html;
}


</script>
