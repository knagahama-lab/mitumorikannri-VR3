let _allMakers      = [];
let _filteredMakers = [];
let _selectedMakerId = null;
const MAKER_GENRES_JS = ['遊技機メーカー', '部品メーカー', '販売代理店', 'その他'];

function loadMakerPage() {
  const listEl = document.getElementById('maker-list-container');
  if (listEl) listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">読み込み中…</div>';
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        _allMakers = res.items || [];
        _filteredMakers = [..._allMakers];
        _renderMakerList(_filteredMakers);
        if (_selectedMakerId) {
          const found = _allMakers.find(m => m.id === _selectedMakerId);
          if (found) _renderMakerDetail(found);
        }
      } else {
        if (listEl) listEl.innerHTML = '<div style="padding:20px;color:var(--danger);">読み込みエラー</div>';
      }
    })
    .handleApiRequest('makerList', {});
}

function _renderMakerList(items) {
  const el = document.getElementById('maker-list-container');
  if (!el) return;
  if (!items || items.length === 0) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">メーカーがありません<br><small>「＋ メーカー追加」で登録</small></div>';
    return;
  }
  const today = new Date().toISOString().slice(0,10);
  el.innerHTML = items.map(m => {
    const active = m.id === _selectedMakerId;
    const genreColor = { '遊技機メーカー':'#dbeafe', '部品メーカー':'#dcfce7', '販売代理店':'#fef9c3', 'その他':'#f1f5f9' };
    const genreText  = { '遊技機メーカー':'#1e40af', '部品メーカー':'#15803d', '販売代理店':'#854d0e', 'その他':'#64748b' };
    const gc = genreColor[m.genre] || '#f1f5f9';
    const gt = genreText[m.genre]  || '#64748b';
    const visitAlert = m.nextVisit && m.nextVisit <= today ? '🔴' : m.nextVisit ? '📅' : '';
    return `<div class="${active ? 'model-list-item-active' : ''}"
        style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-light);"
        onclick="selectMaker('${_esc(m.id)}')"
        onmouseover="if(!this.classList.contains('model-list-item-active'))this.style.background='#f8fafc'"
        onmouseout="if(!this.classList.contains('model-list-item-active'))this.style.background=''">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div style="font-weight:700;font-size:13px;">${_esc(m.name)}</div>
        <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${gc};color:${gt};font-weight:600;">${_esc(m.genre||'—')}</span>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px;">${_esc(m.assignee||'担当未設定')}</div>
      ${m.nextVisit ? `<div style="font-size:11px;">${visitAlert} 次回訪問: <strong>${_esc(m.nextVisit)}</strong></div>` : ''}
    </div>`;
  }).join('');
}

function filterMakerList() {
  const kw = (document.getElementById('maker-search')?.value || '').trim().toLowerCase();
  _filteredMakers = !kw ? [..._allMakers] : _allMakers.filter(m =>
    (m.name||'').toLowerCase().includes(kw) ||
    (m.assignee||'').toLowerCase().includes(kw) ||
    (m.genre||'').toLowerCase().includes(kw)
  );
  _renderMakerList(_filteredMakers);
}

function selectMaker(id) {
  _selectedMakerId = id;
  _renderMakerList(_filteredMakers);
  const m = _allMakers.find(m => m.id === id);
  if (m) _renderMakerDetail(m);
}

function saveMaker(id) {
  const name = document.getElementById('mk-name')?.value?.trim();
  if (!name) { showToast('メーカー名は必須です', true); return; }
  const payload = {
    id: id||'', name,
    genre:          document.getElementById('mk-genre')?.value     || '',
    assignee:       document.getElementById('mk-assignee')?.value?.trim() || '',
    tel:            document.getElementById('mk-tel')?.value?.trim()      || '',
    email:          document.getElementById('mk-email')?.value?.trim()    || '',
    url:            document.getElementById('mk-url')?.value?.trim()      || '',
    address:        document.getElementById('mk-address')?.value?.trim()  || '',
    lastVisit:      document.getElementById('mk-lastVisit')?.value        || '',
    nextVisit:      document.getElementById('mk-nextVisit')?.value        || '',
    competitorInfo: document.getElementById('mk-competitor')?.value?.trim()  || '',
    settlementUrl:  document.getElementById('mk-settlement')?.value?.trim()  || '',
    memo:           document.getElementById('mk-memo')?.value?.trim()     || '',
  };
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('✅ 保存しました');
        document.getElementById('maker-modal-overlay')?.remove();
        loadMakerPage();
      } else showToast('エラー: ' + ((res||{}).error||'不明'), true);
    })
    .handleApiRequest('makerSave', payload);
}

function deleteMaker(id) {
  if (!confirm('このメーカーを削除しますか？')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('🗑️ 削除しました');
        _selectedMakerId = null;
        const det = document.getElementById('maker-detail-panel');
        if (det) det.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);"><div style="font-size:48px;margin-bottom:12px;">🏢</div><div style="font-size:15px;font-weight:600;">メーカーを選択してください</div></div>';
        loadMakerPage();
      } else showToast('エラー: ' + ((res||{}).error||'不明'), true);
    })
    .handleApiRequest('makerDelete', { id });
}

let _allQsItems      = [];
let _filteredQsItems = [];
let _selectedQsId    = null;
let _qsModelFilter   = '';

const QS_TYPES_JS = ['基板回路設計費', '基板実装費', '量産基板', '注残処理'];
const QS_STATUS_LIST = ['未作成', '作成中', '承認待ち', '発行済', '却下'];
const QS_STATUS_COLORS = {
  '未作成':  { bg:'#f1f5f9', text:'#64748b', border:'#cbd5e1' },
  '作成中':  { bg:'#fef9c3', text:'#854d0e', border:'#fde047' },
  '承認待ち':{ bg:'#dbeafe', text:'#1e40af', border:'#93c5fd' },
  '発行済':  { bg:'#dcfce7', text:'#15803d', border:'#86efac' },
  '却下':    { bg:'#fee2e2', text:'#b91c1c', border:'#fca5a5' },
};
const QS_PROGRESS_COLORS = {
  '未着手': { bg:'#f1f5f9', text:'#64748b' },
  '進行中': { bg:'#fef9c3', text:'#854d0e' },
  '完了':   { bg:'#dcfce7', text:'#15803d' },
  '要確認': { bg:'#fee2e2', text:'#b91c1c' },
};

// ── 一覧読み込み ──
function loadQuoteSetPage() {
  const listEl = document.getElementById('qs-list-container');
  if (listEl) listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">読み込み中…</div>';
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        _allQsItems = res.items || [];
        _filteredQsItems = [..._allQsItems];
        _updateQsModelFilterOptions();
        _renderQsList(_filteredQsItems);
        // 選択中案件を再表示
        if (_selectedQsId) {
          const found = _allQsItems.find(i => i.id === _selectedQsId);
          if (found) _renderQsDetail(found);
        }
      } else {
        if (listEl) listEl.innerHTML = '<div style="padding:20px;color:var(--danger);">読み込みエラー: ' + _esc((res||{}).error||'不明') + '</div>';
      }
    })
    .withFailureHandler(function(e) {
      if (listEl) listEl.innerHTML = '<div style="padding:20px;color:var(--danger);">通信エラー</div>';
    })
    .handleApiRequest('quoteSetList', {});
}

// ── リスト描画 ──
function _renderQsList(items) {
  const el = document.getElementById('qs-list-container');
  if (!el) return;
  if (!items || items.length === 0) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">案件がありません<br><small>「＋ 新規セット」で追加</small></div>';
    return;
  }
  el.innerHTML = items.map(item => {
    const active = item.id === _selectedQsId;
    const pc = QS_PROGRESS_COLORS[item.progress] || QS_PROGRESS_COLORS['未着手'];
    const dots = QS_TYPES_JS.map(t => {
      const st = (item.items[t] || {}).status || '未作成';
      const c  = QS_STATUS_COLORS[st] || QS_STATUS_COLORS['未作成'];
      return `<span title="${_esc(t)}: ${_esc(st)}" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c.bg};border:1.5px solid ${c.border};"></span>`;
    }).join('') + (item.extraItems||[]).map(ei => {
      const c = QS_STATUS_COLORS[ei.status] || QS_STATUS_COLORS['未作成'];
      return `<span title="${_esc(ei.name)}: ${_esc(ei.status)}" style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${c.bg};border:1.5px solid ${c.border};"></span>`;
    }).join('');
    const totalFmt = item.totalAmount > 0
      ? '¥' + item.totalAmount.toLocaleString()
      : '<span style="color:var(--text-muted);">—</span>';
    return `<div class="${active ? 'model-list-item-active' : ''}"
        style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-light);${active ? '' : 'hover:background:#f8fafc;'}"
        onclick="selectQs('${_esc(item.id)}')"
        onmouseover="if(!this.classList.contains('model-list-item-active'))this.style.background='#f8fafc'"
        onmouseout="if(!this.classList.contains('model-list-item-active'))this.style.background=''">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;" title="${_esc(item.subject)}">${_esc(item.subject||'（案件名なし）')}</div>
        <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${pc.bg};color:${pc.text};font-weight:600;white-space:nowrap;">${_esc(item.progress)}</span>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px;">${_esc(item.client||'—')}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;">
        ${item.modelCode ? `<span style="font-size:10px;color:#7c3aed;background:#ede9fe;padding:1px 6px;border-radius:8px;font-weight:600;">🏭 ${_esc(item.modelCode)}</span>` : ''}
        ${item.boardCategory ? `<span style="font-size:10px;color:#0369a1;background:#e0f2fe;padding:1px 6px;border-radius:8px;">🔷 ${_esc(item.boardCategory)}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;gap:4px;align-items:center;">${dots}</div>
        <div style="font-size:11px;color:var(--text-sub);font-weight:600;">${totalFmt}</div>
      </div>
    </div>`;
  }).join('');
}

// ── フィルター（テキスト検索 + 機種フィルター） ──
function filterQsList() {
  const kw    = (document.getElementById('qs-set-search')?.value || '').trim().toLowerCase();
  const model = (document.getElementById('qs-model-filter')?.value || '').trim();
  _filteredQsItems = _allQsItems.filter(i => {
    // 機種フィルター
    if (model && (i.modelCode || '') !== model) return false;
    // テキスト検索
    if (!kw) return true;
    return (i.subject||'').toLowerCase().includes(kw) ||
           (i.client||'').toLowerCase().includes(kw) ||
           (i.assignee||'').toLowerCase().includes(kw) ||
           (i.rakurakuNo||'').toLowerCase().includes(kw) ||
           (i.boardCategory||'').toLowerCase().includes(kw) ||
           (i.modelCode||'').toLowerCase().includes(kw) ||
           (i.modelName||'').toLowerCase().includes(kw);
  });
  _renderQsList(_filteredQsItems);
}

// ── 機種フィルタードロップダウンを読み込みデータで更新 ──
function _updateQsModelFilterOptions() {
  const sel = document.getElementById('qs-model-filter');
  if (!sel) return;
  const current = sel.value;
  // ユニークな機種コードを収集（空除外、名前付き）
  const modelMap = {};
  _allQsItems.forEach(i => {
    if (i.modelCode) modelMap[i.modelCode] = i.modelName || i.modelCode;
  });
  const codes = Object.keys(modelMap).sort();
  sel.innerHTML = '<option value="">🏭 すべての機種（' + _allQsItems.length + '件）</option>' +
    codes.map(c => `<option value="${_esc(c)}" ${c===current?'selected':''}>🔷 ${_esc(c)}${modelMap[c] && modelMap[c]!==c ? ' — ' + _esc(modelMap[c]) : ''}</option>`).join('');
}

// ── 案件選択・詳細表示 ──
function selectQs(id) {
  _selectedQsId = id;
  // リストの選択状態を更新
  _renderQsList(_filteredQsItems);
  const item = _allQsItems.find(i => i.id === id);
  if (item) _renderQsDetail(item);
}

// ── 詳細描画 ──
function _renderQsDetail(item) {
  const el = document.getElementById('qs-detail-panel');
  if (!el) return;

  const pc = QS_PROGRESS_COLORS[item.progress] || QS_PROGRESS_COLORS['未着手'];
  const totalFmt = item.totalAmount > 0 ? '¥' + item.totalAmount.toLocaleString() : '—';

  // 各見積タイプのカード行
  const typeRows = QS_TYPES_JS.map(t => {
    const it     = item.items[t] || { quoteNo:'', amount:null, status:'未作成' };
    const sc     = QS_STATUS_COLORS[it.status] || QS_STATUS_COLORS['未作成'];
    const amtStr = (it.amount !== null && it.amount !== undefined) ? '¥' + Number(it.amount).toLocaleString() : '—';
    const nextStatus = _qsNextStatus(it.status);
    return `
      <tr style="border-bottom:1px solid var(--border-light);">
        <td style="padding:10px 12px;font-weight:600;font-size:13px;white-space:nowrap;">${_esc(t)}</td>
        <td style="padding:10px 8px;font-size:12px;color:var(--text-sub);font-family:monospace;">${_esc(it.quoteNo||'—')}</td>
        <td style="padding:10px 8px;font-size:13px;text-align:right;font-weight:600;">${amtStr}</td>
        <td style="padding:10px 8px;text-align:center;">
          <button onclick="cycleQsStatus('${_esc(item.id)}','${_esc(t)}','${_esc(it.status)}')"
            style="padding:3px 10px;border-radius:12px;border:1.5px solid ${sc.border};background:${sc.bg};color:${sc.text};font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;"
            title="クリックで「${_esc(nextStatus)}」に変更">
            ${_esc(it.status)}
          </button>
        </td>
      </tr>`;

// ── 次のステータスを返す（サイクル） ──
function _qsNextStatus(current) {
  const list = ['未作成', '作成中', '承認待ち', '発行済'];
  const idx  = list.indexOf(current);
  if (idx < 0 || idx === list.length - 1) return list[0]; // 却下 or 発行済→未作成
  return list[idx + 1];
}

// ── ステータスをワンクリックで次へ進める ──
function cycleQsStatus(id, type, currentStatus) {
  const item = _allQsItems.find(i => i.id === id);
  if (!item) return;

  const next = _qsNextStatus(currentStatus);

  // ローカルで即時反映
  if (!item.items[type]) item.items[type] = { quoteNo:'', amount:null, status:'未作成' };
  item.items[type].status = next;

  // 進捗再計算（固定4種＋追加見積）
  const statuses = QS_TYPES_JS.map(t => (item.items[t]||{}).status || '未作成');
  (item.extraItems || []).forEach(ei => statuses.push(ei.status || '未作成'));
  const progress = _calcQsProgressJs(statuses);
  item.progress  = progress;

  // 画面即時更新
  _renderQsList(_filteredQsItems);
  _renderQsDetail(item);

  // サーバー保存
  _saveQsToServer(item);
}

// ── JS側 進捗計算（固定4種＋追加見積の状態配列を受け取る） ──
function _calcQsProgressJs(statuses) {
  if (!statuses || statuses.length === 0) return '未着手';
  if (statuses.some(s => s === '却下'))   return '要確認';
  if (statuses.every(s => s === '発行済')) return '完了';
  if (statuses.every(s => s === '未作成')) return '未着手';
  return '進行中';
}

// ── 追加見積ステータスをワンクリックで次へ進める ──
function cycleQsExtraStatus(id, idx, currentStatus) {
  const item = _allQsItems.find(i => i.id === id);
  if (!item || !item.extraItems || !item.extraItems[idx]) return;
  const next = _qsNextStatus(currentStatus);
  item.extraItems[idx].status = next;
  // 進捗再計算
  const statuses = QS_TYPES_JS.map(t => (item.items[t]||{}).status || '未作成');
  item.extraItems.forEach(ei => statuses.push(ei.status || '未作成'));
  item.progress = _calcQsProgressJs(statuses);
  _renderQsList(_filteredQsItems);
  _renderQsDetail(item);
  _saveQsToServer(item);
}

// ── サーバーへ保存 ──
function _saveQsToServer(item) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) showToast('保存エラー: ' + ((res||{}).error||'不明'), true);
    })
    .handleApiRequest('quoteSetSave', {
      id:            item.id,
      requestDate:   item.requestDate,
      subject:       item.subject,
      client:        item.client,
      assignee:      item.assignee,
      rakurakuNo:    item.rakurakuNo,
      boardCategory: item.boardCategory || '',
      modelCode:     item.modelCode || '',
      modelName:     item.modelName || '',
      items:         item.items,
      extraItems:    item.extraItems || [],
      memo:          item.memo,
    });
}

// ── 保存 ──
function saveQs(id) {
  const subject = document.getElementById('qs-f-subject')?.value?.trim();
  if (!subject) { showToast('案件名は必須です', true); return; }

  const items = {};
  QS_TYPES_JS.forEach(t => {
    const qno = document.querySelector(`[name="qno_${t}"]`)?.value?.trim() || '';
    const amt = document.querySelector(`[name="amt_${t}"]`)?.value;
    const st  = document.querySelector(`[name="st_${t}"]`)?.value || '未作成';
    items[t] = {
      quoteNo: qno,
      amount:  (amt !== '' && amt !== undefined && amt !== null) ? Number(amt) : null,
      status:  st,
    };
  });

  const payload = {
    id:          id || '',
    subject:     subject,
    client:      document.getElementById('qs-f-client')?.value?.trim() || '',
    assignee:    document.getElementById('qs-f-assignee')?.value?.trim() || '',
    requestDate: document.getElementById('qs-f-date')?.value || '',
    rakurakuNo:    document.getElementById('qs-f-rakuraku')?.value?.trim() || '',
    boardCategory: document.getElementById('qs-f-category')?.value?.trim() || '',
    modelCode:     document.getElementById('qs-f-model-code')?.value?.trim() || '',
    modelName:     document.getElementById('qs-f-model-name')?.value?.trim() || '',
    memo:          document.getElementById('qs-f-memo')?.value?.trim() || '',
    items:         items,
    extraItems:    (() => {
      const tbody = document.getElementById('qs-extra-tbody');
      if (!tbody) return [];
      return Array.from(tbody.rows).map(tr => ({
        name:    tr.querySelector('[data-field="name"]')?.value?.trim() || '',
        quoteNo: tr.querySelector('[data-field="qno"]')?.value?.trim()  || '',
        amount:  (() => { const v = tr.querySelector('[data-field="amt"]')?.value; return (v !== '' && v != null) ? Number(v) : null; })(),
        status:  tr.querySelector('[data-field="st"]')?.value || '未作成',
      })).filter(ei => ei.name);
    })(),
  };

  const btn = document.querySelector('#qs-modal-overlay .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '保存中…'; }

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('✅ 保存しました');
        document.getElementById('qs-modal-overlay')?.remove();
        loadQuoteSetPage();
      } else {
        showToast('保存エラー: ' + ((res||{}).error||'不明'), true);
        if (btn) { btn.disabled = false; btn.textContent = '💾 保存'; }
      }
    })
    .withFailureHandler(function(e) {
      showToast('通信エラー', true);
      if (btn) { btn.disabled = false; btn.textContent = '💾 保存'; }
    })
    .handleApiRequest('quoteSetSave', payload);
}

// ── 削除 ──
function deleteQs(id) {
  if (!confirm('この見積セットを削除しますか？\n（この操作は元に戻せません）')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('🗑️ 削除しました');
        _selectedQsId = null;
        const detEl = document.getElementById('qs-detail-panel');
        if (detEl) detEl.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);"><div style="font-size:48px;margin-bottom:12px;">📦</div><div style="font-size:15px;font-weight:600;">案件を選択してください</div></div>';
        loadQuoteSetPage();
      } else {
        showToast('削除エラー: ' + ((res||{}).error||'不明'), true);
      }
    })
    .handleApiRequest('quoteSetDelete', { id });
}

// ============================================================
// 見積提出管理
// ============================================================

function loadSubmitMgmt() {
  const el = document.getElementById('sm-list-container');
  if (el) el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">読み込み中…</div>';
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        if (el) el.innerHTML = '<div style="padding:20px;color:var(--danger);">読み込みエラー: ' + _esc((res||{}).error||'不明') + '</div>';
        return;
      }
      _allSmItems = res.items || [];
      _filteredSmItems = [..._allSmItems];
      _updateSmMachineFilter(res.machines || []);
      _renderSmList(_filteredSmItems);
    })
    .withFailureHandler(function(e) {
      if (el) el.innerHTML = '<div style="padding:20px;color:var(--danger);">通信エラー</div>';
    })
    .handleApiRequest('qsGetAll', {});
}

function _updateSmMachineFilter(machines) {
  const sel = document.getElementById('sm-machine-filter');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">🏭 すべての機種（' + _allSmItems.length + '件）</option>' +
    machines.map(m => `<option value="${_esc(m)}" ${m===cur?'selected':''}>${_esc(m)}</option>`).join('');
}

function filterSubmitMgmt() {
  const machine = (document.getElementById('sm-machine-filter')?.value || '').trim();
  const comp    = (document.getElementById('sm-composition-filter')?.value || '').trim();
  const kw      = (document.getElementById('sm-keyword')?.value || '').toLowerCase().trim();
  _filteredSmItems = _allSmItems.filter(r => {
    if (machine && r.machineCode !== machine) return false;
    if (comp    && r.composition !== comp) return false;
    if (kw) {
      const txt = [r.boardName, r.quoteNo, r.submitTo, r.remarks, r.brand, r.machineCode].join(' ').toLowerCase();
      if (!txt.includes(kw)) return false;
    }
    return true;
  });
  _renderSmList(_filteredSmItems);
}

function _smCompBadge(comp) {
  const MAP = {
    NEW:       ['🔵 新品', 'comp-badge comp-badge-NEW'],
    MIXED:     ['🟡 混在', 'comp-badge comp-badge-MIXED'],
    ALL_REUSE: ['🟢 全リユース', 'comp-badge comp-badge-ALL_REUSE'],
  };
  const [label, cls] = MAP[comp] || ['—', 'comp-badge'];
  return `<span class="${cls}">${label}</span>`;
}

function _smTypeLabel(compositionType) {
  const MAP = { '新品': '🔵 新品', 'リユース': '🟠 リユース', 'エコ': '🟢 エコ' };
  if (!compositionType) return '';
  return `<span style="font-size:10px;background:#f3f4f6;color:#374151;padding:1px 6px;border-radius:8px;margin-left:4px;">${_esc(MAP[compositionType]||compositionType)}</span>`;
}

function _renderSmList(items) {
  const el = document.getElementById('sm-list-container');
  if (!el) return;
  if (!items || items.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">見積データがありません</div>';
    return;
  }

  const machineFilter = (document.getElementById('sm-machine-filter')?.value || '').trim();

  // 機種フィルター中: 構成タイプ別グループ表示
  if (machineFilter) {
    const groups = { NEW: [], MIXED: [], ALL_REUSE: [], '': [] };
    items.forEach(r => { const g = r.composition || ''; if (groups[g] !== undefined) groups[g].push(r); else groups[''].push(r); });
    let html = '';
    [['NEW','🔵 新品のみ','comp-badge-NEW'],['MIXED','🟡 混在（新品＋リユース）','comp-badge-MIXED'],['ALL_REUSE','🟢 全リユース','comp-badge-ALL_REUSE'],['','その他','']]
      .forEach(([key, label, cls]) => {
        const g = groups[key];
        if (!g || g.length === 0) return;
        html += `<div style="margin-bottom:16px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 10px;background:#f8fafc;border-radius:6px;border-left:3px solid var(--primary);">
            <span class="comp-badge ${cls}" style="font-size:11px;">${label}</span>
            <span style="font-size:12px;color:var(--text-muted);">${g.length}件</span>
          </div>
          ${_smRenderRows(g)}
        </div>`;
      });
    el.innerHTML = `<div style="font-size:12px;color:var(--text-sub);margin-bottom:12px;">📊 機種 <strong>${_esc(machineFilter)}</strong> の見積一覧（${items.length}件）— 構成別グループ表示</div>${html}`;
    return;
  }

  el.innerHTML = _smRenderRows(items);
}

function _smRenderRows(items) {
  let html = `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;box-shadow:var(--shadow-sm);overflow:hidden;">
    <thead><tr style="background:#f0f2f5;font-size:11px;color:var(--text-muted);">
      <th style="padding:8px 12px;text-align:left;">機種</th>
      <th style="text-align:left;padding:8px;">基板名</th>
      <th style="text-align:left;padding:8px;">構成</th>
      <th style="text-align:left;padding:8px;">見積No</th>
      <th style="text-align:right;padding:8px;">金額</th>
      <th style="text-align:left;padding:8px;">提出先</th>
      <th style="text-align:left;padding:8px;">提出日</th>
      <th style="text-align:left;padding:8px;">構成タイプ</th>
      <th style="text-align:left;padding:8px;">ステータス</th>
      <th style="text-align:center;padding:8px;">操作</th>
    </tr></thead><tbody>`;
  items.forEach(r => {
    const amtStr = r.amount != null ? '¥' + Number(r.amount).toLocaleString() : '—';
    html += `<tr style="border-bottom:1px solid #f0f0f0;">
      <td style="padding:7px 12px;font-weight:600;color:var(--text);">${_esc(r.machineCode||'—')}</td>
      <td style="padding:7px 8px;color:var(--text-sub);">${_esc(r.boardName||'—')}</td>
      <td style="padding:7px 8px;">${_smCompBadge(r.composition)}</td>
      <td style="padding:7px 8px;font-family:monospace;color:var(--primary);">${_esc(r.quoteNo||'—')}</td>
      <td style="padding:7px 8px;text-align:right;font-weight:600;color:var(--danger);">${amtStr}</td>
      <td style="padding:7px 8px;">${_esc(r.submitTo||'—')}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--text-sub);">${_esc(r.submitDate||'—')}</td>
      <td style="padding:7px 8px;">${_smTypeLabel(r.compositionType)}</td>
      <td style="padding:7px 8px;"><span style="font-size:11px;padding:2px 6px;border-radius:8px;background:#f1f5f9;color:#64748b;">${_esc(r.status||'—')}</span></td>
      <td style="padding:7px 8px;text-align:center;">
        ${r.fileUrl ? `<a href="${_esc(r.fileUrl)}" target="_blank" style="font-size:16px;text-decoration:none;">📄</a>` : '—'}
      </td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function searchSubmitByAmount() {
  const amtEl = document.getElementById('sm-amount-input');
  const resEl = document.getElementById('sm-amount-results');
  if (!amtEl || !resEl) return;
  const amount = Number(amtEl.value);
  if (!amount || isNaN(amount)) { showToast('金額を入力してください', true); return; }
  resEl.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">🔍 照合中…</div>';
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) { resEl.innerHTML = '<div style="color:var(--danger);font-size:12px;">検索失敗: ' + _esc((res||{}).error||'不明') + '</div>'; return; }
      const items = res.items || [];
      if (items.length === 0) {
        resEl.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px 0;">±5%以内の見積書が見つかりませんでした</div>';
        return;
      }
      let html = `<div style="font-size:11px;color:var(--text-sub);margin-bottom:6px;">対象金額 ¥${Number(amount).toLocaleString()} の±5%以内 — ${items.length}件 マッチ</div>`;
      html += `<div style="display:flex;flex-direction:column;gap:4px;">`;
      items.forEach(r => {
        const diffSign = r.amount >= amount ? '+' : '-';
        html += `<div style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #bfdbfe;border-radius:6px;padding:6px 10px;flex-wrap:wrap;">
          <span style="font-size:10px;font-weight:700;background:${r.matchScore >= 98 ? '#dcfce7' : '#fef9c3'};color:${r.matchScore >= 98 ? '#15803d' : '#92400e'};padding:2px 6px;border-radius:8px;">★ ${r.matchScore}%</span>
          <span style="font-weight:700;color:var(--danger);">¥${Number(r.amount).toLocaleString()}</span>
          <span style="font-size:10px;color:var(--text-muted);">(${diffSign}${r.diffPct}%)</span>
          <span style="color:var(--primary);font-family:monospace;">${_esc(r.quoteNo||'—')}</span>
          <span>${_esc(r.machineCode||'—')}</span>
          <span style="color:var(--text-sub);">${_esc(r.boardName||'—')}</span>
          ${_smCompBadge(r.composition)}
          <span style="font-size:11px;color:var(--text-muted);">${_esc(r.submitDate||'—')}</span>
        </div>`;
      });
      html += `</div>`;
      resEl.innerHTML = html;
    })
    .withFailureHandler(function(e) {
      resEl.innerHTML = '<div style="color:var(--danger);font-size:12px;">通信エラー</div>';
    })
    .handleApiRequest('qsSearchByAmount', { amount: amount, tolerance: 5 });
}

function clearAmountSearch() {
  const amtEl = document.getElementById('sm-amount-input');
  const resEl = document.getElementById('sm-amount-results');
  if (amtEl) amtEl.value = '';
  if (resEl) resEl.innerHTML = '';
}

function openNewQsSubmitModal() {
  showToast('見積登録モーダルは準備中です');
}

</script>
