function setQuoteSort(key) {
  if (_quoteSortKey === key) { _quoteSortDir = _quoteSortDir === 'desc' ? 'asc' : 'desc'; }
  else { _quoteSortKey = key; _quoteSortDir = 'desc'; }
  _updateSortUI('qs-sort-key', 'qs-sort-dir', _quoteSortKey, _quoteSortDir);

function setLedgerSort(key) {
  if (_ledgerSortKey === key) { _ledgerSortDir = _ledgerSortDir === 'desc' ? 'asc' : 'desc'; }

  _updateSortUI('ledger-sort-key', 'ledger-sort-dir', _ledgerSortKey, _ledgerSortDir);
  applyLedgerFilter();
}
function _cmpByKey(a, b, key, dir) {
  const numKeys = ['quoteAmount','amount','orderAmount'];
  let va, vb;
  if (numKeys.includes(key)) {
    va = Number(a[key])||0; vb = Number(b[key])||0;
    return dir === 'desc' ? vb - va : va - vb;
  }
  if (key === 'issueDate' || key === 'quoteDate') {
    va = _dateSortKey(a[key]||a.quoteDate||''); vb = _dateSortKey(b[key]||b.quoteDate||'');
  } else {
    va = String(a[key]||'').toLowerCase(); vb = String(b[key]||'').toLowerCase();
  }
  if (va > vb) return dir === 'desc' ? -1 : 1;
  if (va < vb) return dir === 'desc' ? 1 : -1;
  return 0;
}
function _updateSortUI(selId, btnId, key, dir) {
  const sel = document.getElementById(selId); if (sel) sel.value = key;
  const btn = document.getElementById(btnId);
  if (btn) { btn.textContent = dir === 'desc' ? '↓ 降順' : '↑ 昇順'; btn.title = dir === 'desc' ? '昇順に切り替え' : '降順に切り替え'; }
}

// ── 日付ソートキー（新しい順：降順比較用） ──
// yyyy/MM/dd, yyyy-MM-dd, M/d/yyyy など様々な形式を ISO に正規化してソートキーを返す
function _dateSortKey(str) {
  if (!str) return '';
  const s = String(str).trim();
  // すでに yyyy/MM/dd または yyyy-MM-dd 形式
  const m1 = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m1) return m1[1] + m1[2].padStart(2,'0') + m1[3].padStart(2,'0');
  // M/d/yyyy
  const m2 = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m2) return m2[3] + m2[1].padStart(2,'0') + m2[2].padStart(2,'0');
  return s; // フォールバック
}
// 台帳レコードの PDF URL を取得（saveUrl → quoteNo で allQuotes を参照）
function _getLedgerPdfUrl(r) {
  if (r.saveUrl) return r.saveUrl;
  if (r.quoteNo) {
    const found = (_allQuotes || []).find(q => q.quoteNo === r.quoteNo && q.quotePdfUrl);
    if (found) return found.quotePdfUrl;
    const found2 = (S && S.all ? S.all : []).find(q => q.quoteNo === r.quoteNo && q.quotePdfUrl);
    if (found2) return found2.quotePdfUrl;
  }
  return '';
}

// ── CSV / PDF 出力 共通ユーティリティ ──

function _downloadCsv(filename, headers, rows) {
  const bom = '﻿';
  const escape = v => { const s = String(v == null ? '' : v); return (s.includes(',') || s.includes('\n') || s.includes('"')) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const lines = [headers.map(escape).join(','), ...rows.map(r => r.map(escape).join(','))];
  const blob = new Blob([bom + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('CSVを出力しました');
}

function _printWindow(title, headers, rows, extraCss) {
  const thHtml = headers.map(h => `<th>${h}</th>`).join('');
  const tbHtml = rows.map(r => `<tr>${r.map(c => `<td>${c == null || c === '' ? '—' : String(c).replace(/</g,'&lt;').replace(/>/g,'&gt;')}</td>`).join('')}</tr>`).join('');
  const w = window.open('', '_blank', 'width=1000,height=720');
  if (!w) { showToast('ポップアップをブロック解除してください', true); return; }
  w.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>${title}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Noto Sans JP",Meiryo,sans-serif;font-size:11px;color:#1e293b;padding:16px;}
    h2{font-size:14px;font-weight:700;margin-bottom:4px;}
    .meta{font-size:10px;color:#64748b;margin-bottom:12px;}
    table{width:100%;border-collapse:collapse;font-size:11px;}
    th{background:#f0f2f5;padding:5px 8px;border:1px solid #cbd5e1;font-weight:600;text-align:left;white-space:nowrap;}
    td{padding:4px 8px;border:1px solid #e2e8f0;vertical-align:top;word-break:break-all;}
    tr:nth-child(even) td{background:#f8fafc;}
    .footer{margin-top:12px;font-size:10px;color:#94a3b8;text-align:right;}
    @page{margin:10mm;}
    @media print{body{padding:0;} .no-print{display:none;}}
    ${extraCss||''}
  </style>
  </head><body>
  <div class="no-print" style="margin-bottom:12px;display:flex;gap:8px;">
    <button onclick="window.print()" style="padding:6px 16px;background:#1e40af;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">🖨️ 印刷 / PDF保存</button>
    <button onclick="window.close()" style="padding:6px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;cursor:pointer;">✕ 閉じる</button>
  </div>
  <h2>${title}</h2>
  <div class="meta">出力日時: ${new Date().toLocaleString('ja-JP')} ／ ${rows.length}件</div>
  <table><thead><tr>${thHtml}</tr></thead><tbody>${tbHtml}</tbody></table>
  <div class="footer">見積管理システム — ${title}</div>
  </body></html>`);
  w.document.close();
}

function _today() { const d = new Date(); return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2); }
function showToast(msg, isError=false){
  const t=document.getElementById('toast'); if(!t) return;
  t.textContent=(isError?'✗ ':'✓ ')+msg; t.style.background=isError?'#dc2626':'#1e293b';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3500);
}

// ── サイドバー ──
// DEFAULT_MENU に存在するが stored に無いアイテムを末尾に追加してマージ
function _mergeMenuWithDefaults(stored) {
  if (!stored || stored.length === 0) return JSON.parse(JSON.stringify(DEFAULT_MENU));
  const ids = new Set(stored.map(i => i.id));
  const merged = JSON.parse(JSON.stringify(stored));
  DEFAULT_MENU.forEach(d => { if (!ids.has(d.id)) merged.push(JSON.parse(JSON.stringify(d))); });
  return merged;
}

function renderSidebar() {
  const container = document.getElementById('sidebar-nav-container'); if(!container) return;
  google.script.run.withSuccessHandler(res => {
    if (res && res.success && res.menuConfig) userMenuConfig = _mergeMenuWithDefaults(res.menuConfig);
    else userMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
    const sections = {};
    userMenuConfig.forEach(item=>{ if(!item.visible) return; if(item.adminOnly && !IS_ADMIN) return; if(!sections[item.section]) sections[item.section]=[]; sections[item.section].push(item); });
    let html='';
    Object.keys(sections).forEach(section=>{
      html += `<div class="sidebar-section-label">${section}</div>`;
      sections[section].forEach(item=>{
        if(item.external) html += `<a class="nav-item nav-item-ext" href="${item.external}" target="_blank"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></a>`;
        else html += `<div class="nav-item" data-id="${item.id}" onclick="showPage('${item.id}')"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></div>`;
      });
    });
    container.innerHTML = html;
    const activePage = document.querySelector('.page.active'); if (activePage) { const pageId = activePage.id.replace('page-', ''); document.querySelectorAll('.nav-item[data-id]').forEach(t=>{ t.classList.toggle('active', t.dataset.id===pageId); }); }
  }).handleApiRequest('menuConfigLoad', null);
}

function showPage(name){
  document.querySelectorAll('.nav-item[data-id]').forEach(t=>{ t.classList.toggle('active', t.dataset.id===name); });
  const titleEl = document.getElementById('topbar-page-title'); if(titleEl) titleEl.textContent = PAGE_TITLES[name] || name;
  const contentEl = document.getElementById('content'); if(contentEl) contentEl.scrollTop=0;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const target = document.getElementById('page-'+name);
  if(!target){ console.warn('[showPage] page not found: page-'+name); return; }
  target.classList.add('active');

  if(name==='list'){ const ao=document.getElementById('area-order'); const aq=document.getElementById('area-quote'); if(ao) ao.style.display=''; if(aq) aq.style.display='none'; }
  if(name==='ledger' && typeof loadLedger==='function') loadLedger();
  if(name==='calendar' && typeof loadCalendar==='function') loadCalendar();
  if(name==='matching' && typeof loadMatchingCandidates==='function') loadMatchingCandidates();
  if(name==='drivesearch'){ if(typeof initDriveSearchPage==='function') initDriveSearchPage(); if(typeof clearDriveSearch==='function') clearDriveSearch(); }
  if(name==='admin') _onShowAdmin();
  if(name==='model') { switchMasterTab('model'); loadModelMaster(); }
  if(name==='board')  { showPage('model'); switchMasterTab('board'); return; }
  if(name==='checklist' && typeof initChecklistPage==='function') initChecklistPage();
  if(name==='quotecheck' && typeof initQuoteCheckPage==='function') initQuoteCheckPage();
  if(name==='quoteset')   loadQuoteSetPage();
  if(name==='submitmgmt') loadSubmitMgmt();
  if(name==='maker')      loadMakerPage();
  if(name==='simulation') loadProfitSimulation();
  if(name==='workflow') loadWorkflowBoard();
  if(name==='analysis') loadAnalysis();
  // カスタム書類ページへの直接遷移は showCustomDocPage() を使う（このルートは通常通らない）
}

function startInlineEdit(e, id, field, val, type = 'mgmt') {
  e.stopPropagation(); const td = e.currentTarget; if (td.querySelector('input')) return;
  const input = document.createElement('input'); input.type = (field.includes('Amount') || field === 'amount') ? 'number' : 'text'; input.className = 'inline-edit-input'; input.value = val === '—' ? '' : val;
  input.onblur = () => saveInlineEdit(td, id, field, input.value, val, type);
  input.onkeydown = (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); } if (ev.key === 'Escape') { td.innerHTML = val || '—'; } };
  td.innerHTML = ''; td.appendChild(input); input.focus(); input.select();
}
function saveInlineEdit(td, id, field, newVal, oldVal, type) {
  const isAmt = field.includes('Amount') || field === 'amount' || field === 'quoteAmount' || field === 'costAmount';
  if (newVal === oldVal) {
    let dv = newVal || '—';
    if (isAmt && newVal) dv = '¥' + Number(newVal).toLocaleString();
    if (field === 'quoteNo' || field === 'orderNo') dv = `<strong>${dv}</strong>`;
    td.innerHTML = dv; return;
  }
  td.innerHTML = `<span style="color:#94a3b8;font-size:11px;">🔄 保存中...</span>`;
  // ── checklist ──
  if (type === 'checklist') {
    const payload = { itemId: id };
    payload[field] = isAmt ? (newVal ? Number(newVal) : 0) : newVal;
    google.script.run.withSuccessHandler(res => {
      if (res.success) {
        showToast('✅ 更新しました');
        // メモリ更新
        for (const sec of (_clSections||[])) { const it = sec.items.find(x => x.itemId === id); if (it) { it[field] = payload[field]; break; } }
        let dv = newVal || '—';
        if (isAmt && newVal) dv = '¥' + Number(newVal).toLocaleString();
        if (field === 'pdfUrl' && newVal) dv = `<a href="${newVal}" target="_blank" style="font-size:16px;text-decoration:none;">📄</a>`;
        td.innerHTML = dv;
      } else { showToast('❌ 更新失敗: ' + res.error, true); td.innerHTML = oldVal || '—'; }
    }).withFailureHandler(() => { showToast('❌ 通信エラー', true); td.innerHTML = oldVal || '—'; })
      .handleApiRequest('checklistSaveItem', payload);
    return;
  }
  // ── ledger ──
  if (type === 'ledger' || String(id).startsWith('LEDGER_')) {
    const realId = String(id).replace('LEDGER_', ''); const payload = { ledgerId: realId }; payload[field] = (field === 'amount') ? (newVal ? Number(newVal) : null) : newVal;
    google.script.run.withSuccessHandler(res => {
      if(res.success){ showToast('✅ 更新しました'); let item = _allLedgerItems.find(r => r.ledgerId === realId); if (item) item[field] = payload[field];
        let qItem = _allQuotes.find(r => r.id === 'LEDGER_' + realId); if (qItem) { if(field==='quoteNo') qItem.quoteNo = newVal; if(field==='subject') qItem.subject = newVal; if(field==='dest') { qItem.destCompany = newVal; qItem.client = newVal; } if(field==='amount') qItem.quoteAmount = newVal; }
        let displayVal = newVal || '—'; if (field === 'amount' && newVal) displayVal = '¥' + Number(newVal).toLocaleString(); if (field === 'quoteNo') displayVal = `<strong>${displayVal}</strong>`; td.innerHTML = displayVal;
      } else { showToast('❌ 更新失敗', true); td.innerHTML = oldVal || '—'; }
    }).handleApiRequest('ledgerSave', payload);
    return;
  }
  // ── mgmt ──
  const payload = { mgmtId: id }; payload[field] = isAmt ? (newVal ? Number(newVal) : null) : newVal;
  google.script.run.withSuccessHandler(res => {
    if(res.success){ showToast('✅ 更新しました'); let item = S.all.find(r => r.id === id); if (item) item[field] = payload[field];
      let qItem = _allQuotes.find(r => r.id === id); if (qItem) { qItem[field] = payload[field]; if (field === 'client') qItem.destCompany = newVal; }
      let displayVal = newVal || '—'; if (isAmt && newVal) displayVal = Number(newVal).toLocaleString() + ' 円'; if (field === 'quoteNo' || field === 'orderNo') displayVal = `<strong>${displayVal}</strong>`; td.innerHTML = displayVal; if (isAmt) _updateSummary();
    } else { showToast('❌ 更新失敗', true); td.innerHTML = oldVal || '—'; }
  }).handleApiRequest('updateMgmt', payload);
}

// ── ★インライン編集（日付型）── mgmt / ledger 両対応
function startInlineEditDate(e, id, field, val, type) {
  e.stopPropagation();
  const td = e.currentTarget;
  if (td.querySelector('input')) return;
  const inputVal = val ? val.replace(/\//g, '-') : '';
  const input = document.createElement('input');
  input.type = 'date';
  input.className = 'inline-edit-input';
  input.value = inputVal;
  input.style.cssText = 'padding:2px 4px;font-size:13px;border:1px solid var(--primary);border-radius:4px;width:130px;';
  const emptyHtml = '<span style="color:var(--text-muted);">—</span>';
  input.onblur = () => {
    const raw = input.value;
    const formatted = raw ? raw.replace(/-/g, '/') : '';
    if (formatted === val) { td.innerHTML = formatted || emptyHtml; return; }
    td.innerHTML = '<span style="color:#94a3b8;font-size:11px;">🔄 保存中...</span>';
    const isChecklist = type === 'checklist';
    const isLedger = !isChecklist && (type === 'ledger' || String(id).startsWith('LEDGER_'));
    const realId = String(id).replace('LEDGER_', '');
    if (isChecklist) {
      const payload = { itemId: id }; payload[field] = formatted;
      google.script.run.withSuccessHandler(res => {
        if (res && res.success) {
          showToast('✅ 更新しました');
          for (const sec of (_clSections||[])) { const it = sec.items.find(x=>x.itemId===id); if(it){it[field]=formatted;break;} }
          td.innerHTML = formatted || emptyHtml;
        } else { showToast('❌ 更新失敗', true); td.innerHTML = val || emptyHtml; }
      }).withFailureHandler(()=>{ showToast('❌ 通信エラー',true); td.innerHTML = val||emptyHtml; })
        .handleApiRequest('checklistSaveItem', payload);
    } else if (isLedger) {
      const payload = { ledgerId: realId }; payload[field] = formatted;
      google.script.run.withSuccessHandler(res => {
        if (res && res.success) {
          showToast('✅ 更新しました');
          const item = _allLedgerItems.find(r => r.ledgerId === realId);
          if (item) item[field] = formatted;
          td.innerHTML = formatted || emptyHtml;
        } else { showToast('❌ 更新失敗', true); td.innerHTML = val || emptyHtml; }
      }).withFailureHandler(() => { showToast('❌ 通信エラー', true); td.innerHTML = val || emptyHtml; })
        .handleApiRequest('ledgerSave', payload);
    } else {
      const payload = { mgmtId: id }; payload[field] = formatted;
      google.script.run.withSuccessHandler(res => {
        if (res && res.success) {
          showToast('✅ 更新しました');
          const item = S.all.find(r => r.id === id);
          if (item) item[field] = formatted;
          td.innerHTML = formatted || emptyHtml;
        } else { showToast('❌ 更新失敗', true); td.innerHTML = val || emptyHtml; }
      }).withFailureHandler(() => { showToast('❌ 通信エラー', true); td.innerHTML = val || emptyHtml; })
        .handleApiRequest('updateMgmt', payload);
    }
  };
  input.onkeydown = (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { td.innerHTML = val || emptyHtml; }
  };
  td.innerHTML = ''; td.appendChild(input); input.focus();
}

function _renderPagination(total) {
  const pages = Math.ceil(total/S.limit);
  const pEl = document.getElementById('pagination');
  if (!pEl) return;
  if (pages <= 1) { pEl.innerHTML = ''; return; }
  let h = '';
  if (S.page > 1) h += `<button class="page-btn" onclick="goPage(${S.page-1})">‹</button>`;
  const start = Math.max(1, S.page - 4);
  const end = Math.min(pages, start + 8);
  if (start > 1) h += `<button class="page-btn" onclick="goPage(1)">1</button><span style="padding:4px 2px;color:var(--text-sub);">…</span>`;
  for (let i = start; i <= end; i++) h += `<button class="page-btn ${i===S.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < pages) h += `<span style="padding:4px 2px;color:var(--text-sub);">…</span><button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  if (S.page < pages) h += `<button class="page-btn" onclick="goPage(${S.page+1})">›</button>`;
  pEl.innerHTML = h;
}

// 金額・単価マッチ：合計金額や明細単価のいずれかが target±tol% に入れば true。金額未入力なら全件通過
function _amtMatch(values, targetRaw, tolPct){
  const target = Number(targetRaw);
  if(!target || isNaN(target)) return true;            // 金額未入力 → フィルタ無効
  const vals = (values||[]).map(Number).filter(v=>!isNaN(v) && v>0);
  if(vals.length === 0) return false;
  if(!tolPct) return vals.some(v=>Math.round(v)===Math.round(target)); // 完全一致
  const lo = target*(1-tolPct/100), hi = target*(1+tolPct/100);
  return vals.some(v=>v>=lo && v<=hi);
}

  const amtTolEl = document.getElementById('amount-tol'); const amtTol = amtTolEl ? Number(amtTolEl.value) : 0;

  const quoteLinks = item.quotePdfUrl ? `<a href="${item.quotePdfUrl}" target="_blank" style="display:inline-block; background:white; padding:2px 8px; border-radius:4px; border:1px solid var(--border); text-decoration:none; font-size:11px;">📄 見積書PDF</a>` : '';

  const infoHtml='<table style="width:100%;font-size:13px;border-collapse:collapse;">'+rows.map(([k,v])=>`<tr><td style="padding:8px 10px;font-weight:600;width:30%;color:var(--text-sub);border-bottom:1px solid var(--border);background:#fafafa;">${k}</td><td style="padding:8px 10px;border-bottom:1px solid var(--border);">${v}</td></tr>`).join('')+'</table>';

  // ★ 注文書の機種コードで候補を自動絞り込み
  const _orderModelCodes = (item.modelCode||'').split(/[,、\/\s]+/).map(c=>c.trim()).filter(Boolean);
  function _matchesOrderModel(candidateModelCode) {
    if (_orderModelCodes.length === 0) return true; // 機種コードなし→全件表示
    const cCodes = (candidateModelCode||'').split(/[,、\/\s]+/).map(c=>c.trim()).filter(Boolean);
    return cCodes.some(c => _orderModelCodes.indexOf(c) >= 0);
  }
  // 候補ごとに機種コードを _allQuotes / S.all から補完
  const _enrichedCandidates = _qCandidates.map(c => {
    const q = (_allQuotes||[]).find(r=>r.id===c.mgmtId) || (S&&S.all||[]).find(r=>r.id===c.mgmtId);
    return Object.assign({}, c, { modelCode: q ? (q.modelCode||q.machineCode||'') : '' });
  });
  // 機種コードが一致するものを先頭・不一致を後ろに（完全に除外はしない）
  const _matchedCandidates  = _enrichedCandidates.filter(c =>  _matchesOrderModel(c.modelCode));
  const _otherCandidates    = _enrichedCandidates.filter(c => !_matchesOrderModel(c.modelCode));
  const _sortedCandidates   = [..._matchedCandidates, ..._otherCandidates];

  const _makeOption = c => {
    const modelTag = c.modelCode ? ` [${c.modelCode}]` : '';
    const matched  = _matchesOrderModel(c.modelCode);
    return `<option value="${c.mgmtId}" data-pdf-url="${c.pdfUrl||''}" data-model-code="${c.modelCode||''}"${matched?'':' style="color:#aaa;"'}>${c.quoteNo}${modelTag}${c.itemName?' 「'+c.itemName+'」':''}</option>`;
  };
  const _qOptions = `<option value="" data-pdf-url="" data-model-code="">-- 見積書を選択 (${_matchedCandidates.length}件一致 / 全${_enrichedCandidates.length}件) --</option>`
    + _sortedCandidates.map(_makeOption).join('');

  // 見積書候補の検索バー付きオプション生成
  let _allQuoteCandidates = _sortedCandidates.slice();
  
  const oTable = detail.orderLines && detail.orderLines.length ? `

          <input type="text" id="detail-quote-search" placeholder="見積No・件名・機種コード..."

          <button style="font-size:10px;padding:3px 7px;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:4px;cursor:pointer;color:#475569;" onclick="document.getElementById('detail-quote-search').value='';_filterDetailQuoteOptions('','${item.id}',${detail.orderLines.map(l=>l.lineNo).join(',') ? '['+detail.orderLines.map(l=>l.lineNo).join(',')+']' : '[]'})">全件表示</button>
        </div>
      </div>
      <p style="font-size:11px;color:var(--text-sub);margin-bottom:6px;">💡 「紐づく見積」欄で各明細行に対応する見積書を選択・確定できます</p>
    <div style="overflow-x:auto;">
    <table style="min-width:800px;width:100%;border-collapse:collapse;font-size:12px;">
      <thead><tr style="background:#f8f9fa;">
        <th style="padding:6px;border:1px solid var(--border);">#</th><th style="padding:6px;border:1px solid var(--border);">品名</th><th style="padding:6px;border:1px solid var(--border);">仕様</th><th style="padding:6px;border:1px solid var(--border);">数量</th><th style="padding:6px;border:1px solid var(--border);">単価</th><th style="padding:6px;border:1px solid var(--border);">金額</th><th style="padding:6px;border:1px solid var(--border);">備考</th><th style="padding:6px;border:1px solid var(--border);min-width:240px;">紐づく見積</th>
      </tr></thead>
      <tbody>${detail.orderLines.map(l=>`<tr>
        <td style="padding:6px;border:1px solid var(--border);text-align:center;">${l.lineNo}</td>
        <td style="padding:6px;border:1px solid var(--border);">${l.itemName||''}</td>
        <td style="padding:6px;border:1px solid var(--border);font-size:11px;color:var(--text-sub);">${l.spec||''}</td>
        <td style="padding:6px;border:1px solid var(--border);text-align:right;">${l.qty||''}</td>
        <td style="padding:6px;border:1px solid var(--border);text-align:right;">${l.unitPrice?Number(l.unitPrice).toLocaleString():''}</td>

        <td style="padding:6px;border:1px solid var(--border);">${l.remarks||''}</td>
        <td style="padding:6px;border:1px solid var(--border);">
          <div style="display:flex;gap:4px;align-items:center;">
            <select id="line-sel-${item.id}-${l.lineNo}" onchange="_updateLinePdfLink(this, '${item.id}', ${l.lineNo})" style="font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;flex:1;min-width:120px;">${_qOptions}</select>
            <a id="line-pdf-${item.id}-${l.lineNo}" href="#" target="_blank" title="見積書PDFを開く" style="display:none; font-size:14px; text-decoration:none; margin:0 4px;" onclick="event.stopPropagation()">📄</a>
            <button onclick="_linkLineConfirm('${item.id}',${l.lineNo})" style="font-size:11px;padding:3px 8px;background:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;">確定</button>
          </div>
        </td>
      </tr>`).join('')}</tbody>
    </table></div></div>` : '';

  let linkHtml = '';
  if (item.orderNo && !item.quoteNo) {
    let quoteOpts = '';

        return qmc.some(c => _omc.indexOf(c) >= 0);

      quoteOpts = unlinkedQuotes.map(q => {

function _saveCompositionTypeFromDetail(mgmtId, quoteNo, compositionType) {
  // 台帳エントリを quoteNo で検索
  const ledgerItem = (_allLedgerItems || []).find(r => r.quoteNo === quoteNo);
  if (ledgerItem && ledgerItem.ledgerId) {
    // 台帳エントリあり → ledgerSave で更新
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) {
          showToast('✅ 種別タブを「' + (compositionType || '未設定') + '」に更新しました');
          // ローカルキャッシュ更新
          if (ledgerItem) ledgerItem.compositionType = compositionType;
          // 一覧を再描画
          _renderQuoteTable();
          const el = document.getElementById('qd-type-badge-preview');
          if (el) el.innerHTML = _typeBadge(compositionType) || '<span style="font-size:12px;color:var(--text-muted);">未設定</span>';
        } else { showToast('❌ 更新失敗: ' + (res ? res.error : '不明'), true); }
      })
      .withFailureHandler(err => showToast('通信エラー: ' + err.message, true))
      .handleApiRequest('ledgerSave', { ledgerId: ledgerItem.ledgerId, compositionType: compositionType });
  } else {
    // 台帳エントリなし → 台帳に新規登録してから設定
    if (!quoteNo) { showToast('見積番号が見つかりません', true); return; }
    const confirmed = confirm('この見積書は見積台帳に未登録です。\n台帳に登録して種別タブを設定しますか？');
    if (!confirmed) return;
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) {
          showToast('✅ 台帳に登録し「' + (compositionType || '未設定') + '」を設定しました');
          // 台帳データを再読み込み
          google.script.run.withSuccessHandler(r2 => {
            if (r2 && r2.success) { _allLedgerItems = r2.items || []; _renderQuoteTable(); }
          }).handleApiRequest('ledgerGetAll', null);
        } else { showToast('❌ ' + (res ? res.error : '失敗'), true); }
      })
      .withFailureHandler(err => showToast('通信エラー: ' + err.message, true))
      .handleApiRequest('ledgerSave', { quoteNo: quoteNo, compositionType: compositionType, subject: '', status: '作成予定' });
  }
}

// ─── ④ 発注書詳細の紐づけ候補 見積書検索フィルタ ───
function _filterDetailQuoteOptions(kw, mgmtId, lineNos) {
  const lines = Array.isArray(lineNos) ? lineNos : [];
  const kwLower = (kw || '').trim().toLowerCase();
  lines.forEach(lineNo => {
    const sel = document.getElementById('line-sel-' + mgmtId + '-' + lineNo);
    if (!sel) return;
    Array.from(sel.options).forEach(opt => {
      if (!opt.value) { opt.style.display = ''; return; } // プレースホルダは常に表示
      if (!kwLower) { opt.style.display = ''; return; }   // 空欄→全件表示
      const optText    = opt.text.toLowerCase();
      const modelCode  = (opt.getAttribute('data-model-code') || '').toLowerCase();
      // テキスト or 機種コードで部分一致
      const matched = optText.includes(kwLower) || modelCode.split(/[,、\/\s]+/).some(c => c && c.includes(kwLower));
      opt.style.display = matched ? '' : 'none';
    });
  });
}

// ★ 分析・レポート

let _analysisData = null;

function loadAnalysis() {
  const container = document.getElementById('analysis-container');
  if (!container) return;

  const now = new Date().getFullYear();
  const yearSel = document.getElementById('analysis-year-sel');

  // セレクターが空（初回）なら現在年±3年を埋める
  if (yearSel && (!yearSel.value || yearSel.options.length <= 1)) {
    yearSel.innerHTML = [now+1,now,now-1,now-2,now-3]
      .map(y=>`<option value="${y}" ${y===now?'selected':''}>${y}年</option>`).join('');
  }

  const year = yearSel && yearSel.value ? parseInt(yearSel.value, 10) : now;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>集計中...</div>';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        container.innerHTML = '<div class="loading" style="color:var(--danger);">読み込み失敗: ' + ((res && res.error) || '不明') + '</div>';
        return;
      }
      _analysisData = res;

      // 利用可能な年でセレクターを更新
      if (yearSel && res.availableYears && res.availableYears.length > 0) {
        const curVal = yearSel.value;
        const opts = Array.from(new Set([now+1, now, now-1, ...res.availableYears])).sort((a,b)=>b-a);
        yearSel.innerHTML = opts.map(y => `<option value="${y}" ${String(y)===String(curVal)?'selected':''}>${y}年</option>`).join('');
      }
      _renderAnalysis(res, container);
    })
    .withFailureHandler(function(err) {
      container.innerHTML = '<div class="loading" style="color:var(--danger);">通信エラー: ' + (err.message||err) + '</div>';
    })
    .handleApiRequest('getAnalysisReport', { year: year });
}

function _renderAnalysis(d, el) {
  const fmt = n => n ? '¥' + Number(n).toLocaleString() : '¥0';
  const maxAmt = Math.max(...d.months.map(m => m.quoteAmt || 0), ...d.months.map(m => m.orderAmt || 0), 1);
  const maxCnt = Math.max(...d.months.map(m => m.quotes || 0), ...d.months.map(m => m.orders || 0), 1);

  // ── KPI カード ──
  const kpis = `
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px;">
    ${_akpi('見積件数', d.totalQuotes + '件', '#2563eb')}
    ${_akpi('見積合計金額', fmt(d.totalQuoteAmt), '#2563eb')}
    ${_akpi('注文件数', d.totalOrders + '件', '#16a34a')}
    ${_akpi('注文合計金額', fmt(d.totalOrderAmt), '#16a34a')}
    ${_akpi('受注率', d.totalQuotes > 0 ? Math.round(d.totalOrders/d.totalQuotes*100)+'%' : '—', '#d97706')}
  </div>`;

  // ── 月別棒グラフ（CSS only） ──
  const barCols = d.months.map(m => {
    const qh = Math.round((m.quotes / maxCnt) * 80);
    const oh = Math.round((m.orders / maxCnt) * 80);
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0;">
      <div style="display:flex;align-items:flex-end;gap:2px;height:80px;">
        <div title="見積${m.quotes}件" style="width:12px;background:#2563eb;border-radius:3px 3px 0 0;height:${qh}px;min-height:${m.quotes>0?2:0}px;opacity:.85;transition:height .3s;"></div>
        <div title="注文${m.orders}件" style="width:12px;background:#16a34a;border-radius:3px 3px 0 0;height:${oh}px;min-height:${m.orders>0?2:0}px;opacity:.85;transition:height .3s;"></div>
      </div>
      <div style="font-size:9px;color:#64748b;white-space:nowrap;">${m.month}月</div>
      <div style="font-size:9px;font-weight:700;color:#2563eb;">${m.quotes}</div>
      <div style="font-size:9px;font-weight:700;color:#16a34a;">${m.orders}</div>
    </div>`;
  }).join('');

  const charts = `
  <div style="background:#fff;border-radius:12px;padding:18px 20px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);margin-bottom:16px;">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap;">
      <h3 style="font-size:14px;font-weight:700;margin:0;">${d.year}年 月別集計</h3>
      <div style="display:flex;gap:12px;font-size:11px;color:#64748b;">
        <span><span style="display:inline-block;width:10px;height:10px;background:#2563eb;border-radius:2px;margin-right:4px;"></span>見積件数</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#16a34a;border-radius:2px;margin-right:4px;"></span>注文件数</span>
      </div>
    </div>
    <div style="display:flex;gap:4px;align-items:flex-end;overflow-x:auto;padding-bottom:4px;">${barCols}</div>
  </div>`;

  // ── 金額グラフ ──
  const amtCols = d.months.map(m => {
    const qh = Math.round((m.quoteAmt / maxAmt) * 80);
    const oh = Math.round((m.orderAmt / maxAmt) * 80);
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0;">
      <div style="display:flex;align-items:flex-end;gap:2px;height:80px;">
        <div title="見積${fmt(m.quoteAmt)}" style="width:12px;background:#93c5fd;border-radius:3px 3px 0 0;height:${qh}px;min-height:${m.quoteAmt>0?2:0}px;transition:height .3s;"></div>
        <div title="注文${fmt(m.orderAmt)}" style="width:12px;background:#86efac;border-radius:3px 3px 0 0;height:${oh}px;min-height:${m.orderAmt>0?2:0}px;transition:height .3s;"></div>
      </div>
      <div style="font-size:9px;color:#64748b;white-space:nowrap;">${m.month}月</div>
    </div>`;

  const statusRank = d.statusRank.length > 0 ? `
  <div style="background:#fff;border-radius:12px;padding:16px 18px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);">
    <h3 style="font-size:13px;font-weight:700;margin-bottom:10px;">🏷️ ステータス別件数（全期間）</h3>

        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px;">

      </div>`;
    }).join('')}
  </div>` : '';

  el.innerHTML = kpis + charts + amtChart +
    `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;">${clientRank}${modelRank}${statusRank}</div>`;

function exportAnalysisCsv() {

  const rows = [
    ['月', '見積件数', '見積金額', '注文件数', '注文金額'],
    ...d.months.map(m => [m.label, m.quotes, m.quoteAmt, m.orders, m.orderAmt]),
    [],
    ['顧客名', '件数'],
    ...d.clientRank.map(c => [c.name, c.count]),
    [],
    ['機種コード', '見積件数', '注文件数', '注文金額'],

let _boardMasterData = { boards: [], products: [] };
let _boardSearchKw   = '';
let _allBoards       = [];
let _selectedBoardId = null;

function loadBoardList() { loadBoardMaster(); }

function loadBoardMaster() {
  const listEl = document.getElementById('board-list-container');
  // フォールバック: 旧container IDもサポート
  const c = listEl || document.getElementById('board-container');
  if (!c) return;
  c.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  if (listEl) _clearBoardDetail();
  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.success) {
        c.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ ' + (res ? res.error : '取得失敗') + '</div>';
        return;
      }
      _boardMasterData = res;
      _allBoards = res.boards || [];
      if (listEl) _renderBoardList(_allBoards);
      else _renderBoardMaster();
    })
    .withFailureHandler(err => {
      c.innerHTML = '<div class="loading" style="color:var(--danger);">通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('bomGetAll', null);
}

// 旧テーブルビュー互換（使用時はフォールバック）
function _renderBoardMaster() {
  _renderBoardList(_allBoards);
}

function _renderBoardList(items) {
  const listEl = document.getElementById('board-list-container');
  if (!listEl) return;
  const products = _boardMasterData.products || [];
  const productMap = {};
  products.forEach(p => { productMap[p.id] = p.name || p.id; });
  if (!items || items.length === 0) {
    listEl.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:13px;text-align:center;">基板データがありません<br><button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="openBoardAddModal()">＋ 基板を追加</button></div>';
    return;
  }
  listEl.innerHTML = items.map(b => {
    const active = b.id === _selectedBoardId ? 'board-list-item-active' : '';
    const productName = productMap[b.productId] || '';
    return `<div class="board-list-item ${active}" onclick="selectBoard('${_esc(b.id||'')}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="overflow:hidden;">
          <div style="font-weight:700;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${_esc(b.name||'（名称未設定）')}</div>
          <div style="font-size:11.5px;color:var(--text-sub);margin-top:2px;font-family:monospace;">${_esc(b.code||'')}</div>
          ${productName ? `<div style="font-size:10.5px;color:var(--text-muted);margin-top:1px;">🏭 ${_esc(productName)}</div>` : ''}
        </div>
        <div style="flex-shrink:0;margin-left:8px;">
          ${b.version ? `<span style="font-size:10.5px;background:#f0f2f5;border-radius:4px;padding:2px 6px;color:var(--text-sub);">${_esc(b.version)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectBoard(boardId) {
  _selectedBoardId = boardId;
  const kw = _boardSearchKw.toLowerCase();
  const filtered = _allBoards.filter(b =>
    !kw || (b.name||'').toLowerCase().includes(kw) || (b.code||'').toLowerCase().includes(kw)
  );
  _renderBoardList(filtered);

  const detailEl = document.getElementById('board-detail-panel');
  if (detailEl) detailEl.innerHTML = '<div class="loading"><div class="spinner"></div><br>詳細を取得中...</div>';

  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.success) {
        if (detailEl) detailEl.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ ' + (res ? res.error : '取得失敗') + '</div>';
        return;
      }
      _renderBoardDetail(res);
    })
    .withFailureHandler(err => {
      if (detailEl) detailEl.innerHTML = '<div class="loading" style="color:var(--danger);">通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('boardMasterGet', { boardId: boardId });
}

function _clearBoardDetail() {

        </div>
      </div>`;

  detailEl.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:10px;">

function switchBoardTab(name) {
  ['quote','order'].forEach(t => {
    const btn = document.getElementById('bdtab-' + t);
    const con = document.getElementById('bdtab-content-' + t);
    if (btn) btn.classList.toggle('active', t === name);
    if (con) con.style.display = (t === name) ? 'block' : 'none';
  });
}

function filterBoardList() {
  _boardSearchKw = (document.getElementById('board-search') || {}).value || '';
  const kw = _boardSearchKw.toLowerCase();
  const filtered = _allBoards.filter(b =>
    !kw || (b.name||'').toLowerCase().includes(kw) ||
    (b.code||'').toLowerCase().includes(kw) ||
    (b.desc||'').toLowerCase().includes(kw)
  );

}

function openBoardAddModal() {
  document.getElementById('board-edit-id').value = '';
  document.getElementById('board-edit-name').value = '';
  document.getElementById('board-edit-code').value = '';
  document.getElementById('board-edit-version').value = '';

function openBoardEditModal(b) {
  document.getElementById('board-edit-id').value = b.id || '';
  document.getElementById('board-edit-name').value = b.name || '';
  document.getElementById('board-edit-code').value = b.code || '';
  document.getElementById('board-edit-version').value = b.version || '';

function _populateBoardProductSelect(selectedId) {
  const sel = document.getElementById('board-edit-productId');
  if (!sel) return;
  const products = _boardMasterData.products || [];
  sel.innerHTML = '<option value="">（機種未選択）</option>' +
    products.map(p => `<option value="${_esc(p.id)}" ${p.id===selectedId?'selected':''}>${_esc(p.name||p.id)}</option>`).join('');
}

function closeBoardModal() {
  document.getElementById('board-modal').classList.remove('open');
}

function saveBoardEntry() {
  const id = document.getElementById('board-edit-id').value.trim();
  const name = document.getElementById('board-edit-name').value.trim();
  if (!name) { showToast('基板名は必須です', true); return; }
  const payload = {
    id        : id || ('board_' + Date.now()),
    name      : name,
    code      : document.getElementById('board-edit-code').value.trim(),
    productId : document.getElementById('board-edit-productId').value,
    version   : document.getElementById('board-edit-version').value.trim(),
    desc      : document.getElementById('board-edit-desc').value.trim(),
  };
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast('保存しました');
        closeBoardModal();
        const savedId = payload.id;
        loadBoardMaster();
        if (savedId) { _selectedBoardId = savedId; setTimeout(() => selectBoard(savedId), 900); }
      } else showToast('保存失敗: ' + (res.error||''), true);
    })
    .withFailureHandler(err => { showToast('通信エラー: ' + err.message, true); })
    .handleApiRequest('bomSaveBoard', payload);
}

function deleteBoardEntry(id) {
  if (!confirm('この基板データを削除しますか？')) return;
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast('削除しました');
        if (_selectedBoardId === id) { _selectedBoardId = null; _clearBoardDetail(); }
        loadBoardMaster();
      } else showToast('削除失敗: ' + (res.error||''), true);
    })
    .withFailureHandler(err => { showToast('通信エラー: ' + err.message, true); })
    .handleApiRequest('bomDeleteBoard', { id });
}

// ─── ③ 見積台帳モーダル確実に開く（ledger-add-modal使用） ───
function openLedgerAddModal(ledgerId) {
  const modal = document.getElementById('ledger-add-modal');
  if (!modal) { console.warn('ledger-add-modal not found'); return; }
  // フォームをリセット
  ['ledger-edit-id','ledger-quote-no','ledger-dest','ledger-machine-code','ledger-subject',
   'ledger-amount','ledger-board-name','ledger-model-no','ledger-save-url','ledger-remarks',
   'ledger-submit-to'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  if (document.getElementById('ledger-issue-date')) document.getElementById('ledger-issue-date').value = '';
  if (document.getElementById('ledger-status')) document.getElementById('ledger-status').value = '作成予定';
  if (document.getElementById('ledger-composition-type')) document.getElementById('ledger-composition-type').value = '';

  if (ledgerId) {
    const item = _allLedgerItems.find(r => r.ledgerId === ledgerId);
    if (item) {
      const sv = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
      sv('ledger-edit-id', ledgerId);
      sv('ledger-quote-no', item.quoteNo);
      sv('ledger-dest', item.dest || item.submitTo || '');
      sv('ledger-machine-code', item.machineCode || item.modelCode || '');
      sv('ledger-subject', item.subject);
      sv('ledger-amount', item.amount || '');
      sv('ledger-board-name', item.boardName || '');
      sv('ledger-model-no', item.modelNo || '');
      sv('ledger-save-url', item.saveUrl || '');
      sv('ledger-remarks', item.remarks || '');
      sv('ledger-submit-to', item.submitTo || '');
      if (document.getElementById('ledger-composition-type')) document.getElementById('ledger-composition-type').value = item.compositionType || '';
      if (item.issueDate || item.sentDate) {
        const d = (item.issueDate || item.sentDate || '').replace(/\//g, '-');
        if (document.getElementById('ledger-issue-date')) document.getElementById('ledger-issue-date').value = d;
      }
      if (document.getElementById('ledger-status')) document.getElementById('ledger-status').value = item.status || '作成予定';
      const titleEl = document.getElementById('ledger-add-title');
      if (titleEl) titleEl.textContent = '📝 見積台帳を編集';
    }
  } else {
    const titleEl = document.getElementById('ledger-add-title');
    if (titleEl) titleEl.textContent = '📝 見積予定を追加';
    const today = new Date();
    const dd = document.getElementById('ledger-issue-date');
    if (dd) dd.value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  }
  modal.classList.add('open');
}

function closeLedgerAddModal() {
  const modal = document.getElementById('ledger-add-modal');
  if (modal) modal.classList.remove('open');
}

function _openLedgerAddModalWithMachine(machine) {
  openLedgerAddModal(null);
  const el = document.getElementById('ledger-machine-code');
  if (el) el.value = machine;
}

function saveLedgerEntry() {
  const v = id => { const el = document.getElementById(id); return el ? String(el.value ?? '').trim() : ''; };
  const subject = v('ledger-subject');
  if (!subject) { showToast('件名は必須です', true); return; }
  const toSlash = s => s ? s.replace(/-/g, '/') : '';
  const payload = {
    ledgerId: v('ledger-edit-id') || undefined,
    quoteNo: v('ledger-quote-no') || undefined,
    issueDate: toSlash(v('ledger-issue-date')) || undefined,
    dest: v('ledger-dest') || undefined,
    machineCode: v('ledger-machine-code') || undefined,
    subject: subject,
    status: v('ledger-status') || '作成予定',
    amount: v('ledger-amount') ? Number(v('ledger-amount')) : undefined,
    boardName: v('ledger-board-name') || undefined,
    modelNo: v('ledger-model-no') || undefined,
    saveUrl: v('ledger-save-url') || undefined,
    remarks: v('ledger-remarks') || undefined,
    submitTo: v('ledger-submit-to') || undefined,
    compositionType: v('ledger-composition-type') || undefined,
  };
  Object.keys(payload).forEach(k => { if (payload[k] === undefined) delete payload[k]; });
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast('保存しました');
        closeLedgerAddModal();
        loadLedger();
        loadQuoteList();
      } else { showToast('保存失敗: ' + (res.error || ''), true); }
    })
    .withFailureHandler(err => { showToast('通信エラー: ' + (err.message || err), true); })
    .handleApiRequest('ledgerSave', payload);
}

function deleteLedgerEntry(ledgerId) {
  if (!confirm('この見積台帳データを削除しますか？')) return;
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('削除しました'); loadLedger(); loadQuoteList(); }

  }).handleApiRequest('ledgerDelete', { ledgerId });

// ★ メニュー設定（管理コンソール > メニュー設定タブ）
// ── 表示/非表示・順番変更・追加・URL添付・全ユーザー反映 ──
// ============================================================
let _editMenuConfig = [];

function renderMenuConfigList() {
  const container = document.getElementById('menu-editor-list');
  if (!container) return;
  // 未初期化なら現在のユーザー設定 or デフォルトを引き継ぐ
  if (!_editMenuConfig || _editMenuConfig.length === 0) {
    if (typeof userMenuConfig !== 'undefined' && userMenuConfig.length > 0) {
      _editMenuConfig = JSON.parse(JSON.stringify(userMenuConfig));
    } else {
      _editMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
    }
  }
  container.innerHTML = _editMenuConfig.map((item, index) => `
    <div style="background:#fff; border:1px solid var(--border); border-radius:6px; padding:8px 12px;
      display:flex; align-items:center; gap:8px; box-shadow:0 1px 2px rgba(0,0,0,0.05); margin-bottom:4px;">

      <!-- 上下移動ボタン -->
      <div style="display:flex; flex-direction:column; gap:2px; flex-shrink:0;">
        <button class="btn btn-outline btn-sm"
          style="padding:0; font-size:10px; height:20px; line-height:1; width:24px;"
          onclick="moveMenuConfigItem(${index}, -1)"
          ${index === 0 ? 'disabled' : ''}>▲</button>
        <button class="btn btn-outline btn-sm"
          style="padding:0; font-size:10px; height:20px; line-height:1; width:24px;"
          onclick="moveMenuConfigItem(${index}, 1)"
          ${index === _editMenuConfig.length - 1 ? 'disabled' : ''}>▼</button>
      </div>

      <!-- アイコン -->
      <input type="text" value="${_escAttr(item.icon||'')}"
        style="width:40px; text-align:center; padding:6px; border:1px solid var(--border); border-radius:4px; font-size:16px;"
        onchange="_editMenuConfig[${index}].icon=this.value"
        title="絵文字アイコン（例: 📋）">

      <!-- メニュー名 -->
      <input type="text" value="${_escAttr(item.label||'')}"
        style="flex:1; min-width:100px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:12px;"
        onchange="_editMenuConfig[${index}].label=this.value"
        title="メニュー名">

      <!-- セクション名 -->
      <input type="text" value="${_escAttr(item.section||'')}"
        style="width:110px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; color:var(--text-sub);"
        onchange="_editMenuConfig[${index}].section=this.value"
        placeholder="セクション名"
        title="サイドバーのセクション見出し">

      <!-- 外部URL -->
      <input type="text" value="${_escAttr(item.external||'')}"
        placeholder="外部URL (https://...)"
        style="width:170px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px;"
        onchange="_editMenuConfig[${index}].external=this.value"
        title="設定するとクリック時に別タブでURLを開きます">

      <!-- 表示・管理者専用 チェックボックス -->
      <div style="display:flex; flex-direction:column; gap:4px; flex-shrink:0; width:120px;">
        <label style="display:flex; align-items:center; gap:4px; font-size:11px; cursor:pointer; white-space:nowrap;">
          <input type="checkbox" ${item.visible ? 'checked' : ''}
            onchange="_editMenuConfig[${index}].visible=this.checked">
          <span>メニューに表示</span>
        </label>
        <label style="display:flex; align-items:center; gap:4px; font-size:11px; cursor:pointer; white-space:nowrap; color:var(--danger);">
          <input type="checkbox" ${item.adminOnly ? 'checked' : ''}
            onchange="_editMenuConfig[${index}].adminOnly=this.checked">
          <span>管理者のみ</span>
        </label>
      </div>

      <!-- 削除ボタン -->
      <button class="btn btn-danger btn-sm"
        style="padding:5px 8px; flex-shrink:0;"
        onclick="deleteMenuConfigItem(${index})"
        title="このメニュー項目を削除">✕</button>
    </div>
  `).join('');
}

function _escAttr(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 項目の上下移動
function moveMenuConfigItem(index, dir) {
  if (index + dir < 0 || index + dir >= _editMenuConfig.length) return;
  const temp = _editMenuConfig[index];
  _editMenuConfig[index] = _editMenuConfig[index + dir];
  _editMenuConfig[index + dir] = temp;
  renderMenuConfigList();
}

// 項目の削除
function deleteMenuConfigItem(index) {
  if (confirm('「' + _editMenuConfig[index].label + '」をメニューから削除しますか？\n※「初期状態にリセット」でいつでも元に戻せます')) {
    _editMenuConfig.splice(index, 1);
    renderMenuConfigList();
  }
}

function addMenuConfigItem() {
  const newId = 'custom_' + Date.now().toString(36);
  _editMenuConfig.push({

    icon: '🔗',

    visible: true,
    adminOnly: false,

  });

  // 末尾へスクロール
  setTimeout(() => {
    const list = document.getElementById('menu-editor-list');

      }
      _allModels = res.items || [];

    })
    .withFailureHandler(err => {
      listEl.innerHTML = '<div class="loading" style="color:var(--danger);">通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('modelMasterList', null);

// ── インライン編集開始 ──
function _startModelInlineEdit(el) {
  if (el.dataset.editing === '1') return;
  el.dataset.editing = '1';
  const modelCode    = el.dataset.modelCode;
  const field        = el.dataset.field;
  const currentValue = el.dataset.value;
  const isDesc       = field === 'description';

  // 入力欄を生成
  const input = isDesc ? document.createElement('textarea') : document.createElement('input');
  input.value = currentValue;
  if (!isDesc) { input.type = 'text'; }
  else { input.rows = 2; }
  input.style.cssText = `width:100%;padding:3px 6px;border:1.5px solid var(--primary);border-radius:4px;font-size:${isDesc ? '10.5' : '12'}px;font-family:inherit;box-sizing:border-box;background:#fff;resize:none;`;

  // 保存処理
  const commit = () => {
    const newVal = input.value.trim();
    delete el.dataset.editing;
    el.dataset.value = newVal;
    // DOM復元
    if (field === 'modelName') {
      el.innerHTML = newVal
        ? `<span class="mif-text">${_esc(newVal)}</span><span class="mif-icon">✏️</span>`
        : `<span class="mif-placeholder">機種名を入力…</span><span class="mif-icon">✏️</span>`;
    } else {
      el.innerHTML = newVal
        ? `<span class="mif-text">${_esc(newVal)}</span><span class="mif-icon">✏️</span>`
        : `<span class="mif-placeholder">説明を入力…</span><span class="mif-icon">✏️</span>`;
    }
    // ローカルキャッシュ更新
    const m = _allModels.find(m => m.modelCode === modelCode);
    if (m) m[field] = newVal;
    // 変更があればサーバーへ保存
    if (newVal !== currentValue) _saveModelFieldInline(modelCode, field, newVal);
  };

  // キャンセル処理
  const cancel = () => {
    delete el.dataset.editing;
    if (field === 'modelName') {
      el.innerHTML = currentValue
        ? `<span class="mif-text">${_esc(currentValue)}</span><span class="mif-icon">✏️</span>`
        : `<span class="mif-placeholder">機種名を入力…</span><span class="mif-icon">✏️</span>`;
    } else {
      el.innerHTML = currentValue
        ? `<span class="mif-text">${_esc(currentValue)}</span><span class="mif-icon">✏️</span>`
        : `<span class="mif-placeholder">説明を入力…</span><span class="mif-icon">✏️</span>`;
    }
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); input.removeEventListener('blur', commit); commit(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); cancel(); }
  });

  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
  input.select();
}

// ── フィールド単位でサーバー保存 ──
function _saveModelFieldInline(modelCode, field, value) {
  const m = _allModels.find(m => m.modelCode === modelCode) || {};
  google.script.run
    .withSuccessHandler(res => {
      if (res && res.success) showToast('✅ 保存しました');
      else showToast('保存失敗: ' + ((res||{}).error||'不明'), true);
    })
    .withFailureHandler(() => showToast('通信エラー', true))
    .handleApiRequest('modelMasterSave', {
      modelCode:   modelCode,
      modelName:   field === 'modelName'   ? value : (m.modelName   || ''),
      description: field === 'description' ? value : (m.description || ''),
    });
}

// ★ 検索で絞り込んだコードを保持（E66検索→E64,E65,E66クリック時に「E66」を記憶）
let _modelSearchFilter = '';

function selectModel(modelCode, filterCode) {
  _selectedModelCode = modelCode;
  // 呼び出し元から filterCode が渡されなければ現在の検索欄の値を使う
  const searchKw = filterCode || (document.getElementById('model-search')?.value.trim() || '');
  // 検索キーワードが modelCode に含まれる個別コードに一致するか確認
  const codesInEntry = modelCode.split(/[,、\s]+/).map(c => c.trim()).filter(Boolean);
  const matched = codesInEntry.find(c => c.toLowerCase() === searchKw.toLowerCase());
  // 一致する個別コードがあればそれだけを表示、なければエントリ全体を表示
  _modelSearchFilter = matched || '';

  // ★ 全再描画せずアクティブ状態だけ更新（検索フィルタを維持するため）
  document.querySelectorAll('.model-list-item').forEach(el => {
    const code = el.getAttribute('data-model-code') || el.dataset.modelCode || '';
    el.classList.toggle('model-list-item-active', code === modelCode);
  });

  // 詳細パネルをローディング状態に
  const detailEl = document.getElementById('model-detail-panel');
  if (detailEl) detailEl.innerHTML = '<div class="loading"><div class="spinner"></div><br>詳細を取得中...</div>';

  // ★ filterCode を渡してバックエンドで絞り込む
  const payload = _modelSearchFilter
    ? { modelCode: modelCode, filterCode: _modelSearchFilter }
    : { modelCode: modelCode };

  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.success) {
        if (detailEl) detailEl.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ ' + (res ? res.error : '取得失敗') + '</div>';
        return;
      }
      _renderModelDetail(res);
    })
    .withFailureHandler(err => {
      if (detailEl) detailEl.innerHTML = '<div class="loading" style="color:var(--danger);">通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('modelMasterGet', payload);
}

  // ★② 台帳と見積書を統合（同じ意味なので1つのリストに）
  // バックエンドから mergedQuotes が返ってきた場合はそれを使う
  let mergedItems = [];
  if (res.mergedQuotes && res.mergedQuotes.length > 0) {
    mergedItems = res.mergedQuotes;
  } else {
    const seen = {};
    quotes.forEach(q => {
      const key = q.quoteNo || ('MGT_' + q.mgmtId);
      if (!seen[key]) { seen[key] = true; mergedItems.push({ quoteNo: q.quoteNo, subject: q.subject, client: q.client, issueDate: q.quoteDate, amount: q.amount, status: q.status, pdfUrl: q.pdfUrl || '', linked: q.linked, source: 'mgmt', compositionType: '' }); }

    ledger.forEach(l => {
      const pdfUrl = (typeof _getLedgerPdfUrl === 'function') ? _getLedgerPdfUrl(l) : (l.saveUrl || '');
      const key = l.quoteNo || ('LED_' + l.ledgerId);
      if (!seen[key]) { seen[key] = true; mergedItems.push({ quoteNo: l.quoteNo, subject: l.subject, client: l.dest, issueDate: l.issueDate, amount: l.amount, status: l.status, pdfUrl: pdfUrl, linked: false, source: 'ledger', compositionType: l.compositionType||'' }); }
      else { const ex = mergedItems.find(m => (m.quoteNo || '') === (l.quoteNo || '') && m.quoteNo); if (ex && !ex.pdfUrl && pdfUrl) ex.pdfUrl = pdfUrl; }
    });
    mergedItems.sort((a, b) => (b.issueDate || '').localeCompare(a.issueDate || ''));

  const quoteTotal = mergedItems.reduce((s, r) => s + (r.amount || 0), 0);

  if (!el) return;
  el.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.success) { el.innerHTML = '<div style="color:var(--danger);">取得失敗: ' + (res ? res.error : '不明') + '</div>'; return; }
      _modelMgmtData = res.items || [];
      _renderModelMgmtTable();
    })
    .withFailureHandler(err => { el.innerHTML = '<div style="color:var(--danger);">通信エラー: ' + err.message + '</div>'; })
    .handleApiRequest('modelMasterGetAll', null);
}

function _renderModelMgmtTable() {
  const el = document.getElementById('model-mgmt-table-wrap');
  if (!el) return;
  if (_modelMgmtData.length === 0) { el.innerHTML = '<div style="padding:20px;color:var(--text-muted);text-align:center;">機種データがありません</div>'; return; }
  let html = `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);">
    <thead><tr style="background:#f0f2f5;">
      <th style="padding:8px 10px;text-align:left;">機種コード</th>
      <th style="padding:8px 10px;text-align:left;">機種名前</th>
      <th style="padding:8px 10px;text-align:left;">型式</th>
      <th style="padding:8px 10px;text-align:left;">発売日</th>
      <th style="padding:8px 10px;text-align:center;">表示</th>
      <th style="padding:8px 10px;text-align:center;">操作</th>
    </tr></thead><tbody>`;
  _modelMgmtData.forEach((item, idx) => {
    const rowStyle = item.visible ? '' : 'background:#fafafa;opacity:.6;';
    html += `<tr style="border-bottom:1px solid #f0f0f0;${rowStyle}" id="mgmt-row-${idx}">
      <td style="padding:7px 10px;font-family:monospace;font-weight:700;color:var(--primary);">${_esc(item.modelCode)}</td>
      <td style="padding:7px 8px;"><input type="text" value="${_esc(item.modelName||'')}" onchange="_updateModelMgmtField('${_esc(item.modelCode)}','modelName',this.value)" style="width:120px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;" placeholder="機種名を入力"></td>
      <td style="padding:7px 8px;"><input type="text" value="${_esc(item.modelType||'')}" onchange="_updateModelMgmtField('${_esc(item.modelCode)}','modelType',this.value)" style="width:100px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;" placeholder="型式"></td>
      <td style="padding:7px 8px;"><input type="date" value="${_esc(item.releaseDate||'')}" onchange="_updateModelMgmtField('${_esc(item.modelCode)}','releaseDate',this.value)" style="padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;"></td>
      <td style="padding:7px 8px;text-align:center;">
        <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;">
          <input type="checkbox" ${item.visible ? 'checked' : ''} onchange="_toggleModelVisible('${_esc(item.modelCode)}',this.checked)" style="cursor:pointer;">
          <span style="font-size:11px;">${item.visible ? '表示' : '非表示'}</span>
        </label>
      </td>
      <td style="padding:7px 8px;text-align:center;white-space:nowrap;">
        <button class="btn btn-danger btn-sm" onclick="_deleteMgmtModel('${_esc(item.modelCode)}')">🗑️</button>
      </td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

function _updateModelMgmtField(modelCode, field, value) {
  const payload = { modelCode: modelCode };
  payload[field] = value;
  google.script.run
    .withSuccessHandler(res => { if (res && res.success) showToast('✅ 更新しました'); else showToast('❌ ' + (res ? res.error : '失敗'), true); })
    .withFailureHandler(err => showToast('通信エラー: ' + err.message, true))
    .handleApiRequest('modelMasterSave', payload);
}

function _toggleModelVisible(modelCode, visible) {
  google.script.run
    .withSuccessHandler(res => {
      if (res && res.success) {
        showToast(visible ? '✅ 表示に変更' : '👁️ 非表示に変更');
        const item = _modelMgmtData.find(m => m.modelCode === modelCode);
        if (item) item.visible = visible;
        _renderModelMgmtTable();
        // 左パネルリストも更新
        loadModelMaster();
      } else { showToast('❌ ' + (res ? res.error : '失敗'), true); }
    })
    .withFailureHandler(err => showToast('通信エラー: ' + err.message, true))
    .handleApiRequest('modelMasterSetVisible', { modelCode: modelCode, visible: visible });
}

function _deleteMgmtModel(modelCode) {
  if (!confirm('機種「' + modelCode + '」を削除しますか？\n関連する見積・注文のデータは残ります。')) return;
  google.script.run
    .withSuccessHandler(res => {
      if (res && res.success) {
        showToast('✅ 削除しました');
        _modelMgmtData = _modelMgmtData.filter(m => m.modelCode !== modelCode);
        _renderModelMgmtTable();
        loadModelMaster();
      } else { showToast('❌ ' + (res ? res.error : '失敗'), true); }
    })
    .handleApiRequest('modelMasterDelete', { modelCode: modelCode });
}

function toggleModelMgmtView() {

function filterModelList() {
  const kw = document.getElementById('model-search').value.trim().toLowerCase();
  if (!kw) { _renderModelList(_allModels); return; }
  const filtered = _allModels.filter(m => {
    // ★ カンマ区切り複数コードを個別に分解して部分一致検索
    const codes = (m.modelCode || '').split(/[,、\s]+/).map(c => c.trim().toLowerCase()).filter(Boolean);
    return codes.some(c => c.includes(kw)) ||
      (m.modelCode || '').toLowerCase().includes(kw) ||
      (m.modelName || '').toLowerCase().includes(kw) ||
      (m.boardNames || '').toLowerCase().includes(kw);
  });
  _renderModelList(filtered);
}

// ── ★ PDF 一括アップロード & OCR バッチキュー ──
// 複数ファイルを並列でOCR処理。google.script.run は非同期なので
// 複数ファイルを同時送信するとGAS側で並列実行される。

var _ocrQueue = {};          // jobId → job object
var _ocrReviewJobId = null;  // 現在レビュー中のjobId
var _ocrSessionId   = null;  // 後方互換用

// ----- モーダル開閉 -----
function openUploadModal(){

  document.getElementById('order-type-section').style.display = 'none';

function setDocType(t){

  ['ot-trial','ot-mass'].forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.remove('active'); });
}

// ----- ファイル選択 / ドロップ -----
function handleFileSelect(e){ Array.from(e.target.files).forEach(f => _queueAddFile(f)); e.target.value=''; }
function handleDropFiles(e){  Array.from(e.dataTransfer.files).forEach(f => _queueAddFile(f)); }

function _queueAddFile(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){ showToast(file.name + ': PDFファイルのみ対応', true); return; }
  if(!S.docType){ showToast('書類種別（見積書 / 注文書）を先に選択してください', true); return; }
  if(S.docType==='order' && !S.orderType){ showToast('注文種別（試作 / 量産）を選択してください', true); return; }

  const jobId = 'job_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  _ocrQueue[jobId] = {
    jobId, file,
    fileName  : file.name,
    docType   : S.docType,
    orderType : S.orderType,
    status    : 'reading',   // reading → ocring → ready → approving → done | error
    sessionId : null,
    res       : null,
    errorMsg  : null,
    startedAt : Date.now(),
  };
  _renderQueue();

  // ファイルを読み込んで即座にOCR開始（非同期）
  const reader = new FileReader();
  reader.onload = ev => {
    const b64 = ev.target.result.split(',')[1];
    _ocrQueue[jobId].status = 'ocring';
    _renderQueueItem(jobId);

    google.script.run
      .withSuccessHandler(res => {
        if(!_ocrQueue[jobId]) return;
        if(!res.success){
          _ocrQueue[jobId].status   = 'error';
          _ocrQueue[jobId].errorMsg = res.error || 'OCRエラー';
        } else {
          _ocrQueue[jobId].status    = 'ready';
          _ocrQueue[jobId].sessionId = res.sessionId;
          _ocrQueue[jobId].res       = res;
          showToast('✅ OCR完了: ' + file.name.substring(0,20));
        }
        _renderQueueItem(jobId);
        _updateClearBtn();
      })
      .withFailureHandler(err => {
        if(!_ocrQueue[jobId]) return;
        _ocrQueue[jobId].status   = 'error';
        _ocrQueue[jobId].errorMsg = '通信エラー: ' + (err.message || String(err));
        _renderQueueItem(jobId);
        _updateClearBtn();
      })
      .handleApiRequest('ocrPreview', {
        base64Data : b64,
        fileName   : file.name,
        docType    : S.docType,
        orderType  : S.orderType,
      });
  };
  reader.readAsDataURL(file);
}

// ----- キュー描画 -----
var _OCR_STATUS_CFG = {
  reading  : { icon:'⏳', text:'読込中...',           color:'#64748b', bg:'#f8fafc' },
  ocring   : { icon:'🔍', text:'OCR解析中...',        color:'#2563eb', bg:'#eff6ff' },
  ready    : { icon:'✅', text:'確認待ち',             color:'#16a34a', bg:'#f0fdf4' },
  approving: { icon:'💾', text:'登録中...',            color:'#7c3aed', bg:'#f5f3ff' },
  done     : { icon:'🎉', text:'登録完了',             color:'#16a34a', bg:'#dcfce7' },
  error    : { icon:'❌', text:'エラー',               color:'#dc2626', bg:'#fef2f2' },
};

function _renderQueue(){
  const container = document.getElementById('ocr-queue-container');
  if(!container) return;
  const jobs = Object.values(_ocrQueue);
  if(jobs.length === 0){ container.innerHTML = ''; _updateClearBtn(); return; }

  const processing = jobs.filter(j=>j.status==='ocring'||j.status==='reading').length;
  const ready      = jobs.filter(j=>j.status==='ready').length;
  const done       = jobs.filter(j=>j.status==='done').length;
  const summary    = `${jobs.length}件 ／ 解析中:${processing} ／ 確認待ち:${ready} ／ 完了:${done}`;

  container.innerHTML =
    '<div style="margin-top:12px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">' +
    '<div style="padding:7px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;">' +
    '<span style="font-size:12px;font-weight:600;color:#475569;">📋 処理キュー</span>' +
    '<span data-summary style="font-size:11px;color:#94a3b8;">' + summary + '</span>' +
    '</div>' +
    '<div id="ocr-queue-list">' +
    jobs.map(j => _queueItemHtml(j)).join('') +
    '</div></div>';
  _updateClearBtn();
}

function _renderQueueItem(jobId){
  const job = _ocrQueue[jobId];
  const el  = document.getElementById('ocr-qi-' + jobId);
  if(el){
    el.outerHTML = _queueItemHtml(job);
  } else {
    _renderQueue();
  }
  // サマリー行も更新
  const container = document.getElementById('ocr-queue-container');
  if(container){
    const jobs       = Object.values(_ocrQueue);
    const processing = jobs.filter(j=>j.status==='ocring'||j.status==='reading').length;
    const ready      = jobs.filter(j=>j.status==='ready').length;
    const done       = jobs.filter(j=>j.status==='done').length;
    const sumEl      = container.querySelector('span[data-summary]');
    if(sumEl) sumEl.textContent = jobs.length + '件 ／ 解析中:' + processing + ' ／ 確認待ち:' + ready + ' ／ 完了:' + done;
  }
}

function _queueItemHtml(job){
  const cfg  = _OCR_STATUS_CFG[job.status] || _OCR_STATUS_CFG.error;
  const name = job.fileName.length > 34 ? job.fileName.substring(0,32) + '…' : job.fileName;
  const spinner = (job.status==='ocring')
    ? '<span class="ocr-mini-spinner"></span>' : '';
  const elapsedSec = job.startedAt ? Math.floor((Date.now()-job.startedAt)/1000) : 0;
  const elapsedTxt = (job.status==='ocring' && elapsedSec > 2) ? ' (' + elapsedSec + 's)' : '';
  const btnHtml =
    job.status === 'ready'
      ? '<button onclick="_queueReview(\'' + job.jobId + '\')" style="border:none;background:#2563eb;color:#fff;border-radius:4px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;">確認・登録</button>'
    : job.status === 'error'
      ? '<button onclick="_queueRetry(\'' + job.jobId + '\')" style="border:1px solid #dc2626;background:#fff;color:#dc2626;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap;">再試行</button>'
    : '';
  const errHtml = job.errorMsg
    ? '<div style="font-size:10px;color:#dc2626;margin-top:2px;">' + _esc(job.errorMsg) + '</div>' : '';
  const typeTag = '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#e2e8f0;color:#475569;margin-left:5px;">' +
    (job.docType==='quote'?'見積書':'注文書') +
    (job.orderType?' '+job.orderType:'') + '</span>';

  return '<div id="ocr-qi-' + job.jobId + '" class="ocr-queue-item" style="background:' + cfg.bg + ';">' +
    '<div style="flex:1;min-width:0;">' +
    '<div style="font-size:12px;font-weight:500;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + _esc(job.fileName) + '">' +
    cfg.icon + ' ' + _esc(name) + spinner + typeTag + '</div>' +
    '<div style="font-size:10px;color:' + cfg.color + ';margin-top:1px;">' + cfg.text + elapsedTxt + '</div>' +
    errHtml +
    '</div>' +
    '<div style="white-space:nowrap;">' + btnHtml + '</div>' +
    '</div>';
}

function _updateClearBtn(){
  const btn  = document.getElementById('queue-clear-btn');
  if(!btn) return;
  const done = Object.values(_ocrQueue).filter(j=>j.status==='done'||j.status==='error').length;
  btn.style.display = done > 0 ? 'inline-flex' : 'none';
}

function clearDoneQueue(){
  Object.keys(_ocrQueue).forEach(k=>{
    if(_ocrQueue[k].status==='done' || _ocrQueue[k].status==='error') delete _ocrQueue[k];
  });
  _renderQueue();
  document.getElementById('upload-status').innerHTML = '';
  _ocrReviewJobId = null;
}

// ----- キューアクション -----
function _queueReview(jobId){
  const job = _ocrQueue[jobId];
  if(!job || job.status !== 'ready' || !job.res) return;
  _ocrReviewJobId = jobId;
  _ocrSessionId   = job.sessionId;   // 後方互換
  S.docType       = job.docType;
  document.getElementById('upload-status').innerHTML = '';
  _openOcrReviewModal(job.res);
  // 確認パネルまでスクロール
  const el = document.getElementById('upload-status');
  if(el) setTimeout(()=>el.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
}

function _queueRetry(jobId){
  const job = _ocrQueue[jobId];
  if(!job) return;
  const file = job.file;
  delete _ocrQueue[jobId];
  S.docType   = job.docType;
  S.orderType = job.orderType;
  _queueAddFile(file);
}

// ----- OCR確認パネル -----
function _openOcrReviewModal(res){
  const ocr=res.ocrResult||{}; const quality=res.quality||0; const warns=res.warnings||[];
  const isQuote=S.docType==='quote';
  const qColor=quality>=75?'#16a34a':quality>=50?'#d97706':'#dc2626';
  const qLabel=quality>=75?'高精度':quality>=50?'要確認':'低精度';
  const warnHtml=warns.map(w=>`<div style="padding:6px 10px;border-radius:5px;font-size:12px;margin-bottom:4px;background:${w.level==='error'?'#fef2f2':'#fffbeb'};color:${w.level==='error'?'#dc2626':'#d97706'};border-left:3px solid ${w.level==='error'?'#dc2626':'#d97706'};">${w.level==='error'?'❌':'⚠️'} ${w.msg}</div>`).join('');
  const lines=ocr.lineItems||[];
  const lineRows=lines.map((item,i)=>`
    <tr id="ocr-line-${i}" style="border-bottom:1px solid #f0f2f5;">
      <td style="padding:4px 6px;text-align:center;color:#94a3b8;font-size:11px;">${i+1}</td>
      <td style="padding:4px 6px;"><input type="text" value="${_esc(item.itemName)}" onchange="ocrUpdateLine(${i},'itemName',this.value)" style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;font-size:12px;"></td>
      <td style="padding:4px 6px;"><input type="text" value="${_esc(item.spec)}" onchange="ocrUpdateLine(${i},'spec',this.value)" style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;font-size:12px;"></td>
      <td style="padding:4px 6px;"><input type="number" value="${item.qty||1}" onchange="ocrUpdateLine(${i},'qty',Number(this.value));ocrRecalcLine(${i})" style="width:60px;border:1px solid #e2e8f0;border-radius:4px;padding:3px 4px;font-size:12px;text-align:right;"></td>

// ----- 明細編集 -----
function ocrUpdateLine(idx,field,val){ if(window._ocrLines&&window._ocrLines[idx]) window._ocrLines[idx][field]=val; }
function ocrRecalcLine(idx){ const line=window._ocrLines&&window._ocrLines[idx]; if(!line) return; const amt=(line.unitPrice||0)*(line.qty||1); line.amount=amt; const el=document.getElementById('ocr-amt-'+idx); if(el) el.textContent=amt.toLocaleString(); }
function ocrDeleteLine(idx){ if(!window._ocrLines) return; window._ocrLines.splice(idx,1); const row=document.getElementById('ocr-line-'+idx); if(row) row.style.display='none'; }
function ocrAddLine(){
  if(!window._ocrLines) window._ocrLines=[];
  const idx=window._ocrLines.length; window._ocrLines.push({itemName:'',spec:'',qty:1,unit:'式',unitPrice:0,amount:0,remarks:''});
  const tbody=document.getElementById('ocr-lines-body'); if(!tbody) return;
  const tr=document.createElement('tr'); tr.id='ocr-line-'+idx; tr.style.borderBottom='1px solid #f0f2f5';
  tr.innerHTML=`<td style="padding:4px 6px;text-align:center;color:#94a3b8;font-size:11px;">${idx+1}</td><td style="padding:4px 6px;"><input type="text" onchange="ocrUpdateLine(${idx},'itemName',this.value)" style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;font-size:12px;"></td><td style="padding:4px 6px;"><input type="text" onchange="ocrUpdateLine(${idx},'spec',this.value)" style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;font-size:12px;"></td><td style="padding:4px 6px;"><input type="number" value="1" onchange="ocrUpdateLine(${idx},'qty',Number(this.value));ocrRecalcLine(${idx})" style="width:60px;border:1px solid #e2e8f0;border-radius:4px;padding:3px 4px;font-size:12px;text-align:right;"></td><td style="padding:4px 6px;"><input type="number" value="0" id="ocr-price-${idx}" onchange="ocrUpdateLine(${idx},'unitPrice',Number(this.value));ocrRecalcLine(${idx})" style="width:90px;border:2px solid #f59e0b;border-radius:4px;padding:3px 4px;font-size:12px;text-align:right;font-weight:600;"></td><td style="padding:4px 6px;text-align:right;font-size:12px;font-weight:500;color:#2563eb;" id="ocr-amt-${idx}">0</td><td style="padding:4px 6px;text-align:center;"><button onclick="ocrDeleteLine(${idx})" style="border:none;background:none;color:#dc2626;cursor:pointer;font-size:14px;">✕</button></td>`;
  tbody.appendChild(tr);
}

// ----- 承認・破棄 -----
function ocrDiscard(){
  const jobId    = _ocrReviewJobId;
  const sessionId = jobId ? (_ocrQueue[jobId]&&_ocrQueue[jobId].sessionId) : _ocrSessionId;
  document.getElementById('upload-status').innerHTML = '';
  _ocrReviewJobId = null;
  if(!sessionId) return;
  google.script.run
    .withSuccessHandler(()=>{ showToast('破棄しました'); })
    .handleApiRequest('ocrDiscard', { sessionId });
  // キューからも削除
  if(jobId && _ocrQueue[jobId]){
    delete _ocrQueue[jobId];
    _renderQueue();
  }
}

function ocrApprove(){
  const jobId    = _ocrReviewJobId;
  const sessionId = jobId ? (_ocrQueue[jobId]&&_ocrQueue[jobId].sessionId) : _ocrSessionId;
  if(!sessionId){ showToast('セッションが無効です', true); return; }

  const btn = document.getElementById('ocr-approve-btn');
  if(btn){ btn.disabled=true; btn.textContent='登録中...'; }

  // キューステータス更新
  if(jobId && _ocrQueue[jobId]){
    _ocrQueue[jobId].status = 'approving';
    _renderQueueItem(jobId);
  }

  const corrected = {
    documentNo   : (document.getElementById('ocr-documentNo')||{}).value||'',
    issueDate    : (document.getElementById('ocr-issueDate')||{}).value||'',
    documentDate : (document.getElementById('ocr-issueDate')||{}).value||'',
    destCompany  : (document.getElementById('ocr-destCompany')||{}).value||'',
    clientName   : (document.getElementById('ocr-destCompany')||{}).value||'',
    subject      : (document.getElementById('ocr-subject')||{}).value||'',
    deliveryDate : (document.getElementById('ocr-deliveryDate')||{}).value||'',
    linkedQuoteNo: (document.getElementById('ocr-linkedQuoteNo')||{}).value||'',
    subtotal     : Number((document.getElementById('ocr-subtotal')||{}).value||0),
    tax          : Number((document.getElementById('ocr-tax')||{}).value||0),
    totalAmount  : Number((document.getElementById('ocr-totalAmount')||{}).value||0),
    lineItems    : (window._ocrLines||[]).filter(l=>l.itemName),
  };

  google.script.run
    .withSuccessHandler(res=>{
      if(btn){ btn.disabled=false; btn.textContent='✅ 確認・承認してDB登録'; }
      if(!res.success){
        showToast('登録失敗: ' + res.error, true);
        if(jobId && _ocrQueue[jobId]){ _ocrQueue[jobId].status='ready'; _renderQueueItem(jobId); }
        return;
      }
      // キュー完了
      if(jobId && _ocrQueue[jobId]){
        _ocrQueue[jobId].status = 'done';
        _renderQueueItem(jobId);
        _updateClearBtn();
      }
      _ocrReviewJobId = null;
      _ocrSessionId   = null;
      document.getElementById('upload-status').innerHTML =
        `<div style="background:#e6f4ea;border-radius:8px;padding:14px;font-size:13px;margin-top:8px;">
          <strong style="color:#16a34a;font-size:14px;">✅ DB登録完了</strong><br>
          <span>${_esc(corrected.documentNo||'—')} / ${_esc(corrected.destCompany||'—')}</span><br>
          <span style="color:#6b7280;">明細: ${res.lineCount}行 ／ 合計: ${corrected.totalAmount?corrected.totalAmount.toLocaleString()+' 円':'—'}</span>
          <div style="margin-top:8px;font-size:11px;color:#64748b;">次の「確認待ち」ファイルがある場合は上のキューから選択してください。</div>
        </div>`;
      showToast('✅ 登録完了しました');
      loadData();
      if(typeof loadQuoteList==='function') loadQuoteList();
    })
    .withFailureHandler(err=>{
      if(btn){ btn.disabled=false; btn.textContent='✅ 確認・承認してDB登録'; }
      showToast('通信エラー: '+(err.message||err), true);
      if(jobId && _ocrQueue[jobId]){ _ocrQueue[jobId].status='ready'; _renderQueueItem(jobId); }
    })
    .handleApiRequest('ocrApprove', { sessionId, correctedOcr: corrected });
}
