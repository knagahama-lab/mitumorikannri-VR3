function setQuoteSort(key) {
  if (_quoteSortKey === key) { _quoteSortDir = _quoteSortDir === 'desc' ? 'asc' : 'desc'; }
  else { _quoteSortKey = key; _quoteSortDir = 'desc'; }
  _updateSortUI('qs-sort-key', 'qs-sort-dir', _quoteSortKey, _quoteSortDir);
  _filteredQuotes.sort((a,b) => _cmpByKey(a, b, _quoteSortKey, _quoteSortDir));
  _quotePage = 1; _renderQuoteTable();
}
function setLedgerSort(key) {
  if (_ledgerSortKey === key) { _ledgerSortDir = _ledgerSortDir === 'desc' ? 'asc' : 'desc'; }
  else { _ledgerSortKey = key; _ledgerSortDir = 'desc'; }
  _updateSortUI('ledger-sort-key', 'ledger-sort-dir', _ledgerSortKey, _ledgerSortDir);
  applyLedgerFilter();
}
function _cmpByKey(a, b, key, dir) {
  const numKeys = ['quoteAmount','amount','orderAmount'];
  let va, vb;
  if (numKeys.includes(key)) {
    va = Number(a[key])||0; vb = Number(b[key])||0;
    return dir === 'desc' ? vb - va : va - vb;
  }
  if (key === 'issueDate' || key === 'quoteDate') {
    va = _dateSortKey(a[key]||a.quoteDate||''); vb = _dateSortKey(b[key]||b.quoteDate||'');
  } else {
    va = String(a[key]||'').toLowerCase(); vb = String(b[key]||'').toLowerCase();
  }
  if (va > vb) return dir === 'desc' ? -1 : 1;
  if (va < vb) return dir === 'desc' ? 1 : -1;
  return 0;
}
function _updateSortUI(selId, btnId, key, dir) {
  const sel = document.getElementById(selId); if (sel) sel.value = key;
  const btn = document.getElementById(btnId);
  if (btn) { btn.textContent = dir === 'desc' ? '↓ 降順' : '↑ 昇順'; btn.title = dir === 'desc' ? '昇順に切り替え' : '降順に切り替え'; }
}

// ── 日付ソートキー（新しい順：降順比較用） ──
// yyyy/MM/dd, yyyy-MM-dd, M/d/yyyy など様々な形式を ISO に正規化してソートキーを返す
function _dateSortKey(str) {
  if (!str) return '';
  const s = String(str).trim();
  // すでに yyyy/MM/dd または yyyy-MM-dd 形式
  const m1 = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m1) return m1[1] + m1[2].padStart(2,'0') + m1[3].padStart(2,'0');
  // M/d/yyyy
  const m2 = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m2) return m2[3] + m2[1].padStart(2,'0') + m2[2].padStart(2,'0');
  return s; // フォールバック
}
// 台帳レコードの PDF URL を取得（saveUrl → quoteNo で allQuotes を参照）
function _getLedgerPdfUrl(r) {
  if (r.saveUrl) return r.saveUrl;
  if (r.quoteNo) {
    const found = (_allQuotes || []).find(q => q.quoteNo === r.quoteNo && q.quotePdfUrl);
    if (found) return found.quotePdfUrl;
    const found2 = (S && S.all ? S.all : []).find(q => q.quoteNo === r.quoteNo && q.quotePdfUrl);
    if (found2) return found2.quotePdfUrl;
  }
  return '';
}

// ── CSV / PDF 出力 共通ユーティリティ ──
// ══════════════════════════════════════════════════════════════
function _downloadCsv(filename, headers, rows) {
  const bom = '﻿';
  const escape = v => { const s = String(v == null ? '' : v); return (s.includes(',') || s.includes('\n') || s.includes('"')) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const lines = [headers.map(escape).join(','), ...rows.map(r => r.map(escape).join(','))];
  const blob = new Blob([bom + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('CSVを出力しました');
}

function _printWindow(title, headers, rows, extraCss) {
  const thHtml = headers.map(h => `<th>${h}</th>`).join('');
  const tbHtml = rows.map(r => `<tr>${r.map(c => `<td>${c == null || c === '' ? '—' : String(c).replace(/</g,'&lt;').replace(/>/g,'&gt;')}</td>`).join('')}</tr>`).join('');
  const w = window.open('', '_blank', 'width=1000,height=720');
  if (!w) { showToast('ポップアップをブロック解除してください', true); return; }
  w.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>${title}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Noto Sans JP",Meiryo,sans-serif;font-size:11px;color:#1e293b;padding:16px;}
    h2{font-size:14px;font-weight:700;margin-bottom:4px;}
    .meta{font-size:10px;color:#64748b;margin-bottom:12px;}
    table{width:100%;border-collapse:collapse;font-size:11px;}
    th{background:#f0f2f5;padding:5px 8px;border:1px solid #cbd5e1;font-weight:600;text-align:left;white-space:nowrap;}
    td{padding:4px 8px;border:1px solid #e2e8f0;vertical-align:top;word-break:break-all;}
    tr:nth-child(even) td{background:#f8fafc;}
    .footer{margin-top:12px;font-size:10px;color:#94a3b8;text-align:right;}
    @page{margin:10mm;}
    @media print{body{padding:0;} .no-print{display:none;}}
    ${extraCss||''}
  </style>
  </head><body>
  <div class="no-print" style="margin-bottom:12px;display:flex;gap:8px;">
    <button onclick="window.print()" style="padding:6px 16px;background:#1e40af;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">🖨️ 印刷 / PDF保存</button>
    <button onclick="window.close()" style="padding:6px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;cursor:pointer;">✕ 閉じる</button>
  </div>
  <h2>${title}</h2>
  <div class="meta">出力日時: ${new Date().toLocaleString('ja-JP')} ／ ${rows.length}件</div>
  <table><thead><tr>${thHtml}</tr></thead><tbody>${tbHtml}</tbody></table>
  <div class="footer">見積管理システム — ${title}</div>
  </body></html>`);
  w.document.close();
}

function _today() { const d = new Date(); return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2); }
function showToast(msg, isError=false){
  const t=document.getElementById('toast'); if(!t) return;
  t.textContent=(isError?'✗ ':'✓ ')+msg; t.style.background=isError?'#dc2626':'#1e293b';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3500);
}

// ── サイドバー ──
function renderSidebar() {
  const container = document.getElementById('sidebar-nav-container'); if(!container) return;
  google.script.run.withSuccessHandler(res => {
    if (res && res.success && res.menuConfig) userMenuConfig = res.menuConfig; else userMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
    const sections = {};
    userMenuConfig.forEach(item=>{ if(!item.visible) return; if(item.adminOnly && !IS_ADMIN) return; if(!sections[item.section]) sections[item.section]=[]; sections[item.section].push(item); });
    let html='';
    Object.keys(sections).forEach(section=>{
      html += `<div class="sidebar-section-label">${section}</div>`;
      sections[section].forEach(item=>{
        if(item.external) html += `<a class="nav-item nav-item-ext" href="${item.external}" target="_blank"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></a>`;
        else html += `<div class="nav-item" data-id="${item.id}" onclick="showPage('${item.id}')"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></div>`;
      });
    });
    container.innerHTML = html;
    const activePage = document.querySelector('.page.active'); if (activePage) { const pageId = activePage.id.replace('page-', ''); document.querySelectorAll('.nav-item[data-id]').forEach(t=>{ t.classList.toggle('active', t.dataset.id===pageId); }); }
  }).handleApiRequest('menuConfigLoad', null);
}

function showPage(name){
  document.querySelectorAll('.nav-item[data-id]').forEach(t=>{ t.classList.toggle('active', t.dataset.id===name); });
  const titleEl = document.getElementById('topbar-page-title'); if(titleEl) titleEl.textContent = PAGE_TITLES[name] || name;
  const contentEl = document.getElementById('content'); if(contentEl) contentEl.scrollTop=0;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const target = document.getElementById('page-'+name);
  if(!target){ console.warn('[showPage] page not found: page-'+name); return; }
  target.classList.add('active');

  if(name==='list'){ const ao=document.getElementById('area-order'); const aq=document.getElementById('area-quote'); if(ao) ao.style.display=''; if(aq) aq.style.display='none'; }
  if(name==='ledger' && typeof loadLedger==='function') loadLedger();
  if(name==='calendar' && typeof loadCalendar==='function') loadCalendar();
  if(name==='matching' && typeof loadMatchingCandidates==='function') loadMatchingCandidates();
  if(name==='drivesearch'){ if(typeof initDriveSearchPage==='function') initDriveSearchPage(); if(typeof clearDriveSearch==='function') clearDriveSearch(); }
  if(name==='admin') _onShowAdmin();
  if(name==='model') loadModelMaster();
  if(name==='checklist' && typeof initChecklistPage==='function') initChecklistPage();
  if(name==='quotecheck' && typeof initQuoteCheckPage==='function') initQuoteCheckPage();
}

// ── ★インライン編集 ──
function startInlineEdit(e, id, field, val, type = 'mgmt') {
  e.stopPropagation(); const td = e.currentTarget; if (td.querySelector('input')) return;
  const input = document.createElement('input'); input.type = (field.includes('Amount') || field === 'amount') ? 'number' : 'text'; input.className = 'inline-edit-input'; input.value = val === '—' ? '' : val;
  input.onblur = () => saveInlineEdit(td, id, field, input.value, val, type);
  input.onkeydown = (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); } if (ev.key === 'Escape') { td.innerHTML = val || '—'; } };
  td.innerHTML = ''; td.appendChild(input); input.focus(); input.select();
}
function saveInlineEdit(td, id, field, newVal, oldVal, type) {
  const isAmt = field.includes('Amount') || field === 'amount' || field === 'quoteAmount' || field === 'costAmount';
  if (newVal === oldVal) {
    let dv = newVal || '—';
    if (isAmt && newVal) dv = '¥' + Number(newVal).toLocaleString();
    if (field === 'quoteNo' || field === 'orderNo') dv = `<strong>${dv}</strong>`;
    td.innerHTML = dv; return;
  }
  td.innerHTML = `<span style="color:#94a3b8;font-size:11px;">🔄 保存中...</span>`;
  // ── checklist ──
  if (type === 'checklist') {
    const payload = { itemId: id };
    payload[field] = isAmt ? (newVal ? Number(newVal) : 0) : newVal;
    google.script.run.withSuccessHandler(res => {
      if (res.success) {
        showToast('✅ 更新しました');
        // メモリ更新
        for (const sec of (_clSections||[])) { const it = sec.items.find(x => x.itemId === id); if (it) { it[field] = payload[field]; break; } }
        let dv = newVal || '—';
        if (isAmt && newVal) dv = '¥' + Number(newVal).toLocaleString();
        if (field === 'pdfUrl' && newVal) dv = `<a href="${newVal}" target="_blank" style="font-size:16px;text-decoration:none;">📄</a>`;
        td.innerHTML = dv;
      } else { showToast('❌ 更新失敗: ' + res.error, true); td.innerHTML = oldVal || '—'; }
    }).withFailureHandler(() => { showToast('❌ 通信エラー', true); td.innerHTML = oldVal || '—'; })
      .handleApiRequest('checklistSaveItem', payload);
    return;
  }
  // ── ledger ──
  if (type === 'ledger' || String(id).startsWith('LEDGER_')) {
    const realId = String(id).replace('LEDGER_', ''); const payload = { ledgerId: realId }; payload[field] = (field === 'amount') ? (newVal ? Number(newVal) : null) : newVal;

// ── ★インライン編集（日付型）── mgmt / ledger 両対応
function startInlineEditDate(e, id, field, val, type) {
  e.stopPropagation();
  const td = e.currentTarget;
  if (td.querySelector('input')) return;
  const inputVal = val ? val.replace(/\//g, '-') : '';
  const input = document.createElement('input');
  input.type = 'date';
  input.className = 'inline-edit-input';
  input.value = inputVal;
  input.style.cssText = 'padding:2px 4px;font-size:13px;border:1px solid var(--primary);border-radius:4px;width:130px;';
  const emptyHtml = '<span style="color:var(--text-muted);">—</span>';
  input.onblur = () => {
    const raw = input.value;
    const formatted = raw ? raw.replace(/-/g, '/') : '';
    if (formatted === val) { td.innerHTML = formatted || emptyHtml; return; }
    td.innerHTML = '<span style="color:#94a3b8;font-size:11px;">🔄 保存中...</span>';
    const isChecklist = type === 'checklist';
    const isLedger = !isChecklist && (type === 'ledger' || String(id).startsWith('LEDGER_'));
    const realId = String(id).replace('LEDGER_', '');
    if (isChecklist) {
      const payload = { itemId: id }; payload[field] = formatted;
      google.script.run.withSuccessHandler(res => {
        if (res && res.success) {
          showToast('✅ 更新しました');
          for (const sec of (_clSections||[])) { const it = sec.items.find(x=>x.itemId===id); if(it){it[field]=formatted;break;} }
          td.innerHTML = formatted || emptyHtml;
        } else { showToast('❌ 更新失敗', true); td.innerHTML = val || emptyHtml; }
      }).withFailureHandler(()=>{ showToast('❌ 通信エラー',true); td.innerHTML = val||emptyHtml; })
        .handleApiRequest('checklistSaveItem', payload);
    } else if (isLedger) {
      const payload = { ledgerId: realId }; payload[field] = formatted;
      google.script.run.withSuccessHandler(res => {
        if (res && res.success) {
          showToast('✅ 更新しました');
          const item = _allLedgerItems.find(r => r.ledgerId === realId);
          if (item) item[field] = formatted;
          td.innerHTML = formatted || emptyHtml;
        } else { showToast('❌ 更新失敗', true); td.innerHTML = val || emptyHtml; }
      }).withFailureHandler(() => { showToast('❌ 通信エラー', true); td.innerHTML = val || emptyHtml; })
        .handleApiRequest('ledgerSave', payload);
    } else {
      const payload = { mgmtId: id }; payload[field] = formatted;
      google.script.run.withSuccessHandler(res => {
        if (res && res.success) {
          showToast('✅ 更新しました');
          const item = S.all.find(r => r.id === id);
          if (item) item[field] = formatted;
          td.innerHTML = formatted || emptyHtml;
        } else { showToast('❌ 更新失敗', true); td.innerHTML = val || emptyHtml; }
      }).withFailureHandler(() => { showToast('❌ 通信エラー', true); td.innerHTML = val || emptyHtml; })
        .handleApiRequest('updateMgmt', payload);
    }
  };
  input.onkeydown = (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { td.innerHTML = val || emptyHtml; }
  };
  td.innerHTML = ''; td.appendChild(input); input.focus();
}

function _renderPagination(total) {

  let h = '';

  const start = Math.max(1, S.page - 4);

  for (let i = start; i <= end; i++) h += `<button class="page-btn ${i===S.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < pages) h += `<span style="padding:4px 2px;color:var(--text-sub);">…</span><button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  if (S.page < pages) h += `<button class="page-btn" onclick="goPage(${S.page+1})">›</button>`;
  pEl.innerHTML = h;
}

function _mergeLedgerIntoQuotes() {
  if (!_allLedgerItems || _allLedgerItems.length === 0) return;
  // 既存の見積No.セットと既にマージ済みの台帳IDセット（重複防止）
  const existingNos     = new Set(_allQuotes.map(q => q.quoteNo).filter(Boolean));
  const existingLedIds  = new Set(_allQuotes.filter(q => q._fromLedger).map(q => q._ledgerId).filter(Boolean));
  _allLedgerItems.forEach(function(led) {
    if (led.status === 'キャンセル' || led.status === '__MACHINE_FOLDER__') return;
    const qNo = led.quoteNo;
    // 既存の見積Noと一致する場合はステータスのみ更新
    if (qNo && existingNos.has(qNo)) {
      const existing = _allQuotes.find(function(q) { return q.quoteNo === qNo; });
      if (existing && led.status) existing.status = led.status;
      return;
    }
    // 既にマージ済みの台帳IDはスキップ（重複追加防止）
    if (existingLedIds.has(led.ledgerId)) return;
    _allQuotes.push({
      id: 'LEDGER_' + led.ledgerId,
      quoteNo: qNo || '',
      subject: led.subject || '',
      destCompany: led.dest || '',
      client: led.dest || '',
      issueDate: led.issueDate || '',
      quoteDate: led.issueDate || '',
      quoteAmount: led.amount || 0,
      status: led.status || '作成予定',
      quotePdfUrl: led.saveUrl || '',
      modelCode: led.machineCode || led.modelCode || '',
      linked: false,
      orderNo: '',
      _fromLedger: true,
      _ledgerId: led.ledgerId
    });
  });
}

// ─── ④ 発注書詳細の紐づけ候補 見積書検索フィルタ ───
function _filterDetailQuoteOptions(kw, mgmtId, lineNos) {
  const lines = Array.isArray(lineNos) ? lineNos : [];
  if (!kw) {
    // すべてのselectを元に戻す（全候補表示）
    lines.forEach(lineNo => {
      const sel = document.getElementById('line-sel-' + mgmtId + '-' + lineNo);
      if (!sel) return;
      Array.from(sel.options).forEach(opt => { opt.style.display = ''; });
    });
    return;
  }
  const kwLower = kw.toLowerCase();
  lines.forEach(lineNo => {
    const sel = document.getElementById('line-sel-' + mgmtId + '-' + lineNo);
    if (!sel) return;
    Array.from(sel.options).forEach(opt => {
      if (!opt.value) { opt.style.display = ''; return; }
      opt.style.display = opt.text.toLowerCase().includes(kwLower) ? '' : 'none';
    });
  });
}

function saveMgmtEdit() {
  const mgmtId = document.getElementById('edit-mgmt-id').value;
  if (!mgmtId) { showToast('IDが取得できません', true); return; }
  const toSlashDate = s => s ? s.replace(/-/g, '/') : '';
  const v = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  const payload = {
    mgmtId, quoteNo: v('edit-quote-no') || undefined, orderNo: v('edit-order-no') || undefined, deliverySlipNo: v('edit-delivery-slip-no') || undefined,
    subject: v('edit-subject') || undefined, client: v('edit-client') || undefined, status: v('edit-status') || undefined,
    orderType: v('edit-order-type') || undefined, modelCode: v('edit-model-code') || undefined, memo: v('edit-memo') || undefined,
    quoteAmount: v('edit-quote-amount') ? Number(v('edit-quote-amount')) : undefined, orderAmount: v('edit-order-amount') ? Number(v('edit-order-amount')) : undefined,
    orderDate: toSlashDate(v('edit-order-date')) || undefined, deliveryDate: toSlashDate(v('edit-delivery-date')) || undefined,
  };
  Object.keys(payload).forEach(k => { if (payload[k] === undefined) delete payload[k]; });
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('保存しました'); document.getElementById('edit-mgmt-modal') && document.getElementById('edit-mgmt-modal').classList.remove('open'); loadData(); loadQuoteList(); loadLedger(); }
    else { showToast('保存失敗: ' + res.error, true); }
  }).withFailureHandler(err => showToast('通信エラー', true)).handleApiRequest('updateMgmt', payload);
}

// ─── ③ 見積台帳モーダル確実に開く（ledger-add-modal使用） ───
function openLedgerAddModal(ledgerId) {
  const modal = document.getElementById('ledger-add-modal');
  if (!modal) { console.warn('ledger-add-modal not found'); return; }
  // フォームをリセット
  ['ledger-edit-id','ledger-quote-no','ledger-dest','ledger-machine-code','ledger-subject',
   'ledger-amount','ledger-board-name','ledger-model-no','ledger-save-url','ledger-remarks'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  if (document.getElementById('ledger-issue-date')) document.getElementById('ledger-issue-date').value = '';
  if (document.getElementById('ledger-status')) document.getElementById('ledger-status').value = '作成予定';

  if (ledgerId) {
    const item = _allLedgerItems.find(r => r.ledgerId === ledgerId);
    if (item) {
      const sv = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
      sv('ledger-edit-id', ledgerId);
      sv('ledger-quote-no', item.quoteNo);
      sv('ledger-dest', item.dest || item.submitTo || '');
      sv('ledger-machine-code', item.machineCode || item.modelCode || '');
      sv('ledger-subject', item.subject);
      sv('ledger-amount', item.amount || '');
      sv('ledger-board-name', item.boardName || '');
      sv('ledger-model-no', item.modelNo || '');
      sv('ledger-save-url', item.saveUrl || '');
      sv('ledger-remarks', item.remarks || '');
      if (item.issueDate || item.sentDate) {
        const d = (item.issueDate || item.sentDate || '').replace(/\//g, '-');
        if (document.getElementById('ledger-issue-date')) document.getElementById('ledger-issue-date').value = d;
      }
      if (document.getElementById('ledger-status')) document.getElementById('ledger-status').value = item.status || '作成予定';
      const titleEl = document.getElementById('ledger-add-title');
      if (titleEl) titleEl.textContent = '📝 見積台帳を編集';
    }
  } else {
    const titleEl = document.getElementById('ledger-add-title');
    if (titleEl) titleEl.textContent = '📝 見積予定を追加';
    const today = new Date();
    const dd = document.getElementById('ledger-issue-date');
    if (dd) dd.value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  }
  modal.classList.add('open');
}

function closeLedgerAddModal() {
  const modal = document.getElementById('ledger-add-modal');
  if (modal) modal.classList.remove('open');
}

function _openLedgerAddModalWithMachine(machine) {
  openLedgerAddModal(null);
  const el = document.getElementById('ledger-machine-code');
  if (el) el.value = machine;
}

function saveLedgerEntry() {
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const subject = v('ledger-subject');
  if (!subject) { showToast('件名は必須です', true); return; }
  const toSlash = s => s ? s.replace(/-/g, '/') : '';
  const payload = {
    ledgerId: v('ledger-edit-id') || undefined,
    quoteNo: v('ledger-quote-no') || undefined,
    issueDate: toSlash(v('ledger-issue-date')) || undefined,
    dest: v('ledger-dest') || undefined,
    machineCode: v('ledger-machine-code') || undefined,
    subject: subject,
    status: v('ledger-status') || '作成予定',
    amount: v('ledger-amount') ? Number(v('ledger-amount')) : undefined,
    boardName: v('ledger-board-name') || undefined,
    modelNo: v('ledger-model-no') || undefined,
    saveUrl: v('ledger-save-url') || undefined,
    remarks: v('ledger-remarks') || undefined,
  };
  Object.keys(payload).forEach(k => { if (payload[k] === undefined) delete payload[k]; });
  google.script.run.withSuccessHandler(res => {
    if (res.success) {
      showToast('保存しました');
      closeLedgerAddModal();
      loadLedger();
      loadQuoteList();
    } else { showToast('保存失敗: ' + (res.error || ''), true); }
  }).handleApiRequest('ledgerSave', payload);
}

function deleteLedgerEntry(ledgerId) {
  if (!confirm('この見積台帳データを削除しますか？')) return;
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('削除しました'); loadLedger(); loadQuoteList(); }
    else showToast('削除失敗: ' + (res.error || ''), true);
  }).handleApiRequest('ledgerDelete', { ledgerId });
}

// ★ メニュー設定（管理コンソール > メニュー設定タブ）
// ── 表示/非表示・順番変更・追加・URL添付・全ユーザー反映 ──
// ============================================================
let _editMenuConfig = [];

function renderMenuConfigList() {
  const container = document.getElementById('menu-editor-list');
  if (!container) return;
  // 未初期化なら現在のユーザー設定 or デフォルトを引き継ぐ
  if (!_editMenuConfig || _editMenuConfig.length === 0) {
    if (typeof userMenuConfig !== 'undefined' && userMenuConfig.length > 0) {
      _editMenuConfig = JSON.parse(JSON.stringify(userMenuConfig));
    } else {
      _editMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
    }
  }
  container.innerHTML = _editMenuConfig.map((item, index) => `
    <div style="background:#fff; border:1px solid var(--border); border-radius:6px; padding:8px 12px;
      display:flex; align-items:center; gap:8px; box-shadow:0 1px 2px rgba(0,0,0,0.05); margin-bottom:4px;">

      <!-- 上下移動ボタン -->
      <div style="display:flex; flex-direction:column; gap:2px; flex-shrink:0;">
        <button class="btn btn-outline btn-sm"
          style="padding:0; font-size:10px; height:20px; line-height:1; width:24px;"
          onclick="moveMenuConfigItem(${index}, -1)"
          ${index === 0 ? 'disabled' : ''}>▲</button>
        <button class="btn btn-outline btn-sm"
          style="padding:0; font-size:10px; height:20px; line-height:1; width:24px;"
          onclick="moveMenuConfigItem(${index}, 1)"
          ${index === _editMenuConfig.length - 1 ? 'disabled' : ''}>▼</button>
      </div>

      <!-- アイコン -->
      <input type="text" value="${_escAttr(item.icon||'')}"
        style="width:40px; text-align:center; padding:6px; border:1px solid var(--border); border-radius:4px; font-size:16px;"
        onchange="_editMenuConfig[${index}].icon=this.value"
        title="絵文字アイコン（例: 📋）">

      <!-- メニュー名 -->
      <input type="text" value="${_escAttr(item.label||'')}"
        style="flex:1; min-width:100px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:12px;"
        onchange="_editMenuConfig[${index}].label=this.value"
        title="メニュー名">

      <!-- セクション名 -->
      <input type="text" value="${_escAttr(item.section||'')}"
        style="width:110px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; color:var(--text-sub);"
        onchange="_editMenuConfig[${index}].section=this.value"
        placeholder="セクション名"
        title="サイドバーのセクション見出し">

      <!-- 外部URL -->
      <input type="text" value="${_escAttr(item.external||'')}"
        placeholder="外部URL (https://...)"
        style="width:170px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px;"
        onchange="_editMenuConfig[${index}].external=this.value"
        title="設定するとクリック時に別タブでURLを開きます">

      <!-- 表示・管理者専用 チェックボックス -->
      <div style="display:flex; flex-direction:column; gap:4px; flex-shrink:0; width:120px;">
        <label style="display:flex; align-items:center; gap:4px; font-size:11px; cursor:pointer; white-space:nowrap;">
          <input type="checkbox" ${item.visible ? 'checked' : ''}
            onchange="_editMenuConfig[${index}].visible=this.checked">
          <span>メニューに表示</span>
        </label>
        <label style="display:flex; align-items:center; gap:4px; font-size:11px; cursor:pointer; white-space:nowrap; color:var(--danger);">
          <input type="checkbox" ${item.adminOnly ? 'checked' : ''}
            onchange="_editMenuConfig[${index}].adminOnly=this.checked">
          <span>管理者のみ</span>
        </label>
      </div>

      <!-- 削除ボタン -->
      <button class="btn btn-danger btn-sm"
        style="padding:5px 8px; flex-shrink:0;"
        onclick="deleteMenuConfigItem(${index})"
        title="このメニュー項目を削除">✕</button>
    </div>
  `).join('');
}

function _escAttr(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 項目の上下移動
function moveMenuConfigItem(index, dir) {
  if (index + dir < 0 || index + dir >= _editMenuConfig.length) return;
  const temp = _editMenuConfig[index];
  _editMenuConfig[index] = _editMenuConfig[index + dir];
  _editMenuConfig[index + dir] = temp;
  renderMenuConfigList();
}

// 項目の削除
function deleteMenuConfigItem(index) {
  if (confirm('「' + _editMenuConfig[index].label + '」をメニューから削除しますか？\n※「初期状態にリセット」でいつでも元に戻せます')) {
    _editMenuConfig.splice(index, 1);
    renderMenuConfigList();
  }
}

// 新規メニュー項目を追加
function addMenuConfigItem() {
  const newId = 'custom_' + Date.now().toString(36);
  _editMenuConfig.push({
    id: newId,
    icon: '🔗',
    label: '新規リンク',
    section: 'その他',
    visible: true,
    adminOnly: false,
    external: ''
  });
  renderMenuConfigList();
  // 末尾へスクロール
  setTimeout(() => {
    const list = document.getElementById('menu-editor-list');
    if (list) list.scrollTop = list.scrollHeight;
  }, 100);
}

// 💾 保存して全ユーザーに反映
function saveMenuConfig() {
  const saveBtn = document.querySelector('#admin-tab-menu .btn-primary');
  if (saveBtn) { saveBtn.textContent = '⏳ 保存中...'; saveBtn.disabled = true; }

  google.script.run
    .withSuccessHandler(res => {
      if (saveBtn) { saveBtn.textContent = '💾 保存して反映'; saveBtn.disabled = false; }
      if (res && res.success) {
        showToast('✅ メニュー設定を全ユーザーに反映しました');
        // ローカルのuserMenuConfigを更新してサイドバーを即再描画
        userMenuConfig = JSON.parse(JSON.stringify(_editMenuConfig));
        renderSidebar();
      } else {
        showToast('保存に失敗しました: ' + (res ? res.error : '不明'), true);
      }
    })
    .withFailureHandler(err => {
      if (saveBtn) { saveBtn.textContent = '💾 保存して反映'; saveBtn.disabled = false; }
      showToast('通信エラー: ' + err.message, true);
    })
    .handleApiRequest('menuConfigSave', { menuConfig: _editMenuConfig });
}

// 🔄 初期状態にリセットして全ユーザーに反映
function resetMenuConfig() {
  if (!confirm('メニュー設定を完全に初期状態にリセットし、全ユーザーに反映しますか？\n現在の設定は失われます。')) return;
  _editMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
  renderMenuConfigList();
  // リセット内容をサーバーへ即保存
  google.script.run
    .withSuccessHandler(res => {
      if (res && res.success) {
        showToast('✅ メニューを初期状態にリセットしました');
        userMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
        renderSidebar();
      } else {
        showToast('リセット保存に失敗: ' + (res ? res.error : '不明'), true);
      }
    })
    .withFailureHandler(err => showToast('通信エラー: ' + err.message, true))
    .handleApiRequest('menuConfigSave', { menuConfig: _editMenuConfig });
}

// 管理コンソール タブ切り替え（menuタブ選択時にリスト初期化）
function switchAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-tab-content').forEach(c => c.style.display = 'none');
  const tabEl = document.getElementById('atab-' + tab);
  const contentEl = document.getElementById('admin-tab-' + tab);
  if (tabEl) tabEl.classList.add('active');
  if (contentEl) contentEl.style.display = 'block';
  // メニュー設定タブを開いた時は常にリスト再描画
  if (tab === 'menu') {
    // サーバーから最新のメニュー設定を読み込んでから描画
    _loadMenuConfigFromServer();
  }
  if (tab === 'apiconn') loadApiConnList();
}

// ============================================================
let _allModels = [];
let _selectedModelCode = null;

function loadModelMaster() {
  const listEl = document.getElementById('model-list-container');
  if (!listEl) return;
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  _clearModelDetail();
  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.success) {
        listEl.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ ' + (res ? res.error : '取得失敗') + '</div>';
        return;
      }
      _allModels = res.items || [];
      _renderModelList(_allModels);
    })
    .withFailureHandler(err => {
      listEl.innerHTML = '<div class="loading" style="color:var(--danger);">通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('modelMasterList', null);
}

function _renderModelList(items) {
  const listEl = document.getElementById('model-list-container');
  if (!listEl) return;
  if (items.length === 0) {
    listEl.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:13px;text-align:center;">機種データがありません<br><button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="openNewModelModal()">＋ 機種を追加</button></div>';
    return;
  }
  listEl.innerHTML = items.map(item => {
    const active = item.modelCode === _selectedModelCode ? 'model-list-item-active' : '';
    return `<div class="model-list-item ${active}" onclick="selectModel('${_esc(item.modelCode)}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-weight:700;font-size:13px;color:var(--text);">${_esc(item.modelCode)}</div>
          <div style="font-size:11.5px;color:var(--text-sub);margin-top:2px;">${_esc(item.modelName||'（機種名未設定）')}</div>
          ${item.boardNames ? `<div style="font-size:10.5px;color:var(--text-muted);margin-top:2px;">🔧 ${_esc(item.boardNames)}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px;">
          <div style="font-size:10.5px;color:var(--text-muted);">見積 <strong>${item.quoteCount}</strong> / 注文 <strong>${item.orderCount}</strong></div>
          ${item.totalAmount > 0 ? `<div style="font-size:10.5px;color:var(--success);margin-top:1px;">¥${Number(item.totalAmount).toLocaleString()}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectModel(modelCode) {
  _selectedModelCode = modelCode;
  // リスト側のアクティブ状態を更新
  document.querySelectorAll('.model-list-item').forEach(el => el.classList.remove('model-list-item-active'));
  const items = document.querySelectorAll('.model-list-item');
  _renderModelList(_allModels); // 再描画でアクティブ適用

  // 詳細パネルをローディング状態に
  const detailEl = document.getElementById('model-detail-panel');
  if (detailEl) detailEl.innerHTML = '<div class="loading"><div class="spinner"></div><br>詳細を取得中...</div>';

  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.success) {
        if (detailEl) detailEl.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ ' + (res ? res.error : '取得失敗') + '</div>';
        return;
      }
      _renderModelDetail(res);
    })
    .withFailureHandler(err => {
      if (detailEl) detailEl.innerHTML = '<div class="loading" style="color:var(--danger);">通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('modelMasterGet', { modelCode: modelCode });
}

function _clearModelDetail() {
  const detailEl = document.getElementById('model-detail-panel');
  if (detailEl) detailEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-muted);font-size:13px;">← 機種を選択してください</div>';
}

function _renderModelDetail(res) {
  const detailEl = document.getElementById('model-detail-panel');
  if (!detailEl) return;
  const mi = res.masterInfo || {};
  const quotes = res.relatedQuotes || [];
  const orders = res.relatedOrders || [];
  const ledger = res.relatedLedger || [];
  const boards = res.boards || [];

  const quoteTotal  = quotes.reduce((s, r) => s + (r.amount || 0), 0);
  const orderTotal  = orders.reduce((s, r) => s + (r.amount || 0), 0);

  const quoteRows = quotes.length === 0
    ? '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);font-size:12px;padding:12px;">データなし</td></tr>'
    : quotes.map(q => `<tr>
        <td><a href="${_esc(q.pdfUrl)}" target="_blank" style="color:var(--primary);font-weight:600;">${_esc(q.quoteNo)}</a></td>
        <td>${_esc(q.client)}</td>
        <td>${_esc(q.quoteDate)}</td>
        <td style="text-align:right;">¥${Number(q.amount||0).toLocaleString()}</td>
        <td>${_sBadge(q.status)}${q.linked ? ' <span style="font-size:10px;color:var(--success);">🔗</span>' : ''}</td>
      </tr>`).join('');

  const orderRows = orders.length === 0
    ? '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);font-size:12px;padding:12px;">データなし</td></tr>'
    : orders.map(o => `<tr>
        <td><a href="${_esc(o.pdfUrl)}" target="_blank" style="color:var(--primary);font-weight:600;">${_esc(o.orderNo)}</a></td>
        <td>${_esc(o.client)}</td>
        <td>${_esc(o.orderDate)}</td>
        <td style="text-align:right;">¥${Number(o.amount||0).toLocaleString()}</td>
        <td>${_esc(o.deliveryDate||'—')}</td>
        <td>${_sBadge(o.status)}${_otBadge(o.orderType)}</td>
      </tr>`).join('');

  const boardRows = boards.length === 0
    ? '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);font-size:12px;padding:12px;">基板データなし（BOM SSに登録してください）</td></tr>'
    : boards.map(b => `<tr>
        <td><strong>${_esc(b.boardName)}</strong></td>
        <td>${_esc(b.code)}</td>
        <td>${_esc(b.version)}</td>
        <td>${_esc(b.desc)}</td>
      </tr>`).join('');

  const ledgerRows = ledger.length === 0
    ? '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);font-size:12px;padding:12px;">台帳データなし</td></tr>'
    : ledger.map(l => `<tr>
        <td><strong>${_esc(l.quoteNo)}</strong></td>
        <td>${_esc(l.issueDate)}</td>
        <td style="text-align:right;">${l.amount != null ? '¥' + Number(l.amount).toLocaleString() : '—'}</td>
        <td>${_esc(l.status)}</td>
      </tr>`).join('');

  detailEl.innerHTML = `
    <!-- ヘッダー -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div>
        <h2 style="font-size:18px;font-weight:700;color:var(--text);">${_esc(mi.modelCode||'—')}</h2>
        <div style="font-size:13px;color:var(--text-sub);margin-top:2px;">${_esc(mi.modelName||'機種名未設定')}</div>
        ${mi.boardNames ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">🔧 ${_esc(mi.boardNames)}</div>` : ''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" onclick="openEditModelModal('${_esc(mi.modelCode)}','${_esc(mi.modelName||'')}','${_esc(mi.description||'')}')">✏️ 編集</button>
        <button class="btn btn-sm" onclick="loadModelMaster()" style="color:var(--text-sub);">🔄 更新</button>
        <button class="btn btn-danger btn-sm" onclick="deleteModel('${_esc(mi.modelCode)}')">🗑️ 削除</button>
      </div>
    </div>
    ${mi.description ? `<div style="background:#f8fafc;border-radius:6px;padding:10px 14px;font-size:12.5px;color:var(--text);margin-bottom:16px;border:1px solid var(--border-light);">📝 ${_esc(mi.description)}</div>` : ''}

    <!-- サマリーカード -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;">
      <div class="summary-card"><div class="lbl">見積件数</div><div class="val c-blue" style="font-size:22px;">${quotes.length}</div></div>
      <div class="summary-card"><div class="lbl">注文件数</div><div class="val c-red" style="font-size:22px;">${orders.length}</div></div>
      <div class="summary-card"><div class="lbl">見積合計</div><div class="val" style="font-size:16px;">¥${quoteTotal.toLocaleString()}</div></div>
      <div class="summary-card"><div class="lbl">注文合計</div><div class="val c-green" style="font-size:16px;">¥${orderTotal.toLocaleString()}</div></div>
    </div>

    <!-- タブ -->
    <div id="model-detail-tabs" style="display:flex;gap:0;border-bottom:2px solid var(--border-light);margin-bottom:14px;">
      <button class="admin-tab active" id="mdtab-quote" onclick="switchModelTab('quote')">📄 見積書 (${quotes.length})</button>
      <button class="admin-tab" id="mdtab-order" onclick="switchModelTab('order')">📦 注文書 (${orders.length})</button>
      <button class="admin-tab" id="mdtab-board" onclick="switchModelTab('board')">🔧 基板 (${boards.length})</button>
      <button class="admin-tab" id="mdtab-ledger" onclick="switchModelTab('ledger')">📝 台帳 (${ledger.length})</button>
    </div>

    <div id="mdtab-content-quote" class="admin-tab-content" style="display:block;">
      <div class="table-wrap"><table>
        <thead><tr><th>見積番号</th><th>顧客名</th><th>見積日</th><th>見積金額</th><th>ステータス</th></tr></thead>
        <tbody>${quoteRows}</tbody>
      </table></div>
    </div>
    <div id="mdtab-content-order" class="admin-tab-content">
      <div class="table-wrap"><table>
        <thead><tr><th>注文番号</th><th>顧客名</th><th>注文日</th><th>注文金額</th><th>納期</th><th>ステータス</th></tr></thead>
        <tbody>${orderRows}</tbody>
      </table></div>
    </div>
    <div id="mdtab-content-board" class="admin-tab-content">
      <div class="table-wrap"><table>
        <thead><tr><th>基板名</th><th>コード</th><th>バージョン</th><th>説明</th></tr></thead>
        <tbody>${boardRows}</tbody>
      </table></div>
    </div>
    <div id="mdtab-content-ledger" class="admin-tab-content">
      <div class="table-wrap"><table>
        <thead><tr><th>見積No</th><th>発行日</th><th>見積金額</th><th>ステータス</th></tr></thead>
        <tbody>${ledgerRows}</tbody>
      </table></div>
    </div>
  `;
}

function switchModelTab(name) {
  ['quote','order','board','ledger'].forEach(t => {
    const btn = document.getElementById('mdtab-' + t);
    const con = document.getElementById('mdtab-content-' + t);
    if (btn) btn.classList.toggle('active', t === name);
    if (con) con.style.display = (t === name) ? 'block' : 'none';
  });
}

// ── 機種 新規追加モーダル ──
function openNewModelModal() {
  document.getElementById('model-modal-title').textContent = '機種を新規追加';
  document.getElementById('model-modal-code').value  = '';
  document.getElementById('model-modal-name').value  = '';
  document.getElementById('model-modal-desc').value  = '';
  document.getElementById('model-modal-code').readOnly = false;
  document.getElementById('model-modal').classList.add('open');
}

function openEditModelModal(code, name, desc) {
  document.getElementById('model-modal-title').textContent = '機種を編集';
  document.getElementById('model-modal-code').value  = code;
  document.getElementById('model-modal-name').value  = name;
  document.getElementById('model-modal-desc').value  = desc;
  document.getElementById('model-modal-code').readOnly = true; // コードは変更不可
  document.getElementById('model-modal').classList.add('open');
}

function closeModelModal() {
  document.getElementById('model-modal').classList.remove('open');
}

function saveModel() {
  const code = document.getElementById('model-modal-code').value.trim();
  const name = document.getElementById('model-modal-name').value.trim();
  const desc = document.getElementById('model-modal-desc').value.trim();
  if (!code) { showToast('機種コードを入力してください', true); return; }

  const saveBtn = document.getElementById('model-modal-save-btn');
  saveBtn.disabled = true; saveBtn.textContent = '保存中...';

  google.script.run
    .withSuccessHandler(res => {
      saveBtn.disabled = false; saveBtn.textContent = '保存';
      if (res && res.success) {
        showToast('✅ 機種を保存しました');
        closeModelModal();
        loadModelMaster();
        if (code) { _selectedModelCode = code; setTimeout(() => selectModel(code), 800); }
      } else {
        showToast('❌ 保存失敗: ' + (res ? res.error : '不明'), true);
      }
    })
    .withFailureHandler(err => {
      saveBtn.disabled = false; saveBtn.textContent = '保存';
      showToast('通信エラー: ' + err.message, true);
    })
    .handleApiRequest('modelMasterSave', { modelCode: code, modelName: name, description: desc });
}

function deleteModel(modelCode) {
  if (!confirm('機種コード「' + modelCode + '」を削除しますか？\n（関連する見積書・注文書のデータは削除されません）')) return;
  google.script.run
    .withSuccessHandler(res => {
      if (res && res.success) {
        showToast('✅ 削除しました');
        _selectedModelCode = null;
        loadModelMaster();
      } else {
        showToast('❌ 削除失敗: ' + (res ? res.error : '不明'), true);
      }
    })
    .withFailureHandler(err => showToast('通信エラー: ' + err.message, true))
    .handleApiRequest('modelMasterDelete', { modelCode: modelCode });
}

function filterModelList() {
  const kw = document.getElementById('model-search').value.toLowerCase();
  const filtered = _allModels.filter(m =>
    m.modelCode.toLowerCase().includes(kw) ||
    (m.modelName || '').toLowerCase().includes(kw) ||
    (m.boardNames || '').toLowerCase().includes(kw)
  );
  _renderModelList(filtered);
}

function rebuildModelMaster() {
  if (!confirm('管理シート・見積台帳から機種コードを収集して機種マスタを再構築します。\nよろしいですか？')) return;
  showToast('再構築中...');
  google.script.run
    .withSuccessHandler(res => {
      if (res && res.success) {
        showToast('✅ 再構築完了: ' + res.total + '機種（新規追加: ' + res.added + '件）');
        loadModelMaster();
      } else {
        showToast('❌ 再構築失敗: ' + (res ? res.error : '不明'), true);
      }
    })
    .withFailureHandler(err => showToast('通信エラー: ' + err.message, true))
    .handleApiRequest('rebuildModelMaster', null);
}

  const container = document.getElementById('menu-editor-list');
  if (container) container.innerHTML = '<div style="padding:16px;color:var(--text-sub);font-size:13px;">⏳ 設定を読み込み中...</div>';
  google.script.run
    .withSuccessHandler(res => {

        _editMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
      }
      renderMenuConfigList();

      // 通信失敗時はローカルのuserMenuConfigを使う

        ? JSON.parse(JSON.stringify(userMenuConfig))
        : JSON.parse(JSON.stringify(DEFAULT_MENU));
      renderMenuConfigList();
    })
    .handleApiRequest('menuConfigLoad', null);
}

// ── ★ PDF 一括アップロード & OCR バッチキュー ──
// 複数ファイルを並列でOCR処理。google.script.run は非同期なので
// 複数ファイルを同時送信するとGAS側で並列実行される。

var _ocrQueue = {};          // jobId → job object
var _ocrReviewJobId = null;  // 現在レビュー中のjobId
var _ocrSessionId   = null;  // 後方互換用

// ----- モーダル開閉 -----

// ----- ファイル選択 / ドロップ -----
function handleFileSelect(e){ Array.from(e.target.files).forEach(f => _queueAddFile(f)); e.target.value=''; }
function handleDropFiles(e){  Array.from(e.dataTransfer.files).forEach(f => _queueAddFile(f)); }

function _queueAddFile(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){ showToast(file.name + ': PDFファイルのみ対応', true); return; }
  if(!S.docType){ showToast('書類種別（見積書 / 注文書）を先に選択してください', true); return; }
  if(S.docType==='order' && !S.orderType){ showToast('注文種別（試作 / 量産）を選択してください', true); return; }

  const jobId = 'job_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  _ocrQueue[jobId] = {
    jobId, file,
    fileName  : file.name,
    docType   : S.docType,
    orderType : S.orderType,
    status    : 'reading',   // reading → ocring → ready → approving → done | error
    sessionId : null,
    res       : null,
    errorMsg  : null,
    startedAt : Date.now(),
  };
  _renderQueue();

  // ファイルを読み込んで即座にOCR開始（非同期）
  const reader = new FileReader();
  reader.onload = ev => {
    const b64 = ev.target.result.split(',')[1];
    _ocrQueue[jobId].status = 'ocring';
    _renderQueueItem(jobId);

    google.script.run
      .withSuccessHandler(res => {
        if(!_ocrQueue[jobId]) return;
        if(!res.success){
          _ocrQueue[jobId].status   = 'error';
          _ocrQueue[jobId].errorMsg = res.error || 'OCRエラー';
        } else {
          _ocrQueue[jobId].status    = 'ready';
          _ocrQueue[jobId].sessionId = res.sessionId;
          _ocrQueue[jobId].res       = res;
          showToast('✅ OCR完了: ' + file.name.substring(0,20));
        }
        _renderQueueItem(jobId);
        _updateClearBtn();
      })
      .withFailureHandler(err => {
        if(!_ocrQueue[jobId]) return;
        _ocrQueue[jobId].status   = 'error';
        _ocrQueue[jobId].errorMsg = '通信エラー: ' + (err.message || String(err));
        _renderQueueItem(jobId);
        _updateClearBtn();
      })
      .handleApiRequest('ocrPreview', {
        base64Data : b64,
        fileName   : file.name,
        docType    : S.docType,
        orderType  : S.orderType,
      });
  };
  reader.readAsDataURL(file);
}

// ----- キュー描画 -----
var _OCR_STATUS_CFG = {
  reading  : { icon:'⏳', text:'読込中...',           color:'#64748b', bg:'#f8fafc' },
  ocring   : { icon:'🔍', text:'OCR解析中...',        color:'#2563eb', bg:'#eff6ff' },
  ready    : { icon:'✅', text:'確認待ち',             color:'#16a34a', bg:'#f0fdf4' },
  approving: { icon:'💾', text:'登録中...',            color:'#7c3aed', bg:'#f5f3ff' },
  done     : { icon:'🎉', text:'登録完了',             color:'#16a34a', bg:'#dcfce7' },
  error    : { icon:'❌', text:'エラー',               color:'#dc2626', bg:'#fef2f2' },
};

function _renderQueue(){
  const container = document.getElementById('ocr-queue-container');
  if(!container) return;
  const jobs = Object.values(_ocrQueue);
  if(jobs.length === 0){ container.innerHTML = ''; _updateClearBtn(); return; }

  const processing = jobs.filter(j=>j.status==='ocring'||j.status==='reading').length;
  const ready      = jobs.filter(j=>j.status==='ready').length;
  const done       = jobs.filter(j=>j.status==='done').length;
  const summary    = `${jobs.length}件 ／ 解析中:${processing} ／ 確認待ち:${ready} ／ 完了:${done}`;

  container.innerHTML =
    '<div style="margin-top:12px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">' +
    '<div style="padding:7px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;">' +
    '<span style="font-size:12px;font-weight:600;color:#475569;">📋 処理キュー</span>' +
    '<span data-summary style="font-size:11px;color:#94a3b8;">' + summary + '</span>' +
    '</div>' +
    '<div id="ocr-queue-list">' +
    jobs.map(j => _queueItemHtml(j)).join('') +
    '</div></div>';
  _updateClearBtn();
}

function _renderQueueItem(jobId){
  const job = _ocrQueue[jobId];
  const el  = document.getElementById('ocr-qi-' + jobId);
  if(el){
    el.outerHTML = _queueItemHtml(job);
  } else {
    _renderQueue();
  }
  // サマリー行も更新
  const container = document.getElementById('ocr-queue-container');
  if(container){
    const jobs       = Object.values(_ocrQueue);
    const processing = jobs.filter(j=>j.status==='ocring'||j.status==='reading').length;
    const ready      = jobs.filter(j=>j.status==='ready').length;
    const done       = jobs.filter(j=>j.status==='done').length;
    const sumEl      = container.querySelector('span[data-summary]');
    if(sumEl) sumEl.textContent = jobs.length + '件 ／ 解析中:' + processing + ' ／ 確認待ち:' + ready + ' ／ 完了:' + done;
  }
}

function _queueItemHtml(job){
  const cfg  = _OCR_STATUS_CFG[job.status] || _OCR_STATUS_CFG.error;
  const name = job.fileName.length > 34 ? job.fileName.substring(0,32) + '…' : job.fileName;
  const spinner = (job.status==='ocring')
    ? '<span class="ocr-mini-spinner"></span>' : '';
  const elapsedSec = job.startedAt ? Math.floor((Date.now()-job.startedAt)/1000) : 0;
  const elapsedTxt = (job.status==='ocring' && elapsedSec > 2) ? ' (' + elapsedSec + 's)' : '';
  const btnHtml =
    job.status === 'ready'
      ? '<button onclick="_queueReview(\'' + job.jobId + '\')" style="border:none;background:#2563eb;color:#fff;border-radius:4px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;">確認・登録</button>'
    : job.status === 'error'
      ? '<button onclick="_queueRetry(\'' + job.jobId + '\')" style="border:1px solid #dc2626;background:#fff;color:#dc2626;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap;">再試行</button>'
    : '';
  const errHtml = job.errorMsg
    ? '<div style="font-size:10px;color:#dc2626;margin-top:2px;">' + _esc(job.errorMsg) + '</div>' : '';
  const typeTag = '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#e2e8f0;color:#475569;margin-left:5px;">' +
    (job.docType==='quote'?'見積書':'注文書') +
    (job.orderType?' '+job.orderType:'') + '</span>';

  return '<div id="ocr-qi-' + job.jobId + '" class="ocr-queue-item" style="background:' + cfg.bg + ';">' +
    '<div style="flex:1;min-width:0;">' +
    '<div style="font-size:12px;font-weight:500;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + _esc(job.fileName) + '">' +
    cfg.icon + ' ' + _esc(name) + spinner + typeTag + '</div>' +
    '<div style="font-size:10px;color:' + cfg.color + ';margin-top:1px;">' + cfg.text + elapsedTxt + '</div>' +
    errHtml +
    '</div>' +
    '<div style="white-space:nowrap;">' + btnHtml + '</div>' +
    '</div>';
}

function _updateClearBtn(){
  const btn  = document.getElementById('queue-clear-btn');
  if(!btn) return;
  const done = Object.values(_ocrQueue).filter(j=>j.status==='done'||j.status==='error').length;
  btn.style.display = done > 0 ? 'inline-flex' : 'none';
}

function clearDoneQueue(){
  Object.keys(_ocrQueue).forEach(k=>{
    if(_ocrQueue[k].status==='done' || _ocrQueue[k].status==='error') delete _ocrQueue[k];
  });
  _renderQueue();
  document.getElementById('upload-status').innerHTML = '';
  _ocrReviewJobId = null;
}

// ----- キューアクション -----
function _queueReview(jobId){
  const job = _ocrQueue[jobId];
  if(!job || job.status !== 'ready' || !job.res) return;
  _ocrReviewJobId = jobId;
  _ocrSessionId   = job.sessionId;   // 後方互換
  S.docType       = job.docType;
  document.getElementById('upload-status').innerHTML = '';
  _openOcrReviewModal(job.res);
  // 確認パネルまでスクロール
  const el = document.getElementById('upload-status');
  if(el) setTimeout(()=>el.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
}

function _queueRetry(jobId){
  const job = _ocrQueue[jobId];
  if(!job) return;
  const file = job.file;
  delete _ocrQueue[jobId];
  S.docType   = job.docType;
  S.orderType = job.orderType;
  _queueAddFile(file);
}

// ----- OCR確認パネル -----
function _openOcrReviewModal(res){
  const ocr=res.ocrResult||{}; const quality=res.quality||0; const warns=res.warnings||[];

  const qColor=quality>=75?'#16a34a':quality>=50?'#d97706':'#dc2626';

  const warnHtml=warns.map(w=>`<div style="padding:6px 10px;border-radius:5px;font-size:12px;margin-bottom:4px;background:${w.level==='error'?'#fef2f2':'#fffbeb'};color:${w.level==='error'?'#dc2626':'#d97706'};border-left:3px solid ${w.level==='error'?'#dc2626':'#d97706'};">${w.level==='error'?'❌':'⚠️'} ${w.msg}</div>`).join('');
  const lines=ocr.lineItems||[];
  const lineRows=lines.map((item,i)=>`

      <td style="padding:4px 6px;"><input type="text" value="${_esc(item.spec)}" onchange="ocrUpdateLine(${i},'spec',this.value)" style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;font-size:12px;"></td>
      <td style="padding:4px 6px;"><input type="number" value="${item.qty||1}" onchange="ocrUpdateLine(${i},'qty',Number(this.value));ocrRecalcLine(${i})" style="width:60px;border:1px solid #e2e8f0;border-radius:4px;padding:3px 4px;font-size:12px;text-align:right;"></td>
      <td style="padding:4px 6px;"><input type="number" value="${item.unitPrice||0}" id="ocr-price-${i}" onchange="ocrUpdateLine(${i},'unitPrice',Number(this.value));ocrRecalcLine(${i})" style="width:90px;border:${item.unitPrice?'1px solid #e2e8f0':'2px solid #f59e0b'};border-radius:4px;padding:3px 4px;font-size:12px;text-align:right;font-weight:${item.unitPrice?'400':'600'};"></td>

      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">見積番号 <span style="color:#dc2626;">*</span></label><input type="text" id="ocr-documentNo" value="${_esc(ocr.documentNo)}" style="width:100%;border:1px solid ${ocr.documentNo?'#e2e8f0':'#f59e0b'};border-radius:6px;padding:6px 8px;font-size:13px;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">発行日</label><input type="text" id="ocr-issueDate" value="${_esc(ocr.issueDate||ocr.documentDate)}" placeholder="YYYY/MM/DD" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">宛先会社名</label><input type="text" id="ocr-destCompany" value="${_esc(ocr.destCompany)}" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">件名</label><input type="text" id="ocr-subject" value="${_esc(ocr.subject)}" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;">
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">小計</label><input type="number" id="ocr-subtotal" value="${ocr.subtotal||0}" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;text-align:right;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">消費税</label><input type="number" id="ocr-tax" value="${ocr.tax||0}" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;text-align:right;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">合計金額</label><input type="number" id="ocr-totalAmount" value="${ocr.totalAmount||0}" style="width:100%;border:1px solid ${ocr.totalAmount?'#e2e8f0':'#f59e0b'};border-radius:6px;padding:6px 8px;font-size:13px;text-align:right;font-weight:600;"></div>
    </div>`:`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">注文番号 <span style="color:#dc2626;">*</span></label><input type="text" id="ocr-documentNo" value="${_esc(ocr.documentNo)}" style="width:100%;border:1px solid ${ocr.documentNo?'#e2e8f0':'#f59e0b'};border-radius:6px;padding:6px 8px;font-size:13px;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">発注日</label><input type="text" id="ocr-issueDate" value="${_esc(ocr.documentDate)}" placeholder="YYYY/MM/DD" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">発注者</label><input type="text" id="ocr-destCompany" value="${_esc(ocr.clientName)}" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">件名</label><input type="text" id="ocr-subject" value="${_esc(ocr.subject)}" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">対応見積番号</label><input type="text" id="ocr-linkedQuoteNo" value="${_esc(ocr.linkedQuoteNo)}" style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:13px;"></div>
      <div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:3px;">合計金額</label><input type="number" id="ocr-totalAmount" value="${ocr.totalAmount||0}" style="width:100%;border:1px solid ${ocr.totalAmount?'#e2e8f0':'#f59e0b'};border-radius:6px;padding:6px 8px;font-size:13px;text-align:right;font-weight:600;"></div>
    </div>`;
  const pdfPreviewBtn=res.pdfUrl?`<a href="${res.pdfUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid #2563eb;border-radius:5px;color:#2563eb;font-size:12px;text-decoration:none;">📄 PDFを確認</a>`:'';
  // ファイル名を取得
  const jobName = _ocrReviewJobId && _ocrQueue[_ocrReviewJobId] ? _ocrQueue[_ocrReviewJobId].fileName : '';
  document.getElementById('upload-status').innerHTML=`
    <div id="ocr-review-panel" style="margin-top:8px;border:2px solid #2563eb22;border-radius:10px;padding:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f2f5;">
        <span style="font-size:12px;font-weight:700;color:#1e293b;">📝 OCR確認</span>
        ${jobName?`<span style="font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;" title="${_esc(jobName)}">${_esc(jobName)}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:10px;">
        <div style="flex:1;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="font-size:12px;font-weight:600;">OCR品質スコア</span><span style="background:${qColor};color:#fff;border-radius:4px;padding:1px 8px;font-size:11px;">${quality}点 ${qLabel}</span>${pdfPreviewBtn}</div><div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;"><div style="width:${quality}%;height:100%;background:${qColor};border-radius:3px;"></div></div></div>
      </div>
      ${warnHtml?`<div style="margin-bottom:10px;">${warnHtml}</div>`:''}
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;">
        <div style="font-size:12px;font-weight:600;margin-bottom:10px;">📋 ${isQuote?'見積書':'注文書'}情報<span style="font-size:11px;font-weight:400;color:#94a3b8;margin-left:6px;">黄色枠は要確認</span></div>
        ${headerFields}
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><span style="font-size:12px;font-weight:600;">📋 明細行 <span id="ocr-line-count">${lines.length}</span>行</span><button onclick="ocrAddLine()" style="border:1px solid #2563eb;background:none;color:#2563eb;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;">＋ 行追加</button></div>
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;min-width:550px;" id="ocr-line-table">
            <thead><tr style="background:#f8fafc;font-size:11px;color:#64748b;"><th style="padding:5px 6px;text-align:center;width:30px;">#</th><th style="padding:5px 6px;text-align:left;">品名</th><th style="padding:5px 6px;text-align:left;">仕様</th><th style="padding:5px 6px;text-align:right;width:60px;">数量</th><th style="padding:5px 6px;text-align:right;width:100px;">単価 *</th><th style="padding:5px 6px;text-align:right;width:90px;">金額</th><th style="padding:5px 6px;width:30px;"></th></tr></thead>
            <tbody id="ocr-lines-body">${lineRows}</tbody>
          </table>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="ocrDiscard()" style="border:1px solid #e2e8f0;background:#fff;color:#64748b;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer;">✕ キャンセル</button>
        <button onclick="ocrApprove()" id="ocr-approve-btn" style="border:none;background:#2563eb;color:#fff;border-radius:6px;padding:7px 20px;font-size:13px;font-weight:600;cursor:pointer;">✅ 確認・承認してDB登録</button>
      </div>
    </div>`;
  window._ocrLines   = JSON.parse(JSON.stringify(lines));
  window._ocrDocType = S.docType;
}

// ----- 明細編集 -----
function ocrUpdateLine(idx,field,val){ if(window._ocrLines&&window._ocrLines[idx]) window._ocrLines[idx][field]=val; }
function ocrRecalcLine(idx){ const line=window._ocrLines&&window._ocrLines[idx]; if(!line) return; const amt=(line.unitPrice||0)*(line.qty||1); line.amount=amt; const el=document.getElementById('ocr-amt-'+idx); if(el) el.textContent=amt.toLocaleString(); }
function ocrDeleteLine(idx){ if(!window._ocrLines) return; window._ocrLines.splice(idx,1); const row=document.getElementById('ocr-line-'+idx); if(row) row.style.display='none'; }
function ocrAddLine(){
  if(!window._ocrLines) window._ocrLines=[];
  const idx=window._ocrLines.length; window._ocrLines.push({itemName:'',spec:'',qty:1,unit:'式',unitPrice:0,amount:0,remarks:''});
  const tbody=document.getElementById('ocr-lines-body'); if(!tbody) return;
  const tr=document.createElement('tr'); tr.id='ocr-line-'+idx; tr.style.borderBottom='1px solid #f0f2f5';
  tr.innerHTML=`<td style="padding:4px 6px;text-align:center;color:#94a3b8;font-size:11px;">${idx+1}</td><td style="padding:4px 6px;"><input type="text" onchange="ocrUpdateLine(${idx},'itemName',this.value)" style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;font-size:12px;"></td><td style="padding:4px 6px;"><input type="text" onchange="ocrUpdateLine(${idx},'spec',this.value)" style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;font-size:12px;"></td><td style="padding:4px 6px;"><input type="number" value="1" onchange="ocrUpdateLine(${idx},'qty',Number(this.value));ocrRecalcLine(${idx})" style="width:60px;border:1px solid #e2e8f0;border-radius:4px;padding:3px 4px;font-size:12px;text-align:right;"></td><td style="padding:4px 6px;"><input type="number" value="0" id="ocr-price-${idx}" onchange="ocrUpdateLine(${idx},'unitPrice',Number(this.value));ocrRecalcLine(${idx})" style="width:90px;border:2px solid #f59e0b;border-radius:4px;padding:3px 4px;font-size:12px;text-align:right;font-weight:600;"></td><td style="padding:4px 6px;text-align:right;font-size:12px;font-weight:500;color:#2563eb;" id="ocr-amt-${idx}">0</td><td style="padding:4px 6px;text-align:center;"><button onclick="ocrDeleteLine(${idx})" style="border:none;background:none;color:#dc2626;cursor:pointer;font-size:14px;">✕</button></td>`;
  tbody.appendChild(tr);
}

// ----- 承認・破棄 -----
function ocrDiscard(){
  const jobId    = _ocrReviewJobId;
  const sessionId = jobId ? (_ocrQueue[jobId]&&_ocrQueue[jobId].sessionId) : _ocrSessionId;
  document.getElementById('upload-status').innerHTML = '';
  _ocrReviewJobId = null;
  if(!sessionId) return;
  google.script.run
    .withSuccessHandler(()=>{ showToast('破棄しました'); })
    .handleApiRequest('ocrDiscard', { sessionId });
  // キューからも削除
  if(jobId && _ocrQueue[jobId]){
    delete _ocrQueue[jobId];
    _renderQueue();
  }
}

function ocrApprove(){
  const jobId    = _ocrReviewJobId;
  const sessionId = jobId ? (_ocrQueue[jobId]&&_ocrQueue[jobId].sessionId) : _ocrSessionId;
  if(!sessionId){ showToast('セッションが無効です', true); return; }

  const btn = document.getElementById('ocr-approve-btn');
  if(btn){ btn.disabled=true; btn.textContent='登録中...'; }

  // キューステータス更新
  if(jobId && _ocrQueue[jobId]){
    _ocrQueue[jobId].status = 'approving';
    _renderQueueItem(jobId);
  }

  const corrected = {
    documentNo  : (document.getElementById('ocr-documentNo')||{}).value||'',
    issueDate   : (document.getElementById('ocr-issueDate')||{}).value||'',
    documentDate: (document.getElementById('ocr-issueDate')||{}).value||'',
    destCompany : (document.getElementById('ocr-destCompany')||{}).value||'',
    clientName  : (document.getElementById('ocr-destCompany')||{}).value||'',
    subject     : (document.getElementById('ocr-subject')||{}).value||'',
    linkedQuoteNo:(document.getElementById('ocr-linkedQuoteNo')||{}).value||'',
    subtotal    : Number((document.getElementById('ocr-subtotal')||{}).value||0),
    tax         : Number((document.getElementById('ocr-tax')||{}).value||0),
    totalAmount : Number((document.getElementById('ocr-totalAmount')||{}).value||0),
    lineItems   : (window._ocrLines||[]).filter(l=>l.itemName),
  };

  google.script.run
    .withSuccessHandler(res=>{
      if(btn){ btn.disabled=false; btn.textContent='✅ 確認・承認してDB登録'; }
      if(!res.success){
        showToast('登録失敗: ' + res.error, true);
        if(jobId && _ocrQueue[jobId]){ _ocrQueue[jobId].status='ready'; _renderQueueItem(jobId); }
        return;
      }
      // キュー完了
      if(jobId && _ocrQueue[jobId]){
        _ocrQueue[jobId].status = 'done';
        _renderQueueItem(jobId);
        _updateClearBtn();
      }
      _ocrReviewJobId = null;
      _ocrSessionId   = null;
      document.getElementById('upload-status').innerHTML =
        `<div style="background:#e6f4ea;border-radius:8px;padding:14px;font-size:13px;margin-top:8px;">
          <strong style="color:#16a34a;font-size:14px;">✅ DB登録完了</strong><br>
          <span>${_esc(corrected.documentNo||'—')} / ${_esc(corrected.destCompany||'—')}</span><br>
          <span style="color:#6b7280;">明細: ${res.lineCount}行 ／ 合計: ${corrected.totalAmount?corrected.totalAmount.toLocaleString()+' 円':'—'}</span>
          <div style="margin-top:8px;font-size:11px;color:#64748b;">次の「確認待ち」ファイルがある場合は上のキューから選択してください。</div>
        </div>`;
      showToast('✅ 登録完了しました');
      loadData();
      if(typeof loadQuoteList==='function') loadQuoteList();
    })
    .withFailureHandler(err=>{
      if(btn){ btn.disabled=false; btn.textContent='✅ 確認・承認してDB登録'; }
      showToast('通信エラー: '+(err.message||err), true);
      if(jobId && _ocrQueue[jobId]){ _ocrQueue[jobId].status='ready'; _renderQueueItem(jobId); }
    })
    .handleApiRequest('ocrApprove', { sessionId, correctedOcr: corrected });
}

// ── ★ 見積一覧 機種列オートコンプリート ──
let _modelCodeCache = [];

function startInlineEditAutocomplete(e, id, field, val, type) {
  e.stopPropagation();
  const td = e.currentTarget;
  if (td.querySelector('input')) return;
  const dlId = 'dl-model-autocomplete';
  if (!document.getElementById(dlId)) {
    const dl = document.createElement('datalist');
    dl.id = dlId;
    document.body.appendChild(dl);
  }
  const _fillDatalist = (codes) => {
    const dl = document.getElementById(dlId);
    if (!dl) return;
    dl.innerHTML = codes.map(c => `<option value="${_esc(c.code)}">${c.code}${c.name?' — '+c.name:''}</option>`).join('');
  };
  if (_modelCodeCache.length > 0) {
    _fillDatalist(_modelCodeCache);
  } else {
    google.script.run.withSuccessHandler(res => {
      if (res && res.success && res.items) {
        _modelCodeCache = res.items.map(r => ({ code: r.modelCode||'', name: r.modelName||'' })).filter(r=>r.code);
        _fillDatalist(_modelCodeCache);
      }
    }).handleApiRequest('modelMasterList', null);
  }
  const input = document.createElement('input');
  input.type = 'text';
  input.setAttribute('list', dlId);
  input.className = 'inline-edit-input';
  input.value = val === '—' ? '' : val;
  input.style.cssText = 'width:100%;min-width:80px;';
  input.onblur = () => saveInlineEdit(td, id, field, input.value, val, type);
  input.onkeydown = (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { td.innerHTML = val || '<span style="color:var(--text-muted);">—</span>'; }
  };
  td.innerHTML = ''; td.appendChild(input); input.focus();
}

// ── ★ 台帳 PDF アップロード ──
function previewLedgerPdf(input) {
  const f = input.files[0];
  if (!f) return;
  if (!f.name.toLowerCase().endsWith('.pdf')) { showToast('PDFのみ対応',true); input.value=''; return; }
  document.getElementById('ledger-pdf-name').textContent = f.name + ' (' + (f.size/1024).toFixed(1) + ' KB)';
  document.getElementById('ledger-pdf-upload-btn').style.display = 'inline-flex';
  document.getElementById('ledger-pdf-status').textContent = '';
}
function uploadLedgerPdf() {
  const input = document.getElementById('ledger-pdf-file');
  const f = input.files[0]; if (!f) { showToast('PDFを選択してください',true); return; }
  const btn = document.getElementById('ledger-pdf-upload-btn');
  btn.disabled = true; btn.textContent = '⏳ アップロード中...';
  document.getElementById('ledger-pdf-status').innerHTML = '<span style="color:var(--text-sub);">アップロード中...</span>';
  const machineCode = (document.getElementById('ledger-machine-code')||{}).value||'';
  const boardName = (document.getElementById('ledger-board-name')||{}).value||'';
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result.split(',')[1];
    google.script.run
      .withSuccessHandler(res => {
        btn.disabled = false; btn.textContent = '⬆ アップロード';
        if (res && res.success) {
          document.getElementById('ledger-save-url').value = res.url;
          document.getElementById('ledger-pdf-status').innerHTML = '<span style="color:var(--success);">✅ アップロード完了 — URLを自動入力しました</span>';
          document.getElementById('ledger-pdf-upload-btn').style.display = 'none';
          showToast('✅ PDFをアップロードしました');
        } else {
          document.getElementById('ledger-pdf-status').innerHTML = '<span style="color:var(--danger);">❌ ' + ((res&&res.error)||'アップロード失敗') + '</span>';
        }
      })
      .withFailureHandler(err => {
        btn.disabled = false; btn.textContent = '⬆ アップロード';
        document.getElementById('ledger-pdf-status').innerHTML = '<span style="color:var(--danger);">❌ 通信エラー</span>';
      })
      .handleApiRequest('ledgerUploadFile', { base64Data: b64, fileName: f.name, machineCode, boardName });
  };
  reader.readAsDataURL(f);
}

// ── ★ 外部API連携管理 ──
let _apiConnList = [];

function loadApiConnList() {
  document.getElementById('api-conn-list').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-sub);">⏳ 読み込み中...</div>';
  google.script.run.withSuccessHandler(res => {
    _apiConnList = (res && res.items) || [];
    _renderApiConnList();
  }).withFailureHandler(() => {
    document.getElementById('api-conn-list').innerHTML = '<div style="padding:20px;color:var(--danger);">読み込みエラー</div>';
  }).handleApiRequest('externalApiList', null);
}

function _renderApiConnList() {
  const el = document.getElementById('api-conn-list'); if (!el) return;
  if (_apiConnList.length === 0) {
    el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-sub);font-size:13px;">まだ外部API連携が登録されていません。<br>「＋ 新規追加」から追加してください。</div>';

    }
    const candRows = candidates.map(c => {
      const qId = c.quoteId || c.id; const q = _allQuotes.find(aq => String(aq.id) === String(qId));
      const qNo = c.quoteNo || (q ? q.quoteNo : '不明'); const qDate = c.issueDate || (q ? q.issueDate : '—');
      const qSubject = c.subject || (q ? q.subject : '—'); const unitPrice = c.amount || (q ? q.quoteAmount : '—');
      const pdfUrl = c.quoteUrl || (q ? q.quotePdfUrl : '');
      const btnColor = c.score >= 80 ? 'var(--success)' : c.score > 0 ? '#fbbc04' : 'var(--text-sub)';
      const scoreBadge = c.score > 0 ? `<span style="background:${btnColor}; color:#fff; padding:2px 6px; border-radius:4px; font-size:11px;">${c.score}点</span>` : `<span style="background:var(--text-sub); color:#fff; padding:2px 6px; border-radius:4px; font-size:11px;">参考表示</span>`;

    }).join('');
    const mgmtItem = S.all.find(r => String(r.id) === String(item.orderMgmtId)); const orderPdfUrl = (mgmtItem ? mgmtItem.orderPdfUrl : '') || item.orderPdfUrl || '';
    const orderPdfBtn = orderPdfUrl ? `<a href="${orderPdfUrl}" target="_blank" style="text-decoration:none; background:#fff; border:1px solid #f9d5d1; color:#c0392b; font-size:11px; padding:3px 8px; border-radius:4px; font-weight:600; display:inline-flex; align-items:center; gap:4px; margin-left:8px;">📄 注文書PDF</a>` : '';

function executeDriveSearch(){

  const res = document.getElementById('drive-results'); if(res) res.innerHTML = '<div class="loading"><div class="spinner"></div><br>Driveを検索中...</div>';

let _calendarInstance = null;
function loadCalendar() {
  const container = document.getElementById('cal-container'); if(!container) return;
  if (_calendarInstance) { _calendarInstance.render(); return; }
  _calendarInstance = new FullCalendar.Calendar(container, {
    initialView: 'dayGridMonth', locale: 'ja', headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' }, buttonText: { today: '今日', month: '月', list: '予定リスト' }, height: 'auto',
    eventContent: function(arg) {
      const title = arg.event.title || ''; const type = arg.event.extendedProps.type || '';
      let icon = '📌'; if (title.includes('見積') || type === 'quote') icon = '📄'; if (title.includes('注文') || type === 'order') icon = '📦'; if (title.includes('納期') || type === 'delivery') icon = '🚚'; if (title.includes('Todo') || type === 'todo') icon = '✅';
      return { html: `<div style="font-size:11px; white-space:normal; line-height:1.4; padding:3px 4px; overflow:hidden; cursor:pointer;" title="クリックして詳細を表示"><strong>${icon} ${title}</strong></div>` };
    },
    events: function(info, successCallback, failureCallback) {
      const midDate = new Date((info.start.getTime() + info.end.getTime()) / 2);
      google.script.run.withSuccessHandler(res => {
        if (!res.success) { failureCallback(res.error); return; }
        const fcEvents = (res.events || []).map(ev => {
          let bgColor = '#3498db'; if (ev.type === 'delivery') bgColor = '#e74c3c'; if (ev.type === 'quote') bgColor = '#2ecc71'; if (ev.type === 'todo') bgColor = '#f39c12';
          return { title: ev.label, start: String(ev.date).replace(/\//g, '-'), backgroundColor: bgColor, borderColor: bgColor, extendedProps: { mgmtId: ev.mgmtId, todoId: ev.todoId, label: ev.label, type: ev.type } };
        });
        successCallback(fcEvents);
      }).handleApiRequest('getCalendar', { year: midDate.getFullYear(), month: midDate.getMonth() + 1 });
    },
    eventClick: function(info) { openCalEventDetail(info.event.extendedProps); }
  });
  _calendarInstance.render();
}
function openCalEventDetail(evProps) {
  if (!evProps) return;
  if (evProps.mgmtId) { const isQuote = (evProps.label && evProps.label.includes('見積')) || evProps.type === 'quote'; if (isQuote) { openQuoteDetail(evProps.mgmtId, ''); } else { openDetail(evProps.mgmtId); } }
  else if (evProps.todoId) { showToast('Todo詳細は準備中です', true); }
}
