<script>
// ============================================================
// js.html — 完全合体版
// ・元のメニュー設定や高度な詳細画面（明細ごとの紐づけ等）を維持
// ・インライン直接編集（Excelライク）
// ・全データ強制文字列化による超強力な明細検索
// ============================================================

const DEFAULT_MENU = [
  { id:'list',        icon:'📋', label:'案件一覧',      section:'営業・進行管理', visible:true },
  { id:'ledger',      icon:'📝', label:'見積台帳',      section:'営業・進行管理', visible:true },
  { id:'matching',    icon:'🔗', label:'AI紐づけ',      section:'営業・進行管理', visible:true },
  { id:'calendar',    icon:'📅', label:'スケジュール',  section:'営業・進行管理', visible:true },
  { id:'ocr',         icon:'🔍', label:'簡易OCR',       section:'営業・進行管理', visible:true },
  { id:'aichat',      icon:'🤖', label:'AIアシスタント',section:'自動化・連携',   visible:true },
  { id:'workflow',    icon:'🔄', label:'業務フロー',    section:'自動化・連携',   visible:true },
  { id:'assignees',   icon:'👥', label:'担当者管理',    section:'自動化・連携',   visible:true },
  { id:'approval',    icon:'✅', label:'製造承認',      section:'自動化・連携',   visible:true },
  { id:'board',       icon:'🏷️', label:'基板管理',      section:'マスタ管理',     visible:true },
  { id:'analysis',    icon:'📊', label:'分析・レポート',section:'マスタ管理',     visible:true },
  { id:'todo',        icon:'✅', label:'ToDo',          section:'ツール',         visible:true },
  { id:'drivesearch', icon:'💾', label:'全文検索',      section:'ツール',         visible:true },
  { id:'admin',       icon:'⚙️', label:'管理コンソール',section:'設定',           visible:true },
  { id:'bom_ext',     icon:'🏭', label:'BOM・原価管理', section:'設定',           visible:true, external:'' }
];

let IS_ADMIN = true;
let userMenuConfig = [];
const PAGE_TITLES = { list:'案件一覧', ledger:'見積台帳', matching:'AI紐づけ', calendar:'スケジュール', ocr:'簡易OCR', todo:'ToDo', drivesearch:'全文検索', admin:'システム管理コンソール', workflow:'業務フロー', assignees:'担当者管理', approval:'製造承認', board:'基板管理', analysis:'分析・レポート', aichat:'AIアシスタント' };

const S = { all:[], filtered:[], page:1, limit:30, docType:'quote', orderType:'', selectedFile:null };
let searchTimer=null; let _allQuotes = []; let _filteredQuotes = []; let _quotePage = 1; const _quoteLimit = 20; let _allMatchingItems = [];
let _allLedgerItems = []; let _filteredLedgerItems = []; let _currentLedgerTab = 'tree';

window.addEventListener('load', () => {
  renderSidebar(); showPage('list'); try { _populateMonthFilter(); } catch(e){}
  loadData(); loadQuoteList(); 
  if (typeof loadMatchingCandidates === 'function') loadMatchingCandidates();
});

function _esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function showToast(msg, isError=false){
  const t=document.getElementById('toast'); if(!t) return;
  t.textContent=(isError?'✗ ':'✓ ')+msg; t.style.background=isError?'#dc2626':'#1e293b';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3500);
}

// サーバーから設定を読み込んでサイドバーを描画する（金庫優先版）
function renderSidebar() {
  const container = document.getElementById('sidebar-nav-container'); 
  if(!container) return;
  
  // サーバーの金庫にデータを取りに行く
  google.script.run.withSuccessHandler(res => {
    // 金庫にデータがあればそれを使う、なければ初期設定を使う
    if (res && res.success && res.menuConfig) {
      userMenuConfig = res.menuConfig;
    } else {
      userMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
    }
    
    // 描画処理
    const sections = {};
    userMenuConfig.forEach(item => {
      if(!item.visible) return;
      if(!sections[item.section]) sections[item.section] = [];
      sections[item.section].push(item);
    });

    let html = '';
    Object.keys(sections).forEach(section => {
      html += `<div class="sidebar-section-label">${section}</div>`;
      sections[section].forEach(item => {
        if(item.external) { 
          html += `<a class="nav-item nav-item-ext" href="${item.external}" target="_blank"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></a>`; 
        } else { 
          html += `<div class="nav-item" data-id="${item.id}" onclick="showPage('${item.id}')"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></div>`; 
        }
      });
    });
    container.innerHTML = html;
    
    // 現在のページをアクティブにする
    const activePage = document.querySelector('.page.active');
    if (activePage) {
      const pageId = activePage.id.replace('page-', '');
      document.querySelectorAll('.nav-item[data-id]').forEach(t => { 
        t.classList.toggle('active', t.dataset.id === pageId); 
      });
    }
  }).handleApiRequest('menuConfigLoad', null); // ← ここで金庫を開けに行っています
}
function _drawSidebar(config, container) {
  const sections = {};
  config.forEach(item => {
    if (!item.visible) return;
    if (item.adminOnly && !IS_ADMIN) return;
    if (!sections[item.section]) sections[item.section] = [];
    sections[item.section].push(item);
  });
  let html = '';
  Object.keys(sections).forEach(section => {
    html += `<div class="sidebar-section-label">${section}</div>`;
    sections[section].forEach(item => {
      if (item.external) {
        html += `<a class="nav-item nav-item-ext" href="${item.external}" target="_blank"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></a>`;
      } else {
        html += `<div class="nav-item" data-id="${item.id}" onclick="showPage('${item.id}')"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></div>`;
      }
    });
  });
  container.innerHTML = html;
  const activePage = document.querySelector('.page.active');
  if (activePage) {
    const pageId = activePage.id.replace('page-', '');
    document.querySelectorAll('.nav-item[data-id]').forEach(t => {
      t.classList.toggle('active', t.dataset.id === pageId);
    });
  }
}

function showPage(name){
  document.querySelectorAll('.nav-item[data-id]').forEach(t=>{ t.classList.toggle('active', t.dataset.id===name); });
  const titleEl = document.getElementById('topbar-page-title'); if(titleEl) titleEl.textContent = PAGE_TITLES[name] || name;
  const contentEl = document.getElementById('content'); if(contentEl) contentEl.scrollTop=0;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const target = document.getElementById('page-'+name); if(target) target.classList.add('active');

  if(name==='list'){ const ao=document.getElementById('area-order'); const aq=document.getElementById('area-quote'); if(ao) ao.style.display=''; if(aq) aq.style.display='none'; }
  if(name==='ledger' && typeof loadLedger==='function') loadLedger();
  if(name==='calendar' && typeof loadCalendar==='function') loadCalendar();
  if(name==='matching' && typeof loadMatchingCandidates==='function') loadMatchingCandidates();
  if(name==='drivesearch') { initDriveSearchPage(); }
  if(name==='admin') _onShowAdmin();
}
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('collapsed'); }

// ── ★インライン編集 ──
function startInlineEdit(e, id, field, val, type = 'mgmt') {
  e.stopPropagation(); const td = e.currentTarget; if (td.querySelector('input')) return;
  const input = document.createElement('input'); input.type = (field.includes('Amount') || field === 'amount') ? 'number' : 'text'; input.className = 'inline-edit-input'; input.value = val === '—' ? '' : val;
  input.onblur = () => saveInlineEdit(td, id, field, input.value, val, type);
  input.onkeydown = (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); } if (ev.key === 'Escape') { td.innerHTML = val || '—'; } };
  td.innerHTML = ''; td.appendChild(input); input.focus(); input.select();
}
function saveInlineEdit(td, id, field, newVal, oldVal, type) {
  if (newVal === oldVal) { let displayVal = newVal || '—'; if ((field.includes('Amount') || field === 'amount') && newVal) displayVal = Number(newVal).toLocaleString() + ' 円'; if (field === 'quoteNo' || field === 'orderNo') displayVal = `<strong>${displayVal}</strong>`; td.innerHTML = displayVal; return; }
  td.innerHTML = `<span style="color:#94a3b8; font-size:11px;">🔄 保存中...</span>`;
  if (type === 'ledger' || String(id).startsWith('LEDGER_')) {
    const realId = String(id).replace('LEDGER_', ''); const payload = { ledgerId: realId }; payload[field] = (field === 'amount') ? (newVal ? Number(newVal) : null) : newVal;
    google.script.run.withSuccessHandler(res => {
      if(res.success){ showToast('✅ 更新しました'); let item = _allLedgerItems.find(r => r.ledgerId === realId); if (item) item[field] = payload[field];
        let qItem = _allQuotes.find(r => r.id === 'LEDGER_' + realId); if (qItem) { if(field==='quoteNo') qItem.quoteNo = newVal; if(field==='subject') qItem.subject = newVal; if(field==='dest') { qItem.destCompany = newVal; qItem.client = newVal; } if(field==='amount') qItem.quoteAmount = newVal; }
        let displayVal = newVal || '—'; if (field === 'amount' && newVal) displayVal = '¥' + Number(newVal).toLocaleString(); if (field === 'quoteNo') displayVal = `<strong>${displayVal}</strong>`; td.innerHTML = displayVal;
      } else { showToast('❌ 更新失敗', true); td.innerHTML = oldVal || '—'; }
    }).handleApiRequest('ledgerSave', payload);
  } else {
    const payload = { mgmtId: id }; payload[field] = field.includes('Amount') ? (newVal ? Number(newVal) : null) : newVal;
    google.script.run.withSuccessHandler(res => {
      if(res.success){ showToast('✅ 更新しました'); let item = S.all.find(r => r.id === id); if (item) item[field] = payload[field];
        let qItem = _allQuotes.find(r => r.id === id); if (qItem) { qItem[field] = payload[field]; if (field === 'client') qItem.destCompany = newVal; }
        let displayVal = newVal || '—'; if (field.includes('Amount') && newVal) displayVal = Number(newVal).toLocaleString() + ' 円'; if (field === 'quoteNo' || field === 'orderNo') displayVal = `<strong>${displayVal}</strong>`; td.innerHTML = displayVal; if (field.includes('Amount')) _updateSummary();
      } else { showToast('❌ 更新失敗', true); td.innerHTML = oldVal || '—'; }
    }).handleApiRequest('updateMgmt', payload);
  }
}

// ── 案件一覧 ──
function normalizeSearchText(str){ return String(str||'').toLowerCase().replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[\u3000]/g, ' '); }
function loadData() { const container = document.getElementById('table-container'); if(!container) return; container.innerHTML = '<div class="loading"><div class="spinner"></div><br>データ読み込み中...</div>'; google.script.run.withSuccessHandler(res => { if (!res || !res.success) { container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ データ取得失敗</div>'; return; } S.all = res.items || []; S.filtered = S.all.slice(); S.page = 1; _updateSummary(); _renderTable(); }).handleApiRequest('getAll', null); }
function switchSubTab(tab) { var isOrder = tab === 'order'; var areaOrder = document.getElementById('area-order'), areaQuote = document.getElementById('area-quote'); var orderBtn = document.getElementById('subtab-order'), quoteBtn = document.getElementById('subtab-quote'); if (!areaOrder || !areaQuote || !orderBtn || !quoteBtn) return; areaOrder.style.display = isOrder ? '' : 'none'; areaQuote.style.display = isOrder ? 'none' : ''; orderBtn.style.color = isOrder ? 'var(--primary)' : 'var(--text-sub)'; orderBtn.style.borderBottom = isOrder ? '2px solid var(--primary)' : '2px solid transparent'; quoteBtn.style.color = isOrder ? 'var(--text-sub)' : 'var(--primary)'; quoteBtn.style.borderBottom = isOrder ? '2px solid transparent' : '2px solid var(--primary)'; if (!isOrder && _allQuotes.length === 0) loadQuoteList(); }
function _updateSummary() { const now = new Date(); const ym = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0'); if(document.getElementById('sum-sent')) document.getElementById('sum-sent').textContent = S.all.filter(r=>r.status==='送信済み').length; if(document.getElementById('sum-received')) document.getElementById('sum-received').textContent = S.all.filter(r=>r.status==='受領' || r.status==='受注済み').length; if(document.getElementById('sum-done')) document.getElementById('sum-done').textContent = S.all.filter(r=>r.status==='納品済み').length; if(document.getElementById('sum-amount')) document.getElementById('sum-amount').textContent = S.all.filter(r=>String(r.orderDate).startsWith(ym)).reduce((s,r)=>s+(Number(r.orderAmount)||0), 0).toLocaleString(); }
function _sBadge(s){const m={'作成予定':'planned','送信済み':'sent','受領':'received','受注済み':'received','納品済み':'done','キャンセル':'planned'};return`<span class="badge badge-${m[s]||'planned'}">${s||'—'}</span>`;}
function _otBadge(t){if(t==='試作')return'<span class="badge badge-trial">試作</span>';if(t==='量産')return'<span class="badge badge-mass">量産</span>';return'';}

// ステータス手動切替ドロップダウン（注文書・見積書一覧共通）
function _statusSelectHtml(id, currentStatus, editType) {
  const mgmtStatuses = ['作成予定','送信済み','受領','受注済み','納品済み','キャンセル'];
  const ledgerStatuses = ['作成予定','作成中','送信済み','受注済み','キャンセル'];
  const statuses = (editType === 'ledger') ? ledgerStatuses : mgmtStatuses;
  const st = currentStatus || '作成予定';
  const stClassMap = {'作成予定':'st-planned','送信済み':'st-sent','受領':'st-received','受注済み':'st-received','納品済み':'st-done','作成中':'st-planned','キャンセル':'st-planned'};
  const stClass = stClassMap[st] || 'st-planned';
  const opts = statuses.map(s => `<option value="${s}"${s===st?' selected':''}>${s}</option>`).join('');
  const safeId = String(id).replace(/'/g,"\\'");
  const onChange = (editType === 'ledger')
    ? `quickUpdateLedgerStatus('${safeId}', this.value)`
    : `quickUpdateMgmtStatus('${safeId}', this.value)`;
  const classMapJs = "{'作成予定':'st-planned','送信済み':'st-sent','受領':'st-received','受注済み':'st-received','納品済み':'st-done','作成中':'st-planned','キャンセル':'st-planned'}";
  return `<select class="status-select-inline ${stClass}" onchange="event.stopPropagation();${onChange};this.className='status-select-inline '+((${classMapJs})[this.value]||'st-planned')">${opts}</select>`;
}
// mgmtのステータス即時更新
function quickUpdateMgmtStatus(mgmtId, newStatus) {
  const item = S.all.find(r => r.id === mgmtId);
  if (item) item.status = newStatus;
  const qItem = _allQuotes.find(r => r.id === mgmtId);
  if (qItem) qItem.status = newStatus;
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('ステータスを更新しました'); _updateSummary(); }
    else { showToast('更新失敗: ' + res.error, true); }
  }).handleApiRequest('updateStatus', { mgmtId: mgmtId, newStatus: newStatus });
}

function _renderTable() {
  const start = (S.page-1)*S.limit; const data = S.filtered.slice(start, start+S.limit); const total = S.filtered.length;
  if(document.getElementById('result-count')) document.getElementById('result-count').textContent = total+'件中 '+(total>0?start+1:0)+'–'+Math.min(start+S.limit,total)+'件';
  if (total===0) { document.getElementById('table-container').innerHTML = '<div class="loading">該当なし</div>'; document.getElementById('pagination').innerHTML=''; return; }
  
  const rows = data.map(r=>`
    <tr style="border-bottom:1px solid #f0f2f5;">
      <td><span class="text-sub" style="font-size:10px;">${r.id||''}</span></td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'orderNo', '${_esc(r.orderNo||r.quoteNo||'')}', 'mgmt')"><strong>${r.orderNo||r.quoteNo||'—'}</strong></td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'orderSlipNo', '${_esc(r.orderSlipNo||'')}', 'mgmt')">${r.orderSlipNo||'—'}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'modelCode', '${_esc(r.modelCode||'')}', 'mgmt')">${r.modelCode||'—'}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'client', '${_esc(r.client||'')}', 'mgmt')" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.client||''}</td>
      <td onclick="event.stopPropagation();">${_statusSelectHtml(r.id, r.status, 'mgmt')}</td>
      <td>${r.orderType?_otBadge(r.orderType):''}</td>
      <td class="text-sub">${r.orderDate||r.quoteDate||''}</td>
      <td class="text-sub">${r.deliveryDate||''}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'orderAmount', '${r.orderAmount||''}', 'mgmt')" style="text-align:right;">${r.orderAmount?Number(r.orderAmount).toLocaleString()+' 円':'—'}</td>
      <td>
        ${r.quotePdfUrl?`<a class="pdf-link" href="${r.quotePdfUrl}" target="_blank" onclick="event.stopPropagation()">見積</a> `:''}
        ${r.orderPdfUrl?`<a class="pdf-link" href="${r.orderPdfUrl}" target="_blank" onclick="event.stopPropagation()">発注</a>`:''}
      </td>
      <td onclick="event.stopPropagation();" style="min-width:120px;">
        ${r.quoteNo
          ? `<span style="font-size:11px;color:var(--primary);font-weight:600;">${r.quoteNo}</span><button class="btn btn-outline btn-sm" style="margin-left:4px;font-size:10px;padding:2px 6px;" onclick="event.stopPropagation();_openQuickLinkOrder('${r.id}')">変更</button>`
          : `<button class="btn btn-outline btn-sm" style="font-size:10px;padding:2px 8px;" onclick="event.stopPropagation();_openQuickLinkOrder('${r.id}')">🔗 見積No.入力</button>`}
      </td>
      <td style="text-align:center; white-space:nowrap;">
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); openDetail('${r.id}')">📄 詳細</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteMgmt('${r.id}', '${(r.orderNo||r.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button>
      </td>
    </tr>`).join('');
  document.getElementById('table-container').innerHTML = `<div style="overflow-x:auto;"><table><thead><tr><th>管理ID</th><th>発注書番号</th><th>発注伝票No</th><th>機種</th><th>顧客名</th><th>ステータス</th><th>種別</th><th>発注日</th><th>納期</th><th>注文金額</th><th>PDF</th><th>紐づき見積No.</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  _renderPagination(total);
}
function _renderPagination(total) {
  const pages = Math.ceil(total/S.limit);
  const pEl = document.getElementById('pagination');
  if (!pEl) return;
  if (pages <= 1) { pEl.innerHTML = ''; return; }
  let h = '';
  if (S.page > 1) h += `<button class="page-btn" onclick="goPage(${S.page-1})">‹</button>`;
  const start = Math.max(1, S.page - 4);
  const end = Math.min(pages, start + 8);
  if (start > 1) h += `<button class="page-btn" onclick="goPage(1)">1</button><span style="padding:4px 2px;color:var(--text-sub);">…</span>`;
  for (let i = start; i <= end; i++) h += `<button class="page-btn ${i===S.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < pages) h += `<span style="padding:4px 2px;color:var(--text-sub);">…</span><button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  if (S.page < pages) h += `<button class="page-btn" onclick="goPage(${S.page+1})">›</button>`;
  pEl.innerHTML = h;
}
function goPage(n){S.page=n;_renderTable();}
function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,300);}

// ★ 究極の明細検索
function applyFilters() {
  const rawKw = document.getElementById('search-input').value; const kws = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean);
  const st = document.getElementById('filter-status').value; const ot = document.getElementById('filter-order-type').value; const mo = document.getElementById('filter-month').value;
  S.filtered = S.all.filter(r => {
    const txt = normalizeSearchText(JSON.stringify(r)); // 全情報を強制検索
    const mk = kws.length === 0 || kws.every(kw => txt.includes(kw));
    const ms = !st || r.status === st; const mo2 = !ot || r.orderType === ot;
    const mm = !mo || (String(r.orderDate).startsWith(mo) || String(r.quoteDate).startsWith(mo));
    return mk && ms && mo2 && mm;
  });
  S.page = 1; _renderTable();
}
function clearFilters(){ document.getElementById('search-input').value=''; ['filter-status','filter-order-type','filter-month'].forEach(id=>document.getElementById(id).value=''); S.filtered=S.all.slice();S.page=1;_renderTable(); }
function _populateMonthFilter(){ const sel=document.getElementById('filter-month'); if(!sel) return; const now=new Date(); for(let i=0;i<12;i++){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); const ym=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0'); const o=document.createElement('option');o.value=ym;o.textContent=ym;sel.appendChild(o); } }

// ── 見積書一覧 ──
function loadQuoteList() { const container = document.getElementById('quotelist-container'); if(!container) return; container.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>'; google.script.run.withSuccessHandler(res => { if (!res.success) { container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ ' + res.error + '</div>'; return; } _allQuotes = res.items || []; if(typeof _mergeLedgerIntoQuotes === 'function') _mergeLedgerIntoQuotes(); _filteredQuotes = _allQuotes.slice(); _quotePage = 1; if(document.getElementById('qs-total')) document.getElementById('qs-total').textContent = _allQuotes.length; if(document.getElementById('qs-linked')) document.getElementById('qs-linked').textContent = _allQuotes.filter(r => r.linked).length; if(document.getElementById('qs-amount')) document.getElementById('qs-amount').textContent = _allQuotes.reduce((s, r) => s + (Number(r.quoteAmount) || 0), 0).toLocaleString(); _renderQuoteTable(); }).handleApiRequest('quoteListGetAll', null); }
function _mergeLedgerIntoQuotes(){ if(!_allLedgerItems || _allLedgerItems.length === 0) return; const existingNos = new Set(_allQuotes.map(q => q.quoteNo).filter(Boolean)); _allLedgerItems.forEach(led => { if(led.status === 'キャンセル' || led.status === '__MACHINE_FOLDER__') return; const qNo = led.quoteNo; if(qNo && existingNos.has(qNo)) { const existing = _allQuotes.find(q => q.quoteNo === qNo); if(existing && led.status) existing.status = led.status; return; } _allQuotes.push({ id: 'LEDGER_' + led.ledgerId, quoteNo: qNo || '', subject: led.subject || '', destCompany: led.dest || '', client: led.dest || '', issueDate: led.issueDate || '', quoteDate: led.issueDate || '', quoteAmount: led.amount || 0, status: led.status || '作成予定', quotePdfUrl: led.saveUrl || '', modelCode: led.machineCode || led.modelCode || '', linked: false, orderNo: '', _fromLedger: true, _ledgerId: led.ledgerId }); }); }

function applyQuoteFilter() {
  const rawKw  = document.getElementById('qs-search').value; const kws = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean); 
  const st = document.getElementById('qs-filter-status').value; const linked = document.getElementById('qs-filter-linked').value;
  _filteredQuotes = _allQuotes.filter(r => {
    const txt = normalizeSearchText(JSON.stringify(r)); // 全情報を強制検索
    const mk = kws.length === 0 || kws.every(kw => txt.includes(kw));
    const ms = !st || r.status === st; const ml = !linked || (linked === 'linked' && r.linked) || (linked === 'unlinked' && !r.linked);
    return mk && ms && ml;
  });
  _filteredQuotes.sort((a, b) => String(b.issueDate||b.quoteDate||'').localeCompare(String(a.issueDate||a.quoteDate||'')));
  _quotePage = 1; _renderQuoteTable();
}
function clearQuoteFilter() { document.getElementById('qs-search').value = ''; document.getElementById('qs-filter-status').value = ''; document.getElementById('qs-filter-linked').value = ''; _filteredQuotes = _allQuotes.slice(); _quotePage = 1; _renderQuoteTable(); }

function _renderQuoteTable() {
  const start = (_quotePage - 1) * _quoteLimit; const data  = _filteredQuotes.slice(start, start + _quoteLimit); const total = _filteredQuotes.length;
  if(document.getElementById('qs-count')) document.getElementById('qs-count').textContent = total + '件中 ' + (total > 0 ? start + 1 : 0) + '–' + Math.min(start + _quoteLimit, total) + '件';
  if (total === 0) { document.getElementById('quotelist-container').innerHTML = '<div class="loading">該当なし</div>'; return; }
  const rows = data.map(r => {
    const fromLedger = r._fromLedger; const ledgerBadge = fromLedger ? '<span style="font-size:9px;background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;border-radius:4px;padding:1px 4px;margin-left:4px;">台帳</span>' : '';
    const selectId = fromLedger ? ('LEDGER_' + r._ledgerId) : r.id; const editType = fromLedger ? 'ledger' : 'mgmt'; const realId = fromLedger ? r._ledgerId : r.id;
    return `
    <tr style="border-bottom:1px solid #f0f2f5;">
      <td class="editable-cell" onclick="startInlineEdit(event, '${realId}', 'quoteNo', '${_esc(r.quoteNo||'')}', '${editType}')"><strong>${r.quoteNo || '—'}</strong>${ledgerBadge}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${realId}', 'subject', '${_esc(r.subject||'')}', '${editType}')" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.subject || ''}">${r.subject || '—'}</td>
      <td style="font-size:12px;color:var(--text-sub);">${r.issueDate || r.quoteDate || '—'}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${realId}', '${fromLedger?'dest':'client'}', '${_esc(r.destCompany||r.client||'')}', '${editType}')" style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.destCompany||r.client||''}">${r.destCompany || r.client || '—'}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${realId}', '${fromLedger?'amount':'quoteAmount'}', '${r.quoteAmount||''}', '${editType}')" style="text-align:right;white-space:nowrap;">${r.quoteAmount ? Number(r.quoteAmount).toLocaleString() + ' 円' : '—'}</td>
      <td onclick="event.stopPropagation();">${_statusSelectHtml(selectId, r.status, fromLedger ? 'ledger' : 'mgmt')}</td>
      <td>${r.linked ? '<span class="badge badge-linked">✓ 注文書あり</span>' : '<span style="font-size:11px;color:var(--text-sub);">未受注</span>'}</td>
      <td onclick="event.stopPropagation();" style="min-width:120px;">
        ${r.orderNo
          ? `<span style="font-size:11px;color:var(--danger);font-weight:600;">${r.orderNo}</span><button class="btn btn-outline btn-sm" style="margin-left:4px;font-size:10px;padding:2px 6px;" onclick="event.stopPropagation();_openQuickLinkQuote('${fromLedger ? 'LEDGER_'+r._ledgerId : r.id}')">変更</button>`
          : `<button class="btn btn-outline btn-sm" style="font-size:10px;padding:2px 8px;" onclick="event.stopPropagation();_openQuickLinkQuote('${fromLedger ? 'LEDGER_'+r._ledgerId : r.id}')">🔗 注文書番号入力</button>`}
      </td>
      <td>${r.quotePdfUrl ? '<a class="pdf-link" href="' + r.quotePdfUrl + '" target="_blank" onclick="event.stopPropagation()">📄 PDF</a>' : '—'}</td>
      <td style="text-align:center; white-space:nowrap;">
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); ${fromLedger ? `if(typeof openLedgerAddModal==='function')openLedgerAddModal('${r._ledgerId}')` : `openQuoteDetail('${r.id}')`}">📄 詳細</button>
        ${!fromLedger ? `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteMgmt('${r.id}', '${(r.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button>` : `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteLedgerEntry('${r._ledgerId}')">🗑️ 削除</button>`}
      </td>
    </tr>`;
  }).join('');
  document.getElementById('quotelist-container').innerHTML = `<div style="overflow-x:auto;"><table><thead><tr><th>見積No.</th><th>件名（ファイル名）</th><th>発行日</th><th>宛先</th><th>金額</th><th>ステータス</th><th>紐づけ状況</th><th>注文書番号</th><th>PDF</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  const pages = Math.ceil(total / _quoteLimit); if (pages <= 1) { document.getElementById('qs-pagination').innerHTML = ''; return; }
  let pHtml = ''; for (let i = 1; i <= Math.min(pages, 10); i++) pHtml += `<button class="page-btn ${i === _quotePage ? 'active' : ''}" onclick="goQuotePage(${i})">${i}</button>`; document.getElementById('qs-pagination').innerHTML = pHtml;
}

// ── 見積台帳 ──
function loadLedger(){ const container = document.getElementById('ledger-tree-container'); if(!container) return; container.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>'; document.getElementById('ledger-flat-container').innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>'; google.script.run.withSuccessHandler(res => { if(!res.success) return; _allLedgerItems = res.items || []; applyLedgerFilter(); }).handleApiRequest('ledgerGetAll', null); }
function _updateLedgerSummary(items){ const tot = document.getElementById('ledger-total'); const sent = document.getElementById('ledger-sent'); const plan = document.getElementById('ledger-planned'); const amt = document.getElementById('ledger-amount'); if(tot) tot.textContent = items.length; if(sent) sent.textContent = items.filter(r => r.status === '送信済み').length; if(plan) plan.textContent = items.filter(r => r.status === '作成予定').length; if(amt) amt.textContent = items.reduce((s,r) => s + (Number(r.amount)||0), 0).toLocaleString(); }
function switchLedgerTab(tab) { _currentLedgerTab = tab; const isTree = tab === 'tree'; document.getElementById('ledger-tree-container').style.display = isTree ? '' : 'none'; document.getElementById('ledger-flat-container').style.display = isTree ? 'none' : ''; const treeBtn = document.getElementById('subtab-ledger-tree'); const flatBtn = document.getElementById('subtab-ledger-flat'); if (treeBtn && flatBtn) { treeBtn.style.color = isTree ? 'var(--primary)' : 'var(--text-sub)'; treeBtn.style.borderBottom = isTree ? '2px solid var(--primary)' : '2px solid transparent'; flatBtn.style.color = isTree ? 'var(--text-sub)' : 'var(--primary)'; flatBtn.style.borderBottom = isTree ? '2px solid transparent' : '2px solid var(--primary)'; } applyLedgerFilter(); }
function applyLedgerFilter() { const searchEl = document.getElementById('ledger-search'); const kw = searchEl ? normalizeSearchText(searchEl.value) : ''; const stEl = document.getElementById('ledger-filter-status'); const st = stEl ? stEl.value : ''; let filtered = _allLedgerItems.filter(r => { if (r.status === '__MACHINE_FOLDER__' && _currentLedgerTab === 'flat') return false; if (r.status === '__MACHINE_FOLDER__' && _currentLedgerTab === 'tree') return true; const txt = normalizeSearchText(JSON.stringify(r)); const mk = !kw || txt.includes(kw); const ms = !st || r.status === st; return mk && ms; }); const tot = document.getElementById('ledger-count-label'); if(tot) tot.textContent = filtered.filter(r=>r.status!=='__MACHINE_FOLDER__').length + '件'; _updateLedgerSummary(filtered.filter(r => r.status !== '__MACHINE_FOLDER__')); if (_currentLedgerTab === 'tree') { _renderLedgerTree(filtered); } else { _renderLedgerFlat(filtered); } }
function clearLedgerFilter(){ if(document.getElementById('ledger-search')) document.getElementById('ledger-search').value = ''; if(document.getElementById('ledger-filter-status')) document.getElementById('ledger-filter-status').value = ''; applyLedgerFilter(); }
function quickUpdateLedgerStatus(ledgerId, newStatus) { const item = _allLedgerItems.find(r => r.ledgerId === ledgerId); if (item) item.status = newStatus; google.script.run.withSuccessHandler(res => { if (res.success) { showToast('ステータスを更新しました'); loadQuoteList(); } else { showToast('更新失敗', true); } }).handleApiRequest('ledgerSave', { ledgerId: ledgerId, status: newStatus }); }

function _renderLedgerTree(items) { const container = document.getElementById('ledger-tree-container'); if(!container) return; const machineSet = {}; items.forEach(r => { const m = (r.machineCode || '（機種未設定）').trim(); if (!machineSet[m]) machineSet[m] = []; if (r.status !== '__MACHINE_FOLDER__') machineSet[m].push(r); }); if (Object.keys(machineSet).length === 0) { container.innerHTML = '<div class="loading">該当する見積がありません。</div>'; return; } let html = ''; Object.keys(machineSet).sort().forEach(machine => { const machineItems = machineSet[machine]; const machineId = 'machine-' + machine.replace(/[^a-zA-Z0-9]/g, '_'); html += `<div style="background:var(--card);border-radius:8px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;"><div class="ledger-machine-hd" onclick="_toggleSection('${machineId}')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;border-left:4px solid var(--primary);"><span style="display:flex;align-items:center;gap:10px;"><span style="font-size:15px;" id="${machineId}-arrow">▼</span><span style="font-weight:700;font-size:15px;letter-spacing:.03em;">📁 ${machine}</span><span style="font-size:12px;color:var(--text-sub);">${machineItems.length}件</span></span><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();if(typeof _openLedgerAddModalWithMachine==='function')_openLedgerAddModalWithMachine('${machine}')" style="font-size:11px;padding:3px 8px;">＋ 見積登録</button></div><div id="${machineId}" style="display:block;">`; const boardGroups = {}; machineItems.forEach(r => { const bKey = (r.boardName || '（基板未設定）').trim(); if (!boardGroups[bKey]) boardGroups[bKey] = []; boardGroups[bKey].push(r); }); if (Object.keys(boardGroups).length === 0) html += `<div style="padding:14px 20px;color:var(--text-sub);font-size:13px;">まだ見積がありません。</div>`; Object.keys(boardGroups).sort().forEach(board => { const boardItems = boardGroups[board]; const boardId = machineId + '_' + board.replace(/[^a-zA-Z0-9]/g, '_'); html += `<div style="border-top:1px solid var(--border);"><div class="ledger-board-hd" onclick="_toggleSection('${boardId}')" style="display:flex;align-items:center;justify-content:space-between;padding:7px 16px 7px 28px;background:#f4f6f9;cursor:pointer;user-select:none;"><span style="display:flex;align-items:center;gap:8px;"><span style="font-size:12px;" id="${boardId}-arrow">▼</span><span style="font-size:13px;font-weight:600;">🔬 ${board}</span></span></div><div id="${boardId}"><table style="width:100%;border-collapse:collapse;"><thead><tr style="background:#f0f2f5;"><th style="padding:5px 10px 5px 50px;">見積No.</th><th>件名</th><th>金額</th><th>ステータス</th><th>発行日</th><th>操作</th></tr></thead><tbody>`; boardItems.forEach(r => { const safeId = (r.ledgerId || '').replace(/'/g, "\\'"); const statuses = ['作成予定', '作成中', '送信済み', '受注済み', 'キャンセル']; const statusOpts = statuses.map(s => `<option value="${s}" ${s === r.status ? 'selected' : ''}>${s}</option>`).join(''); const statusSelect = `<select onchange="event.stopPropagation(); quickUpdateLedgerStatus('${safeId}', this.value)" style="padding:2px 4px;font-size:11px;border-radius:4px;border:1px solid var(--border);background:#fff;cursor:pointer;">${statusOpts}</select>`; html += `<tr style="border-bottom:1px solid #f0f0f0;"> <td class="editable-cell" onclick="startInlineEdit(event, '${safeId}', 'quoteNo', '${_esc(r.quoteNo||'')}', 'ledger')" style="padding:7px 10px 7px 50px;font-family:monospace;font-size:12px;color:var(--primary);"><strong>${r.quoteNo || '—'}</strong></td> <td class="editable-cell" onclick="startInlineEdit(event, '${safeId}', 'subject', '${_esc(r.subject||'')}', 'ledger')" style="padding:7px 8px;font-size:12px;">${r.subject || '—'}</td> <td class="editable-cell" onclick="startInlineEdit(event, '${safeId}', 'amount', '${r.amount||''}', 'ledger')" style="padding:7px 8px;font-size:12px;color:var(--danger);font-weight:600;">${r.amount ? '¥'+Number(r.amount).toLocaleString() : '—'}</td> <td style="padding:7px 8px;" onclick="event.stopPropagation();">${statusSelect}</td> <td style="padding:7px 8px;font-size:11px;color:var(--text-sub);">${r.issueDate || '—'}</td> <td style="padding:7px 8px;white-space:nowrap;"> <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); if(typeof openLedgerAddModal==='function')openLedgerAddModal('${safeId}')">📄 詳細/編集</button> <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteLedgerEntry('${safeId}')" style="margin-left:2px;">🗑️</button> </td> </tr>`; }); html += `</tbody></table></div></div>`; }); html += `</div></div>`; }); container.innerHTML = html; }
function _renderLedgerFlat(items) { const container = document.getElementById('ledger-flat-container'); if(!container) return; let data = items.filter(r => r.status !== '__MACHINE_FOLDER__'); data.sort((a,b) => String(b.quoteNo||'').localeCompare(String(a.quoteNo||''))); if (data.length === 0) { container.innerHTML = '<div class="loading">該当なし</div>'; return; } let html = `<table class="dtable" style="width:100%;border-collapse:collapse;font-size:12px;background:#fff;box-shadow:var(--shadow-sm);border-radius:8px;overflow:hidden;"><thead><tr style="background:#f0f2f5;"><th style="padding:8px 12px;text-align:left;">見積No.</th><th>件名</th><th>機種</th><th>基板名</th><th style="text-align:right;">金額</th><th>ステータス</th><th>発行日</th><th style="text-align:center;">操作</th></tr></thead><tbody>`; data.forEach(r => { const safeId = (r.ledgerId || '').replace(/'/g, "\\'"); const statuses = ['作成予定', '作成中', '送信済み', '受注済み', 'キャンセル']; const statusOpts = statuses.map(s => `<option value="${s}" ${s === r.status ? 'selected' : ''}>${s}</option>`).join(''); const statusSelect = `<select onchange="event.stopPropagation(); quickUpdateLedgerStatus('${safeId}', this.value)" style="padding:2px 4px;font-size:11px;border-radius:4px;border:1px solid var(--border);background:#fff;cursor:pointer;">${statusOpts}</select>`; html += `<tr style="border-bottom:1px solid #f0f0f0;"> <td class="editable-cell" onclick="startInlineEdit(event, '${safeId}', 'quoteNo', '${_esc(r.quoteNo||'')}', 'ledger')" style="padding:8px 12px;font-family:monospace;color:var(--primary);font-weight:600;"><strong>${r.quoteNo || '—'}</strong></td> <td class="editable-cell" onclick="startInlineEdit(event, '${safeId}', 'subject', '${_esc(r.subject||'')}', 'ledger')" style="padding:8px 12px;">${r.subject || '—'}</td> <td class="editable-cell" onclick="startInlineEdit(event, '${safeId}', 'machineCode', '${_esc(r.machineCode||'')}', 'ledger')" style="padding:8px 12px;color:var(--text-sub);">${r.machineCode || '—'}</td> <td class="editable-cell" onclick="startInlineEdit(event, '${safeId}', 'boardName', '${_esc(r.boardName||'')}', 'ledger')" style="padding:8px 12px;color:var(--text-sub);">${r.boardName || '—'}</td> <td class="editable-cell" onclick="startInlineEdit(event, '${safeId}', 'amount', '${r.amount||''}', 'ledger')" style="padding:8px 12px;text-align:right;color:var(--danger);font-weight:600;">${r.amount ? '¥'+Number(r.amount).toLocaleString() : '—'}</td> <td style="padding:8px 12px;" onclick="event.stopPropagation();">${statusSelect}</td> <td style="padding:8px 12px;font-size:11px;color:var(--text-sub);">${r.issueDate || '—'}</td> <td style="padding:8px 12px;text-align:center;white-space:nowrap;"><button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); openLedgerAddModal('${safeId}')">📄 詳細/編集</button> <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteLedgerEntry('${safeId}')">🗑️</button></td> </tr>`; }); html += `</tbody></table>`; container.innerHTML = `<div style="overflow-x:auto;">${html}</div>`; }
function _toggleSection(id) { const el = document.getElementById(id); const arr = document.getElementById(id+'-arrow'); if(el){ el.style.display = el.style.display==='none'?'block':'none'; if(arr) arr.textContent = el.style.display==='none'?'▶':'▼'; } }

// ── モーダル詳細 ＆ 明細紐づけ（高度な機能） ──
function openDetail(mgmtId) {
  let item = S.all.find(r => r.id === mgmtId) || _allQuotes.find(r => r.id === mgmtId) || { id: mgmtId, client: 'データ取得中...', status: '' };
  document.getElementById('detail-title').textContent = '📋 ' + (item.orderNo || item.quoteNo || mgmtId);
  document.getElementById('detail-modal').classList.add('open');
  document.getElementById('detail-body').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  google.script.run.withSuccessHandler(res => {
      if (!res.success) { document.getElementById('detail-body').innerHTML = '<div style="color:var(--danger);padding:20px;">エラー: ' + res.error + '</div>'; return; }
      document.getElementById('detail-body').innerHTML = _buildDetailHtml(res.mgmt || item, res);
      if ((res.mgmt||item).orderNo) document.getElementById('detail-title').textContent = '📦 注文書 ' + (res.mgmt||item).orderNo;
    }).handleApiRequest('getDetail', { mgmtId });
}
function closeDetailModal(){ const el = document.getElementById('detail-modal'); if(el) el.classList.remove('open');}

function openQuoteDetail(mgmtId, quoteNo) {
  let item = S.all.find(r => r.id === mgmtId) || _allQuotes.find(r => r.id === mgmtId) || { id: mgmtId, quoteNo: quoteNo || mgmtId, client: '', status: '' };
  document.getElementById('quote-detail-title').textContent = '📄 見積書 ' + (item.quoteNo || mgmtId);
  document.getElementById('quote-detail-modal').classList.add('open');
  document.getElementById('quote-detail-body').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  google.script.run.withSuccessHandler(res => {
      if (!res.success) { document.getElementById('quote-detail-body').innerHTML = '<div style="color:var(--danger);padding:20px;">エラー: ' + res.error + '</div>'; return; }
      if (!res.mgmt) res.mgmt = item; 
      document.getElementById('quote-detail-body').innerHTML = _buildQuoteDetailHtml(res);
    }).handleApiRequest('getQuoteDetail', { mgmtId });
}
function closeQuoteDetail() { const el = document.getElementById('quote-detail-modal'); if(el) el.classList.remove('open'); }

function _buildDetailHtml(item, detail) {
  const orderLinks = [ item.orderPdfUrl ? `<a href="${item.orderPdfUrl}" target="_blank" style="display:inline-block; background:white; padding:2px 8px; border-radius:4px; border:1px solid var(--border); text-decoration:none; font-size:11px;">📄 発注書PDF</a>` : '', item.driveFolderUrl ? `<a href="${item.driveFolderUrl}" target="_blank" style="display:inline-block; background:white; padding:2px 8px; border-radius:4px; border:1px solid var(--border); text-decoration:none; font-size:11px;">📁 フォルダ</a>` : '' ].filter(Boolean).join(' ');
  const quoteLinks = item.quotePdfUrl ? `<a href="${item.quotePdfUrl}" target="_blank" style="display:inline-block; background:white; padding:2px 8px; border-radius:4px; border:1px solid var(--border); text-decoration:none; font-size:11px;">📄 見積書PDF</a>` : '';
  const rows=[
    ['管理ID', item.id],
    ['発注書番号', (item.orderNo || '—') + (orderLinks ? `<div style="margin-top:6px;">${orderLinks}</div>` : '')],
    ['見積書番号', (item.quoteNo || '—') + (quoteLinks ? `<div style="margin-top:6px;">${quoteLinks}</div>` : '')],
    ['納品書番号', item.deliverySlipNo || item.orderSlipNo || '—'],
    ['機種コード', item.modelCode || '—'],
    ['顧客名', item.client || '—'],
    ['ステータス', _sBadge(item.status)],
    ['注文種別', item.orderType ? _otBadge(item.orderType) : '—'],
    ['発注日', item.orderDate || '—'],
    ['見積日', item.quoteDate || '—'],
    ['注文金額', item.orderAmount ? Number(item.orderAmount).toLocaleString() + ' 円' : '—'],
    ['合計金額', item.total ? Number(item.total).toLocaleString() + ' 円' : '—'],
    ['納期', item.deliveryDate || '—'],
    ['メモ', item.memo || '—']

// ─── ④ 発注書詳細の紐づけ候補 見積書検索フィルタ ───
function _filterDetailQuoteOptions(kw, mgmtId, lineNos) {
  const lines = Array.isArray(lineNos) ? lineNos : [];
  if (!kw) {
    // すべてのselectを元に戻す（全候補表示）
    lines.forEach(lineNo => {
      const sel = document.getElementById('line-sel-' + mgmtId + '-' + lineNo);
      if (!sel) return;
      Array.from(sel.options).forEach(opt => { opt.style.display = ''; });
    });
    return;
  }
  const kwLower = kw.toLowerCase();
  lines.forEach(lineNo => {
    const sel = document.getElementById('line-sel-' + mgmtId + '-' + lineNo);
    if (!sel) return;
    Array.from(sel.options).forEach(opt => {
      if (!opt.value) { opt.style.display = ''; return; }
      opt.style.display = opt.text.toLowerCase().includes(kwLower) ? '' : 'none';
    });
  });
}

function saveMgmtEdit() {
  const mgmtId = document.getElementById('edit-mgmt-id').value;
  if (!mgmtId) { showToast('IDが取得できません', true); return; }
  const toSlashDate = s => s ? s.replace(/-/g, '/') : '';
  const v = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  const payload = {
    mgmtId, quoteNo: v('edit-quote-no') || undefined, orderNo: v('edit-order-no') || undefined, deliverySlipNo: v('edit-delivery-slip-no') || undefined,
    subject: v('edit-subject') || undefined, client: v('edit-client') || undefined, status: v('edit-status') || undefined,
    orderType: v('edit-order-type') || undefined, modelCode: v('edit-model-code') || undefined, memo: v('edit-memo') || undefined,
    quoteAmount: v('edit-quote-amount') ? Number(v('edit-quote-amount')) : undefined, orderAmount: v('edit-order-amount') ? Number(v('edit-order-amount')) : undefined,
    orderDate: toSlashDate(v('edit-order-date')) || undefined, deliveryDate: toSlashDate(v('edit-delivery-date')) || undefined,
  };
  Object.keys(payload).forEach(k => { if (payload[k] === undefined) delete payload[k]; });
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('保存しました'); document.getElementById('edit-mgmt-modal') && document.getElementById('edit-mgmt-modal').classList.remove('open'); loadData(); loadQuoteList(); loadLedger(); }
    else { showToast('保存失敗: ' + res.error, true); }
  }).withFailureHandler(err => showToast('通信エラー', true)).handleApiRequest('updateMgmt', payload);
}

function deleteMgmt(mgmtId, label) {

// ─── ③ 見積台帳モーダル確実に開く（ledger-add-modal使用） ───
function openLedgerAddModal(ledgerId) {
  const modal = document.getElementById('ledger-add-modal');
  if (!modal) { console.warn('ledger-add-modal not found'); return; }
  // フォームをリセット
  ['ledger-edit-id','ledger-quote-no','ledger-dest','ledger-machine-code','ledger-subject',
   'ledger-amount','ledger-board-name','ledger-model-no','ledger-save-url','ledger-remarks'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  if (document.getElementById('ledger-issue-date')) document.getElementById('ledger-issue-date').value = '';
  if (document.getElementById('ledger-status')) document.getElementById('ledger-status').value = '作成予定';

  if (ledgerId) {
    const item = _allLedgerItems.find(r => r.ledgerId === ledgerId);
    if (item) {
      const sv = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
      sv('ledger-edit-id', ledgerId);
      sv('ledger-quote-no', item.quoteNo);
      sv('ledger-dest', item.dest || item.submitTo || '');
      sv('ledger-machine-code', item.machineCode || item.modelCode || '');
      sv('ledger-subject', item.subject);
      sv('ledger-amount', item.amount || '');
      sv('ledger-board-name', item.boardName || '');
      sv('ledger-model-no', item.modelNo || '');
      sv('ledger-save-url', item.saveUrl || '');
      sv('ledger-remarks', item.remarks || '');
      if (item.issueDate || item.sentDate) {
        const d = (item.issueDate || item.sentDate || '').replace(/\//g, '-');
        if (document.getElementById('ledger-issue-date')) document.getElementById('ledger-issue-date').value = d;
      }
      if (document.getElementById('ledger-status')) document.getElementById('ledger-status').value = item.status || '作成予定';
      const titleEl = document.getElementById('ledger-add-title');
      if (titleEl) titleEl.textContent = '📝 見積台帳を編集';
    }
  } else {
    const titleEl = document.getElementById('ledger-add-title');
    if (titleEl) titleEl.textContent = '📝 見積予定を追加';
    const today = new Date();
    const dd = document.getElementById('ledger-issue-date');
    if (dd) dd.value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  }
  modal.classList.add('open');
}

function closeLedgerAddModal() {
  const modal = document.getElementById('ledger-add-modal');
  if (modal) modal.classList.remove('open');
}

function _openLedgerAddModalWithMachine(machine) {
  openLedgerAddModal(null);
  const el = document.getElementById('ledger-machine-code');
  if (el) el.value = machine;
}

function saveLedgerEntry() {
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const subject = v('ledger-subject');
  if (!subject) { showToast('件名は必須です', true); return; }
  const toSlash = s => s ? s.replace(/-/g, '/') : '';
  const payload = {
    ledgerId: v('ledger-edit-id') || undefined,
    quoteNo: v('ledger-quote-no') || undefined,
    issueDate: toSlash(v('ledger-issue-date')) || undefined,
    dest: v('ledger-dest') || undefined,
    machineCode: v('ledger-machine-code') || undefined,
    subject: subject,
    status: v('ledger-status') || '作成予定',
    amount: v('ledger-amount') ? Number(v('ledger-amount')) : undefined,
    boardName: v('ledger-board-name') || undefined,
    modelNo: v('ledger-model-no') || undefined,
    saveUrl: v('ledger-save-url') || undefined,
    remarks: v('ledger-remarks') || undefined,
  };
  Object.keys(payload).forEach(k => { if (payload[k] === undefined) delete payload[k]; });
  google.script.run.withSuccessHandler(res => {
    if (res.success) {
      showToast('保存しました');
      closeLedgerAddModal();
      loadLedger();
      loadQuoteList();
    } else { showToast('保存失敗: ' + (res.error || ''), true); }
  }).handleApiRequest('ledgerSave', payload);
}

function deleteLedgerEntry(ledgerId) {
  if (!confirm('この見積台帳データを削除しますか？')) return;
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('削除しました'); loadLedger(); loadQuoteList(); }
    else showToast('削除失敗: ' + (res.error || ''), true);
  }).handleApiRequest('ledgerDelete', { ledgerId });
}

// ★ メニュー設定（管理コンソール > メニュー設定タブ）
// ── 表示/非表示・順番変更・追加・URL添付・全ユーザー反映 ──
// ============================================================
let _editMenuConfig = [];

function renderMenuConfigList() {
  const container = document.getElementById('menu-editor-list');
  if (!container) return;
  // 未初期化なら現在のユーザー設定 or デフォルトを引き継ぐ
  if (!_editMenuConfig || _editMenuConfig.length === 0) {
    if (typeof userMenuConfig !== 'undefined' && userMenuConfig.length > 0) {
      _editMenuConfig = JSON.parse(JSON.stringify(userMenuConfig));
    } else {
      _editMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
    }
  }
  container.innerHTML = _editMenuConfig.map((item, index) => `
    <div style="background:#fff; border:1px solid var(--border); border-radius:6px; padding:8px 12px;
      display:flex; align-items:center; gap:8px; box-shadow:0 1px 2px rgba(0,0,0,0.05); margin-bottom:4px;">

      <!-- 上下移動ボタン -->
      <div style="display:flex; flex-direction:column; gap:2px; flex-shrink:0;">
        <button class="btn btn-outline btn-sm"
          style="padding:0; font-size:10px; height:20px; line-height:1; width:24px;"
          onclick="moveMenuConfigItem(${index}, -1)"
          ${index === 0 ? 'disabled' : ''}>▲</button>
        <button class="btn btn-outline btn-sm"
          style="padding:0; font-size:10px; height:20px; line-height:1; width:24px;"
          onclick="moveMenuConfigItem(${index}, 1)"
          ${index === _editMenuConfig.length - 1 ? 'disabled' : ''}>▼</button>
      </div>

      <!-- アイコン -->
      <input type="text" value="${_escAttr(item.icon||'')}"
        style="width:40px; text-align:center; padding:6px; border:1px solid var(--border); border-radius:4px; font-size:16px;"
        onchange="_editMenuConfig[${index}].icon=this.value"
        title="絵文字アイコン（例: 📋）">

      <!-- メニュー名 -->
      <input type="text" value="${_escAttr(item.label||'')}"
        style="flex:1; min-width:100px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:12px;"
        onchange="_editMenuConfig[${index}].label=this.value"
        title="メニュー名">

      <!-- セクション名 -->
      <input type="text" value="${_escAttr(item.section||'')}"
        style="width:110px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; color:var(--text-sub);"
        onchange="_editMenuConfig[${index}].section=this.value"
        placeholder="セクション名"
        title="サイドバーのセクション見出し">

      <!-- 外部URL -->
      <input type="text" value="${_escAttr(item.external||'')}"
        placeholder="外部URL (https://...)"
        style="width:170px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px;"
        onchange="_editMenuConfig[${index}].external=this.value"
        title="設定するとクリック時に別タブでURLを開きます">

      <!-- 表示・管理者専用 チェックボックス -->
      <div style="display:flex; flex-direction:column; gap:4px; flex-shrink:0; width:120px;">
        <label style="display:flex; align-items:center; gap:4px; font-size:11px; cursor:pointer; white-space:nowrap;">
          <input type="checkbox" ${item.visible ? 'checked' : ''}
            onchange="_editMenuConfig[${index}].visible=this.checked">
          <span>メニューに表示</span>
        </label>
        <label style="display:flex; align-items:center; gap:4px; font-size:11px; cursor:pointer; white-space:nowrap; color:var(--danger);">
          <input type="checkbox" ${item.adminOnly ? 'checked' : ''}
            onchange="_editMenuConfig[${index}].adminOnly=this.checked">
          <span>管理者のみ</span>
        </label>
      </div>

      <!-- 削除ボタン -->
      <button class="btn btn-danger btn-sm"
        style="padding:5px 8px; flex-shrink:0;"
        onclick="deleteMenuConfigItem(${index})"
        title="このメニュー項目を削除">✕</button>
    </div>
  `).join('');
}

function _escAttr(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 項目の上下移動
function moveMenuConfigItem(index, dir) {
  if (index + dir < 0 || index + dir >= _editMenuConfig.length) return;
  const temp = _editMenuConfig[index];
  _editMenuConfig[index] = _editMenuConfig[index + dir];
  _editMenuConfig[index + dir] = temp;
  renderMenuConfigList();
}

// 項目の削除
function deleteMenuConfigItem(index) {
  if (confirm('「' + _editMenuConfig[index].label + '」をメニューから削除しますか？\n※「初期状態にリセット」でいつでも元に戻せます')) {
    _editMenuConfig.splice(index, 1);
    renderMenuConfigList();
  }
}

// 新規メニュー項目を追加
function addMenuConfigItem() {
  const newId = 'custom_' + Date.now().toString(36);
  _editMenuConfig.push({
    id: newId,
    icon: '🔗',
    label: '新規リンク',
    section: 'その他',
    visible: true,
    adminOnly: false,
    external: ''
  });
  renderMenuConfigList();
  // 末尾へスクロール
  setTimeout(() => {
    const list = document.getElementById('menu-editor-list');
    if (list) list.scrollTop = list.scrollHeight;
  }, 100);
}



// 🔄 初期状態にリセットして全ユーザーに反映
function resetMenuConfig() {
  if (!confirm('メニュー設定を完全に初期状態にリセットしますか？\n現在の設定は失われます。')) return;
  _editMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
  renderMenuConfigList();
  // ローカルに即時反映
  userMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
  renderSidebar(true);
  showToast('✅ メニューを初期状態にリセットしました');
  // GASへの保存も試みる
  var resetStr = JSON.stringify(_editMenuConfig);
  google.script.run
    .withSuccessHandler(function() {})
    .withFailureHandler(function() {})
    .handleApiRequest('saveSettings', { menuConfigJson: resetStr });
}

// 管理コンソール タブ切り替え（menuタブ選択時にリスト初期化）
function switchAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-tab-content').forEach(c => c.style.display = 'none');
  const tabEl = document.getElementById('atab-' + tab);
  const contentEl = document.getElementById('admin-tab-' + tab);
  if (tabEl) tabEl.classList.add('active');
  if (contentEl) contentEl.style.display = 'block';
  // メニュー設定タブを開いた時は常にリスト再描画
  if (tab === 'menu') {
    // サーバーから最新のメニュー設定を読み込んでから描画
    _loadMenuConfigFromServer();
  }
}

// サーバーから最新メニュー設定を取得して編集リストに反映
function _loadMenuConfigFromServer() {
  const container = document.getElementById('menu-editor-list');
  if (container) container.innerHTML = '<div style="padding:16px;color:var(--text-sub);font-size:13px;">⏳ 設定を読み込み中...</div>';
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        // loadSettings の返却値から menuConfig を取り出す
        var mc = null;
        if (res.menuConfig && res.menuConfig.length > 0) {
          mc = res.menuConfig;
        } else if (res.menuConfigJson) {
          try { mc = JSON.parse(res.menuConfigJson); } catch(e2) {}
        }
        if (mc && mc.length > 0) {
          _editMenuConfig = mc;
          userMenuConfig = JSON.parse(JSON.stringify(mc));
        } else {
          _editMenuConfig = userMenuConfig.length > 0
            ? JSON.parse(JSON.stringify(userMenuConfig))
            : JSON.parse(JSON.stringify(DEFAULT_MENU));
        }
      } else {
        _editMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
      }
      renderMenuConfigList();
    })
    .withFailureHandler(function() {
      _editMenuConfig = userMenuConfig.length > 0
        ? JSON.parse(JSON.stringify(userMenuConfig))
        : JSON.parse(JSON.stringify(DEFAULT_MENU));
      renderMenuConfigList();
    })
    .handleApiRequest('loadSettings', {});
}

          キーワードを入力して「検索」ボタンを押してください
        </div>
      </div>`;
  }

function runDriveSearch() {
  const kwEl = document.getElementById('drive-search-input');
  const fromEl = document.getElementById('drive-date-from');
  const toEl = document.getElementById('drive-date-to');
  const btn = document.getElementById('drive-search-btn');
  const container = document.getElementById('drive-search-container');
  if (!kwEl || !container) return;
  const keyword = kwEl.value.trim();
  const dateFrom = (fromEl ? fromEl.value : '').replace(/-/g, '/');
  const dateTo = (toEl ? toEl.value : '').replace(/-/g, '/');
  if (btn) { btn.disabled = true; btn.textContent = '検索中...'; }
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>Drive を検索中...</div>';
  google.script.run
    .withSuccessHandler(res => {
      if (btn) { btn.disabled = false; btn.textContent = '🔍 検索'; }
      if (!res.success) {
        container.innerHTML = '<div style="color:var(--danger);padding:20px;">⚠️ ' + res.error + '</div>';
        return;
      }
      _renderDriveResults(res.items || [], res.total || (res.items||[]).length, keyword);
    })
    .withFailureHandler(err => {
      if (btn) { btn.disabled = false; btn.textContent = '🔍 検索'; }
      container.innerHTML = '<div style="color:var(--danger);padding:20px;">通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('driveSearch', { keyword, dateFrom, dateTo });
}

function _renderDriveResults(items, total, keyword) {
  const cntEl = document.getElementById('drive-result-count');
  if (cntEl) cntEl.textContent = total + '件';
  const container = document.getElementById('drive-search-container');
  if (!container) return;
  if (items.length === 0) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">「' + (keyword||'') + '」に一致するファイルが見つかりません</div>';
    return;
  }
  // キーワードをハイライト
  const hl = (text) => {
    if (!keyword) return text;
    return text.replace(new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
      m => `<mark style="background:#fef08a;border-radius:2px;">${m}</mark>`);
  };
  const rows = items.map(item => `
    <tr id="drive-row-${item.id}">
      <td style="padding:10px 12px;">
        <a href="${item.url}" target="_blank" style="color:var(--primary);text-decoration:none;font-weight:600;font-size:13px;">
          📄 ${hl(item.name)}
        </a>
      </td>
      <td style="padding:10px 12px;font-size:12px;color:var(--text-sub);white-space:nowrap;">${item.createdAt || item.updatedAt || '—'}</td>
      <td style="padding:10px 12px;font-size:12px;color:var(--text-sub);">${item.size ? (Number(item.size)/1024).toFixed(1) + ' KB' : '—'}</td>
      <td style="padding:10px 12px;white-space:nowrap;">
        <a href="${item.url}" target="_blank" class="btn btn-outline btn-sm">📂 開く</a>
        <button class="btn btn-danger btn-sm" style="margin-left:4px;"
          onclick="deleteDriveFile('${item.id}','${item.name.replace(/'/g,'')}')">🗑️</button>
      </td>
    </tr>`).join('');
  container.innerHTML = `
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#f8fafc;">
            <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text-sub);font-weight:700;border-bottom:1px solid var(--border);">ファイル名</th>
            <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text-sub);font-weight:700;border-bottom:1px solid var(--border);">作成日</th>
            <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text-sub);font-weight:700;border-bottom:1px solid var(--border);">サイズ</th>
            <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text-sub);font-weight:700;border-bottom:1px solid var(--border);">操作</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function deleteDriveFile(fileId, fileName) {
  if (!confirm('「' + fileName + '」をゴミ箱に移動しますか？')) return;
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('削除しました'); document.getElementById('drive-row-' + fileId)?.remove(); }
    else showToast('削除失敗: ' + res.error, true);
  }).handleApiRequest('driveDeleteFile', { fileId });
}

function clearDriveSearch() {
  const kw = document.getElementById('drive-search-input');
  const df = document.getElementById('drive-date-from');
  const dt = document.getElementById('drive-date-to');
  const cnt = document.getElementById('drive-result-count');
  const con = document.getElementById('drive-search-container');
  if (kw) kw.value = '';
  if (df) df.value = '';
  if (dt) dt.value = '';
  if (cnt) cnt.textContent = '';
  if (con) con.innerHTML = 'キーワードを入力して「検索」ボタンを押してください';
}

// ============================================================
// ★ スケジュール（FullCalendar 月表示）
//   ・見積書発行日 📄  ・注文書発注日 📦  ・納期 🚚  ・台帳予定日 📝
// ============================================================
let _calendarInstance = null;

function loadCalendar() {
  const container = document.getElementById('cal-container');
  if (!container) return;
  if (_calendarInstance) {
    _calendarInstance.render();
    return;
  }

  _calendarInstance = new FullCalendar.Calendar(container, {
    initialView: 'dayGridMonth',
    locale: 'ja',
    height: 'auto',
    headerToolbar: {
      left:   'prev,next today',
      center: 'title',
      right:  'dayGridMonth,listMonth'
    },
    buttonText: { today: '今日', month: '月', list: '一覧' },

    // ─── イベントカラー凡例 ───
    // 📄 見積発行日   #2563eb (青)
    // 📦 注文書発注日 #dc2626 (赤)
    // 🚚 納期         #16a34a (緑)
    // 📝 台帳予定     #d97706 (オレンジ)

    eventContent: function(arg) {
      const icon = arg.event.extendedProps.icon || '📌';
      const label = arg.event.title || '';
      return {
        html: `<div style="font-size:11px;white-space:normal;line-height:1.4;padding:2px 4px;overflow:hidden;cursor:pointer;" title="${label}">
                 <strong>${icon} ${label}</strong>
               </div>`
      };
    },

    events: function(info, successCallback, failureCallback) {
      const midDate = new Date((info.start.getTime() + info.end.getTime()) / 2);

      // ① GAS API からイベント取得
      google.script.run
        .withSuccessHandler(res => {
          let fcEvents = [];

          // API からのイベント
          if (res && res.success) {
            fcEvents = (res.events || []).map(ev => {
              const typeMap = {
                quote:    { color: '#2563eb', icon: '📄' },
                order:    { color: '#dc2626', icon: '📦' },
                delivery: { color: '#16a34a', icon: '🚚' },
                ledger:   { color: '#d97706', icon: '📝' },
                todo:     { color: '#7c3aed', icon: '✅' },
              };
              const t = typeMap[ev.type] || { color: '#64748b', icon: '📌' };
              return {
                title:           ev.label,
                start:           String(ev.date).replace(/\//g, '-'),
                backgroundColor: t.color,
                borderColor:     t.color,
                extendedProps:   { icon: t.icon, mgmtId: ev.mgmtId, todoId: ev.todoId, type: ev.type }
              };
            });
          }

          // ② ローカルデータから補完（S.all + _allQuotes + _allLedgerItems）
          const localEvents = _buildLocalCalendarEvents();
          // API イベントと重複しないキーで結合
          const apiKeys = new Set(fcEvents.map(e => e.title + '|' + e.start));
          localEvents.forEach(e => {
            if (!apiKeys.has(e.title + '|' + e.start)) fcEvents.push(e);
          });

          successCallback(fcEvents);
        })
        .withFailureHandler(() => {
          // API 失敗時はローカルデータのみ表示
          successCallback(_buildLocalCalendarEvents());
        })
        .handleApiRequest('getCalendar', {
          year:  midDate.getFullYear(),
          month: midDate.getMonth() + 1
        });
    },

    eventClick: function(info) {
      _openCalEventDetail(info.event);
    }
  });

  _calendarInstance.render();
}

// ─── ローカルデータからカレンダーイベントを生成 ───
function _buildLocalCalendarEvents() {
  const events = [];
  const toDateStr = d => {
    if (!d) return null;
    const s = String(d).replace(/\//g, '-').trim();
    return /^\d{4}-\d{2}-\d{2}/.test(s) ? s.substring(0, 10) : null;
  };

  // 注文書一覧 (S.all) — 発注日・納期
  (S.all || []).forEach(r => {
    const label = r.orderNo || r.quoteNo || r.client || '案件';
    const orderDate = toDateStr(r.orderDate);
    const delivDate = toDateStr(r.deliveryDate);
    const quoteDate = toDateStr(r.quoteDate);
    if (orderDate) events.push({
      title: '📦 発注: ' + label,
      start: orderDate,
      backgroundColor: '#dc2626', borderColor: '#dc2626',
      extendedProps: { icon: '📦', mgmtId: r.id, type: 'order' }
    });
    if (delivDate) events.push({
      title: '🚚 納期: ' + label,
      start: delivDate,
      backgroundColor: '#16a34a', borderColor: '#16a34a',
      extendedProps: { icon: '🚚', mgmtId: r.id, type: 'delivery' }
    });
    if (quoteDate && !orderDate) events.push({
      title: '📄 見積: ' + label,
      start: quoteDate,
      backgroundColor: '#2563eb', borderColor: '#2563eb',
      extendedProps: { icon: '📄', mgmtId: r.id, type: 'quote' }
    });
  });

  // 見積書一覧 (_allQuotes) — 発行日
  (_allQuotes || []).forEach(r => {
    if (r._fromLedger) return; // 台帳分は下で処理
    const d = toDateStr(r.issueDate || r.quoteDate);
    if (!d) return;
    events.push({
      title: '📄 見積: ' + (r.quoteNo || r.subject || r.client || '—'),
      start: d,
      backgroundColor: '#2563eb', borderColor: '#2563eb',
      extendedProps: { icon: '📄', mgmtId: r.id, type: 'quote' }
    });
  });

  // 台帳 (_allLedgerItems) — 発行予定日
  (_allLedgerItems || []).forEach(r => {
    if (r.status === '__MACHINE_FOLDER__' || r.status === 'キャンセル') return;
    const d = toDateStr(r.issueDate || r.sentDate);
    if (!d) return;
    events.push({
      title: '📝 台帳: ' + (r.quoteNo || r.subject || '—'),
      start: d,
      backgroundColor: '#d97706', borderColor: '#d97706',
      extendedProps: { icon: '📝', type: 'ledger', ledgerId: r.ledgerId }
    });
  });

  return events;
}

// ─── カレンダーイベントクリック ───
function _openCalEventDetail(ev) {
  const props = ev.extendedProps || {};
  if (props.mgmtId) {
    const isQuote = props.type === 'quote';
    if (isQuote) openQuoteDetail(props.mgmtId, '');
    else openDetail(props.mgmtId);
  } else if (props.ledgerId) {
    openLedgerAddModal(props.ledgerId);
  } else if (props.todoId) {
    showToast('Todo詳細は準備中です');
  }
}

// カレンダーを強制リロード（データ更新後に呼ぶ）
function reloadCalendar() {
  if (_calendarInstance) {
    _calendarInstance.refetchEvents();
  }
}
// メニュー設定を保存し、全ユーザーに一斉反映する
function saveMenuConfig() { 
  const btn = typeof event !== 'undefined' ? event.target : null;
  let originalText = '保存';
  if (btn && btn.tagName === 'BUTTON') {
    originalText = btn.textContent;
    btn.textContent = '保存中...';
    btn.disabled = true;
  }
  
  google.script.run.withSuccessHandler(res => {
    if (btn && btn.tagName === 'BUTTON') {
      btn.textContent = originalText;
      btn.disabled = false;
    }
    if (res && res.success) {
      if (typeof showToast === 'function') showToast('✅ メニュー設定を全ユーザーに反映しました。');
      if (typeof userMenuConfig !== 'undefined') { 
        userMenuConfig = JSON.parse(JSON.stringify(_editMenuConfig)); 
        if (typeof renderSidebar === 'function') renderSidebar(); 
      } 
      closeMenuConfig();
    } else {
      // ★ 修正：何が原因で失敗したのか、サーバーからのエラーメッセージを直接表示する！
      let errMsg = res && res.error ? res.error : '原因不明の通信エラー';
      if (typeof showToast === 'function') showToast('⚠️ 保存失敗: ' + errMsg, true);
    }
  }).withFailureHandler(err => {
    if (btn && btn.tagName === 'BUTTON') { btn.textContent = originalText; btn.disabled = false; }
    if (typeof showToast === 'function') showToast('⚠️ 通信エラー: ' + err.message, true);
  }).handleApiRequest('menuConfigSave', { menuConfig: _editMenuConfig });
}

// メニュー設定を完全に初期状態に戻し、全ユーザーに反映する
function resetMenuConfig() { 
  if (confirm('メニュー設定を完全に初期状態にリセットし、全ユーザーに反映しますか？')) { 
    _editMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU)); 
    renderMenuConfigList(); 
    saveMenuConfig();
  } 
}
