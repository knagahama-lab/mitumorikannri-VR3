<script>
const DEFAULT_MENU = [
  { id:'list',       icon:'📋', label:'案件一覧',         section:'営業・進行管理', visible:true },
  { id:'ledger',     icon:'📝', label:'見積台帳',         section:'営業・進行管理', visible:true },
  { id:'matching',   icon:'🔗', label:'AI紐づけ',         section:'営業・進行管理', visible:true },
  { id:'calendar',   icon:'📅', label:'スケジュール',     section:'営業・進行管理', visible:true },
  { id:'ocr',        icon:'🔍', label:'簡易OCR',          section:'営業・進行管理', visible:true },
  { id:'aichat',     icon:'🤖', label:'AIアシスタント',   section:'自動化・連携',   visible:true },
  { id:'workflow',   icon:'🔄', label:'業務フロー',       section:'自動化・連携',   visible:true },
  { id:'assignees',  icon:'👥', label:'担当者管理',       section:'自動化・連携',   visible:true },
  { id:'approval',   icon:'✅', label:'製造承認',         section:'自動化・連携',   visible:true },
  { id:'board',      icon:'🏷️', label:'基板管理',         section:'マスタ管理',     visible:true },
  { id:'analysis',   icon:'📊', label:'分析・レポート',   section:'マスタ管理',     visible:true },
  { id:'todo',       icon:'✅', label:'ToDo',             section:'ツール',         visible:true },
  { id:'drivesearch',icon:'💾', label:'全文検索',         section:'ツール',         visible:true },
  { id:'admin',      icon:'⚙️', label:'管理コンソール',   section:'設定',           visible:true },
  { id:'bom_ext',    icon:'🏭', label:'BOM・原価管理',    section:'設定',           visible:true, external:'' }
];

let IS_ADMIN = true; // 強制的に管理者権限を付与
let userMenuConfig = [];

const PAGE_TITLES = {
  list:'案件一覧', ledger:'見積台帳', matching:'AI紐づけ', calendar:'スケジュール',
  ocr:'簡易OCR', todo:'ToDo', drivesearch:'全文検索', admin:'システム管理コンソール',
  workflow:'業務フロー', assignees:'担当者管理', approval:'製造承認', board:'基板管理',
  analysis:'分析・レポート', aichat:'AIアシスタント',
};

const S = { all:[], filtered:[], page:1, limit:30, docType:'quote', orderType:'', selectedFile:null, calYear: new Date().getFullYear(), calMonth: new Date().getMonth()+1, calEvents:[] };
let searchTimer=null; let _allQuotes = []; let _filteredQuotes = []; let _quotePage = 1; const _quoteLimit = 20; let _allMatchingItems = [];

window.addEventListener('load', () => {
  renderSidebar(); showPage('list');
  try { _populateMonthFilter(); } catch(e){}
  loadData(); loadQuoteList(); 
  if (typeof loadMatchingCandidates === 'function') loadMatchingCandidates();
});

// 使わなくなるので中身を空にします
function loadMenuConfig() {}

// サーバーから設定を読み込んでサイドバーを描画するように変更
function renderSidebar() {
  const container = document.getElementById('sidebar-nav-container'); if(!container) return;
  
  google.script.run.withSuccessHandler(res => {
    if (res && res.success && res.menuConfig) {
      userMenuConfig = res.menuConfig;
    } else {
      userMenuConfig = JSON.parse(JSON.stringify(DEFAULT_MENU));
    }
    
    const sections = {};
    userMenuConfig.forEach(item=>{
      if(!item.visible) return;
      if(!sections[item.section]) sections[item.section]=[];
      sections[item.section].push(item);
    });
    let html='';
    Object.keys(sections).forEach(section=>{
      html += `<div class="sidebar-section-label">${section}</div>`;
      sections[section].forEach(item=>{
        if(item.external){ html += `<a class="nav-item nav-item-ext" href="${item.external}" target="_blank"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></a>`; }
        else { html += `<div class="nav-item" data-id="${item.id}" onclick="showPage('${item.id}')"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></div>`; }
      });
    });
    container.innerHTML = html;
    
    // 現在のページのアクティブ状態を再設定
    const activePage = document.querySelector('.page.active');
    if (activePage) {
      const pageId = activePage.id.replace('page-', '');
      document.querySelectorAll('.nav-item[data-id]').forEach(t=>{ t.classList.toggle('active', t.dataset.id===pageId); });
    }
  }).handleApiRequest('menuConfigLoad', null);
}

function showPage(name){
  document.querySelectorAll('.nav-item[data-id]').forEach(t=>{ t.classList.toggle('active', t.dataset.id===name); });
  const titleEl = document.getElementById('topbar-page-title'); if(titleEl) titleEl.textContent = PAGE_TITLES[name] || name;
  const contentEl = document.getElementById('content'); if(contentEl) contentEl.scrollTop=0;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const target = document.getElementById('page-'+name); if(target) target.classList.add('active');

  if(name==='list'){ const ao=document.getElementById('area-order'); const aq=document.getElementById('area-quote'); if(ao) ao.style.display=''; if(aq) aq.style.display='none'; }
  if(name==='ledger' && typeof loadLedger==='function') loadLedger();
  if(name==='calendar' && typeof loadCalendar==='function') loadCalendar();
  if(name==='matching' && typeof loadMatchingCandidates==='function') loadMatchingCandidates();
  if(name==='drivesearch' && typeof clearDriveSearch==='function') clearDriveSearch();
  if(name==='admin') _onShowAdmin();
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('collapsed'); }
function showToast(msg, isError=false){
  const t=document.getElementById('toast'); if(!t) return;
  t.textContent=(isError?'✗ ':'✓ ')+msg; t.style.background=isError?'#dc2626':'#1e293b';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3500);
}

function normalizeSearchText(str) { return String(str||'').toLowerCase().replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0)).replace(/[\u3000]/g, ' '); }

function loadData() {
  const container = document.getElementById('table-container'); if(!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>データ読み込み中...</div>';
  google.script.run.withSuccessHandler(res => {
    if (!res || !res.success) { container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ データ取得失敗: '+(res?res.error:'不明')+'</div>'; return; }
    S.all = res.items || []; S.filtered = S.all.slice(); S.page = 1; _updateSummary(); _renderTable();
  }).withFailureHandler(err => { container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ 通信エラー: '+err.message+'</div>'; }).handleApiRequest('getAll', null);
}

function switchSubTab(tab) {
  var isOrder = tab === 'order';
  var areaOrder = document.getElementById('area-order'), areaQuote = document.getElementById('area-quote');
  var orderBtn = document.getElementById('subtab-order'), quoteBtn = document.getElementById('subtab-quote');
  if (!areaOrder || !areaQuote || !orderBtn || !quoteBtn) return;
  areaOrder.style.display = isOrder ? '' : 'none'; areaQuote.style.display = isOrder ? 'none' : '';
  orderBtn.style.color = isOrder ? 'var(--primary)' : 'var(--text-sub)'; orderBtn.style.borderBottom = isOrder ? '2px solid var(--primary)' : '2px solid transparent'; orderBtn.style.fontWeight = isOrder ? '600' : '500';
  quoteBtn.style.color = isOrder ? 'var(--text-sub)' : 'var(--primary)'; quoteBtn.style.borderBottom = isOrder ? '2px solid transparent' : '2px solid var(--primary)'; quoteBtn.style.fontWeight = isOrder ? '500' : '600';
  if (!isOrder && _allQuotes.length === 0) loadQuoteList();
}

function _updateSummary() {
  const now = new Date(); const ym = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0');
  if(document.getElementById('sum-sent')) document.getElementById('sum-sent').textContent = S.all.filter(r=>r.status==='送信済み').length;
  if(document.getElementById('sum-received')) document.getElementById('sum-received').textContent = S.all.filter(r=>r.status==='受領').length;
  if(document.getElementById('sum-done')) document.getElementById('sum-done').textContent = S.all.filter(r=>r.status==='納品済み').length;
  const tot = S.all.filter(r=>String(r.orderDate).startsWith(ym)).reduce((s,r)=>s+(Number(r.orderAmount)||0), 0);
  if(document.getElementById('sum-amount')) document.getElementById('sum-amount').textContent = tot.toLocaleString();
}

function _renderTable() {
  const start = (S.page-1)*S.limit; const data = S.filtered.slice(start, start+S.limit); const total = S.filtered.length;
  if(document.getElementById('result-count')) document.getElementById('result-count').textContent = total+'件中 '+(total>0?start+1:0)+'–'+Math.min(start+S.limit,total)+'件';
  if (total===0) { document.getElementById('table-container').innerHTML = '<div class="loading" style="color:var(--text-sub);">該当する案件がありません</div>'; document.getElementById('pagination').innerHTML=''; return; }
  const rows = data.map(r=>`
    <tr onclick="openDetail('${r.id}')" style="cursor:pointer;">
      <td><span class="text-sub">${r.id||''}</span></td>
      <td><strong>${r.orderNo||r.quoteNo||'—'}</strong></td>
      <td>${r.orderSlipNo||'—'}</td>
      <td>${r.modelCode||'—'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.client||''}</td>
      <td>${_sBadge(r.status)}</td>
      <td>${r.orderType?_otBadge(r.orderType):''}</td>
      <td class="text-sub">${r.orderDate||r.quoteDate||''}</td>
      <td class="text-sub">${r.deliveryDate||''}</td>
      <td style="text-align:right;white-space:nowrap;">${r.orderAmount?Number(r.orderAmount).toLocaleString()+' 円':'—'}</td>
      <td>
        ${r.quotePdfUrl?`<a class="pdf-link" href="${r.quotePdfUrl}" target="_blank" onclick="event.stopPropagation()">見積</a> `:''}
        ${r.orderPdfUrl?`<a class="pdf-link" href="${r.orderPdfUrl}" target="_blank" onclick="event.stopPropagation()">発注</a>`:''}
        ${r.driveFolderUrl?`<br><a class="pdf-link" href="${r.driveFolderUrl}" target="_blank" onclick="event.stopPropagation()">📁</a>`:''}
      </td>
      <td style="text-align:center; white-space:nowrap;"><button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteMgmt('${r.id}', '${(r.orderNo||r.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button></td>
    </tr>`).join('');
  document.getElementById('table-container').innerHTML = `<table><thead><tr><th>管理ID</th><th>発注書番号</th><th>発注伝票No</th><th>機種</th><th>顧客名</th><th>ステータス</th><th>種別</th><th>発注日</th><th>納期</th><th>注文金額</th><th>PDF/フォルダ</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
  _renderPagination(total);
}

function _sBadge(s){const m={'作成予定':'planned','送信済み':'sent','受領':'received','納品済み':'done'};return`<span class="badge badge-${m[s]||'planned'}">${s||'—'}</span>`;}
function _otBadge(t){if(t==='試作')return'<span class="badge badge-trial">試作</span>';if(t==='量産')return'<span class="badge badge-mass">量産</span>';return'';}

function _renderPagination(total) {
  const pages=Math.ceil(total/S.limit); if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let h=''; for(let i=1;i<=Math.min(pages,10);i++) h+=`<button class="page-btn ${i===S.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML=h;
}
function goPage(n){S.page=n;_renderTable();}
function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,300);}

function applyFilters() {
  const rawKw = document.getElementById('search-input').value; const kws = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean);
  const st = document.getElementById('filter-status').value; const ot = document.getElementById('filter-order-type').value; const mo = document.getElementById('filter-month').value;
  S.filtered = S.all.filter(r => {
    const targetValues = [ r.quoteNo, r.orderNo, r.orderSlipNo, r.modelCode, r.subject, r.client, r.orderAmount ];
    const searchableText = normalizeSearchText(targetValues.join(' '));
    const mk = kws.length === 0 || kws.every(kw => searchableText.includes(kw));
    const ms = !st || r.status === st; const mo2 = !ot || r.orderType === ot;
    const mm = !mo || (String(r.orderDate).startsWith(mo) || String(r.quoteDate).startsWith(mo));
    return mk && ms && mo2 && mm;
  });
  S.page = 1; _renderTable();
}

function clearFilters(){ document.getElementById('search-input').value=''; ['filter-status','filter-order-type','filter-month'].forEach(id=>document.getElementById(id).value=''); S.filtered=S.all.slice();S.page=1;_renderTable(); }
function _populateMonthFilter(){
  const sel=document.getElementById('filter-month'); if(!sel) return; const now=new Date();
  for(let i=0;i<12;i++){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); const ym=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0'); const o=document.createElement('option');o.value=ym;o.textContent=ym;sel.appendChild(o); }
}

function loadQuoteList() {
  const container = document.getElementById('quotelist-container'); if(!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  google.script.run.withSuccessHandler(res => {
    if (!res.success) { container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ ' + res.error + '</div>'; return; }
    _allQuotes = res.items || []; _filteredQuotes = _allQuotes.slice(); _quotePage = 1;
    if(document.getElementById('qs-total')) document.getElementById('qs-total').textContent = _allQuotes.length;
    if(document.getElementById('qs-linked')) document.getElementById('qs-linked').textContent = _allQuotes.filter(r => r.linked).length;
    if(document.getElementById('qs-amount')) document.getElementById('qs-amount').textContent = _allQuotes.reduce((s, r) => s + (Number(r.quoteAmount) || 0), 0).toLocaleString();
    _renderQuoteTable();
  }).handleApiRequest('quoteListGetAll', null);
}

function applyQuoteFilter() {
  const rawKw  = document.getElementById('qs-search').value; const kws = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean); 
  const st = document.getElementById('qs-filter-status').value; const linked = document.getElementById('qs-filter-linked').value;
  _filteredQuotes = _allQuotes.filter(r => {
    const targetValues = [ r.quoteNo, r.subject, r.destCompany, r.destPerson, r.modelCode, r.quoteAmount, r.orderNo ];
    const searchableText = normalizeSearchText(targetValues.join(' '));
    const mk = kws.length === 0 || kws.every(kw => searchableText.includes(kw));
    const ms = !st || r.status === st; const ml = !linked || (linked === 'linked' && r.linked) || (linked === 'unlinked' && !r.linked);
    return mk && ms && ml;
  });
  _filteredQuotes.sort((a, b) => String(b.issueDate||'').localeCompare(String(a.issueDate||'')));
  _quotePage = 1; _renderQuoteTable();
}

function clearQuoteFilter() {
  document.getElementById('qs-search').value = ''; document.getElementById('qs-filter-status').value = ''; document.getElementById('qs-filter-linked').value = '';
  _filteredQuotes = _allQuotes.slice(); _quotePage = 1; _renderQuoteTable();
}

function _renderQuoteTable() {
  const start = (_quotePage - 1) * _quoteLimit; const data  = _filteredQuotes.slice(start, start + _quoteLimit); const total = _filteredQuotes.length;
  if(document.getElementById('qs-count')) document.getElementById('qs-count').textContent = total + '件中 ' + (total > 0 ? start + 1 : 0) + '–' + Math.min(start + _quoteLimit, total) + '件';
  if (total === 0) { document.getElementById('quotelist-container').innerHTML = '<div class="loading" style="color:var(--text-sub);">該当する見積書がありません</div>'; document.getElementById('qs-pagination').innerHTML = ''; return; }
  const rows = data.map(r => `
    <tr onclick="openQuoteDetail('${r.id}')" style="cursor:pointer;">
      <td><strong>${r.quoteNo || '—'}</strong></td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.subject || ''}">${r.subject || '—'}</td>
      <td style="font-size:12px;color:var(--text-sub);">${r.issueDate || '—'}</td>
      <td style="text-align:right;white-space:nowrap;">${r.quoteAmount ? Number(r.quoteAmount).toLocaleString() + ' 円' : '—'}</td>
      <td>${_sBadge(r.status)}</td>
      <td>${r.linked ? '<span class="badge badge-linked">✓ 注文書あり</span>' : '<span style="font-size:11px;color:var(--text-sub);">未受注</span>'}${r.orderNo ? '<br><span style="font-size:11px;color:var(--text-sub);">No.' + r.orderNo + '</span>' : ''}</td>
      <td>${r.quotePdfUrl ? '<a class="pdf-link" href="' + r.quotePdfUrl + '" target="_blank" onclick="event.stopPropagation()">📄 PDF</a>' : ''}</td>
      <td style="text-align:center; white-space:nowrap;"><button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteMgmt('${r.id}', '${(r.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button></td>
    </tr>`).join('');
  document.getElementById('quotelist-container').innerHTML = `<table><thead><tr><th>見積No.</th><th>件名（ファイル名）</th><th>発行日</th><th>金額</th><th>ステータス</th><th>紐づけ状況</th><th>PDF</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
  const pages = Math.ceil(total / _quoteLimit);
  if (pages <= 1) { document.getElementById('qs-pagination').innerHTML = ''; return; }
  let pHtml = ''; for (let i = 1; i <= Math.min(pages, 10); i++) pHtml += `<button class="page-btn ${i === _quotePage ? 'active' : ''}" onclick="goQuotePage(${i})">${i}</button>`;
  document.getElementById('qs-pagination').innerHTML = pHtml;
}
function goQuotePage(n) { _quotePage = n; _renderQuoteTable(); }

// プレースホルダー群
function loadTodos() { document.getElementById('todo-container') && (document.getElementById('todo-container').innerHTML = '<div class="loading">Todoリストは準備中です</div>'); }
function loadBoardList() { document.getElementById('board-container') && (document.getElementById('board-container').innerHTML = '<div class="loading">基板管理は準備中です</div>'); }
function loadBoardAnalysis() { document.getElementById('analysis-container') && (document.getElementById('analysis-container').innerHTML = '<div class="loading">分析は準備中です</div>'); }
function refreshWorkflowStatus() { document.getElementById('workflow-container') && (document.getElementById('workflow-container').innerHTML = '<div class="loading">ワークフローは準備中です</div>'); }
function loadAssignees() { document.getElementById('assignee-container') && (document.getElementById('assignee-container').innerHTML = '<div class="loading">担当者管理は準備中です</div>'); }
function loadApprovals() { document.getElementById('approval-container') && (document.getElementById('approval-container').innerHTML = '<div class="loading">製造承認は準備中です</div>'); }
</script>
