<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>見積・注文 管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<style>
/* ============================================================
   CSS Variables & Reset
============================================================ */
:root{
  --sidebar-w: 240px; --sidebar-collapsed-w: 60px; --sidebar-bg: #0f1729;
  --sidebar-hover: rgba(255,255,255,0.07 ); --sidebar-active: rgba(74,144,226,0.18);
  --sidebar-active-bar: #4a90e2; --sidebar-text: rgba(255,255,255,0.65);
  --sidebar-text-active: #fff; --sidebar-text-sub: rgba(255,255,255,0.35);
  --sidebar-border: rgba(255,255,255,0.06); --sidebar-logo-bg: #0a1020;
  --bg: #f4f6fb; --card: #ffffff; --border: #e8eaed; --border-light: #f0f2f5;
  --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8;
  --success: #16a34a; --danger: #dc2626; --warning: #d97706; --info: #0891b2;
  --s-planned-bg:#f1f5f9;--s-planned-fg:#475569; --s-sent-bg:#eff6ff;--s-sent-fg:#2563eb;
  --s-received-bg:#fef2f2;--s-received-fg:#dc2626; --s-done-bg:#f0fdf4;--s-done-fg:#16a34a;
  --trial-bg:#fff7ed;--trial-fg:#c2410c; --mass-bg:#f0fdf4;--mass-fg:#15803d;
  --text: #1e293b; --text-sub: #64748b; --text-muted: #94a3b8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.04);
  --radius: 10px; --radius-sm: 6px; --radius-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
#app-shell{ display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
#sidebar{ width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--sidebar-bg); display:flex; flex-direction:column; height:100vh; position:relative; transition:width .25s cubic-bezier(.4,0,.2,1),min-width .25s; z-index:100; overflow:hidden; }
#sidebar.collapsed{ width:var(--sidebar-collapsed-w); min-width:var(--sidebar-collapsed-w); }
.sidebar-logo{ display:flex; align-items:center; gap:10px; padding:18px 16px 16px; border-bottom:1px solid var(--sidebar-border); background:var(--sidebar-logo-bg); flex-shrink:0; min-height:64px; cursor:pointer; user-select:none; }
.sidebar-logo-icon{ width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#4a90e2,#2563eb); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; box-shadow:0 2px 8px rgba(74,144,226,.4); }
.sidebar-logo-text{ display:flex; flex-direction:column; overflow:hidden; transition:opacity .2s,width .2s; white-space:nowrap; }
.sidebar-logo-title{ font-size:13px; font-weight:700; color:#fff; letter-spacing:0.02em; line-height:1.2; }
.sidebar-logo-sub{ font-size:10px; color:var(--sidebar-text-sub); margin-top:1px; }
#sidebar.collapsed .sidebar-logo-text{ opacity:0; width:0; overflow:hidden; }
.sidebar-nav{ flex:1; overflow-y:auto; overflow-x:hidden; padding:8px 0; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.1) transparent; }
.sidebar-section-label{ font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--sidebar-text-sub); padding:14px 18px 5px; white-space:nowrap; transition:opacity .2s; }
#sidebar.collapsed .sidebar-section-label{ opacity:0; pointer-events:none; }
.nav-item{ display:flex; align-items:center; gap:10px; padding:9px 14px 9px 16px; margin:1px 8px; border-radius:var(--radius-sm); cursor:pointer; color:var(--sidebar-text); font-size:12.5px; font-weight:500; transition:all .15s; text-decoration:none; position:relative; white-space:nowrap; user-select:none; }
.nav-item:hover{ background:var(--sidebar-hover); color:var(--sidebar-text-active); }
.nav-item.active{ background:var(--sidebar-active); color:var(--sidebar-text-active); }
.nav-item.active::before{ content:''; position:absolute; left:-8px; top:50%; transform:translateY(-50%); width:3px; height:20px; background:var(--sidebar-active-bar); border-radius:0 3px 3px 0; }
.nav-item-icon{ font-size:15px; width:20px; text-align:center; flex-shrink:0; line-height:1; }
.nav-item-label{ flex:1; transition:opacity .2s; overflow:hidden; }
#sidebar.collapsed .nav-item-label{ opacity:0; width:0; overflow:hidden; }
#sidebar.collapsed .nav-item{ justify-content:center; padding:9px; }
#sidebar.collapsed .nav-item.active::before{ left:-8px; }
.sidebar-footer{ padding:12px 8px; border-top:1px solid var(--sidebar-border); flex-shrink:0; }
.sidebar-user{ display:flex; align-items:center; gap:10px; padding:8px; border-radius:var(--radius-sm); cursor:pointer; transition:background .15s; color:#fff;}
.sidebar-avatar{ width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#4a90e2,#7c3aed); display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:700; flex-shrink:0; }
.sidebar-user-info{ overflow:hidden; flex:1; transition:opacity .2s; }
.sidebar-user-name{ font-size:11.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sidebar-user-role{ font-size:10px; color:var(--sidebar-text-sub); }
#sidebar.collapsed .sidebar-user-info{ opacity:0; width:0; overflow:hidden; }
.sidebar-toggle{ position:absolute; top:20px; right:-12px; width:24px; height:24px; background:var(--card); border:1px solid var(--border); border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text-sub); box-shadow:var(--shadow-sm); z-index:101; transition:transform .25s,box-shadow .15s; }
.sidebar-toggle:hover{ box-shadow:var(--shadow); color:var(--primary); }
#sidebar.collapsed .sidebar-toggle{ transform:rotate(180deg); }

/* Main & Topbar */
#main{ flex:1; display:flex; flex-direction:column; height:100vh; overflow:hidden; min-width:0; }
#topbar{ height:56px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:16px; flex-shrink:0; position:sticky; top:0; z-index:50; }
.topbar-breadcrumb{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-sub); }
.topbar-breadcrumb-current{ font-size:14px; font-weight:700; color:var(--text); }
.topbar-breadcrumb-sep{ color:var(--border); }
.topbar-spacer{flex:1;}
.topbar-actions{ display:flex; align-items:center; gap:8px; }
.topbar-btn{ height:32px; padding:0 14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--card); color:var(--text); font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .15s; }
.topbar-btn:hover{ background:var(--bg); border-color:#c5cdd9; }
.topbar-btn.primary{ background:var(--primary); color:#fff; border-color:var(--primary); }
.topbar-btn.primary:hover{ background:var(--primary-dark); }

/* Pages & Components */
#content{ flex:1; overflow-y:auto; overflow-x:hidden; padding:24px; }
.page{display:none;max-width:1600px;margin:0 auto;}
.page.active{display:block;animation:fadeSlideIn .2s ease-out;}
@keyframes fadeSlideIn{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:14px;margin-bottom:20px;}
.summary-card{ background:var(--card); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); transition:box-shadow .2s,transform .2s; }
.summary-card:hover{ box-shadow:var(--shadow); transform:translateY(-1px); }
.summary-card .lbl{font-size:11px;color:var(--text-sub);margin-bottom:4px;font-weight:500;}
.summary-card .val{font-size:26px;font-weight:700;}
.summary-card .sub{font-size:11px;color:var(--text-muted);margin-top:3px;}
.c-blue{color:var(--primary);} .c-red{color:var(--danger);} .c-green{color:var(--success);}
.filter-bar{ background:var(--card); border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); }
.search-box{position:relative;flex:1;min-width:200px;}
.search-box input{ width:100%; padding:7px 12px 7px 32px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:12px; outline:none; }
.search-box input:focus{border-color:var(--primary);}
.search-box::before{ content:'🔍'; position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:11px; pointer-events:none; }
select{ padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:12px; outline:none; }
.table-wrap{ background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow:hidden; border:1px solid var(--border-light); }
.table-toolbar{ padding:12px 16px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
.table-toolbar h2{font-size:14px;font-weight:700;color:var(--text);}
table{width:100%; border-collapse:collapse;}
th{ padding:9px 12px; text-align:left; font-size:10.5px; font-weight:700; color:var(--text-sub); border-bottom:1px solid var(--border-light); background:#f8fafc; white-space:nowrap; }
td{ padding:10px 12px; border-bottom:1px solid var(--border-light); font-size:12.5px; vertical-align:middle; }
tr:hover td{background:#f8fafc;}
.pagination{ display:flex; align-items:center; justify-content:flex-end; gap:4px; padding:10px 16px; }
.page-btn{ padding:4px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--card); cursor:pointer; font-size:11px; color:var(--text-sub); transition:all .15s; }
.page-btn:hover{background:var(--bg);color:var(--text);}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.badge{ display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10.5px; font-weight:600; white-space:nowrap; }
.badge-planned{background:var(--s-planned-bg);color:var(--s-planned-fg);}
.badge-sent{background:var(--s-sent-bg);color:var(--s-sent-fg);}
.badge-received{background:var(--s-received-bg);color:var(--s-received-fg);}
.badge-done{background:var(--s-done-bg);color:var(--s-done-fg);}
.badge-trial{background:var(--trial-bg);color:var(--trial-fg);}
.badge-mass{background:var(--mass-bg);color:var(--mass-fg);}
.badge-linked{background:var(--s-done-bg);color:var(--s-done-fg);}
.btn{ padding:7px 14px; border-radius:var(--radius-sm); border:1px solid var(--border); cursor:pointer; font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:5px; transition:all .15s; background:var(--card); color:var(--text); }
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-outline{background:transparent;border:1px solid var(--border);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}

/* Modals */
.modal-overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,.6); backdrop-filter:blur(3px); display:none; align-items:center; justify-content:center; z-index:200; }
.modal-overlay.open{display:flex;}
.modal{ background:var(--card); width:90%; max-width:600px; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); overflow:hidden; animation:modalPop .25s cubic-bezier(.16,1,.3,1); }
@keyframes modalPop{ from{opacity:0;transform:scale(.95) translateY(10px);} to{opacity:1;transform:scale(1) translateY(0);} }
.modal-head{ padding:16px 20px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
.modal-head h3{font-size:15px;font-weight:700;}
.modal-close{ width:32px; height:32px; border-radius:50%; border:none; background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-sub); transition:all .15s; }
.modal-close:hover{background:var(--border-light);color:var(--danger);}
.modal-body{padding:20px;}

/* Toast */
#toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:#1e293b; color:#fff; padding:10px 20px; border-radius:30px; font-size:13px; font-weight:500; box-shadow:var(--shadow-lg); z-index:300; transition:transform .3s cubic-bezier(.16,1,.3,1); display:flex; align-items:center; gap:8px; }
#toast.show{transform:translateX(-50%) translateY(0);}

/* Admin Tabs */
.admin-tab{ padding:10px 20px; cursor:pointer; border:none; background:none; font-size:13px; font-weight:600; color:var(--text-sub); position:relative; transition:all .2s; white-space:nowrap; }
.admin-tab:hover{color:var(--primary);}
.admin-tab.active{color:var(--primary);}
.admin-tab.active::after{ content:''; position:absolute; bottom:-2px; left:0; width:100%; height:2px; background:var(--primary); }
</style>
</head>
<body>

<div id="app-shell">
  <aside id="sidebar">
    <div class="sidebar-logo" onclick="showPage('list')">
      <div class="sidebar-logo-icon">☀️</div>
      <div class="sidebar-logo-text">
        <span class="sidebar-logo-title">見積・注文管理</span>
        <span class="sidebar-logo-sub">Version 3.0</span>
      </div>
    </div>
    <div class="sidebar-toggle" onclick="toggleSidebar()">◀</div>
    <nav class="sidebar-nav" id="sidebar-nav-container">
      <!-- JavaScriptで動的に生成されます -->
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="user-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-email-label">user@example.com</div>
          <div class="sidebar-user-role" id="user-role-label">管理者</div>
        </div>
      </div>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <div class="topbar-breadcrumb">
        <span>見積・注文管理</span>
        <span class="topbar-breadcrumb-sep">/</span>
        <span class="topbar-breadcrumb-current" id="topbar-page-title">案件一覧</span>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <button class="topbar-btn primary" onclick="openUploadModal()">➕ PDFアップロード</button>
      </div>
    </header>

    <div id="content">
      <!-- 1. 案件一覧ページ -->
      <div id="page-list" class="page active">
        <div class="summary-grid">
          <div class="summary-card"><div class="lbl">今月の受注総額</div><div class="val c-blue">¥<span id="sum-amount">0</span></div><div class="sub">今月分のみ集計</div></div>
          <div class="summary-card"><div class="lbl">送信済み見積</div><div class="val"><span id="sum-sent">0</span></div><div class="sub">回答待ち案件</div></div>
          <div class="summary-card"><div class="lbl">受領済み注文</div><div class="val c-red"><span id="sum-received">0</span></div><div class="sub">未納品案件</div></div>
          <div class="summary-card"><div class="lbl">納品完了</div><div class="val c-green"><span id="sum-done">0</span></div><div class="sub">完了済み案件</div></div>
        </div>

        <div style="display:flex;gap:24px;border-bottom:2px solid var(--border-light);margin-bottom:16px;">
          <button id="subtab-order" onclick="switchSubTab('order')" style="padding:10px 4px;background:none;border:none;border-bottom:2px solid var(--primary);color:var(--primary);font-weight:600;cursor:pointer;">📦 注文書一覧</button>
          <button id="subtab-quote" onclick="switchSubTab('quote')" style="padding:10px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-sub);font-weight:500;cursor:pointer;">📄 見積書リスト</button>
        </div>

        <!-- 注文書一覧エリア -->
        <div id="area-order">
          <div class="filter-bar">
            <div class="search-box"><input type="text" id="search-input" placeholder="注文番号・顧客名・機種名で検索..." oninput="debounceSearch()"></div>
            <select id="filter-status" onchange="applyFilters()"><option value="">すべてのステータス</option><option value="作成予定">作成予定</option><option value="送信済み">送信済み</option><option value="受領">受領</option><option value="納品済み">納品済み</option></select>
            <select id="filter-order-type" onchange="applyFilters()"><option value="">すべての種別</option><option value="試作">試作</option><option value="量産">量産</option></select>
            <select id="filter-month" onchange="applyFilters()"><option value="">すべての月</option></select>
            <button class="btn btn-outline" onclick="clearFilters()">クリア</button>
            <button class="btn btn-outline" onclick="loadData()">🔄 更新</button>
          </div>
          <div class="table-wrap">
            <div class="table-toolbar"><h2>案件データ <span id="result-count" style="font-weight:normal;font-size:12px;color:var(--text-sub);margin-left:8px;"></span></h2></div>
            <div id="table-container"></div>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>

        <!-- 見積書リストエリア -->
        <div id="area-quote" style="display:none;">
          <div class="summary-grid" style="grid-template-columns: repeat(3, 1fr);">
            <div class="summary-card"><div class="lbl">総見積件数</div><div class="val"><span id="qs-total">0</span></div></div>
            <div class="summary-card"><div class="lbl">紐づけ済み</div><div class="val c-green"><span id="qs-linked">0</span></div></div>
            <div class="summary-card"><div class="lbl">総見積金額</div><div class="val c-blue">¥<span id="qs-amount">0</span></div></div>
          </div>
          <div class="filter-bar">
            <div class="search-box"><input type="text" id="qs-search" placeholder="見積No・件名で検索..." oninput="applyQuoteFilter()"></div>
            <select id="qs-filter-status" onchange="applyQuoteFilter()"><option value="">すべてのステータス</option><option value="送信済み">送信済み</option><option value="受領">受領</option></select>
            <select id="qs-filter-linked" onchange="applyQuoteFilter()"><option value="">すべての紐づけ</option><option value="linked">注文書あり</option><option value="unlinked">未受注</option></select>
            <button class="btn btn-outline" onclick="clearQuoteFilter()">クリア</button>
            <button class="btn btn-outline" onclick="loadQuoteList()">🔄 更新</button>
          </div>
          <div class="table-wrap">
            <div class="table-toolbar"><h2>見積書データ <span id="qs-count" style="font-weight:normal;font-size:12px;color:var(--text-sub);margin-left:8px;"></span></h2></div>
            <div id="quotelist-container"></div>
            <div class="pagination" id="qs-pagination"></div>
          </div>
        </div>
      </div>

      <!-- 2. 管理コンソールページ -->
      <div id="page-admin" class="page">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <div>
            <h2>⚙️ システム管理コンソール</h2>
            <p>権限管理・メール監視・メール配信・外部連携などシステム全体の設定を行います</p>
          </div>
          <button class="btn btn-outline" onclick="loadAdminSettings()" id="admin-reload-btn">📥 全設定を読み込む</button>
        </div>

        <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px;overflow-x:auto;">
          <button class="admin-tab active" onclick="switchAdminTab('basic')" id="atab-basic">🔧 基本設定</button>
          <button class="admin-tab" onclick="switchAdminTab('access')" id="atab-access">👁️ 閲覧権限</button>
          <button class="admin-tab" onclick="switchAdminTab('mailwatch')" id="atab-mailwatch">📧 メール監視</button>
          <button class="admin-tab" onclick="switchAdminTab('mailsend')" id="atab-mailsend">✉️ メール配信</button>
          <button class="admin-tab" onclick="switchAdminTab('rakuraku')" id="atab-rakuraku">🛒 楽楽販売連携</button>
          <button class="admin-tab" onclick="switchAdminTab('external')" id="atab-external">⚡ 外部連携</button>
          <button class="admin-tab" onclick="switchAdminTab('menu')" id="atab-menu">📱 メニュー設定</button>
        </div>

        <div id="admin-tab-basic" class="admin-tab-content" style="display:block;">
          <!-- 基本設定の内容（中略） -->
        </div>
        
        <div id="admin-tab-menu" class="admin-tab-content" style="display:none;">
          <!-- ここに JavaScript でメニュー編集 UI が生成されます -->
        </div>
        <!-- 他のタブ（access, mailwatch等）のコンテナもここに配置 -->
        <div id="admin-tab-access" class="admin-tab-content" style="display:none;"></div>
        <div id="admin-tab-mailwatch" class="admin-tab-content" style="display:none;"></div>
        <div id="admin-tab-mailsend" class="admin-tab-content" style="display:none;"></div>
        <div id="admin-tab-rakuraku" class="admin-tab-content" style="display:none;"></div>
        <div id="admin-tab-external" class="admin-tab-content" style="display:none;"></div>
      </div>

      <!-- その他のページコンテナ -->
      <div id="page-ledger" class="page"></div>
      <div id="page-matching" class="page"></div>
      <div id="page-calendar" class="page"></div>
      <div id="page-todo" class="page"></div>
      <div id="page-drivesearch" class="page"></div>
