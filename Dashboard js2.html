<script>
// ============================================================
// グローバル状態・初期化
// ============================================================
const S = {
  all:[], filtered:[], page:1, limit:30,
  docType:'quote', orderType:'', selectedFile:null,
  calYear: new Date().getFullYear(), calMonth: new Date().getMonth()+1,
  calEvents:[],
};
let searchTimer=null;

window.onload = () => {
  _populateMonthFilter();
  loadData();
  loadQuoteList();
  loadMatchingCandidates();
};

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
  var target = document.getElementById('page-'+name);
  if (!target) { console.warn('ページが見つかりません: page-'+name); return; }
  target.classList.add('active');
  
  document.querySelectorAll('.nav-tab').forEach(function(t) {
    var onclick = t.getAttribute('onclick') || '';
    if (onclick.indexOf("'" + name + "'") >= 0) t.classList.add('active');
  });

  if (name === 'list') {
    var ao = document.getElementById('area-order');
    var aq = document.getElementById('area-quote');
    if (ao) ao.style.display = '';
    if (aq) aq.style.display = 'none';
  }
  if (name==='parts') { if (typeof loadPartsData === 'function') loadPartsData(); }
  if (name==='ledger')   loadLedger();
  if (name==='todo')     loadTodos();
  if (name==='calendar') loadCalendar();
  if (name==='matching') loadMatchingCandidates();
  if (name==='quotesubmit') { if (_allQs.length === 0) loadQsData(); }
}

function showToast(msg,isError=false){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=(isError?'✗ ':'✓ ')+msg;
  t.style.background=isError?'var(--danger)':'#323232';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

// --- ▼ 検索用の文字列正規化関数 ▼ ---
function normalizeSearchText(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .toLowerCase() // 小文字に統一
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
      return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); // 全角英数字を半角に変換
    })
    .replace(/[\u3000]/g, ' '); // 全角スペースを半角スペースに統一
}

// ============================================================
// 案件データ（注文書一覧）
// ============================================================
function loadData() {
  const container = document.getElementById('table-container');
  if(!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>データ読み込み中...</div>';
  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.success) {
        container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ データ取得失敗: ' + (res ? res.error : '不明') + '</div>';
        return;
      }
      S.all = res.items || [];
      S.filtered = S.all.slice();
      S.page = 1;
      _updateSummary();
      _renderTable();
    })
    .withFailureHandler(err => {
      container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ 通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('getAll', null);
}

function switchSubTab(tab) {
  var isOrder   = tab === 'order';
  var areaOrder = document.getElementById('area-order');
  var areaQuote = document.getElementById('area-quote');
  var orderBtn  = document.getElementById('subtab-order');
  var quoteBtn  = document.getElementById('subtab-quote');

  if (!areaOrder || !areaQuote || !orderBtn || !quoteBtn) return;
  areaOrder.style.display = isOrder ? '' : 'none';
  areaQuote.style.display = isOrder ? 'none' : '';
  orderBtn.style.color        = isOrder ? 'var(--primary)'  : 'var(--text-sub)';
  orderBtn.style.borderBottom = isOrder ? '2px solid var(--primary)' : '2px solid transparent';
  orderBtn.style.fontWeight   = isOrder ? '600' : '500';
  quoteBtn.style.color        = isOrder ? 'var(--text-sub)'  : 'var(--primary)';
  quoteBtn.style.borderBottom = isOrder ? '2px solid transparent' : '2px solid var(--primary)';
  quoteBtn.style.fontWeight   = isOrder ? '500' : '600';

  if (!isOrder && _allQuotes.length === 0) loadQuoteList();
}

function _updateSummary() {
  const now = new Date();
  const ym  = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0');
  if(document.getElementById('sum-sent')) document.getElementById('sum-sent').textContent     = S.all.filter(r=>r.status==='送信済み').length;
  if(document.getElementById('sum-received')) document.getElementById('sum-received').textContent = S.all.filter(r=>r.status==='受領').length;
  if(document.getElementById('sum-done')) document.getElementById('sum-done').textContent     = S.all.filter(r=>r.status==='納品済み').length;
  const tot = S.all.filter(r=>String(r.orderDate).startsWith(ym)).reduce((s,r)=>s+(Number(r.orderAmount)||0), 0);
  if(document.getElementById('sum-amount')) document.getElementById('sum-amount').textContent = tot.toLocaleString();
}

function _renderTable() {
  const start = (S.page-1)*S.limit;
  const data  = S.filtered.slice(start, start+S.limit);
  const total = S.filtered.length;
  if(document.getElementById('result-count')) document.getElementById('result-count').textContent = total+'件中 '+(total>0?start+1:0)+'–'+Math.min(start+S.limit,total)+'件';

  if (total===0) {
    document.getElementById('table-container').innerHTML = '<div class="loading" style="color:var(--text-sub);">該当する案件がありません</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }

  const rows = data.map(r=>`
    <tr onclick="openDetail('${r.id}')">
      <td><span class="text-sub">${r.id||''}</span></td>
      <td><strong>${r.orderNo||r.quoteNo||'—'}</strong></td>
      <td>${r.orderSlipNo||'—'}</td>
      <td>${r.modelCode||'—'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.client||''}</td>
      <td>${_sBadge(r.status)}</td>
      <td>${r.orderType?_otBadge(r.orderType):''}</td>
      <td class="text-sub">${r.orderDate||r.quoteDate||''}</td>
      <td class="text-sub">${r.deliveryDate||''}</td>
      <td style="text-align:right;white-space:nowrap;">${r.orderAmount?Number(r.orderAmount).toLocaleString()+' 円':'—'}</td>
      <td>
        ${r.quotePdfUrl?`<a class="pdf-link" href="${r.quotePdfUrl}" target="_blank" onclick="event.stopPropagation()">見積</a> `:''}
        ${r.orderPdfUrl?`<a class="pdf-link" href="${r.orderPdfUrl}" target="_blank" onclick="event.stopPropagation()">発注</a>`:''}
        ${r.driveFolderUrl?`<br><a class="pdf-link" href="${r.driveFolderUrl}" target="_blank" onclick="event.stopPropagation()">📁</a>`:''}
      </td>
      <td style="text-align:center; white-space:nowrap;">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteMgmt('${r.id}', '${(r.orderNo||r.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button>
      </td>
    </tr>`).join('');

  document.getElementById('table-container').innerHTML = `
    <table>
      <thead><tr>
        <th>管理ID</th><th>発注書番号</th><th>発注伝票No</th><th>機種</th><th>顧客名</th>
        <th>ステータス</th><th>種別</th><th>発注日</th><th>納期</th><th>注文金額</th><th>PDF/フォルダ</th><th>操作</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  _renderPagination(total);
}

function _sBadge(s){const m={'作成予定':'planned','送信済み':'sent','受領':'received','納品済み':'done'};return`<span class="badge badge-${m[s]||'planned'}">${s||'—'}</span>`;}
function _otBadge(t){if(t==='試作')return'<span class="badge badge-trial">試作</span>';if(t==='量産')return'<span class="badge badge-mass">量産</span>';return'';}

function _renderPagination(total) {
  const pages=Math.ceil(total/S.limit);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let h='';
  for(let i=1;i<=Math.min(pages,10);i++)
    h+=`<button class="page-btn ${i===S.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML=h;
}
function goPage(n){S.page=n;_renderTable();}

function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,300);}

// --- ▼ 注文書一覧の検索機能 ▼ ---
function applyFilters() {
  const rawKw = document.getElementById('search-input').value;
  const kws   = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean);
  const st    = document.getElementById('filter-status').value;
  const ot    = document.getElementById('filter-order-type').value;
  const mo    = document.getElementById('filter-month').value;

  S.filtered = S.all.filter(r => {
    // 検索対象の項目
    const targetValues = [
      r.quoteNo, 
      r.orderNo, 
      r.orderSlipNo, 
      r.modelCode, 
      r.subject, 
      r.client, 
      r.orderAmount
    ];
    const searchableText = normalizeSearchText(targetValues.join(' '));
    const mk = kws.length === 0 || kws.every(kw => searchableText.includes(kw));

    const ms = !st || r.status === st;
    const mo2 = !ot || r.orderType === ot;
    const mm = !mo || (String(r.orderDate).startsWith(mo) || String(r.quoteDate).startsWith(mo));
    return mk && ms && mo2 && mm;
  });

  S.page = 1;
  _renderTable();
}

function clearFilters(){
  document.getElementById('search-input').value='';
  ['filter-status','filter-order-type','filter-month'].forEach(id=>document.getElementById(id).value='');
  S.filtered=S.all.slice();S.page=1;_renderTable();
}

function _populateMonthFilter(){
  const sel=document.getElementById('filter-month');
  if(!sel) return;
  const now=new Date();
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0');
    const o=document.createElement('option');o.value=ym;o.textContent=ym;sel.appendChild(o);
  }
}

function _findMgmtItem(mgmtId) {
  let item = S.all.find(r => r.id === mgmtId);
  if (item) return item;
  if(typeof _allQuotes !== 'undefined') item = _allQuotes.find(r => r.id === mgmtId);
  return item || null;
}

// ============================================================
// 📋 詳細モーダル表示 ＆ 紐づけ機能
// ============================================================
function openDetail(mgmtId) {
  let item = _findMgmtItem(mgmtId);
  if (!item) item = { id: mgmtId, client: 'データ取得中...', status: '' };
  
  document.getElementById('detail-title').textContent = '📋 ' + (item.orderNo || item.quoteNo || mgmtId);
  document.getElementById('detail-modal').classList.add('open');
  document.getElementById('detail-body').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  
  google.script.run
    .withSuccessHandler(res => {
      if (!res.success) { document.getElementById('detail-body').innerHTML = '<div style="color:var(--danger);padding:20px;">エラー: ' + res.error + '</div>'; return; }
      try {
        const dataItem = res.mgmt || item;
        document.getElementById('detail-body').innerHTML = _buildDetailHtml(dataItem, res);
        if (dataItem.orderNo) document.getElementById('detail-title').textContent = '📦 注文書 ' + dataItem.orderNo;
      } catch(e) { document.getElementById('detail-body').innerHTML = '<div style="color:var(--danger);padding:20px;">表示エラー: ' + e.message + '</div>'; }
    })
    .handleApiRequest('getDetail', { mgmtId });
}
function closeDetailModal(){document.getElementById('detail-modal').classList.remove('open');}

function _buildDetailHtml(item, detail) {
  const orderLinks = [
    item.orderPdfUrl ? `<a href="${item.orderPdfUrl}" target="_blank" class="pdf-link" style="display:inline-block; background:white; padding:2px 8px; border-radius:4px; border:1px solid var(--border); text-decoration:none; font-size:11px;">📄 発注書PDF</a>` : '',
    item.driveFolderUrl ? `<a href="${item.driveFolderUrl}" target="_blank" class="pdf-link" style="display:inline-block; background:white; padding:2px 8px; border-radius:4px; border:1px solid var(--border); text-decoration:none; font-size:11px;">📁 フォルダ</a>` : ''
  ].filter(Boolean).join(' ');

  const quoteLinks = item.quotePdfUrl ? `<a href="${item.quotePdfUrl}" target="_blank" class="pdf-link" style="display:inline-block; background:white; padding:2px 8px; border-radius:4px; border:1px solid var(--border); text-decoration:none; font-size:11px;">📄 見積書PDF</a>` : '';

  const rows=[
    ['管理ID', item.id],
    ['発注書番号', (item.orderNo || '—') + (orderLinks ? `<div style="margin-top:6px;">${orderLinks}</div>` : '')],
    ['見積書番号', (item.quoteNo || '—') + (quoteLinks ? `<div style="margin-top:6px;">${quoteLinks}</div>` : '')],
    ['発注伝票番号', item.orderSlipNo || '—'],
    ['機種コード', item.modelCode || '—'],
    ['顧客名', item.client || '—'],
    ['ステータス', _sBadge(item.status)],
    ['注文種別', item.orderType ? _otBadge(item.orderType) : '—'],
    ['発注日', item.orderDate || '—'],
    ['見積日', item.quoteDate || '—'],
    ['注文金額', item.orderAmount ? Number(item.orderAmount).toLocaleString() + ' 円' : '—'],
    ['合計金額', item.total ? Number(item.total).toLocaleString() + ' 円' : '—'],
    ['納期', item.deliveryDate || '—'],
    ['担当者', item.assignee || '—'],
    ['メモ', item.memo || '—'],
  ];

  const infoHtml='<table style="width:100%;font-size:13px;border-collapse:collapse;">'+
    rows.map(([k,v])=>`<tr><td style="padding:8px 10px;font-weight:600;width:30%;color:var(--text-sub);border-bottom:1px solid var(--border);background:var(--surface2);">${k}</td><td style="padding:8px 10px;border-bottom:1px solid var(--border);">${v}</td></tr>`).join('')+
    '</table>';

  const statusOpts=['作成予定','送信済み','受領','納品済み'].map(s=>`<option value="${s}"${s===item.status?' selected':''}>${s}</option>`).join('');

  // ★ 各明細行に表示する見積書リンクのHTML
  const quoteCellHtml = item.quoteNo 
    ? `<div style="line-height:1.4;">
         <span style="font-size:11px; color:var(--text3);">No.</span><a href="javascript:void(0)" onclick="event.stopPropagation(); openQuoteDetail('${item.id}', '${item.quoteNo}')" style="color:var(--primary); font-weight:600; text-decoration:none; font-size:12px;">${item.quoteNo}</a>
         ${item.quotePdfUrl ? `<br><a href="${item.quotePdfUrl}" target="_blank" onclick="event.stopPropagation()" style="font-size:11px; color:var(--info); text-decoration:none;">📄 PDFを開く</a>` : ''}
       </div>`
    : '<span style="font-size:11px; color:var(--text3);">未紐づけ</span>';

  // ★ 明細テーブルに「紐づく見積」の列を追加
  const oTable = detail.orderLines && detail.orderLines.length ? `
    <div class="detail-section"><h4>発注書 明細</h4>
    <table class="dtable" style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead>
        <tr>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">#</th>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">品名</th>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">仕様</th>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">納品先</th>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">数量</th>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">単価</th>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">金額</th>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">備考</th>
          <th style="background:#f8f9fa;padding:6px;border:1px solid var(--border);">紐づく見積</th>
        </tr>
      </thead>
      <tbody>${detail.orderLines.map(l=>`<tr class="${(l.remarks||'').includes('キャンセル')?'cancelled':''}">
        <td style="padding:6px;border:1px solid var(--border);text-align:center;">${l.lineNo}</td>
        <td style="padding:6px;border:1px solid var(--border);">${l.itemName||''}</td>
        <td style="padding:6px;border:1px solid var(--border);font-size:11px;color:var(--text-sub);">${l.spec||''}</td>
        <td style="padding:6px;border:1px solid var(--border);">${l.deliveryDest||''}</td>
        <td style="padding:6px;border:1px solid var(--border);text-align:right;">${l.qty||''}</td>
        <td style="padding:6px;border:1px solid var(--border);text-align:right;">${l.unitPrice?Number(l.unitPrice).toLocaleString():''}</td>
        <td style="padding:6px;border:1px solid var(--border);text-align:right;font-weight:600;">${l.amount?Number(l.amount).toLocaleString():''}</td>
        <td style="padding:6px;border:1px solid var(--border);">${l.remarks||''}</td>
        <td style="padding:6px;border:1px solid var(--border);vertical-align:middle;text-align:center;">${quoteCellHtml}</td>
      </tr>`).join('')}</tbody>
    </table></div>` : '';

  // =====================================
  // 🔗 手動＆AIマッチング候補の紐づけUI
  // =====================================
  let linkHtml = '';
  // 注文書番号があって、見積書番号がない（未紐づけ）場合のみ表示
  if (item.orderNo && !item.quoteNo) {
    let candHtml = '';
    if (typeof _allMatchingItems !== 'undefined') {
      const matchData = _allMatchingItems.find(m => String(m.orderMgmtId) === String(item.id) || String(m.orderNo) === String(item.orderNo));
      if (matchData && matchData.candidates && matchData.candidates.length > 0) {
        candHtml = `<div style="margin-top:12px;font-size:12px;color:var(--text2);">
          💡 <b>AIの推測候補:</b><br>
          <div style="display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;">` + 
          matchData.candidates.map(c => `
            <button class="btn btn-outline btn-sm" onclick="confirmLink('${item.id}','${c.quoteId}')" style="background:white; border-color:#fbbc04;">
              ${c.quoteNo || c.quoteId} (${c.score}点)
            </button>`).join('') +
          `</div></div>`;
      }
    }
    
    let quoteOpts = '';
    if (typeof _allQuotes !== 'undefined') {
      const unlinkedQuotes = _allQuotes.filter(q => !q.linked);
      quoteOpts = unlinkedQuotes.map(q => `<option value="${q.id}">${q.quoteNo || '見積Noなし'} （${q.client || '顧客不明'} : ¥${q.quoteAmount ? Number(q.quoteAmount).toLocaleString() : 0}）</option>`).join('');
    }

    linkHtml = `
    <div style="background:var(--info-bg);border:1px solid #b5d4f4;border-radius:8px;padding:16px;margin:20px 0;">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--info);">🔗 見積書との紐づけ</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="manual-link-quote-id" style="flex:1;padding:8px 10px;border-radius:4px;border:1px solid var(--border2);font-size:13px;background:white;outline:none;">
          <option value="">-- 既存の未紐づけ見積書から選択 --</option>
          ${quoteOpts}
        </select>
        <button class="btn btn-primary" onclick="_manualLinkQuote('${item.id}')">この見積書で確定</button>
      </div>
      ${candHtml}
    </div>
    `;
  }

  return `${infoHtml}
    ${linkHtml}
    <div style="display:flex;align-items:center;gap:8px;margin-top:20px;margin-bottom:16px;">
      <span style="font-size:12px;font-weight:600;color:var(--text-sub);">ステータス変更:</span>
      <select id="status-sel" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;">${statusOpts}</select>
      <button class="btn btn-primary btn-sm" onclick="updateStatus('${item.id}')">更新</button>
      <span style="margin:0 8px; color:var(--border);">|</span>
      <button class="btn btn-outline btn-sm" onclick="openEditModal('${item.id}')">✏️ 案件情報を直接編集</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMgmt('${item.id}','${(item.orderNo||item.quoteNo||'').replace(/'/g,'')}')" style="margin-left:auto;">🗑️ 削除</button>
    </div>${oTable}`;
}

function _manualLinkQuote(orderMgmtId) {
  const quoteMgmtId = document.getElementById('manual-link-quote-id').value;
  if(!quoteMgmtId) { showToast('プルダウンから見積書を選択してください', true); return; }
  confirmLink(orderMgmtId, quoteMgmtId);
}

function updateStatus(mgmtId){
  const ns=document.getElementById('status-sel').value;
  google.script.run
    .withSuccessHandler(res=>{
      if(res.success){
        showToast('ステータスを「'+ns+'」に変更しました');
        const it=S.all.find(r=>r.id===mgmtId);if(it)it.status=ns;
        S.filtered=S.filtered.map(r=>r.id===mgmtId?{...r,status:ns}:r);
        _renderTable();_updateSummary();closeDetailModal();
      }else showToast('更新失敗: '+res.error,true);
    })
    .handleApiRequest('updateStatus',{mgmtId,newStatus:ns});
}

// ============================================================
// ファイルアップロード (OCR)
// ============================================================
function openUploadModal(){
  S.selectedFile=null;S.orderType='';
  document.getElementById('upload-status').innerHTML='';
  document.getElementById('upload-btn').disabled=true;
  document.getElementById('file-input').value='';
  document.getElementById('order-type-section').style.display='none';
  document.getElementById('upload-modal').classList.add('open');
}
function closeUploadModal(){document.getElementById('upload-modal').classList.remove('open');}
function setDocType(t){
  S.docType=t;S.orderType='';
  document.getElementById('type-quote').classList.toggle('active',t==='quote');
  document.getElementById('type-order').classList.toggle('active',t==='order');
  document.getElementById('order-type-section').style.display=t==='order'?'block':'none';
  document.getElementById('ot-trial').className='order-type-btn';
  document.getElementById('ot-mass').className='order-type-btn';
}
function setOrderType(t){
  S.orderType=t;
  document.getElementById('ot-trial').className='order-type-btn'+(t==='試作'?' active-trial':'');
  document.getElementById('ot-mass').className='order-type-btn'+(t==='量産'?' active-mass':'');
}
function dragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('dragover');}
function dragLeave(e){document.getElementById('drop-zone').classList.remove('dragover');}
function dropFile(e){e.preventDefault();dragLeave(e);const f=e.dataTransfer.files[0];if(f)_setFile(f);}
function handleFileSelect(e){const f=e.target.files[0];if(f)_setFile(f);}
function _setFile(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){showToast('PDFのみ対応',true);return;}
  S.selectedFile=file;
  document.getElementById('upload-status').innerHTML=`<p style="color:var(--success);font-size:13px;">✓ ${file.name} (${(file.size/1024).toFixed(1)} KB)</p>`;
  document.getElementById('upload-btn').disabled=false;
}

function uploadFile(){
  if(!S.selectedFile)return;
  if(S.docType==='order'&&!S.orderType){showToast('注文種別を選択してください',true);return;}
  const btn=document.getElementById('upload-btn');
  btn.disabled=true;btn.textContent='解析中...';
  document.getElementById('upload-status').innerHTML='<div class="loading" style="padding:16px;"><div class="spinner"></div> Gemini OCR 解析中...</div>';
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result.split(',')[1];
    const action = S.docType==='order' ? 'uploadOrderWithLink' : 'uploadPdf';
    google.script.run
      .withSuccessHandler(res=>{
        btn.textContent='解析・登録';btn.disabled=false;
        if(res.success){
          if(S.docType==='order'){ _showOrderUploadResult(res); } 
          else {
            document.getElementById('upload-status').innerHTML=`
              <div style="background:#e6f4ea;border-radius:8px;padding:12px;font-size:13px;">
                <strong style="color:var(--success);">✓ 登録完了</strong><br>
                発行日: ${res.issueDate||'—'}<br>合計金額: ${res.totalAmount?Number(res.totalAmount).toLocaleString()+' 円':'—'}
              </div>`;
            showToast('登録完了しました');
          }
          loadData();
        }else{
          document.getElementById('upload-status').innerHTML=`<p style="color:var(--danger);font-size:13px;">✗ ${res.error}</p>`;
        }
      })
      .withFailureHandler(err=>{
        document.getElementById('upload-status').innerHTML=`<p style="color:var(--danger);font-size:13px;">✗ 通信エラー</p>`;
        btn.textContent='解析・登録';btn.disabled=false;
      })
      .handleApiRequest(action,{base64Data:b64,fileName:S.selectedFile.name,docType:S.docType,orderType:S.orderType});
  };
  reader.readAsDataURL(S.selectedFile);
}

function _showOrderUploadResult(res){
  const lr = res.linkResult || {};
  let candidateHtml = '';
  if((lr.status==='candidates_found'||lr.status==='forced_candidate') && lr.candidates && lr.candidates.length){
    const rows = lr.candidates.map(c=>{
      const color = c.score >= 80 ? '#34a853' : c.score >= 50 ? '#fbbc04' : '#ea4335';
      return `
      <tr style="border-bottom:1px solid var(--border);">
        <td style="padding:6px 8px;font-size:12px;">${c.quoteNo||'—'}</td>
        <td style="padding:6px 8px;font-size:12px;text-align:center;">
          <span style="background:${color};color:#fff;border-radius:4px;padding:2px 6px;font-size:11px;">${c.score}点</span>
        </td>
        <td style="padding:6px 8px;"><button onclick="confirmLink('${res.mgmtId}','${c.quoteMgmtId}')" class="btn btn-primary btn-sm">確定</button></td>
      </tr>`;
    }).join('');
    candidateHtml = `<div style="margin-top:10px;"><p style="font-size:11px;color:var(--text-sub);margin-bottom:4px;">🔗 マッチング候補:</p><table style="width:100%;border-collapse:collapse;"><tbody>${rows}</tbody></table></div>`;
  }
  document.getElementById('upload-status').innerHTML=`
    <div style="background:#e6f4ea;border-radius:8px;padding:12px;font-size:13px;">
      <strong style="color:var(--success);">✓ 注文書 登録完了</strong> ${lr.status==='auto_linked' ? '<span class="badge badge-done">自動紐付け済</span>' : ''}<br>
      件名: ${res.orderNo||'—'}<br>
      ${candidateHtml}
    </div>`;
  showToast('注文書を登録しました');
}

// --- ▼ 見積書一覧の検索機能 ▼ ---
function applyQuoteFilter() {
  const rawKw  = document.getElementById('qs-search').value;
  const kws    = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean); 
  const st     = document.getElementById('qs-filter-status').value;
  const linked = document.getElementById('qs-filter-linked').value;

  _filteredQuotes = _allQuotes.filter(r => {
    const targetValues = [
      r.quoteNo,      // 見積番号
      r.subject,      // 件名（ファイル名など）
      r.destCompany,  // 宛先
      r.destPerson,   // 担当者
      r.modelCode,    // 機種コード
      r.quoteAmount,  // 金額
      r.orderNo       // 紐づく注文番号
    ];
    const searchableText = normalizeSearchText(targetValues.join(' '));
    const mk = kws.length === 0 || kws.every(kw => searchableText.includes(kw));
    
    const ms = !st || r.status === st;
    const ml = !linked || (linked === 'linked' && r.linked) || (linked === 'unlinked' && !r.linked);
    
    return mk && ms && ml;
  });

  _filteredQuotes.sort((a, b) => String(b.issueDate||'').localeCompare(String(a.issueDate||'')));
  _quotePage = 1;
  _renderQuoteTable();
}

function clearQuoteFilter() {
  document.getElementById('qs-search').value = '';
  document.getElementById('qs-filter-status').value = '';
  document.getElementById('qs-filter-linked').value = '';
  _filteredQuotes = _allQuotes.slice();
  _quotePage = 1;
  _renderQuoteTable();
}

function _renderQuoteTable() {
  const start = (_quotePage - 1) * _quoteLimit;
  const data  = _filteredQuotes.slice(start, start + _quoteLimit);
  const total = _filteredQuotes.length;

  if(document.getElementById('qs-count')) document.getElementById('qs-count').textContent = total + '件中 ' + (total > 0 ? start + 1 : 0) + '–' + Math.min(start + _quoteLimit, total) + '件';

  if (total === 0) {
    document.getElementById('quotelist-container').innerHTML = '<div class="loading" style="color:var(--text-sub);">該当する見積書がありません</div>';
    document.getElementById('qs-pagination').innerHTML = '';
    return;
  }

  // ▼ テーブルの行(<tr>)の出力順を変更 ▼
  const rows = data.map(r => `
    <tr onclick="openQuoteDetail('${r.id}')" style="cursor:pointer;">
      <td><strong>${r.quoteNo || '—'}</strong></td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.subject || ''}">${r.subject || '—'}</td>
      <td style="font-size:12px;color:var(--text-sub);">${r.issueDate || '—'}</td>
      <td style="text-align:right;white-space:nowrap;">${r.quoteAmount ? Number(r.quoteAmount).toLocaleString() + ' 円' : '—'}</td>
      <td>${_sBadge(r.status)}</td>
      <td>
        ${r.linked ? '<span class="badge badge-linked">✓ 注文書あり</span>' : '<span style="font-size:11px;color:var(--text-sub);">未受注</span>'}
        ${r.orderNo ? '<br><span style="font-size:11px;color:var(--text-sub);">No.' + r.orderNo + '</span>' : ''}
      </td>
      <td>${r.quotePdfUrl ? '<a class="pdf-link" href="' + r.quotePdfUrl + '" target="_blank" onclick="event.stopPropagation()">📄 PDF</a>' : ''}</td>
      <td style="text-align:center; white-space:nowrap;">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteMgmt('${r.id}', '${(r.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button>
      </td>
    </tr>`).join('');

  // ▼ テーブルのヘッダー(<th>)の出力順を変更 ▼
  document.getElementById('quotelist-container').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>見積No.</th>
          <th>件名（ファイル名）</th>
          <th>発行日</th>
          <th>金額</th>
          <th>ステータス</th>
          <th>紐づけ状況</th>
          <th>PDF</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;

  const pages = Math.ceil(total / _quoteLimit);
  if (pages <= 1) { document.getElementById('qs-pagination').innerHTML = ''; return; }
  let pHtml = '';
  for (let i = 1; i <= Math.min(pages, 10); i++) pHtml += `<button class="page-btn ${i === _quotePage ? 'active' : ''}" onclick="goQuotePage(${i})">${i}</button>`;
  document.getElementById('qs-pagination').innerHTML = pHtml;
}

function goQuotePage(n) { _quotePage = n; _renderQuoteTable(); }

let _calendarInstance = null;

function loadCalendar() {
  const container = document.getElementById('cal-container');
  if(!container) return;
  if (_calendarInstance) { _calendarInstance.render(); return; }

  _calendarInstance = new FullCalendar.Calendar(container, {
    initialView: 'dayGridMonth',
    locale: 'ja',
    headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
    buttonText: { today: '今日', month: '月', list: '予定リスト' },
    height: 'auto',
    eventContent: function(arg) {
      const title = arg.event.title || '';
      const type = arg.event.extendedProps.type || '';
      let icon = '📌';
      if (title.includes('見積') || type === 'quote') icon = '📄';
      if (title.includes('注文') || type === 'order') icon = '📦';
      if (title.includes('納期') || type === 'delivery') icon = '🚚';
      if (title.includes('Todo') || type === 'todo') icon = '✅';
      return { html: `<div style="font-size:11px; white-space:normal; line-height:1.4; padding:3px 4px; overflow:hidden; cursor:pointer;" title="クリックして詳細を表示"><strong>${icon} ${title}</strong></div>` };
    },
    events: function(info, successCallback, failureCallback) {
      const midDate = new Date((info.start.getTime() + info.end.getTime()) / 2);
      google.script.run
        .withSuccessHandler(res => {
          if (!res.success) { failureCallback(res.error); return; }
          const fcEvents = (res.events || []).map(ev => {
            let bgColor = '#3498db'; 
            if (ev.type === 'delivery') bgColor = '#e74c3c';
            if (ev.type === 'quote')    bgColor = '#2ecc71';
            if (ev.type === 'todo')     bgColor = '#f39c12';
            return {
              title: ev.label,
              start: String(ev.date).replace(/\//g, '-'),
              backgroundColor: bgColor, borderColor: bgColor,
              extendedProps: { mgmtId: ev.mgmtId, todoId: ev.todoId, label: ev.label, type: ev.type }
            };
          });
          successCallback(fcEvents);
        })
        .handleApiRequest('getCalendar', { year: midDate.getFullYear(), month: midDate.getMonth() + 1 });
    },
    eventClick: function(info) { openCalEventDetail(info.event.extendedProps); }
  });
  _calendarInstance.render();
}

function openCalEventDetail(evProps) {
  if (!evProps) return;
  if (evProps.mgmtId) {
    const isQuote = (evProps.label && evProps.label.includes('見積')) || evProps.type === 'quote';
    if (isQuote) { openQuoteDetail(evProps.mgmtId, ''); } else { openDetail(evProps.mgmtId); }
  } else if (evProps.todoId) { openTodoModal(evProps.todoId); }
}

let _allLedger = [];
let _ledgerMachines = [];

function loadLedger() {
  const container = document.getElementById('ledger-tree-container');
  if(!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  google.script.run
    .withSuccessHandler(res => {
      if (!res.success) return;
      _allLedger = res.items || [];
      _ledgerMachines = [...new Set(_allLedger.map(r => (r.machineCode || '（機種未設定）').trim()))].sort();
      applyLedgerFilter();
    })
    .handleApiRequest('ledgerGetAll', null);
}

function applyLedgerFilter() {
  const kw = (document.getElementById('ledger-search')?.value || '').toLowerCase();
  let filtered = _allLedger.filter(r => {
    if (r.status === '__MACHINE_FOLDER__') return true;
    return !kw || [r.quoteNo, r.boardName, r.modelNo, r.subject, r.dest, r.machineCode, r.remarks].some(v => String(v||'').toLowerCase().includes(kw));
  });
  _renderLedgerTree(filtered);
}

function _renderLedgerTree(items) {
  const container = document.getElementById('ledger-tree-container');
  if(!container) return;
  const machineSet = {};
  items.forEach(r => {
    const m = (r.machineCode || '（機種未設定）').trim();
    if (!machineSet[m]) machineSet[m] = [];
    if (r.status !== '__MACHINE_FOLDER__') machineSet[m].push(r);
  });

  if (Object.keys(machineSet).length === 0) {
    container.innerHTML = '<div class="loading" style="color:var(--text-sub);">該当する見積がありません。</div>'; return;
  }

  let html = '';
  Object.keys(machineSet).sort().forEach(machine => {
    const machineItems = machineSet[machine];
    const machineId = 'machine-' + machine.replace(/[^a-zA-Z0-9]/g, '_');
    html += `
    <div style="background:var(--card);border-radius:8px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;">
      <div class="ledger-machine-hd" onclick="_toggleMachineSection('${machineId}')"
           style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;border-left:4px solid var(--primary);">
        <span style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:15px;" id="${machineId}-arrow">▼</span>
          <span style="font-weight:700;font-size:15px;letter-spacing:.03em;">📁 ${machine}</span>
          <span style="font-size:12px;color:var(--text-sub);">${machineItems.length}件</span>
        </span>
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();_openLedgerModalWithMachine('${machine}')" style="font-size:11px;padding:3px 8px;">＋ 見積登録</button>
      </div>
      <div id="${machineId}" style="display:block;">`;

    const boardGroups = {};
    machineItems.forEach(r => {
      const bKey = (r.boardName || '（基板未設定）').trim();
      if (!boardGroups[bKey]) boardGroups[bKey] = [];
      boardGroups[bKey].push(r);
    });

    if (Object.keys(boardGroups).length === 0) html += `<div style="padding:14px 20px;color:var(--text-sub);font-size:13px;">まだ見積がありません。</div>`;

    Object.keys(boardGroups).sort().forEach(board => {
      const boardItems = boardGroups[board];
      const boardId = machineId + '_' + board.replace(/[^a-zA-Z0-9]/g, '_');
      html += `
        <div style="border-top:1px solid var(--border);">
          <div class="ledger-board-hd" onclick="_toggleBoardSection('${boardId}')"
               style="display:flex;align-items:center;justify-content:space-between;padding:7px 16px 7px 28px;background:#f4f6f9;cursor:pointer;user-select:none;">
            <span style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:12px;" id="${boardId}-arrow">▼</span>
              <span style="font-size:13px;font-weight:600;">🔬 ${board}</span>
            </span>
          </div>
          <div id="${boardId}">
            <table style="width:100%;border-collapse:collapse;">
              <thead>
                <tr style="background:#f0f2f5;">
                  <th style="padding:5px 10px 5px 50px;">見積No.</th><th>件名</th><th>金額</th><th>操作</th>
                </tr>
              </thead>
              <tbody>`;
      boardItems.forEach(r => {
        const safeId = r.ledgerId.replace(/'/g, "\\'");
        html += `
                <tr style="border-bottom:1px solid #f0f0f0; cursor:pointer;" onclick="openLedgerModal('${safeId}')" onmouseenter="this.style.background='#f8f9fa'" onmouseleave="this.style.background=''">
                  <td style="padding:7px 10px 7px 50px;font-family:monospace;font-size:12px;color:var(--primary);">${r.quoteNo || '—'}</td>
                  <td style="padding:7px 8px;font-size:12px;">${r.subject || '—'}</td>
                  <td style="padding:7px 8px;font-size:12px;color:var(--danger);font-weight:600;">${r.amount ? '¥'+Number(r.amount).toLocaleString() : '—'}</td>
                  <td style="padding:7px 8px;">
                    <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); openLedgerModal('${safeId}')">✏️</button>
                    <button class="btn btn-danger btn-sm"  onclick="event.stopPropagation(); deleteLedger('${safeId}')" style="margin-left:2px;">🗑️</button>
                  </td>
                </tr>`;
      });
      html += `</tbody></table></div></div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function _toggleMachineSection(id) { const el = document.getElementById(id); const arr = document.getElementById(id+'-arrow'); if(el){ el.style.display = el.style.display==='none'?'block':'none'; if(arr) arr.textContent = el.style.display==='none'?'▶':'▼'; } }
function _toggleBoardSection(id) { const el = document.getElementById(id); const arr = document.getElementById(id+'-arrow'); if(el){ el.style.display = el.style.display==='none'?'block':'none'; if(arr) arr.textContent = el.style.display==='none'?'▶':'▼'; } }

function openLedgerModal(id) {
  const item = id ? _allLedger.find(r => r.ledgerId === id) : null;
  document.getElementById('ledger-modal-title').textContent = item ? '見積編集' : '見積登録';
  document.getElementById('ledger-id').value           = item ? item.ledgerId   : '';
  document.getElementById('ledger-machine-code').value = item ? (item.machineCode || '') : '';
  document.getElementById('ledger-board-name').value   = item ? (item.boardName  || '') : '';
  document.getElementById('ledger-quote-no').value     = item ? item.quoteNo     : '';
  document.getElementById('ledger-subject').value      = item ? item.subject     : '';
  document.getElementById('ledger-amount').value       = item ? (item.amount || '') : '';
  document.getElementById('ledger-modal').classList.add('open');
}

function _openLedgerModalWithMachine(machine) { openLedgerModal(null); document.getElementById('ledger-machine-code').value = machine; }
function closeLedgerModal() { document.getElementById('ledger-modal').classList.remove('open'); }

function saveLedger() {
  const payload = {
    ledgerId:    document.getElementById('ledger-id').value || null,
    machineCode: document.getElementById('ledger-machine-code').value.trim(),
    boardName:   document.getElementById('ledger-board-name').value.trim(),
    quoteNo:     document.getElementById('ledger-quote-no').value,
    subject:     document.getElementById('ledger-subject').value.trim(),
    amount:      document.getElementById('ledger-amount').value || '',
  };
  if (!payload.subject) { showToast('件名は必須です', true); return; }
  google.script.run
    .withSuccessHandler(res => { if (res.success) { showToast('保存しました'); closeLedgerModal(); loadLedger(); } else showToast('保存失敗', true); })
    .handleApiRequest('ledgerSave', payload);
}

function deleteLedger(id) {
  if (!confirm('削除しますか？')) return;
  google.script.run.withSuccessHandler(res => { if (res.success) { showToast('削除しました'); loadLedger(); } }).handleApiRequest('ledgerDelete', { ledgerId: id });
}

function openCreateMachineModal() { document.getElementById('create-machine-modal').classList.add('open'); }
function closeCreateMachineModal() { document.getElementById('create-machine-modal').classList.remove('open'); }
function saveCreateMachine() {
  const code = document.getElementById('create-machine-code').value.trim();
  if (!code) return;
  google.script.run.withSuccessHandler(res => { if(res.success){ closeCreateMachineModal(); loadLedger(); } }).handleApiRequest('ledgerCreateMachine', { machineCode: code });
}


// ============================================================
// 🤖 Gemini AI 紐づけ候補管理機能
// ============================================================
let _allMatchingItems = [];

function loadMatchingCandidates() {
  const container = document.getElementById('matching-container');
  if(!container) return;
  
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>AIが抽出した紐づけ候補を読み込み中...</div>';
    
  google.script.run
    .withSuccessHandler(res => {
      if (!res.success) { 
        container.innerHTML = '<div class="alert alert-danger" style="color:var(--danger);">エラー: ' + res.error + '</div>'; 
        return; 
      }
      _allMatchingItems = res.items || [];
      _renderMatchingCandidates(_allMatchingItems);
    })
    .withFailureHandler(err => { 
      container.innerHTML = '<div class="alert alert-danger" style="color:var(--danger);">通信エラー: ' + err.message + '</div>'; 
    })
    .handleApiRequest('getCandidates', null);
}

function runBatchMatching() {
  showToast('Gemini AIによる全件マッチングを開始しました...');
  document.getElementById('matching-container').innerHTML =
    '<div class="loading"><div class="spinner"></div><br>🤖 Gemini AIが未紐づけの注文書と見積書を解析中...<br><span style="font-size:12px;color:var(--text-sub)">※文脈・金額・表記揺れを比較しているため、数十秒〜数分かかります</span></div>';
    
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast('完了！ 自動確定: ' + (res.result.autoCount||0) + '件 / 要確認候補: ' + (res.result.candidateCount||0) + '件');
        loadMatchingCandidates();
        if (typeof loadData === 'function') loadData();
      } else {
        showToast('エラー: ' + res.error, true);
        loadMatchingCandidates();
      }
    })
    .withFailureHandler(err => {
      showToast('通信エラー: ' + err.message, true);
      loadMatchingCandidates();
    })
    .handleApiRequest('runMatching', {});
}

function _renderMatchingCandidates(items) {
  const container = document.getElementById('matching-container');
  if(!container) return;
  
  if (items.length === 0) {
    container.innerHTML =
      '<div style="text-align:center; padding:40px; background:var(--surface2); border-radius:8px;">' +
      '<strong style="color:var(--success); font-size:16px;">✓ 要確認の紐づけ候補はありません</strong><br>' +
      '<span style="font-size:13px; color:var(--text-sub); display:inline-block; margin-top:8px;">すべての注文書が自動紐づけされたか、未処理の案件がありません。</span></div>';
    return;
  }

  const scoreBar = (s) => {
    const w = Math.min(s, 100);
    const c = s >= 80 ? 'var(--success)' : s >= 50 ? '#fbbc04' : 'var(--danger)';
    return `
    <div style="display:flex;align-items:center;gap:6px;">
      <div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;min-width:100px;">
        <div style="width:${w}%;height:100%;background:${c};border-radius:4px;"></div>
      </div>
      <span style="font-size:14px;font-weight:700;color:${c};min-width:36px;text-align:right;">${s}点</span>
    </div>`;
  };

  const cards = items.map(item => {
    const candidates = item.candidates || [];

    const candRows = candidates.map(c => `
      <div style="display:flex;flex-direction:column;gap:6px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <div style="font-size:13px;font-weight:700;">📄 見積書No: ${c.quoteNo || c.quoteId || '—'}</div>
            <div style="font-size:12px;color:var(--text-sub);margin-top:2px;">宛先: ${c.client || '—'} | 金額: <strong>¥${c.amount ? Number(c.amount).toLocaleString() : '—'}</strong></div>
          </div>
          <div style="min-width:160px;">${scoreBar(c.score)}</div>
          <button class="btn btn-primary" onclick="confirmLink('${item.orderMgmtId}','${c.quoteId}')">この見積書で確定</button>
        </div>
        ${c.reason ? `
        <div style="font-size:12px;color:var(--info);background:var(--info-light, #e8f0fe);padding:8px 12px;border-radius:6px;border-left:3px solid var(--info);margin-top:4px;">
          <strong>🤖 AIの推測理由:</strong> ${c.reason}
        </div>` : ''}
      </div>`).join('');

    return `
      <div style="background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:24px;box-shadow:var(--shadow);overflow:hidden;">
        <div style="background:#fce8e6;padding:14px 20px;border-bottom:1px solid #f9d5d1;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
          <span class="badge" style="background:#c0392b;color:white;font-size:12px;padding:4px 10px;">📦 未紐づけ 注文書</span>
          <strong style="font-size:16px;color:#c0392b;">${item.orderNo || item.orderMgmtId}</strong>
          <span style="font-size:13px;color:var(--text-sub); border-left:1px solid #f9d5d1; padding-left:16px;">顧客: ${item.orderClient || '—'}</span>
          <span style="font-size:13px;color:var(--text-sub);">発注日: ${item.orderDate || '—'}</span>
          <span style="margin-left:auto;font-size:16px;font-weight:800;color:var(--danger);">¥${item.orderAmount ? Number(item.orderAmount).toLocaleString() : '—'}</span>
        </div>
        <div style="padding:16px 20px;">
          <div style="font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:12px;">↓ AIが見つけた見積書候補（スコア順）</div>
          ${candRows || '<div style="padding:10px; background:#fff8e1; color:#e65100; border:1px solid #f5d9b8; border-radius:6px; font-size:12px;">合致しそうな見積書候補が見つかりませんでした。新しく見積書を登録してください。</div>'}
        </div>
      </div>`;
  }).join('');

  container.innerHTML = `<div>${cards}</div>`;
}

// 確定ボタンを押したときの処理
function confirmLink(orderMgmtId, quoteMgmtId) {
  if (!confirm('この注文書と見積書の紐づけを確定しますか？\n（ステータスが受注済みに更新されます）')) return;
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast('✅ 紐づけが完了しました');
        loadMatchingCandidates();
        if (typeof loadData === 'function') loadData(); // メインの案件一覧も更新
      } else {
        showToast('失敗: ' + res.error, true);
      }
    })
    .handleApiRequest('confirmOrderLink', { orderMgmtId, quoteMgmtId });
}
