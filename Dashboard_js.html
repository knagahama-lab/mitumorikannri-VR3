<script>
// ============================================================
// Dashboard js — メインJS（進化版）
// ・インライン直接編集機能（Excelライク）
// ・明細/単価からの高度な検索機能
// ・見積台帳・AI紐づけメインロジック
// ============================================================

// ──────────────────────────────────────────
// メニュー定義・初期化
// ──────────────────────────────────────────
const DEFAULT_MENU = [
  { id:'list',        icon:'📋', label:'案件一覧',      section:'営業・進行管理', visible:true },
  { id:'ledger',      icon:'📝', label:'見積台帳',      section:'営業・進行管理', visible:true },
  { id:'matching',    icon:'🔗', label:'AI紐づけ',      section:'営業・進行管理', visible:true },
  { id:'aichat',      icon:'🤖', label:'AIチャット',    section:'ツール',         visible:true },
  { id:'calendar',    icon:'📅', label:'スケジュール',  section:'営業・進行管理', visible:true },
  { id:'ocr',         icon:'🔍', label:'簡易OCR',       section:'ツール',         visible:true },
  { id:'todo',        icon:'✅', label:'ToDo',          section:'ツール',         visible:true },
  { id:'drivesearch', icon:'💾', label:'全文検索',      section:'ツール',         visible:true },
  { id:'admin',       icon:'⚙️', label:'各種設定',      section:'設定',           visible:true, adminOnly:true }
];

const IS_ADMIN = (function(){ try{ return window.APP_IS_ADMIN === true || window.APP_IS_ADMIN === 'true'; }catch(e){return false;} })();

const PAGE_TITLES = { list:'案件一覧', ledger:'見積台帳', matching:'AI紐づけ', calendar:'スケジュール', ocr:'簡易OCR', todo:'ToDo', drivesearch:'全文検索', admin:'各種設定', aichat:'AIチャット' };

const S = { all:[], filtered:[], page:1, limit:30, docType:'quote', orderType:'', selectedFile:null };
let searchTimer = null;
let _allQuotes = []; let _filteredQuotes = []; let _quotePage = 1; const _quoteLimit = 30;
let _allMatchingItems = []; let _allLedgerItems = []; let _filteredLedgerItems = []; let _adminLoaded = false;

window.addEventListener('load', () => {
  renderSidebar(); showPage('list'); _populateMonthFilter();
  loadData(); loadQuoteList(); loadMatchingCandidates(); loadOcrUsage();
});

function renderSidebar(){
  const container = document.getElementById('sidebar-nav-container'); if(!container) return;
  const sections = {};
  DEFAULT_MENU.forEach(item => {
    if(!item.visible) return; if(item.adminOnly && !IS_ADMIN) return;
    if(!sections[item.section]) sections[item.section] = [];
    sections[item.section].push(item);
  });
  let html = '';
  Object.keys(sections).forEach(section => {
    html += `<div class="sidebar-section-label">${section}</div>`;
    sections[section].forEach(item => {
      html += `<div class="nav-item" data-id="${item.id}" onclick="showPage('${item.id}')"><span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></div>`;
    });
  });
  container.innerHTML = html;
}

function showPage(name){
  document.querySelectorAll('.nav-item[data-id]').forEach(t => t.classList.toggle('active', t.dataset.id === name));
  const titleEl = document.getElementById('topbar-page-title'); if(titleEl) titleEl.textContent = PAGE_TITLES[name] || name;
  const contentEl = document.getElementById('content'); if(contentEl) contentEl.scrollTop = 0;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + name); if(target) target.classList.add('active');
  if(name === 'list'){ document.getElementById('area-order').style.display = ''; document.getElementById('area-quote').style.display = 'none'; }
  if(name === 'ledger') loadLedger(); if(name === 'calendar') loadCalendar(); if(name === 'matching') loadMatchingCandidates(); if(name === 'drivesearch') initDriveSearchPage(); if(name === 'admin') _onShowAdmin();
}
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('collapsed'); }
function showToast(msg, isError = false){
  const t = document.getElementById('toast'); if(!t) return;
  t.textContent = (isError ? '✗ ' : '✓ ') + msg; t.style.background = isError ? '#dc2626' : '#1e293b'; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500);
}

const STATUS_MAP = {
  '作成予定': { cls:'planned', label:'作成予定' }, '作成中': { cls:'sent', label:'作成中' }, '送信済み': { cls:'sent', label:'送信済み' },
  '受領': { cls:'received',label:'受領' }, '受注済み': { cls:'received',label:'受注済み' }, '納品済み': { cls:'done', label:'納品済み' }, 'キャンセル':{ cls:'planned',label:'キャンセル' }
};
function _sBadge(s){ const m = STATUS_MAP[s] || { cls:'planned', label: s || '—' }; return `<span class="badge badge-${m.cls}">${m.label}</span>`; }
function _otBadge(t){ if(t === '試作') return '<span class="badge badge-trial">試作</span>'; if(t === '量産') return '<span class="badge badge-mass">量産</span>'; return ''; }

function _statusSelectHtml(mgmtId, currentStatus){
  const sList = ['作成予定','作成中','送信済み','受領','受注済み','納品済み','キャンセル'];
  const stClass = { '作成予定':'st-planned','作成中':'st-sent','送信済み':'st-sent','受領':'st-received','受注済み':'st-received','納品済み':'st-done','キャンセル':'st-planned' };
  const cls = stClass[currentStatus] || 'st-planned';
  const opts = sList.map(s => `<option value="${s}"${s === currentStatus ? ' selected' : ''}>${s}</option>`).join('');
  return `<select class="status-select-inline ${cls}" onchange="changeStatusInline('${mgmtId}', this)" onclick="event.stopPropagation()">${opts}</select>`;
}

function changeStatusInline(mgmtId, selectEl){
  const newStatus = selectEl.value;
  const stClass = { '作成予定':'st-planned','作成中':'st-sent','送信済み':'st-sent','受領':'st-received','受注済み':'st-received','納品済み':'st-done','キャンセル':'st-planned' };
  selectEl.className = 'status-select-inline ' + (stClass[newStatus] || 'st-planned');
  google.script.run.withSuccessHandler(res => {
    if(res.success){ showToast('ステータスを変更しました'); const it = S.all.find(r => r.id === mgmtId); if(it) it.status = newStatus; const iq = _allQuotes.find(r => r.id === mgmtId); if(iq) iq.status = newStatus; _updateSummary(); }
    else { showToast('更新失敗: ' + (res.error || ''), true); selectEl.value = (S.all.find(r => r.id === mgmtId) || {}).status || ''; }
  }).handleApiRequest('updateStatus', { mgmtId, newStatus });
}

// ★ インライン直接編集
function startInlineEdit(e, id, field, val) {
  e.stopPropagation(); if (id.startsWith('LEDGER_')) return;
  const td = e.currentTarget; if (td.querySelector('input')) return;
  const input = document.createElement('input');
  input.type = field.includes('Amount') ? 'number' : 'text';
  input.className = 'inline-edit-input';
  input.value = val === '—' ? '' : val;
  input.onblur = () => saveInlineEdit(td, id, field, input.value, val);
  input.onkeydown = (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); } if (ev.key === 'Escape') { td.innerHTML = val || '—'; } };
  td.innerHTML = ''; td.appendChild(input); input.focus(); input.select();
}

function saveInlineEdit(td, id, field, newVal, oldVal) {
  if (newVal === oldVal) { td.innerHTML = (field.includes('Amount') && newVal) ? Number(newVal).toLocaleString() + ' 円' : (newVal || '—'); return; }
  td.innerHTML = `<span style="color:#94a3b8; font-size:11px;">🔄...</span>`;
  const payload = { mgmtId: id };
  payload[field] = field.includes('Amount') ? (newVal ? Number(newVal) : null) : newVal;
  google.script.run.withSuccessHandler(res => {
      if(res.success){ showToast('✅ 更新しました'); let item = S.all.find(r => r.id === id); if (item) item[field] = payload[field]; let qItem = _allQuotes.find(r => r.id === id); if (qItem) qItem[field] = payload[field];
        let displayVal = newVal || '—'; if (field.includes('Amount') && newVal) displayVal = Number(newVal).toLocaleString() + ' 円'; if (field === 'quoteNo' || field === 'orderNo') displayVal = `<strong>${displayVal}</strong>`;
        td.innerHTML = displayVal; if (field.includes('Amount')) _updateSummary();
      } else { showToast('❌ 更新失敗: ' + res.error, true); td.innerHTML = oldVal || '—'; }
    }).withFailureHandler(err => { showToast('❌ 通信エラー', true); td.innerHTML = oldVal || '—'; }).handleApiRequest('updateMgmt', payload);
}

// ──────────────────────────────────────────
// 案件データ（検索強化版）
// ──────────────────────────────────────────
function normalizeSearchText(str){
  if(str == null) return '';
  return String(str).toLowerCase().replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[\u3000]/g, ' ');
}

function loadData(){
  const container = document.getElementById('table-container'); if(!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>データ読み込み中...</div>';
  google.script.run.withSuccessHandler(res => {
    if(!res || !res.success){ container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ 取得失敗</div>'; return; }
    S.all = res.items || []; S.filtered = S.all.slice(); S.page = 1; _updateSummary(); _renderTable();
  }).handleApiRequest('getAll', null);
}

function _updateSummary(){
  const now = new Date(); const ym = now.getFullYear() + '/' + String(now.getMonth() + 1).padStart(2, '0');
  const sumSent = document.getElementById('sum-sent'); const sumRec = document.getElementById('sum-received'); const sumDone = document.getElementById('sum-done'); const sumAmt = document.getElementById('sum-amount');
  if(sumSent) sumSent.textContent = S.all.filter(r => r.status === '送信済み').length;
  if(sumRec)  sumRec.textContent  = S.all.filter(r => r.status === '受領' || r.status === '受注済み').length;
  if(sumDone) sumDone.textContent = S.all.filter(r => r.status === '納品済み').length;
  if(sumAmt) sumAmt.textContent = S.all.filter(r => String(r.orderDate || '').startsWith(ym)).reduce((s, r) => s + (Number(r.orderAmount) || 0), 0).toLocaleString();
}

function _renderTable(){
  const start = (S.page - 1) * S.limit; const data = S.filtered.slice(start, start + S.limit); const total = S.filtered.length;
  const rcEl = document.getElementById('result-count'); if(rcEl) rcEl.textContent = total + '件中 ' + (total > 0 ? start + 1 : 0) + '–' + Math.min(start + S.limit, total) + '件';
  if(total === 0){ document.getElementById('table-container').innerHTML = '<div class="loading">該当なし</div>'; return; }
  const rows = data.map(r => {
    const linkBtn = (r.linked || r.quoteNo) ? `<button class="btn btn-sm btn-success" onclick="event.stopPropagation();openOrderLinkModal('${r.id}')">✅ ${r.quoteNo}</button>` : `<button class="btn btn-sm" onclick="event.stopPropagation();openOrderLinkModal('${r.id}')">🔗 紐づける</button>`;
    const slipNo = r.deliverySlipNo || r.orderSlipNo || '';
    return `<tr onclick="openDetail('${r.id}')">
      <td><span style="font-size:10px;">${r.id}</span></td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'orderNo', '${r.orderNo||r.quoteNo||''}')"><strong>${r.orderNo || r.quoteNo || '—'}</strong></td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'deliverySlipNo', '${slipNo}')">${slipNo || '—'}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'modelCode', '${r.modelCode||''}')">${r.modelCode || '—'}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'client', '${r.client||''}')">${r.client || ''}</td>
      <td onclick="event.stopPropagation();">${_statusSelectHtml(r.id, r.status)}</td>
      <td>${r.orderType ? _otBadge(r.orderType) : ''}</td>
      <td style="font-size:11px;">${r.orderDate || r.quoteDate || ''}</td>
      <td style="font-size:11px;">${r.deliveryDate || ''}</td>
      <td class="editable-cell" onclick="startInlineEdit(event, '${r.id}', 'orderAmount', '${r.orderAmount||''}')" style="text-align:right;">${r.orderAmount ? Number(r.orderAmount).toLocaleString() : '—'}</td>
      <td>${r.quotePdfUrl ? `<a href="${r.quotePdfUrl}" target="_blank" onclick="event.stopPropagation()">📄</a>` : ''}</td>
      <td onclick="event.stopPropagation();">${linkBtn}</td>
      <td onclick="event.stopPropagation();"><button class="btn btn-danger btn-sm" onclick="deleteMgmt('${r.id}')">🗑️</button></td>
    </tr>`;
  }).join('');
  document.getElementById('table-container').innerHTML = `<div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>番号</th><th>納品No</th><th>機種</th><th>顧客</th><th>ステータス</th><th>種別</th><th>発注日</th><th>納期</th><th>金額</th><th>PDF</th><th>紐づけ</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  _renderPagination(total);
}

function debounceSearch(){ clearTimeout(searchTimer); searchTimer = setTimeout(applyFilters, 300); }

// ★ 新機能：明細（項目・単価）も検索対象に含める
function applyFilters(){
  const rawKw = document.getElementById('search-input').value;
  const kws   = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean);
  const st    = document.getElementById('filter-status').value;
  const ot    = document.getElementById('filter-order-type').value;
  S.filtered  = S.all.filter(r => {
    let detailText = '';
    if (r.lines) detailText += JSON.stringify(r.lines);
    if (r.lineItems) detailText += JSON.stringify(r.lineItems);
    if (r.detailText) detailText += r.detailText;
    const txt = normalizeSearchText([r.quoteNo, r.orderNo, r.orderSlipNo, r.deliverySlipNo, r.modelCode, r.subject, r.client, r.orderAmount, detailText].join(' '));
    const mk  = kws.length === 0 || kws.every(kw => txt.includes(kw));
    const ms  = !st || r.status === st;
    const mo2 = !ot || r.orderType === ot;
    return mk && ms && mo2;
  });
  S.page = 1; _renderTable();
}

function applyQuoteFilter(){
  const rawKw  = document.getElementById('qs-search').value;
  const kws    = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean);
  const st     = document.getElementById('qs-filter-status').value;
  _filteredQuotes = _allQuotes.filter(r => {
    let detailText = '';
    if (r.lines) detailText += JSON.stringify(r.lines);
    if (r.lineItems) detailText += JSON.stringify(r.lineItems);
    if (r.detailText) detailText += r.detailText;
    const txt = normalizeSearchText([r.quoteNo, r.subject, r.destCompany, r.client, r.modelCode, r.quoteAmount, r.orderNo, detailText].join(' '));
    const mk  = kws.length === 0 || kws.every(kw => txt.includes(kw));
    const ms  = !st || r.status === st;
    return mk && ms;
  });
  _quotePage = 1; _renderQuoteTable();
}

// ──────────────────────────────────────────
// 見積台帳
// ──────────────────────────────────────────
function loadLedger(){
  google.script.run.withSuccessHandler(res => { if(!res.success) return; _allLedgerItems = res.items || []; applyLedgerFilter(); }).handleApiRequest('ledgerGetAll', {});
}

function applyLedgerFilter() {
  const searchEl = document.getElementById('ledger-search'); const kw = searchEl ? normalizeSearchText(searchEl.value) : '';
  let filtered = _allLedgerItems.filter(r => {
    if (r.status === '__MACHINE_FOLDER__' && _currentLedgerTab === 'flat') return false; 
    if (r.status === '__MACHINE_FOLDER__' && _currentLedgerTab === 'tree') return true;
    const txt = normalizeSearchText([r.quoteNo, r.subject, r.dest, r.machineCode, r.modelCode, r.boardName, r.modelNo].join(' '));
    return !kw || txt.includes(kw);
  });
  if (_currentLedgerTab === 'tree') { _renderLedgerTree(filtered); } else { _renderLedgerFlat(filtered); }
}

function switchLedgerTab(tab) { _currentLedgerTab = tab; document.getElementById('ledger-tree-container').style.display = tab === 'tree' ? '' : 'none'; document.getElementById('ledger-flat-container').style.display = tab === 'tree' ? 'none' : ''; applyLedgerFilter(); }

// ──────────────────────────────────────────
// その他共通ロジック（以下略 - 必要に応じて以前のものを保持）
// ──────────────────────────────────────────
function _populateMonthFilter(){ /* 省略 */ }
function _renderPagination(t){ /* 省略 */ }
function loadQuoteList(){ /* 見積書一覧取得 */ }
function loadMatchingCandidates(){ /* AI候補取得 */ }
function loadOcrUsage(){ /* OCR使用状況取得 */ }
</script>
