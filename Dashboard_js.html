<script>
// ============================================================
// メニュー定義・初期化
// ============================================================
const DEFAULT_MENU = [
  { id:'list',       icon:'📋', label:'案件一覧',         section:'営業・進行管理', visible:true },
  { id:'ledger',     icon:'📝', label:'見積台帳',         section:'営業・進行管理', visible:true },
  { id:'matching',   icon:'🔗', label:'AI紐づけ',         section:'営業・進行管理', visible:true },
  { id:'calendar',   icon:'📅', label:'スケジュール',     section:'営業・進行管理', visible:true },
  { id:'ocr',        icon:'🔍', label:'簡易OCR',          section:'営業・進行管理', visible:true },
  { id:'todo',       icon:'✅', label:'ToDo',             section:'ツール',         visible:true },
  { id:'drivesearch',icon:'💾', label:'全文検索',         section:'ツール',         visible:true },
  { id:'admin',      icon:'⚙️', label:'各種設定',         section:'設定',           visible:true, adminOnly:true },
  { id:'bom_ext',    icon:'🏭', label:'BOM・原価管理',    section:'設定',           visible:true, adminOnly:true, external:'https://script.google.com/a/sun-denshi.co.jp/macros/s/AKfycbxk-6hM0VDR-iWToBvOhuaEd6pZcZTXW53tXZUzHl7AucIWvRgt-S_gTpFd1foRSf5Ung/exec?page=bom' }
];

const IS_ADMIN = (function(){
  try{ const val = "<? if (isAdmin) { ?>true<? } else { ?>false<? } ?>"; return val === 'true'; }catch(e){return false;}
})();

const PAGE_TITLES = {
  list:'案件一覧', ledger:'見積台帳', matching:'AI紐づけ', calendar:'スケジュール',
  ocr:'簡易OCR', todo:'ToDo', drivesearch:'全文検索', admin:'各種設定'
};

const S = window.S = {
  all:[], filtered:[], page:1, limit:30,
  docType:'quote', orderType:'', selectedFile:null,
  calYear: new Date().getFullYear(), calMonth: new Date().getMonth()+1, calEvents:[],
};
let searchTimer=null;
let _allQuotes = window._allQuotes = [];
let _allMatchingItems = window._allMatchingItems = [];

// ★ ノーコード管理・完全動的権限制御用
let _userRole = window._userRole = 'ゲスト';
let _masterSettings = window._masterSettings = {};

window.addEventListener('load', () => {
  renderSidebar();
  showPage('list');
  _populateMonthFilter();
  
  // マスタ設定とユーザー権限を取得してから各種データを読み込む
  _fetchSystemConfig(() => {
    loadData();
    loadQuoteList();
    loadMatchingCandidates();
    loadOcrUsage();
  });
});

/**
 * 起動時に設定マスタとユーザーロールを取得し格納する
 */
function _fetchSystemConfig(callback) {
  // 並列で2つのAPIを呼ぶ簡易Promiseラッパー
  const p1 = new Promise(resolve => {
    google.script.run
      .withSuccessHandler(res => { if(res.success) _masterSettings = res.data; resolve(); })
      .withFailureHandler(() => resolve())
      .handleApiRequest('getMasterSettings');
  });
  const p2 = new Promise(resolve => {
    google.script.run
      .withSuccessHandler(res => { if(res.success) _userRole = res.role; resolve(); })
      .withFailureHandler(() => resolve())
      .handleApiRequest('getUserRole');
  });
  
  Promise.all([p1, p2]).then(() => {
    _buildDynamicDropdowns();
    if(callback) callback();
  });
}

/**
 * 設定マスタに基づいて各種プルダウンを動的に生成する
 */
function _buildDynamicDropdowns() {
  if (!_masterSettings) return;
  // 案件ステータスのプルダウン要素一覧をマスタから上書き
  const sList = _masterSettings['案件ステータス'] || [];
  if (sList.length > 0) {
    const opts = sList.map(s => `<option value="${s.value}">${s.value}</option>`);
    const fSel = document.getElementById('filter-status');
    if(fSel) fSel.innerHTML = '<option value="">(全て)</option>' + opts.join('');
    // 詳細モーダルのステータス選択なども後で動的生成時にこのリストを使う
  }
}

/**
 * 取得したロール（_userRole）とカラム権限マスタを突き合わせ、
 * 表示NGなら該当DOMを非表示、編集NGならdisabledにする完全コントロール関数
 */
function _applyPermissions() {
  if (!_masterSettings || !_masterSettings['カラム権限']) return;
  const colSettings = _masterSettings['カラム権限'];
  
  colSettings.forEach(setting => {
    const colName = setting.value; // 例: "見積金額"
    const canView = setting.permissions.view[_userRole] !== false;
    const canEdit = setting.permissions.edit[_userRole] !== false;
    
    // 表示権限がない列（テーブルヘッダ、セル）はCSSで非表示化
    if (!canView) {
      document.querySelectorAll(`[data-col="${colName}"]`).forEach(el => {
        el.style.display = 'none';
      });
    }
    
    // 編集権限がない項目は disabled 属性を付与
    if (!canEdit) {
      document.querySelectorAll(`[data-edit-col="${colName}"]`).forEach(el => {
        if (el.tagName === 'INPUT' || el.tagName === 'SELECT' || el.tagName === 'TEXTAREA' || el.tagName === 'BUTTON') {
          el.disabled = true;
          el.style.backgroundColor = '#f1f5f9';
          el.style.color = '#94a3b8';
          el.title = '現在の権限(' + _userRole + ')では編集できません';
        }
      });
    }
  });
}

// ★ OCR残り件数表示
function loadOcrUsage() {
  google.script.run
    .withSuccessHandler(function(info) {
      const el = document.getElementById('ocr-usage-badge');
      if (!el || !info) return;
      const pct = Math.round((info.used / info.limit) * 100);
      const color = pct >= 80 ? '#dc2626' : pct >= 60 ? '#f59e0b' : '#16a34a';
      el.innerHTML = `
        <span title="本日のOCR使用状況 (モデル: ${info.model})" style="
          display:inline-flex; align-items:center; gap:4px;
          background:${color}18; color:${color};
          border:1px solid ${color}40; border-radius:9999px;
          padding:2px 10px; font-size:11px; font-weight:600; cursor:default;
        ">
          🧠 OCR残り: ${info.remaining.toLocaleString()} / ${info.limit.toLocaleString()}件
          <span style="background:${color};color:#fff;border-radius:9999px;padding:1px 5px;font-size:10px;">${pct}%使用</span>
        </span>`;
    })
    .handleApiRequest('getOcrUsage', null);
}

function renderSidebar(){
  const container = document.getElementById('sidebar-nav-container');
  if(!container) return;
  const sections = {};
  DEFAULT_MENU.forEach(item=>{
    if(!item.visible) return;
    if(item.adminOnly && !IS_ADMIN) return;
    if(!sections[item.section]) sections[item.section]=[];
    sections[item.section].push(item);
  });

  let html='';
  Object.keys(sections).forEach(section=>{
    html += `<div class="sidebar-section-label">${section}</div>`;
    sections[section].forEach(item=>{
      if(item.external){
        html += `<a class="nav-item nav-item-ext" href="${item.external}" target="_blank">
          <span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></a>`;
      } else {
        html += `<div class="nav-item" data-id="${item.id}" onclick="showPage('${item.id}')">
          <span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></div>`;
      }
    });
  });
  container.innerHTML = html;
}

function showPage(name){
  document.querySelectorAll('.nav-item[data-id]').forEach(t=>{ t.classList.toggle('active', t.dataset.id===name); });
  const titleEl = document.getElementById('topbar-page-title');
  if(titleEl) titleEl.textContent = PAGE_TITLES[name] || name;
  const contentEl = document.getElementById('content');
  if(contentEl) contentEl.scrollTop=0;

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const target = document.getElementById('page-'+name);
  if(target) target.classList.add('active');

  if(name==='list'){
    const ao=document.getElementById('area-order'); const aq=document.getElementById('area-quote');
    if(ao) ao.style.display=''; if(aq) aq.style.display='none';
  }
  
  if(name==='ledger'  && typeof loadLedger==='function')    loadLedger();
  if(name==='todo'    && typeof loadTodos==='function')      loadTodos();
  if(name==='calendar'&& typeof loadCalendar==='function')  loadCalendar();
  if(name==='matching'&& typeof loadMatchingCandidates==='function') loadMatchingCandidates();
  if(name==='admin')   _onShowAdmin();
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('collapsed'); }
function showToast(msg, isError=false){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=(isError?'✗ ':'✓ ')+msg;
  t.style.background=isError?'#dc2626':'#1e293b';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

// ============================================================
// 案件データ（注文書一覧）
// ============================================================
function normalizeSearchText(str) {
  if (str === null || str === undefined) return '';
  return String(str).toLowerCase().replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); }).replace(/[\u3000]/g, ' ');
}

function loadData() {
  const container = document.getElementById('table-container');
  if(!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>データ読み込み中...</div>';
  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.success) { container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ データ取得失敗: ' + (res ? res.error : '不明') + '</div>'; return; }
      S.all = res.items || []; S.filtered = S.all.slice(); S.page = 1;
      _updateSummary(); _renderTable();
    })
    .withFailureHandler(err => { container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ 通信エラー: ' + err.message + '</div>'; })
    .handleApiRequest('getAll', null);
}

function switchSubTab(tab) {
  var isOrder   = tab === 'order';
  var areaOrder = document.getElementById('area-order');
  var areaQuote = document.getElementById('area-quote');
  var orderBtn  = document.getElementById('subtab-order');
  var quoteBtn  = document.getElementById('subtab-quote');
  if (!areaOrder || !areaQuote || !orderBtn || !quoteBtn) return;
  areaOrder.style.display = isOrder ? '' : 'none';
  areaQuote.style.display = isOrder ? 'none' : '';
  orderBtn.style.color        = isOrder ? 'var(--primary)'  : 'var(--text-sub)';
  orderBtn.style.borderBottom = isOrder ? '2px solid var(--primary)' : '2px solid transparent';
  orderBtn.style.fontWeight   = isOrder ? '600' : '500';
  quoteBtn.style.color        = isOrder ? 'var(--text-sub)'  : 'var(--primary)';
  quoteBtn.style.borderBottom = isOrder ? '2px solid transparent' : '2px solid var(--primary)';
  quoteBtn.style.fontWeight   = isOrder ? '500' : '600';
  if (!isOrder && _allQuotes.length === 0) loadQuoteList();
}

function _updateSummary() {
  const now = new Date(); const ym = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0');
  if(document.getElementById('sum-sent')) document.getElementById('sum-sent').textContent = S.all.filter(r=>r.status==='送信済み').length;
  if(document.getElementById('sum-received')) document.getElementById('sum-received').textContent = S.all.filter(r=>r.status==='受領').length;
  if(document.getElementById('sum-done')) document.getElementById('sum-done').textContent = S.all.filter(r=>r.status==='納品済み').length;
  const tot = S.all.filter(r=>String(r.orderDate).startsWith(ym)).reduce((s,r)=>s+(Number(r.orderAmount)||0), 0);
  if(document.getElementById('sum-amount')) document.getElementById('sum-amount').textContent = tot.toLocaleString();
}

function _renderTable() {
  const start = (S.page-1)*S.limit;
  const data  = S.filtered.slice(start, start+S.limit);
  const total = S.filtered.length;
  if(document.getElementById('result-count')) document.getElementById('result-count').textContent = total+'件中 '+(total>0?start+1:0)+'–'+Math.min(start+S.limit,total)+'件';
  if (total===0) {
    document.getElementById('table-container').innerHTML = '<div class="loading" style="color:var(--text-sub);">該当する案件がありません</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }
  const rows = data.map(r=>`
    <tr onclick="openDetail('${r.id}')" style="cursor:pointer;">
      <td data-col="管理ID"><span class="text-sub">${r.id||''}</span></td>
      <td data-col="発注書番号"><strong>${r.orderNo||r.quoteNo||'—'}</strong></td>
      <td data-col="発注伝票No">${r.orderSlipNo||'—'}</td>
      <td data-col="機種">${r.modelCode||'—'}</td>
      <td data-col="顧客名" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.client||''}</td>
      <td data-col="ステータス">${_sBadge(r.status)}</td>
      <td data-col="種別">${r.orderType?_otBadge(r.orderType):''}</td>
      <td data-col="発注日" class="text-sub">${r.orderDate||r.quoteDate||''}</td>
      <td data-col="納期" class="text-sub">${r.deliveryDate||''}</td>
      <td data-col="注文金額" style="text-align:right;white-space:nowrap;">${r.orderAmount?Number(r.orderAmount).toLocaleString()+' 円':'—'}</td>
      <td data-col="PDF">
        ${r.quotePdfUrl?`<a class="pdf-link" href="${r.quotePdfUrl}" target="_blank" onclick="event.stopPropagation()">見積</a> `:''}
        ${r.orderPdfUrl?`<a class="pdf-link" href="${r.orderPdfUrl}" target="_blank" onclick="event.stopPropagation()">発注</a>`:''}
        ${r.driveFolderUrl?`<br><a class="pdf-link" href="${r.driveFolderUrl}" target="_blank" onclick="event.stopPropagation()">📁</a>`:''}
      </td>
      <td data-col="操作" style="text-align:center; white-space:nowrap;">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteMgmt('${r.id}', '${(r.orderNo||r.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button>
      </td>
    </tr>`).join('');
  document.getElementById('table-container').innerHTML = `
    <table>
      <thead><tr>
        <th data-col="管理ID">管理ID</th>
        <th data-col="発注書番号">発注書番号</th>
        <th data-col="発注伝票No">発注伝票No</th>
        <th data-col="機種">機種</th>
        <th data-col="顧客名">顧客名</th>
        <th data-col="ステータス">ステータス</th>
        <th data-col="種別">種別</th>
        <th data-col="発注日">発注日</th>
        <th data-col="納期">納期</th>
        <th data-col="注文金額">注文金額</th>
        <th data-col="PDF">PDF/フォルダ</th>
        <th data-col="操作">操作</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  _renderPagination(total);
  
  // テーブル描画直後に権限制御スクリプトを走らせる
  _applyPermissions();
}

function _sBadge(s){const m={'作成予定':'planned','送信済み':'sent','受領':'received','納品済み':'done'};return`<span class="badge badge-${m[s]||'planned'}">${s||'—'}</span>`;}
function _otBadge(t){if(t==='試作')return'<span class="badge badge-trial">試作</span>';if(t==='量産')return'<span class="badge badge-mass">量産</span>';return'';}

function _renderPagination(total) {
  const pages=Math.ceil(total/S.limit);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let h='';
  for(let i=1;i<=Math.min(pages,10);i++) h+=`<button class="page-btn ${i===S.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML=h;
}
function goPage(n){S.page=n;_renderTable();}

function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,300);}

function applyFilters() {
  const rawKw = document.getElementById('search-input').value;
  const kws   = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean);
  const st    = document.getElementById('filter-status').value;
  const ot    = document.getElementById('filter-order-type').value;
  const mo    = document.getElementById('filter-month').value;
  S.filtered = S.all.filter(r => {
    const targetValues = [ r.quoteNo, r.orderNo, r.orderSlipNo, r.modelCode, r.subject, r.client, r.orderAmount ];
    const searchableText = normalizeSearchText(targetValues.join(' '));
    const mk = kws.length === 0 || kws.every(kw => searchableText.includes(kw));
    const ms = !st || r.status === st;
    const mo2 = !ot || r.orderType === ot;
    const mm = !mo || (String(r.orderDate).startsWith(mo) || String(r.quoteDate).startsWith(mo));
    return mk && ms && mo2 && mm;
  });
  S.page = 1;
  _renderTable();
}

function clearFilters(){
  document.getElementById('search-input').value='';
  ['filter-status','filter-order-type','filter-month'].forEach(id=>document.getElementById(id).value='');
  S.filtered=S.all.slice();S.page=1;_renderTable();
}

function _populateMonthFilter(){
  const sel=document.getElementById('filter-month');
  if(!sel) return;
  const now=new Date();
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0');
    const o=document.createElement('option');o.value=ym;o.textContent=ym;sel.appendChild(o);
  }
}

function _findMgmtItem(mgmtId) {
  let item = S.all.find(r => r.id === mgmtId);
  if (item) return item;
  if(typeof _allQuotes !== 'undefined') item = _allQuotes.find(r => r.id === mgmtId);
  return item || null;
}

// ============================================================
// 📋 詳細モーダル表示 ＆ 紐づけ機能
// ============================================================
// 描画後、DOMツリーが展開されたタイミングでパーミッションをセット（openDetailの完了処理にhookするか、setIntervalで監視）
function _applyPermissionsToDetailModal() {
  setTimeout(_applyPermissions, 100);
}

// ============================================================
// ファイルアップロード (OCR)
// ============================================================
// ============================================================
// 見積書一覧
// ============================================================
function loadQuoteList() {
  const container = document.getElementById('quotelist-container');
  if(!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  google.script.run
    .withSuccessHandler(res => {
      if (!res.success) { container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ ' + res.error + '</div>'; return; }
      _allQuotes = res.items || [];
      _filteredQuotes = _allQuotes.slice();
      _quotePage = 1;
      if(document.getElementById('qs-total')) document.getElementById('qs-total').textContent = _allQuotes.length;
      if(document.getElementById('qs-linked')) document.getElementById('qs-linked').textContent = _allQuotes.filter(r => r.linked).length;
      if(document.getElementById('qs-amount')) document.getElementById('qs-amount').textContent = _allQuotes.reduce((s, r) => s + (Number(r.quoteAmount) || 0), 0).toLocaleString();
      _renderQuoteTable();
    })
    .handleApiRequest('quoteListGetAll', null);
}

function applyQuoteFilter() {
  const rawKw  = document.getElementById('qs-search').value;
  const kws    = normalizeSearchText(rawKw).split(/\s+/).filter(Boolean); 
  const st     = document.getElementById('qs-filter-status').value;
  const linked = document.getElementById('qs-filter-linked').value;
  _filteredQuotes = _allQuotes.filter(r => {
    const targetValues = [ r.quoteNo, r.subject, r.destCompany, r.destPerson, r.modelCode, r.quoteAmount, r.orderNo ];
    const searchableText = normalizeSearchText(targetValues.join(' '));
    const mk = kws.length === 0 || kws.every(kw => searchableText.includes(kw));
    const ms = !st || r.status === st;
    const ml = !linked || (linked === 'linked' && r.linked) || (linked === 'unlinked' && !r.linked);
    return mk && ms && ml;
  });
  _filteredQuotes.sort((a, b) => String(b.issueDate||'').localeCompare(String(a.issueDate||'')));
  _quotePage = 1;
  _renderQuoteTable();
}

function clearQuoteFilter() {
  document.getElementById('qs-search').value = '';
  document.getElementById('qs-filter-status').value = '';
  document.getElementById('qs-filter-linked').value = '';
  _filteredQuotes = _allQuotes.slice();
  _quotePage = 1;
  _renderQuoteTable();
}

function _renderQuoteTable() {
  const start = (_quotePage - 1) * _quoteLimit;
  const data  = _filteredQuotes.slice(start, start + _quoteLimit);
  const total = _filteredQuotes.length;
  if(document.getElementById('qs-count')) document.getElementById('qs-count').textContent = total + '件中 ' + (total > 0 ? start + 1 : 0) + '–' + Math.min(start + _quoteLimit, total) + '件';
  if (total === 0) {
    document.getElementById('quotelist-container').innerHTML = '<div class="loading" style="color:var(--text-sub);">該当する見積書がありません</div>';
    document.getElementById('qs-pagination').innerHTML = ''; return;
  }
  const rows = data.map(r => `
    <tr onclick="openQuoteDetail('${r.id}')" style="cursor:pointer;">
      <td><strong>${r.quoteNo || '—'}</strong></td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.subject || ''}">${r.subject || '—'}</td>
      <td style="font-size:12px;color:var(--text-sub);">${r.issueDate || '—'}</td>
      <td style="text-align:right;white-space:nowrap;">${r.quoteAmount ? Number(r.quoteAmount).toLocaleString() + ' 円' : '—'}</td>
      <td>${_sBadge(r.status)}</td>
      <td>${r.linked ? '<span class="badge badge-linked">✓ 注文書あり</span>' : '<span style="font-size:11px;color:var(--text-sub);">未受注</span>'}${r.orderNo ? '<br><span style="font-size:11px;color:var(--text-sub);">No.' + r.orderNo + '</span>' : ''}</td>
      <td>${r.quotePdfUrl ? '<a class="pdf-link" href="' + r.quotePdfUrl + '" target="_blank" onclick="event.stopPropagation()">📄 PDF</a>' : ''}</td>
      <td style="text-align:center; white-space:nowrap;">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteMgmt('${r.id}', '${(r.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button>
      </td>
    </tr>`).join('');
  document.getElementById('quotelist-container').innerHTML = `<table><thead><tr><th>見積No.</th><th>件名（ファイル名）</th><th>発行日</th><th>金額</th><th>ステータス</th><th>紐づけ状況</th><th>PDF</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
  const pages = Math.ceil(total / _quoteLimit);
  if (pages <= 1) { document.getElementById('qs-pagination').innerHTML = ''; return; }
  let pHtml = '';
  for (let i = 1; i <= Math.min(pages, 10); i++) pHtml += `<button class="page-btn ${i === _quotePage ? 'active' : ''}" onclick="goQuotePage(${i})">${i}</button>`;
  document.getElementById('qs-pagination').innerHTML = pHtml;
}

function goQuotePage(n) { _quotePage = n; _renderQuoteTable(); }

// --- 見積台帳 (Ledger) ---
function _getLedgerStatusColor(s) {
  const m = {'作成予定':'#94a3b8', '作成中':'#eab308', '送信済み':'#2563eb', 'キャンセル':'#ef4444'};
  return m[s] || '#94a3b8';
}

// --- Todoリスト ---
function loadTodos() {
  const container = document.getElementById('page-todo');
  if(!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>Todoを読み込み中...</div>';
  
  google.script.run
    .withSuccessHandler(res => {
      if(!res.success) { container.innerHTML = `<div>エラー: ${res.error}</div>`; return; }
      const items = res.items || [];
      const rows = items.map(t => `
        <div class="summary-card" style="margin-bottom:12px; display:flex; align-items:center; gap:16px;">
          <input type="checkbox" ${t.status==='完了'?'checked':''} onchange="toggleTodoStatus('${t.id}', this.checked)" style="width:20px;height:20px;cursor:pointer;">
          <div style="flex:1;">
            <div style="font-weight:700; font-size:14px; ${t.status==='完了'?'text-decoration:line-through;color:var(--text-muted);':''}">${t.title}</div>
            <div style="font-size:11px; color:var(--text-sub); margin-top:4px;">
              <span>👤 ${t.client||'—'}</span> | <span>📅 期限: ${t.dueDate||'—'}</span> | <span>🚩 優先度: ${t.priority||'中'}</span>
            </div>
            ${t.memo ? `<div style="font-size:12px; margin-top:6px; color:var(--text); border-left:2px solid var(--border); padding-left:8px;">${t.memo}</div>` : ''}
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteTodo('${t.id}')">🗑️</button>
        </div>
      `).join('');
      
      container.innerHTML = `
        <div class="page-heading">
          <div><h2>✅ ToDoリスト</h2><p>案件に付随するタスクを管理します</p></div>
          <button class="btn btn-primary" onclick="openTodoModal()">＋ 新規タスク</button>
        </div>
        <div id="todo-list">${items.length ? rows : '<div class="loading">タスクはありません</div>'}</div>
      `;
    })
    .handleApiRequest('getTodos', {});
}

function toggleTodoStatus(id, checked) {
  const status = checked ? '完了' : '未着手';
  google.script.run.withSuccessHandler(() => { showToast('更新しました'); loadTodos(); }).handleApiRequest('saveTodo', { id, status });
}

function deleteTodo(id) {
  if(!confirm('このToDoを削除しますか？')) return;
  google.script.run.withSuccessHandler(() => { showToast('削除しました'); loadTodos(); }).handleApiRequest('deleteTodo', { id });
}

function openTodoModal() {
  const title = prompt('タスク名を入力してください');
  if(!title) return;
  google.script.run.withSuccessHandler(() => { showToast('追加しました'); loadTodos(); }).handleApiRequest('saveTodo', { title });
}

// --- カレンダー (FullCalendar) ---
let _calendar = null;
function _getEventColor(type) {
  const colors = { order:'#2563eb', quote:'#0891b2', delivery:'#16a34a', todo:'#eab308' };
  return colors[type] || '#94a3b8';
}

// --- Drive全文検索 ---
// page-drivesearchの初期化
function initDriveSearchPage() {
  const container = document.getElementById('drive-search-container');
  if(!container) return;
  container.innerHTML = `
    <div class="page-heading">
      <div><h2>💾 全文検索</h2><p>Google Drive内のファイルを横断検索します</p></div>
    </div>
    <div class="filter-bar">
      <div class="search-box" style="flex:1;">
        <input type="text" id="drive-kw" placeholder="ファイル名や内容のキーワードを入力..." onkeypress="if(event.key==='Enter') executeDriveSearch()">
      </div>
      <button class="btn btn-primary" onclick="executeDriveSearch()">🔍 検索</button>
    </div>
    <div id="drive-results" class="table-wrap" style="min-height:200px; padding:20px; background:#fff;">
      <div style="color:var(--text-muted); text-align:center; padding:40px;">キーワードを入力して検索してください</div>
    </div>
  `;
}

function executeDriveSearch() {
  const kw = document.getElementById('drive-kw').value.trim();
  if(!kw) { showToast('キーワードを入力してください', true); return; }
  
  const resultsDiv = document.getElementById('drive-results');
  resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><br>Driveを検索中...</div>';
  
  google.script.run
    .withSuccessHandler(res => {
      if(!res.success) { resultsDiv.innerHTML = `<div style="color:var(--danger);">${res.error}</div>`; return; }
      const files = res.files || [];
      if(files.length === 0) { resultsDiv.innerHTML = '<div style="text-align:center;padding:40px;">一致するファイルは見つかりませんでした</div>'; return; }
      
      const rows = files.map(f => `
        <div style="display:flex; align-items:center; gap:12px; padding:12px; border-bottom:1px solid var(--border-light);">
          <span style="font-size:20px;">${_getFileIcon(f.mimeType)}</span>
          <div style="flex:1;">
            <a href="${f.url}" target="_blank" style="font-weight:600; color:var(--primary); text-decoration:none; font-size:14px;">${f.name}</a>
            <div style="font-size:11px; color:var(--text-sub); margin-top:2px;">最終更新: ${f.updatedAt} | 📁 ${f.folderName || 'Root'}</div>
          </div>
        </div>
      `).join('');
      resultsDiv.innerHTML = rows;
    })
    .handleApiRequest('driveSearch', { keyword: kw });
}

function _getFileIcon(mime) {
  if(mime.includes('pdf')) return '📄';
  if(mime.includes('spreadsheet')) return '📊';
  if(mime.includes('folder')) return '📁';
  return '📝';
}
