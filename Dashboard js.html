<!-- jQuery v3.7.1 -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
/**
 * 見積・注文管理システム Dashboard Client Logic (Fixed & Enhanced )
 * ============================================================
 */

// 1. グローバル状態・定数
// ============================================================
let DEFAULT_MENU = [
  { id:'list',       icon:'📋', label:'案件一覧',         section:'営業・進行管理', visible:true },
  { id:'ledger',     icon:'📝', label:'見積台帳',         section:'営業・進行管理', visible:true },
  { id:'matching',   icon:'🔗', label:'AI紐づけ',         section:'営業・進行管理', visible:true },
  { id:'calendar',   icon:'📅', label:'スケジュール',     section:'営業・進行管理', visible:true },
  { id:'ocr',        icon:'🔍', label:'簡易OCR',          section:'営業・進行管理', visible:true },
  { id:'workflow',   icon:'🔄', label:'業務フロー',       section:'自動化・連携',   visible:true },
  { id:'assignees',  icon:'👥', label:'担当者管理',       section:'自動化・連携',   visible:true },
  { id:'approval',   icon:'✅', label:'製造承認',         section:'自動化・連携',   visible:true },
  { id:'board',      icon:'🏷️', label:'基板管理',         section:'マスタ管理',     visible:true },
  { id:'analysis',   icon:'📊', label:'分析・レポート',   section:'マスタ管理',     visible:true },
  { id:'todo',       icon:'✅', label:'ToDo',             section:'ツール',         visible:true },
  { id:'drivesearch',icon:'💾', label:'全文検索',         section:'ツール',         visible:true },
  { id:'admin',      icon:'⚙️', label:'管理コンソール',   section:'設定',           visible:true, adminOnly:true },
  { id:'bom_ext',    icon:'🏭', label:'BOM・原価管理',    section:'設定',           visible:true, adminOnly:true, external:'https://script.google.com/a/sun-denshi.co.jp/macros/s/AKfycbxk-6hM0VDR-iWToBvOhuaEd6pZcZTXW53tXZUzHl7AucIWvRgt-S_gTpFd1foRSf5Ung/exec?page=bom' }
];

const PAGE_TITLES = {
  list:'案件一覧', ledger:'見積台帳', matching:'AI紐づけ', calendar:'スケジュール',
  ocr:'簡易OCR', todo:'ToDo', drivesearch:'全文検索', admin:'システム管理コンソール',
  workflow:'業務フロー', assignees:'担当者管理', approval:'製造承認', board:'基板管理', analysis:'分析・レポート'
};

const S = {
  all:[], filtered:[], page:1, limit:30,
  docType:'quote', orderType:'', selectedFile:null,
  calYear: new Date( ).getFullYear(), calMonth: new Date().getMonth()+1,
  calEvents:[],
};

// 見積書リスト用の状態（白画面防止のため初期化）
let _allQuotes = [];
let _filteredQuotes = [];
let _quotePage = 1;
const _quoteLimit = 30;
let _allMatchingItems = [];
let searchTimer = null;

let IS_ADMIN = window.APP_IS_ADMIN || false;

// 2. 初期化
// ============================================================
window.addEventListener('load', () => {
  try {
    // サーバーからメニュー設定を読み込む
    google.script.run.withSuccessHandler(res => {
      if (res && res.success && res.menu) {
        DEFAULT_MENU = res.menu;
      }
      // メニュー描画を確実に実行
      renderSidebar();
      showPage('list');
      _populateMonthFilter();
      loadData();
      loadQuoteList();
    }).withFailureHandler(err => {
      console.warn('Menu load failed, using default:', err);
      renderSidebar();
      showPage('list');
    }).handleApiRequest('loadMenuSettings', null);
  } catch (e) {
    console.error('Init Error:', e);
    renderSidebar(); // エラー時も最低限描画
  }
});

// 3. サイドバー・ページ制御
// ============================================================
function renderSidebar(){
  const container = document.getElementById('sidebar-nav-container');
  if(!container) return;
  const sections = {};
  DEFAULT_MENU.forEach(item => {
    if(!item.visible) return;
    if(item.adminOnly && !IS_ADMIN) return;
    if(!sections[item.section]) sections[item.section] = [];
    sections[item.section].push(item);
  });
  let html = '';
  Object.keys(sections).forEach(section => {
    html += `<div class="sidebar-section-label">${section}</div>`;
    sections[section].forEach(item => {
      if(item.external){
        html += `<a class="nav-item nav-item-ext" href="${item.external}" target="_blank">
          <span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></a>`;
      } else {
        html += `<div class="nav-item" data-id="${item.id}" onclick="showPage('${item.id}')">
          <span class="nav-item-icon">${item.icon}</span><span class="nav-item-label">${item.label}</span></div>`;
      }
    });
  });
  container.innerHTML = html;
}

function showPage(name){
  document.querySelectorAll('.nav-item[data-id]').forEach(t => { t.classList.toggle('active', t.dataset.id === name); });
  const titleEl = document.getElementById('topbar-page-title');
  if(titleEl) titleEl.textContent = PAGE_TITLES[name] || name;
  const contentEl = document.getElementById('content');
  if(contentEl) contentEl.scrollTop = 0;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + name);
  if(target) target.classList.add('active');

  if(name === 'list'){ 
    const ao = document.getElementById('area-order'); 
    const aq = document.getElementById('area-quote'); 
    if(ao) ao.style.display = ''; 
    if(aq) aq.style.display = 'none'; 
  }
  if(name === 'admin') _onShowAdmin();
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('collapsed'); }

function showToast(msg, isError = false){
  const t = document.getElementById('toast'); if(!t) return;
  t.textContent = (isError ? '✗ ' : '✓ ') + msg; t.style.background = isError ? '#dc2626' : '#1e293b';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500);
}

// 4. データ読み込み・表示 (案件一覧)
// ============================================================
function loadData() {
  const container = document.getElementById('table-container'); if(!container) return;
  container.innerHTML = '<div class="loading">データ読み込み中...</div>';
  google.script.run.withSuccessHandler(res => {
    if (!res || !res.success) { 
      container.innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ データ取得失敗</div>'; return; 
    }
    S.all = res.items || []; S.filtered = S.all.slice(); S.page = 1; _updateSummary(); _renderTable();
  }).handleApiRequest('getAll', null);
}

function _renderTable() {
  const start = (S.page - 1) * S.limit; const data = S.filtered.slice(start, start + S.limit); const total = S.filtered.length;
  if(document.getElementById('result-count')) document.getElementById('result-count').textContent = total + '件';
  if (total === 0) { document.getElementById('table-container').innerHTML = '<div class="loading">案件がありません</div>'; return; }
  
  const rows = data.map(r => `
    <tr>
      <td>${r.id || ''}</td>
      <td><strong>${r.orderNo || r.quoteNo || '—'}</strong></td>
      <td>${r.client || ''}</td>
      <td>${_sBadge(r.status)}</td>
      <td style="text-align:right;">${r.orderAmount ? Number(r.orderAmount).toLocaleString() : '—'}</td>
    </tr>`).join('');
  document.getElementById('table-container').innerHTML = `<table><thead><tr><th>ID</th><th>番号</th><th>顧客名</th><th>ステータス</th><th>金額</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function _updateSummary() {
  if(document.getElementById('sum-sent')) document.getElementById('sum-sent').textContent = S.all.filter(r => r.status === '送信済み').length;
  if(document.getElementById('sum-received')) document.getElementById('sum-received').textContent = S.all.filter(r => r.status === '受領').length;
}

function _sBadge(s){const m={'作成予定':'planned','送信済み':'sent','受領':'received','納品済み':'done'};return`<span class="badge badge-${m[s]||'planned'}">${s||'—'}</span>`;}

// 5. 見積書リスト
// ============================================================
function loadQuoteList() {
  const container = document.getElementById('quotelist-container'); if(!container) return;
  container.innerHTML = '<div class="loading">読み込み中...</div>';
  google.script.run.withSuccessHandler(res => {
    if (!res || !res.success) return;
    _allQuotes = res.items || []; 
    _filteredQuotes = _allQuotes.slice(); 
    _renderQuoteTable();
  }).handleApiRequest('quoteListGetAll', null);
}

function _renderQuoteTable() {
  const data = _filteredQuotes.slice(0, 30);
  const rows = data.map(r => `
    <tr>
      <td><strong>${r.quoteNo || '—'}</strong></td>
      <td>${r.subject || '—'}</td>
      <td>${_sBadge(r.status)}</td>
    </tr>`).join('');
  document.getElementById('quotelist-container').innerHTML = `<table><thead><tr><th>見積No.</th><th>件名</th><th>ステータス</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// 6. 管理コンソール・メニュー編集
// ============================================================
function _onShowAdmin() {
  switchAdminTab('basic');
}

function switchAdminTab(tabId) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.id === 'atab-' + tabId));
  document.querySelectorAll('.admin-tab-content').forEach(c => c.style.display = 'none');
  const target = document.getElementById('admin-tab-' + tabId);
  if (target) {
    target.style.display = 'block';
    if (tabId === 'menu') renderMenuEditor();
  }
}

function renderMenuEditor() {
  const container = document.getElementById('admin-tab-menu');
  if (!container) return;
  
  let html = `
    <div style="background:white;border-radius:12px;padding:24px;box-shadow:var(--shadow);">
      <h3 style="margin-bottom:12px;">📱 サイドバーメニュー設定</h3>
      <div style="overflow-x:auto;">
        <table style="width:100%;font-size:12px;">
          <thead>
            <tr style="background:#f8fafc;text-align:left;">
              <th>表示</th><th>ID</th><th>アイコン</th><th>ラベル</th><th>セクション</th><th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${DEFAULT_MENU.map((item, idx) => `
              <tr style="border-bottom:1px solid var(--border-light);">
                <td><input type="checkbox" ${item.visible ? 'checked' : ''} onchange="updateMenuItem(${idx}, 'visible', this.checked)"></td>
                <td>${item.id}</td>
                <td><input type="text" value="${item.icon}" style="width:40px;" onchange="updateMenuItem(${idx}, 'icon', this.value)"></td>
                <td><input type="text" value="${item.label}" style="width:100px;" onchange="updateMenuItem(${idx}, 'label', this.value)"></td>
                <td><input type="text" value="${item.section}" style="width:100px;" onchange="updateMenuItem(${idx}, 'section', this.value)"></td>
                <td>
                  <button onclick="moveMenuItem(${idx}, -1)">↑</button>
                  <button onclick="moveMenuItem(${idx}, 1)">↓</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:20px;text-align:right;">
        <button class="btn btn-primary" onclick="saveMenuSettings()">💾 保存</button>
      </div>
    </div>
  `;
  container.innerHTML = html;
}

function updateMenuItem(idx, key, val) { DEFAULT_MENU[idx][key] = val; }
function moveMenuItem(idx, dir) {
  const target = idx + dir; if (target < 0 || target >= DEFAULT_MENU.length) return;
  const temp = DEFAULT_MENU[idx]; DEFAULT_MENU[idx] = DEFAULT_MENU[target]; DEFAULT_MENU[target] = temp;
  renderMenuEditor();
}

function saveMenuSettings() {
  showToast('保存中...');
  google.script.run.withSuccessHandler(res => {
    if (res.success) { showToast('保存しました'); renderSidebar(); }
  }).handleApiRequest('saveMenuSettings', { menu: DEFAULT_MENU });
}

function _populateMonthFilter(){ /* 中略 */ }
function applyFilters() { /* 中略 */ }
function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,300);}
function switchSubTab(tab) {
  const isOrder = tab === 'order';
  document.getElementById('area-order').style.display = isOrder ? '' : 'none';
  document.getElementById('area-quote').style.display = isOrder ? 'none' : '';
}
</script>
