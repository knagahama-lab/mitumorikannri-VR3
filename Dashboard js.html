<script>

// ===== 状態 =====
const S = {
  all:[], filtered:[], page:1, limit:30,
  docType:'quote', orderType:'', selectedFile:null,
  calYear: new Date().getFullYear(), calMonth: new Date().getMonth()+1,
  calEvents:[],
};
let searchTimer=null;

// ===== 初期化 =====
window.onload = () => {
  _populateMonthFilter();
  loadData();
};

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
  var target = document.getElementById('page-'+name);
  if (!target) { console.error('ページが見つかりません: page-'+name); return; }
  target.classList.add('active');
  // nav-tab active 更新
  document.querySelectorAll('.nav-tab').forEach(function(t) {
    var onclick = t.getAttribute('onclick') || '';
    if (onclick.indexOf("'" + name + "'") >= 0) t.classList.add('active');
  });
  // 案件一覧に戻ったとき area-order を確実に表示
  if (name === 'list') {
    var ao = document.getElementById('area-order');
    var aq = document.getElementById('area-quote');
    if (ao) ao.style.display = '';
    if (aq) aq.style.display = 'none';
  }
  if (name==='parts') {
    if (_allParts.length === 0) loadPartsData();
    switchPartsTab('parts');
  }
  if (name==='ledger')   loadLedger();
  if (name==='todo')     loadTodos();
  if (name==='calendar') loadCalendar();
  if (name==='matching') loadMatchingCandidates();
  if (name==='quotesubmit') { if (_allQs.length === 0) loadQsData(); }
  if (name==='board')    loadBoardList();
  if (name==='analysis')    loadBoardAnalysis();
  if (name==='drivesearch') { /* 手動検索のため自動ロードしない */ }
}

// ===== 案件データ =====
function loadData() {
  document.getElementById('table-container').innerHTML =
    '<div class="loading"><div class="spinner"></div><br>データ読み込み中...</div>';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        document.getElementById('table-container').innerHTML =
          '<div class="loading" style="color:var(--danger);">⚠️ データ取得失敗: ' + (res ? res.error : '不明') + '</div>';
        return;
      }
      try {
        S.all = res.items || [];
        S.filtered = S.all.slice();
        S.page = 1;
        _updateSummary();
        _renderTable();
      } catch(e) {
        document.getElementById('table-container').innerHTML =
          '<div class="loading" style="color:var(--danger);">⚠️ 描画エラー: ' + e.message + '<br><small>' + e.stack + '</small></div>';
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('table-container').innerHTML =
        '<div class="loading" style="color:var(--danger);">⚠️ 通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('getAll', null);
}

function switchSubTab(tab) {
  var isOrder   = tab === 'order';
  var areaOrder = document.getElementById('area-order');
  var areaQuote = document.getElementById('area-quote');
  var orderBtn  = document.getElementById('subtab-order');
  var quoteBtn  = document.getElementById('subtab-quote');

  // null チェック（要素が見つからない場合はスキップ）
  if (!areaOrder || !areaQuote || !orderBtn || !quoteBtn) {
    console.warn('[switchSubTab] 要素が見つかりません。page-listが表示されていない可能性があります。');
    // page-list を先に表示してから再試行
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('page-list').classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
    setTimeout(function() { switchSubTab(tab); }, 50);
    return;
  }

  areaOrder.style.display = isOrder ? '' : 'none';
  areaQuote.style.display = isOrder ? 'none' : '';

  orderBtn.style.color        = isOrder ? 'var(--primary)'  : 'var(--text-sub)';
  orderBtn.style.borderBottom = isOrder ? '2px solid var(--primary)' : '2px solid transparent';
  orderBtn.style.fontWeight   = isOrder ? '600' : '500';
  quoteBtn.style.color        = isOrder ? 'var(--text-sub)'  : 'var(--primary)';
  quoteBtn.style.borderBottom = isOrder ? '2px solid transparent' : '2px solid var(--primary)';
  quoteBtn.style.fontWeight   = isOrder ? '500' : '600';

  if (!isOrder && _allQuotes.length === 0) loadQuoteList();
}

function _updateSummary() {
  const now = new Date();
  const ym  = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('sum-sent').textContent     = S.all.filter(r=>r.status==='送信済み').length;
  document.getElementById('sum-received').textContent = S.all.filter(r=>r.status==='受領').length;
  document.getElementById('sum-done').textContent     = S.all.filter(r=>r.status==='納品済み').length;
  const tot = S.all.filter(r=>String(r.orderDate).startsWith(ym))
    .reduce((s,r)=>s+(Number(r.orderAmount)||0), 0);
  document.getElementById('sum-amount').textContent = tot.toLocaleString();
}

function _renderTable() {
  const start = (S.page-1)*S.limit;
  const data  = S.filtered.slice(start, start+S.limit);
  const total = S.filtered.length;

  document.getElementById('result-count').textContent =
    total+'件中 '+(total>0?start+1:0)+'–'+Math.min(start+S.limit,total)+'件';

  if (total===0) {
    document.getElementById('table-container').innerHTML =
      '<div class="loading" style="color:var(--text-sub);">該当する案件がありません</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }

  const rows = data.map(r=>`
    <tr onclick="openDetail('${r.id}')">
      <td><span class="text-sub">${r.id||''}</span></td>
      <td><strong>${r.orderNo||r.quoteNo||'—'}</strong></td>
      <td>${r.orderSlipNo||'—'}</td>
      <td>${r.modelCode||'—'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.client||''}</td>
      <td>${_sBadge(r.status)}</td>
      <td>${r.orderType?_otBadge(r.orderType):''}</td>
      <td class="text-sub">${r.orderDate||r.quoteDate||''}</td>
      <td class="text-sub">${r.deliveryDate||''}</td>
      <td style="text-align:right;white-space:nowrap;">${r.orderAmount?Number(r.orderAmount).toLocaleString()+' 円':'—'}</td>
      <td>
        ${r.quotePdfUrl?`<a class="pdf-link" href="${r.quotePdfUrl}" target="_blank" onclick="event.stopPropagation()">見積</a> `:''}
        ${r.orderPdfUrl?`<a class="pdf-link" href="${r.orderPdfUrl}" target="_blank" onclick="event.stopPropagation()">発注</a>`:''}
        ${r.driveFolderUrl?`<br><a class="pdf-link" href="${r.driveFolderUrl}" target="_blank" onclick="event.stopPropagation()">📁</a>`:''}
      </td>
    </tr>`).join('');

  document.getElementById('table-container').innerHTML = `
    <table>
      <thead><tr>
        <th>管理ID</th><th>発注書番号</th><th>発注伝票No</th><th>機種</th><th>顧客名</th>
        <th>ステータス</th><th>種別</th><th>発注日</th><th>納期</th><th>注文金額</th><th>PDF/フォルダ</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  _renderPagination(total);
}

function _sBadge(s){const m={'作成予定':'planned','送信済み':'sent','受領':'received','納品済み':'done'};return`<span class="badge badge-${m[s]||'planned'}">${s||'—'}</span>`;}
function _otBadge(t){if(t==='試作')return'<span class="badge badge-trial">試作</span>';if(t==='量産')return'<span class="badge badge-mass">量産</span>';return'';}
function _prioBadge(p){if(p==='高')return'<span class="badge badge-high">高</span>';if(p==='低')return'<span class="badge badge-low">低</span>';return'<span class="badge badge-mid">中</span>';}

function _renderPagination(total) {
  const pages=Math.ceil(total/S.limit);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let h='';
  for(let i=1;i<=Math.min(pages,10);i++)
    h+=`<button class="page-btn ${i===S.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML=h;
}
function goPage(n){S.page=n;_renderTable();}

function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,300);}
function applyFilters(){
  const kw=document.getElementById('search-input').value.toLowerCase();
  const st=document.getElementById('filter-status').value;
  const ot=document.getElementById('filter-order-type').value;
  const mo=document.getElementById('filter-month').value;
  S.filtered=S.all.filter(r=>{
    const mk=!kw||[r.quoteNo,r.orderNo,r.orderSlipNo,r.modelCode,r.subject,r.client].some(v=>String(v).toLowerCase().includes(kw));
    const ms=!st||r.status===st;
    const mo2=!ot||r.orderType===ot;
    const mm=!mo||(String(r.orderDate).startsWith(mo)||String(r.quoteDate).startsWith(mo));
    return mk&&ms&&mo2&&mm;
  });
  S.page=1;_renderTable();
}
function clearFilters(){
  document.getElementById('search-input').value='';
  ['filter-status','filter-order-type','filter-month'].forEach(id=>document.getElementById(id).value='');
  S.filtered=S.all.slice();S.page=1;_renderTable();
}
function _populateMonthFilter(){
  const sel=document.getElementById('filter-month');
  const now=new Date();
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0');
    const o=document.createElement('option');o.value=ym;o.textContent=ym;sel.appendChild(o);
  }
}

// ===== 詳細モーダル =====
function openDetail(mgmtId){
  const item=S.all.find(r=>r.id===mgmtId);if(!item)return;
  document.getElementById('detail-title').textContent='📋 '+(item.client||item.orderNo||mgmtId);
  document.getElementById('detail-modal').classList.add('open');
  document.getElementById('detail-body').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  google.script.run
    .withSuccessHandler(res=>{
      if(!res.success){document.getElementById('detail-body').innerHTML='エラー: '+res.error;return;}
      document.getElementById('detail-body').innerHTML=_buildDetailHtml(item,res);
    })
    .withFailureHandler(err=>{document.getElementById('detail-body').innerHTML='エラー: '+err.message;})
    .handleApiRequest('getDetail',{mgmtId});
}
function closeDetailModal(){document.getElementById('detail-modal').classList.remove('open');}

function _buildDetailHtml(item,detail){
  const rows=[
    ['管理ID',item.id],['発注書番号',item.orderNo||'—'],['発注伝票番号',item.orderSlipNo||'—'],
    ['機種コード',item.modelCode||'—'],['顧客名',item.client||'—'],
    ['ステータス',_sBadge(item.status)],['注文種別',item.orderType?_otBadge(item.orderType):'—'],
    ['発注日',item.orderDate||'—'],['見積日',item.quoteDate||'—'],
    ['注文金額',item.orderAmount?Number(item.orderAmount).toLocaleString()+' 円':'—'],
    ['合計金額',item.total?Number(item.total).toLocaleString()+' 円':'—'],
    ['納期',item.deliveryDate||'—'],['担当者',item.assignee||'—'],['メモ',item.memo||'—'],
  ];
  const infoHtml='<table style="width:100%;font-size:13px;border-collapse:collapse;">'+
    rows.map(([k,v])=>`<tr><td style="padding:5px 8px;font-weight:600;width:36%;color:var(--text-sub);border-bottom:1px solid var(--border);">${k}</td><td style="padding:5px 8px;border-bottom:1px solid var(--border);">${v}</td></tr>`).join('')+
    '</table>';
  const links=[
    item.quotePdfUrl?`<a href="${item.quotePdfUrl}" target="_blank" class="pdf-link">📄 見積書PDF</a>`:'',
    item.orderPdfUrl?`<a href="${item.orderPdfUrl}" target="_blank" class="pdf-link">📦 発注書PDF</a>`:'',
    item.driveFolderUrl?`<a href="${item.driveFolderUrl}" target="_blank" class="pdf-link">📁 フォルダ</a>`:'',
  ].filter(Boolean).join('　');
  const statusOpts=['作成予定','送信済み','受領','納品済み'].map(s=>`<option value="${s}"${s===item.status?' selected':''}>${s}</option>`).join('');

  // 注文明細
  const oTable=detail.orderLines&&detail.orderLines.length?`
    <div class="detail-section"><h4>発注書 明細</h4>
    <table class="dtable"><thead><tr><th>#</th><th>品名</th><th>仕様</th><th>初回納品日</th><th>納品先</th><th>数量</th><th>単位</th><th>単価</th><th>金額</th><th>備考</th></tr></thead>
    <tbody>${detail.orderLines.map(l=>`<tr class="${(l.remarks||'').includes('キャンセル')?'cancelled':''}">
      <td>${l.lineNo}</td><td>${l.itemName||''}</td><td style="font-size:11px;">${l.spec||''}</td>
      <td>${l.firstDelivery||''}</td><td>${l.deliveryDest||''}</td>
      <td class="r">${l.qty||''}</td><td>${l.unit||''}</td>
      <td class="r">${l.unitPrice?Number(l.unitPrice).toLocaleString():''}</td>
      <td class="r">${l.amount?Number(l.amount).toLocaleString():''}</td>
      <td>${l.remarks||''}</td>
    </tr>`).join('')}</tbody></table></div>`:''  ;

  // 見積明細
  const qTable=detail.quoteLines&&detail.quoteLines.length?`
    <div class="detail-section"><h4>見積書 明細</h4>
    <p style="font-size:12px;color:var(--text-sub);margin-bottom:6px;">
      発行日: ${detail.quoteLines[0].issueDate||'—'} &nbsp;
      送り先: ${detail.quoteLines[0].destCompany||'—'} &nbsp;
      担当者: ${detail.quoteLines[0].destPerson||'—'}
    </p>
    <table class="dtable"><thead><tr><th>#</th><th>品名</th><th>仕様</th><th>数量</th><th>単位</th><th>単価</th><th>金額</th></tr></thead>
    <tbody>${detail.quoteLines.map(l=>`<tr>
      <td>${l.lineNo}</td><td>${l.itemName||''}</td><td>${l.spec||''}</td>
      <td class="r">${l.qty||''}</td><td>${l.unit||''}</td>
      <td class="r">${l.unitPrice?Number(l.unitPrice).toLocaleString():''}</td>
      <td class="r">${l.amount?Number(l.amount).toLocaleString():''}</td>
    </tr>`).join('')}</tbody></table></div>`:'' ;

  return `${infoHtml}
    <div style="margin:12px 0;">${links}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <span style="font-size:12px;color:var(--text-sub);">ステータス変更:</span>
      <select id="status-sel" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;">${statusOpts}</select>
      <button class="btn btn-primary btn-sm" onclick="updateStatus('${item.id}')">更新</button>
      <button class="btn btn-outline btn-sm" onclick="openEditMgmtModal('${item.id}')" style="margin-left:8px;">✏️ 編集</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMgmt('${item.id}','${(item.orderNo||item.quoteNo||'').replace(/'/g,'')}')">🗑️ 削除</button>
    </div>
    ${oTable}${qTable}`;
}

function updateStatus(mgmtId){
  const ns=document.getElementById('status-sel').value;
  google.script.run
    .withSuccessHandler(res=>{
      if(res.success){
        showToast('ステータスを「'+ns+'」に変更しました');
        const it=S.all.find(r=>r.id===mgmtId);if(it)it.status=ns;
        S.filtered=S.filtered.map(r=>r.id===mgmtId?{...r,status:ns}:r);
        _renderTable();_updateSummary();closeDetailModal();
      }else showToast('更新失敗: '+res.error,true);
    })
    .handleApiRequest('updateStatus',{mgmtId,newStatus:ns});
}

// ===== アップロード =====
function openUploadModal(){
  S.selectedFile=null;S.orderType='';
  document.getElementById('upload-status').innerHTML='';
  document.getElementById('upload-btn').disabled=true;
  document.getElementById('file-input').value='';
  document.getElementById('order-type-section').style.display='none';
  document.getElementById('upload-modal').classList.add('open');
}
function closeUploadModal(){document.getElementById('upload-modal').classList.remove('open');}
function setDocType(t){
  S.docType=t;S.orderType='';
  document.getElementById('type-quote').classList.toggle('active',t==='quote');
  document.getElementById('type-order').classList.toggle('active',t==='order');
  document.getElementById('order-type-section').style.display=t==='order'?'block':'none';
  document.getElementById('ot-trial').className='order-type-btn';
  document.getElementById('ot-mass').className='order-type-btn';
  document.getElementById('folder-hint').textContent='';
}
function setOrderType(t){
  S.orderType=t;
  document.getElementById('ot-trial').className='order-type-btn'+(t==='試作'?' active-trial':'');
  document.getElementById('ot-mass').className='order-type-btn'+(t==='量産'?' active-mass':'');
  document.getElementById('folder-hint').textContent='保存先: 注文書（'+t+'）フォルダ';
}
function dragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('dragover');}
function dragLeave(e){document.getElementById('drop-zone').classList.remove('dragover');}
function dropFile(e){e.preventDefault();dragLeave(e);const f=e.dataTransfer.files[0];if(f)_setFile(f);}
function handleFileSelect(e){const f=e.target.files[0];if(f)_setFile(f);}
function _setFile(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){showToast('PDFのみ対応',true);return;}
  S.selectedFile=file;
  document.getElementById('upload-status').innerHTML=`<p style="color:var(--success);font-size:13px;">✓ ${file.name} (${(file.size/1024).toFixed(1)} KB)</p>`;
  document.getElementById('upload-btn').disabled=false;
}
function uploadFile(){
  if(!S.selectedFile)return;
  if(S.docType==='order'&&!S.orderType){showToast('注文種別を選択してください',true);return;}
  const btn=document.getElementById('upload-btn');
  btn.disabled=true;btn.textContent='解析中...';
  document.getElementById('upload-status').innerHTML='<div class="loading" style="padding:16px;"><div class="spinner"></div> Gemini OCR 解析中...</div>';
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result.split(',')[1];

    // ★ 注文書の場合はAI紐づけ＋Chat通知付きのAPIを使用
    const action = S.docType==='order' ? 'uploadOrderWithLink' : 'uploadPdf';

    google.script.run
      .withSuccessHandler(res=>{
        btn.textContent='解析・登録';btn.disabled=false;
        if(res.success){
          // ★ 注文書の場合：紐づけ結果を表示
          if(S.docType==='order'){
            _showOrderUploadResult(res);
          } else {
            document.getElementById('upload-status').innerHTML=`
              <div style="background:#e6f4ea;border-radius:8px;padding:12px;font-size:13px;">
                <strong style="color:var(--success);">✓ 登録完了</strong><br>
                発行日: ${res.issueDate||'—'}<br>
                送り先: ${res.destCompany||'—'}<br>
                合計金額: ${res.totalAmount?Number(res.totalAmount).toLocaleString()+' 円':'—'}<br>
                明細: ${res.lineCount}行 &nbsp;
                <a href="${res.savedFolder}" target="_blank" style="color:var(--primary);">📁 フォルダ</a>
              </div>`;
            showToast('登録完了しました');
          }
          loadData();
        }else{
          document.getElementById('upload-status').innerHTML=`<p style="color:var(--danger);font-size:13px;">✗ ${res.error}</p>`;
        }
      })
      .withFailureHandler(err=>{
        document.getElementById('upload-status').innerHTML=`<p style="color:var(--danger);font-size:13px;">✗ 通信エラー: ${err.message}</p>`;
        btn.textContent='解析・登録';btn.disabled=false;
      })
      .handleApiRequest(action,{base64Data:b64,fileName:S.selectedFile.name,docType:S.docType,orderType:S.orderType});
  };
  reader.readAsDataURL(S.selectedFile);
}

// ★ 注文書アップロード結果の表示（AI紐づけ候補含む）
function _showOrderUploadResult(res){
  const lr = res.linkResult || {};
  const statusMap = {
    'auto_linked':      {icon:'✅', label:'AI自動紐づけ完了', color:'var(--success)'},
    'candidates_found': {icon:'⚠️', label:'手動紐づけが必要です', color:'var(--warning)'},
    'forced_candidate': {icon:'⚠️', label:'候補を選択してください（スコアが低い）', color:'var(--warning)'},
    'no_quotes':        {icon:'❌', label:'紐づけ可能な見積書なし', color:'var(--danger)'},
    'already_linked':   {icon:'✅', label:'既に紐づけ済み', color:'var(--success)'},
  };
  const st = statusMap[lr.status] || {icon:'ℹ️', label:lr.status||'不明', color:'var(--text-sub)'};

  let candidateHtml = '';
  if((lr.status==='candidates_found'||lr.status==='forced_candidate') && lr.candidates && lr.candidates.length){
    const rows = lr.candidates.map(c=>`
      <tr style="border-bottom:1px solid var(--border);">
        <td style="padding:6px 8px;font-size:12px;">${c.quoteNo||'—'}</td>
        <td style="padding:6px 8px;font-size:12px;text-align:center;">
          <span style="background:${c.score>=60?'#34a853':'#fbbc04'};color:#fff;border-radius:4px;padding:2px 6px;font-size:11px;">${c.score}点</span>
        </td>
        <td style="padding:6px 8px;font-size:11px;color:var(--text-sub);">${(c.keywords||'').substring(0,30)}</td>
        <td style="padding:6px 8px;">
          ${c.quoteUrl?`<a href="${c.quoteUrl}" target="_blank" style="font-size:11px;">📄</a>`:''}
        </td>
        <td style="padding:6px 8px;">
          <button onclick="_confirmOrderLink('${res.mgmtId}','${c.quoteMgmtId}','${c.quoteNo}')"
            style="font-size:11px;padding:3px 8px;background:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer;">
            この見積書で確定
          </button>
        </td>
      </tr>`).join('');
    candidateHtml = `
      <div style="margin-top:10px;">
        <p style="font-size:12px;font-weight:600;margin-bottom:6px;">📋 類似見積書 候補一覧</p>
        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr style="background:var(--bg-subtle);font-size:11px;">
              <th style="padding:5px 8px;text-align:left;">見積番号</th>
              <th style="padding:5px 8px;">スコア</th>

// ★ 手動紐づけ確定
function _confirmOrderLink(orderMgmtId, quoteMgmtId, quoteNo){
  if(!confirm('見積書「' + quoteNo + '」と紐づけを確定しますか？\nステータスが「受注済み」に変更されます。')){return;}
  google.script.run
    .withSuccessHandler(res=>{
      if(res.success){
        showToast('✅ 紐づけを確定しました（' + quoteNo + '）');
        loadData();
        // 確定後、ボタン類をリセット
        const statusEl = document.getElementById('upload-status');
        if(statusEl){
          const btns = statusEl.querySelectorAll('button');
          btns.forEach(b=>{b.disabled=true;b.textContent='確定済み';b.style.background='var(--text-sub)';});
          statusEl.insertAdjacentHTML('beforeend',
            '<p style="color:var(--success);font-size:12px;margin-top:6px;">✓ 受注済みに変更しました</p>');
        }
      } else {
        showToast('エラー: ' + (res.error||'不明'), true);
      }
    })
    .withFailureHandler(err=>showToast('通信エラー: '+err.message, true))
    .handleApiRequest('confirmOrderLink',{orderMgmtId, quoteMgmtId});
}

let _allQuotes = [];
let _filteredQuotes = [];
let _quotePage = 1;
const _quoteLimit = 30;

// ===== 見積書詳細モーダル =====
function openQuoteDetail(mgmtId, quoteNo) {
  document.getElementById('quote-detail-title').textContent = '📄 見積書 ' + (quoteNo || mgmtId);
  document.getElementById('quote-detail-modal').classList.add('open');
  document.getElementById('quote-detail-body').innerHTML =
    '<div class="loading"><div class="spinner"></div></div>';
  google.script.run
    .withSuccessHandler(res => {
      if (!res.success) {
        document.getElementById('quote-detail-body').innerHTML =
          '<div style="color:var(--danger);">エラー: ' + res.error + '</div>';
        return;
      }
      document.getElementById('quote-detail-body').innerHTML = _buildQuoteDetailHtml(res);
    })
    .withFailureHandler(err => {
      document.getElementById('quote-detail-body').innerHTML =
        '<div style="color:var(--danger);">通信エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('getQuoteDetail', { mgmtId });
}
function closeQuoteDetail() {
  document.getElementById('quote-detail-modal').classList.remove('open');
}

function _buildQuoteDetailHtml(res) {
  const m = res.mgmt || {};
  const lines = res.quoteLines || [];
  const issueDate   = lines.length ? (lines[0].issueDate   || m.quoteDate || '—') : (m.quoteDate || '—');
  const destCompany = lines.length ? (lines[0].destCompany || m.client    || '—') : (m.client    || '—');
  const destPerson  = lines.length ? (lines[0].destPerson  || '—')               : '—';
  const pdfUrl      = lines.length ? lines[0].pdfUrl : m.quotePdfUrl;

  const infoRows = [
    ['見積番号',     m.quoteNo    || '—'],
    ['発行日',       issueDate],
    ['送り先会社名', destCompany],
    ['送り先担当者', destPerson],
    ['見積金額',     m.quoteAmount ? Number(m.quoteAmount).toLocaleString() + ' 円' : '—'],
    ['ステータス',   _sBadge(m.status)],
    ['紐づけ状況',   m.linked ? '<span class="badge badge-linked">✓ 注文書あり（No.' + (m.orderNo||'') + '）</span>' : '<span style="color:var(--text-sub);">未受注</span>'],
    ['機種コード',   m.modelCode  || '—'],
  ].map(([k,v]) => `
    <tr>
      <td style="padding:6px 8px;font-weight:600;width:36%;color:var(--text-sub);border-bottom:1px solid var(--border);font-size:13px;">${k}</td>
      <td style="padding:6px 8px;border-bottom:1px solid var(--border);font-size:13px;">${v}</td>
    </tr>`).join('');

  const lineRows = lines.map((l, i) => `
    <tr class="${String(l.remarks||'').includes('キャンセル') ? 'cancelled' : ''}">
      <td>${i+1}</td>
      <td><strong style="font-size:12px;">${l.itemName||''}</strong></td>
      <td style="font-size:11px;color:var(--text-sub);">${l.spec||''}</td>
      <td class="r">${l.qty||''}</td>
      <td>${l.unit||''}</td>
      <td class="r">${l.unitPrice ? Number(l.unitPrice).toLocaleString() : ''}</td>
      <td class="r" style="font-weight:600;">${l.amount ? Number(l.amount).toLocaleString() : ''}</td>
      <td style="font-size:11px;">${l.remarks||''}</td>
    </tr>`).join('');

  return `
    <table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:16px;">
      <tbody>${infoRows}</tbody>
    </table>
    ${pdfUrl ? `<div style="margin-bottom:16px;">
      <a href="${pdfUrl}" target="_blank" class="btn btn-outline btn-sm">📄 見積書PDFを開く</a>
    </div>` : ''}
    <div class="detail-section">
      <h4>見積書 明細</h4>
      ${lineRows ? `
        <table class="dtable">
          <thead><tr><th>#</th><th>品名</th><th>仕様</th><th>数量</th><th>単位</th><th>単価</th><th>金額</th><th>備考</th></tr></thead>
          <tbody>${lineRows}</tbody>
        </table>` : '<div style="font-size:13px;color:var(--text-sub);">明細データなし</div>'}
    </div>`;
}

function loadQuoteList() {
  document.getElementById('quotelist-container').innerHTML =
    '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  google.script.run
    .withSuccessHandler(res => {
      if (!res.success) {
        document.getElementById('quotelist-container').innerHTML =
          '<div class="loading" style="color:var(--danger);">⚠️ ' + res.error + '</div>';
        return;
      }
      _allQuotes      = res.items || [];
      _filteredQuotes = _allQuotes.slice();
      _quotePage      = 1;
      _updateQuoteSummary();
      _renderQuoteTable();
    })
    .withFailureHandler(err => {
      document.getElementById('quotelist-container').innerHTML =
        '<div class="loading" style="color:var(--danger);">通信エラー: ' + err.message + '</div>';

function _updateQuoteSummary() {
  document.getElementById('qs-total').textContent  = _allQuotes.length;
  document.getElementById('qs-linked').textContent = _allQuotes.filter(r => r.linked).length;
  const total = _allQuotes.reduce((s, r) => s + (Number(r.quoteAmount) || 0), 0);
  document.getElementById('qs-amount').textContent = total.toLocaleString();
}

function applyQuoteFilter() {
  const kw     = document.getElementById('qs-search').value.toLowerCase();
  const st     = document.getElementById('qs-filter-status').value;
  const linked = document.getElementById('qs-filter-linked').value;
  _filteredQuotes = _allQuotes.filter(r => {
    const mk = !kw || [r.quoteNo, r.destCompany, r.destPerson, r.modelCode].some(
      v => String(v||'').toLowerCase().includes(kw));
    const ms = !st || r.status === st;
    const ml = !linked ||
      (linked === 'linked'   &&  r.linked) ||
      (linked === 'unlinked' && !r.linked);
    return mk && ms && ml;
  });
  // 発行日降順（新しい順）
  _filteredQuotes.sort((a, b) => String(b.issueDate||'').localeCompare(String(a.issueDate||'')));
  _quotePage = 1;
  _renderQuoteTable();
}

function clearQuoteFilter() {
  document.getElementById('qs-search').value = '';
  document.getElementById('qs-filter-status').value = '';
  document.getElementById('qs-filter-linked').value = '';
  _filteredQuotes = _allQuotes.slice();
  _quotePage = 1;
  _renderQuoteTable();
}

function _renderQuoteTable() {
  const start = (_quotePage - 1) * _quoteLimit;
  const data  = _filteredQuotes.slice(start, start + _quoteLimit);
  const total = _filteredQuotes.length;

  document.getElementById('qs-count').textContent =
    total + '件中 ' + (total > 0 ? start + 1 : 0) + '–' + Math.min(start + _quoteLimit, total) + '件';

  if (total === 0) {
    document.getElementById('quotelist-container').innerHTML =
      '<div class="loading" style="color:var(--text-sub);">該当する見積書がありません</div>';
    document.getElementById('qs-pagination').innerHTML = '';
    return;
  }

  const rows = data.map(r => `
    <tr onclick="openQuoteDetail('${r.id}')" style="cursor:pointer;">
      <td><strong>${r.quoteNo || '—'}</strong></td>
      <td style="font-size:12px;color:var(--text-sub);">${r.issueDate || '—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.destCompany || ''}</td>
      <td style="font-size:12px;color:var(--text-sub);">${r.destPerson || ''}</td>
      <td style="text-align:right;white-space:nowrap;">
        ${r.quoteAmount ? Number(r.quoteAmount).toLocaleString() + ' 円' : '—'}
      </td>
      <td>${_sBadge(r.status)}</td>
      <td>
        ${r.linked
          ? '<span class="badge badge-linked">✓ 注文書あり</span>'
          : '<span style="font-size:11px;color:var(--text-sub);">未受注</span>'}
        ${r.orderNo ? '<br><span style="font-size:11px;color:var(--text-sub);">No.' + r.orderNo + '</span>' : ''}
      </td>
      <td>
        ${r.quotePdfUrl
          ? '<a class="pdf-link" href="' + r.quotePdfUrl + '" target="_blank" onclick="event.stopPropagation()">📄 PDF</a>'
          : ''}
      </td>
    </tr>`).join('');

  document.getElementById('quotelist-container').innerHTML = `
    <table>
      <thead><tr>
        <th>見積番号</th>
        <th>発行日</th>
        <th>送り先会社名</th>
        <th>送り先担当者名</th>
        <th>見積金額</th>
        <th>ステータス</th>
        <th>紐づけ状況</th>
        <th>PDF</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  // ページネーション
  const pages = Math.ceil(total / _quoteLimit);
  if (pages <= 1) { document.getElementById('qs-pagination').innerHTML = ''; return; }
  let pHtml = '';
  for (let i = 1; i <= Math.min(pages, 10); i++)
    pHtml += `<button class="page-btn ${i === _quotePage ? 'active' : ''}" onclick="goQuotePage(${i})">${i}</button>`;
  document.getElementById('qs-pagination').innerHTML = pHtml;
}

function goQuotePage(n) { _quotePage = n; _renderQuoteTable(); }

// ===== 見積台帳（機種別 > 基板別 ツリー表示） =====

let _allLedger   = [];  // 全件キャッシュ
let _ledgerMachines = [];  // 機種リスト
const LEDGER_STATUS_BADGE = {
  '作成予定': 'planned', '作成中': 'sent', '送信済み': 'received', 'キャンセル': 'done'
};

// ---------- ロード ----------
function loadLedger() {
  document.getElementById('ledger-tree-container').innerHTML =
    '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  google.script.run
    .withSuccessHandler(res => {
      if (!res.success) { showToast(res.error, true); return; }
      _allLedger = res.items || [];
      _ledgerMachines = _extractMachines(_allLedger);
      _populateLedgerMachineFilter();
      applyLedgerFilter();
    })
    .withFailureHandler(err => {
      document.getElementById('ledger-tree-container').innerHTML =
        '<div class="loading" style="color:var(--danger);">エラー: ' + err.message + '</div>';
    })
    .handleApiRequest('ledgerGetAll', null);
}

function _extractMachines(items) {
  const seen = {}, list = [];
  items.forEach(r => {
    const m = (r.machineCode || '（機種未設定）').trim();
    if (!seen[m]) { seen[m] = true; list.push(m); }
  });
  return list.sort();
}

function _populateLedgerMachineFilter() {
  const sel = document.getElementById('ledger-filter-machine');
  if (!sel) return;
  while (sel.options.length > 1) sel.remove(1);
  _ledgerMachines.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m; sel.appendChild(o);
  });
  // datalist for modal
  const dl = document.getElementById('ledger-machine-list');
  if (dl) {
    dl.innerHTML = '';
    _ledgerMachines.forEach(m => {
      const o = document.createElement('option'); o.value = m; dl.appendChild(o);
    });
  }
}

// ---------- フィルタ ----------
function applyLedgerFilter() {
  const kw      = (document.getElementById('ledger-search')?.value || '').toLowerCase();
  const machine = document.getElementById('ledger-filter-machine')?.value || '';
  const st      = document.getElementById('ledger-filter-status')?.value || '';

  let filtered = _allLedger.filter(r => {
    // __MACHINE_FOLDER__（機種フォルダ行）は機種フィルターのみ適用し、他は常に通過
    if (r.status === '__MACHINE_FOLDER__') {
      const mm = !machine || (r.machineCode||'（機種未設定）') === machine;
      return mm;
    }
    // 通常の見積行：キーワード・機種・ステータスすべてでフィルタ
    const mk = !kw || [r.quoteNo, r.boardName, r.modelNo, r.subject, r.dest, r.machineCode, r.remarks]
      .some(v => String(v||'').toLowerCase().includes(kw));
    const mm = !machine || (r.machineCode||'（機種未設定）') === machine;
    const ms = !st || r.status === st;
    return mk && mm && ms;
  });

  _updateLedgerSummary(filtered);
  _renderLedgerTree(filtered);
}

function _clearLedgerFilter() {
  if (document.getElementById('ledger-search'))         document.getElementById('ledger-search').value = '';
  if (document.getElementById('ledger-filter-machine')) document.getElementById('ledger-filter-machine').value = '';
  if (document.getElementById('ledger-filter-status'))  document.getElementById('ledger-filter-status').value = '';
  applyLedgerFilter();
}

// ---------- サマリー ----------
function _updateLedgerSummary(items) {
  const real = items.filter(r => r.status !== '__MACHINE_FOLDER__');
  document.getElementById('ledger-count').textContent         = real.length;
  document.getElementById('ledger-machine-count').textContent = _extractMachines(items).length;
  document.getElementById('ledger-sent-count').textContent    = real.filter(r => r.status === '送信済み').length;
  document.getElementById('ledger-pending-count').textContent = real.filter(r => r.status === '作成予定').length;
}

// ---------- ツリー描画 ----------
function _renderLedgerTree(items) {
  const container = document.getElementById('ledger-tree-container');

  // プレースホルダー行（__MACHINE_FOLDER__）を除いた実見積リスト
  const realItems = items.filter(r => r.status !== '__MACHINE_FOLDER__');

  // 機種ごとのグループを構築（プレースホルダー含む全itemsから機種キーを収集）
  const machineSet = {};
  items.forEach(r => {
    const m = (r.machineCode || '（機種未設定）').trim();
    if (!machineSet[m]) machineSet[m] = [];
    if (r.status !== '__MACHINE_FOLDER__') machineSet[m].push(r);
  });

  if (Object.keys(machineSet).length === 0) {
    container.innerHTML = '<div class="loading" style="color:var(--text-sub);">該当する見積がありません。「🗂️ 機種を追加」または「＋ 見積登録」から追加してください。</div>';
    return;
  }

  const machineKeys = Object.keys(machineSet).sort((a, b) => {
    if (a === '（機種未設定）') return 1;
    if (b === '（機種未設定）') return -1;
    return a.localeCompare(b, 'ja');
  });

  const CAT_BADGE = {
    '試作':'badge-trial','量産':'badge-mass','仕掛':'badge-sent',
    'PCB':'badge-planned','修理':'badge-received','その他':'badge-planned'
  };

  let html = '';

  machineKeys.forEach(machine => {
    const machineItems = machineSet[machine]; // プレースホルダー除き済み
    const machineId = 'machine-' + machine.replace(/[^a-zA-Z0-9]/g, '_');

    // 集計
    const totalAmt  = machineItems.reduce((s, r) => s + (Number(r.amount) || 0), 0);
    const sentCnt   = machineItems.filter(r => r.status === '送信済み').length;
    const quoteCnt  = machineItems.length;

    // ── 機種ヘッダー ──────────────────────────────────────────────
    html += `
    <div style="background:var(--card);border-radius:8px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;">
      <div class="ledger-machine-hd" onclick="_toggleMachineSection('${machineId}')"
           style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;border-left:4px solid var(--primary);">
        <span style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:15px;" id="${machineId}-arrow">▼</span>
          <span style="font-weight:700;font-size:15px;letter-spacing:.03em;">📁 ${machine}</span>
          <span style="font-size:12px;color:var(--text-sub);">${quoteCnt}件</span>
          ${sentCnt > 0 ? `<span class="badge badge-received" style="font-size:10px;">送信済み ${sentCnt}件</span>` : ''}
        </span>
        <span style="display:flex;gap:8px;align-items:center;">
          ${totalAmt > 0 ? `<span style="font-size:13px;font-weight:700;color:var(--danger);">¥${totalAmt.toLocaleString()}</span>` : ''}
          <button class="btn btn-outline btn-sm"
            onclick="event.stopPropagation();_openLedgerModalWithMachine('${machine}')"
            style="font-size:11px;padding:3px 8px;">＋ 見積登録</button>
        </span>
      </div>

      <div id="${machineId}" style="display:block;">`;

    // ── 基板グループ ──────────────────────────────────────────────
    const boardGroups = {};
    machineItems.forEach(r => {
      const bKey = (r.boardName || '（基板未設定）').trim();
      if (!boardGroups[bKey]) boardGroups[bKey] = [];
      boardGroups[bKey].push(r);
    });
    const boardKeys = Object.keys(boardGroups).sort((a, b) => {
      if (a === '（基板未設定）') return 1;
      if (b === '（基板未設定）') return -1;
      return a.localeCompare(b, 'ja');
    });

    if (boardKeys.length === 0) {
      html += `<div style="padding:14px 20px;color:var(--text-sub);font-size:13px;">まだ見積がありません。「＋ 見積登録」から追加してください。</div>`;
    }

    boardKeys.forEach(board => {
      const boardItems = boardGroups[board].sort((a, b) =>
        String(b.issueDate || '').localeCompare(String(a.issueDate || '')));
      const boardAmt = boardItems.reduce((s, r) => s + (Number(r.amount) || 0), 0);
      const safeBoard = board.replace(/'/g, "\\'");
      const boardId   = machineId + '_' + board.replace(/[^a-zA-Z0-9]/g, '_');

      // ── 基板ヘッダー ────────────────────────────────────────────
      html += `
        <div style="border-top:1px solid var(--border);">
          <div class="ledger-board-hd" onclick="_toggleBoardSection('${boardId}')"
               style="display:flex;align-items:center;justify-content:space-between;
                      padding:7px 16px 7px 28px;background:#f4f6f9;cursor:pointer;user-select:none;">
            <span style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:12px;" id="${boardId}-arrow">▼</span>
              <span style="font-size:13px;font-weight:600;">🔬 ${board}</span>
              <span style="font-size:12px;color:var(--text-sub);">${boardItems.length}件</span>
              ${boardAmt > 0 ? `<span style="font-size:12px;color:var(--danger);font-weight:600;">¥${boardAmt.toLocaleString()}</span>` : ''}
            </span>
            <button class="btn btn-outline btn-sm"
              onclick="event.stopPropagation();_openLedgerModalWithBoard('${machine}','${safeBoard}')"
              style="font-size:11px;padding:2px 8px;">＋ 見積追加</button>
          </div>

          <div id="${boardId}">`;

      // ── 型番グループ ──────────────────────────────────────────────
      const modelGroups = {};
      boardItems.forEach(r => {
        const mKey = (r.modelNo || '（型番未設定）').trim();
        if (!modelGroups[mKey]) modelGroups[mKey] = [];
        modelGroups[mKey].push(r);
      });
      const modelKeys = Object.keys(modelGroups).sort((a, b) => {
        if (a === '（型番未設定）') return 1;
        if (b === '（型番未設定）') return -1;
        return a.localeCompare(b, 'ja');
      });

      modelKeys.forEach(modelNo => {
        const modelItems = modelGroups[modelNo].sort((a, b) =>
          String(b.issueDate || '').localeCompare(String(a.issueDate || '')));
        const modelAmt  = modelItems.reduce((s, r) => s + (Number(r.amount) || 0), 0);
        const safeModel = modelNo.replace(/'/g, "\\'");

            <div style="border-top:1px dashed var(--border);">
              <div style="display:flex;align-items:center;justify-content:space-between;

function saveLedger() {
  const subject = document.getElementById('ledger-subject').value.trim();
  if (!subject) { showToast('件名は必須です', true); return; }

  const dateVal = document.getElementById('ledger-issue-date').value;
  const payload = {
    ledgerId:    document.getElementById('ledger-id').value || null,
    machineCode: document.getElementById('ledger-machine-code').value.trim(),
    boardName:   document.getElementById('ledger-board-name').value.trim(),
    modelNo:     document.getElementById('ledger-model-no').value.trim(),

    subject,
    status:      document.getElementById('ledger-status').value,
    saveUrl:     document.getElementById('ledger-save-url').value,
    amount:      document.getElementById('ledger-amount')?.value || '',
    submitTo:    document.getElementById('ledger-submit-to')?.value || '',
    format:      document.getElementById('ledger-format')?.value || '',

function _ledgerHandleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const machine = document.getElementById('ledger-machine-code').value || '';
  const board   = document.getElementById('ledger-board-name').value   || '';
  document.getElementById('ledger-file-status').innerHTML =
    '<span style="color:var(--primary);">📤 アップロード中: ' + file.name + '</span>';
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result.split(',')[1];
    google.script.run
      .withSuccessHandler(res => {
        event.target.value = '';
        if (res.success) {
          document.getElementById('ledger-save-url').value = res.url;
          document.getElementById('ledger-file-status').innerHTML =
            '<span style="color:var(--success);">✓ アップロード完了: ' + res.fileName + '</span>';
          const existEl = document.getElementById('ledger-existing-file');
          const linkEl  = document.getElementById('ledger-existing-link');
          if (existEl && linkEl) {
            existEl.style.display = '';
            linkEl.href = res.url;
            linkEl.textContent = '📎 ' + res.fileName;
          }
        } else {
          document.getElementById('ledger-file-status').innerHTML =
            '<span style="color:var(--danger);">✗ ' + res.error + '</span>';
        }
      })
      .withFailureHandler(err => {
        event.target.value = '';
        document.getElementById('ledger-file-status').innerHTML =
          '<span style="color:var(--danger);">✗ 通信エラー: ' + err.message + '</span>';
      })
      .handleApiRequest('ledgerUploadFile', {
        base64Data:  b64,
        fileName:    file.name,
        mimeType:    file.type || 'application/octet-stream',
        machineCode: machine,
        boardName:   board,
      });
  };
  reader.readAsDataURL(file);
}

function _renderMatchingCandidates(items) {
  if (items.length === 0) {
    document.getElementById('matching-container').innerHTML =
      '<div class="loading" style="color:var(--success);">✓ 要確認の紐づけ候補はありません</div>';
    return;
  }

  const scoreBar = (s) => {
    const w = Math.min(s, 100);
    const c = s >= 80 ? 'var(--success)' : s >= 60 ? 'var(--warning)' : 'var(--danger)';
    return `<div style="display:flex;align-items:center;gap:6px;">
      <div style="flex:1;height:6px;background:var(--border);border-radius:3px;">
        <div style="width:${w}%;height:100%;background:${c};border-radius:3px;"></div>
      </div>
      <span style="font-size:12px;font-weight:600;color:${c};min-width:32px;">${s}点</span>
    </div>`;
  };

  const cards = items.map(item => {
    const candidates = [];
    if (item.c1Id) candidates.push({id:item.c1Id, no:item.c1No, client:item.c1Client, score:item.c1Score, detail:item.c1Detail, quoteUrl:item.c1quoteUrl||''});
    if (item.c2Id) candidates.push({id:item.c2Id, no:'', client:'', score:item.c2Score, detail:''});
    if (item.c3Id) candidates.push({id:item.c3Id, no:'', client:'', score:item.c3Score, detail:''});

    const candRows = candidates.map(c => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:600;">${c.no||c.id}</div>
          <div style="font-size:11px;color:var(--text-sub);">${c.client||''} ${c.id}</div>
          ${c.detail ? `<div style="font-size:11px;color:var(--text-sub);margin-top:2px;">${c.detail}</div>` : ''}
        </div>
        <div style="min-width:140px;">${scoreBar(c.score)}</div>
        <button class="btn btn-primary btn-sm" onclick="confirmLink('${item.orderMgmtId}','${c.id}')">確定</button>
      </div>`).join('');

    return `
      <div style="background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);">
        <div style="background:#f8f9fa;padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <span class="badge badge-received">注文書</span>
          <strong style="font-size:13px;">${item.orderNo||item.orderMgmtId}</strong>
          <span style="font-size:12px;color:var(--text-sub);">${item.orderClient||''}</span>
          <span style="font-size:12px;color:var(--text-sub);">${item.orderDate||''}</span>
          <span style="margin-left:auto;font-size:12px;color:var(--text-sub);">${item.orderAmount?Number(item.orderAmount).toLocaleString()+' 円':''}</span>
          ${item.orderPdfUrl ? '<a href="'+item.orderPdfUrl+'" target="_blank" class="pdf-link" style="font-size:12px;">📦 注文書PDF</a>' : ''}
        </div>
        <div style="padding:12px 16px;">
          <div style="font-size:12px;color:var(--text-sub);margin-bottom:8px;">見積書候補（スコア順）</div>
          ${candRows || '<div style="font-size:12px;color:var(--text-sub);">候補が見つかりませんでした</div>'}
        </div>
      </div>`;
  }).join('');

  document.getElementById('matching-container').innerHTML = `<div>${cards}</div>`;
  // キャッシュ保存（検索フィルター用）
  document.getElementById('matching-container').dataset.allCards = JSON.stringify(items);
}

let _allMatchingItems = [];
</script>
