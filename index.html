<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>製造業業務フロービルダー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Segoe UI',sans-serif;background:#f0f4f8;color:#1e2a3a;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ---- TOOLBAR ---- */
#toolbar{background:#2c3e50;padding:7px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;box-shadow:0 2px 8px #0004;min-height:50px;z-index:10}
.logo{color:#fff;font-weight:700;font-size:14px;margin-right:6px;white-space:nowrap}
.tb-sep{width:1px;height:20px;background:#ffffff33;flex-shrink:0}
.tb-btn{padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #ffffff44;background:transparent;color:#ffffffcc;font-family:inherit;transition:all .15s;white-space:nowrap}
.tb-btn:hover{background:#ffffff22}
.tb-btn.active{background:#3498db;border-color:#fff;color:#fff}
.tb-btn.green{background:#27ae60;border-color:#2ecc71;color:#fff}
.tb-btn.orange{background:#e67e22;border-color:#f39c12;color:#fff}
.tb-btn.purple{background:#8e44ad;border-color:#9b59b6;color:#fff}
.tb-btn.red{background:#c0392b;border-color:#e74c3c;color:#fff}
.tb-sel{padding:5px 8px;border-radius:6px;font-size:12px;background:#ffffff18;border:1px solid #ffffff33;color:#fff;font-family:inherit}
.tb-sel option{color:#1e2a3a;background:#fff}

/* ---- STATUS ---- */
#statusbar{background:#fff;border-bottom:1px solid #d1d9e6;padding:4px 14px;font-size:11px;color:#64748b;display:flex;align-items:center;gap:10px;min-height:26px}
#conn-hint{color:#d97706;font-weight:500;display:none}
#stat-right{margin-left:auto;font-size:11px}

/* ---- CANVAS ---- */
#canvas-wrap{flex:1;overflow:auto;background:#e8edf5;position:relative}
#main-svg{display:block;background:#fff}

/* ---- MODALS共通 ---- */
.overlay{position:fixed;inset:0;background:#00000055;z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border:1px solid #d1d9e6;border-radius:14px;padding:24px;width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #0003}
.modal.wide{width:580px}
.modal.extra-wide{width:720px}
.modal h3{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.frow{margin-bottom:12px}
.frow label{font-size:11px;color:#64748b;display:block;margin-bottom:4px;font-weight:500}
.frow input,.frow textarea,.frow select{width:100%;border:1px solid #d1d9e6;border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.frow input:focus,.frow textarea:focus,.frow select:focus{border-color:#3498db}
.frow textarea{resize:vertical}
.type-wrap{display:flex;flex-wrap:wrap;gap:5px}
.tybtn{padding:4px 9px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid #d1d9e6;background:#f8fafc;color:#64748b;font-family:inherit;transition:all .15s}
.tybtn:hover{background:#e8edf5}
.tybtn.active{background:#3498db;color:#fff;border-color:#2980b9}
.mfoot{display:flex;justify-content:space-between;gap:8px;margin-top:16px}
.btn-del{padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;background:#fee2e2;border:1px solid #dc2626;color:#dc2626;font-family:inherit}
.btn-cancel{padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;background:transparent;border:1px solid #d1d9e6;color:#64748b;font-family:inherit}
.btn-save{padding:7px 18px;border-radius:7px;font-size:12px;cursor:pointer;background:#2c3e50;border:none;color:#fff;font-weight:700;font-family:inherit}
.btn-add{width:100%;padding:8px;border-radius:7px;font-size:12px;cursor:pointer;background:#ecf0f1;border:1px solid #bdc3c7;color:#2c3e50;font-family:inherit;margin-top:6px}
.btn-primary{padding:8px 18px;border-radius:7px;font-size:12px;cursor:pointer;background:#3498db;border:none;color:#fff;font-weight:700;font-family:inherit}
.btn-success{padding:8px 18px;border-radius:7px;font-size:12px;cursor:pointer;background:#27ae60;border:none;color:#fff;font-weight:700;font-family:inherit}

/* ---- EDGE LABEL INPUT ---- */
#edgelabel-popup{position:fixed;background:#fff;border:1px solid #d1d9e6;border-radius:10px;padding:14px;z-index:200;box-shadow:0 8px 30px #0002;display:none;width:220px}
#edgelabel-popup input{width:100%;border:1px solid #d1d9e6;border-radius:6px;padding:6px 9px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px}
#edgelabel-popup .btns{display:flex;gap:8px;justify-content:flex-end}

/* ---- TOAST ---- */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:9px 20px;border-radius:30px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:80vw;text-align:center}
#toast.show{opacity:1}

/* ---- IMPORT TABS ---- */
.tab-bar{display:flex;gap:2px;margin-bottom:14px;border-bottom:2px solid #e8edf5}
.tab-btn{padding:7px 14px;font-size:12px;cursor:pointer;border:none;background:transparent;color:#64748b;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:#3498db;border-bottom-color:#3498db;font-weight:700}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ---- CSV TABLE ---- */
.csv-table-wrap{overflow:auto;max-height:200px;border:1px solid #d1d9e6;border-radius:7px;margin-top:8px}
.csv-table{width:100%;border-collapse:collapse;font-size:11px}
.csv-table th{background:#2c3e50;color:#fff;padding:5px 8px;text-align:left;position:sticky;top:0}
.csv-table td{padding:4px 8px;border-bottom:1px solid #e8edf5;color:#374151}
.csv-table tr:hover td{background:#f8fafc}

/* ---- AI LOADING ---- */
.ai-loading{display:flex;align-items:center;gap:10px;padding:14px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;margin-top:10px;font-size:12px;color:#0369a1}
.spinner{width:18px;height:18px;border:2px solid #bae6fd;border-top-color:#0369a1;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---- TYPE MANAGER ---- */
.type-list-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid #e8edf5;border-radius:6px;margin-bottom:6px;background:#f8fafc}
.type-list-item .type-icon{font-size:16px;width:24px;text-align:center}
.type-list-item .type-name{flex:1;font-size:12px}
.type-list-item .type-del{padding:2px 8px;font-size:11px;cursor:pointer;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;color:#dc2626;font-family:inherit}

/* ---- CUSTOM TYPE BADGE ---- */
.custom-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;background:#fef3c7;color:#92400e;margin-left:4px}

/* ---- PROGRESS BAR ---- */
.progress-wrap{height:6px;background:#e8edf5;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;background:#3498db;border-radius:3px;transition:width .3s}

/* ---- INFO BOX ---- */
.info-box{padding:10px 12px;border-radius:7px;font-size:11px;margin-bottom:10px;line-height:1.6}
.info-box.blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8}
.info-box.green{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}
.info-box.yellow{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.info-box.red{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
</style>
</head>
<body>

<div id="toolbar">
  <span class="logo">🏭 製造業業務フロー</span>
  <div class="tb-sep"></div>
  <button class="tb-btn active" id="btn-sel" onclick="setMode('select')">↖ 選択・移動</button>
  <button class="tb-btn" id="btn-con" onclick="setMode('connect')">↗ 接続</button>
  <div class="tb-sep"></div>
  <select class="tb-sel" id="sel-type"></select>
  <select class="tb-sel" id="sel-lane"></select>
  <button class="tb-btn orange" onclick="addNode()">＋ ノード追加</button>
  <button class="tb-btn" onclick="openLaneModal()">🏢 部門管理</button>
  <button class="tb-btn purple" onclick="openTypeManager()">🔷 種別管理</button>
  <div class="tb-sep"></div>
  <button class="tb-btn purple" onclick="openImportModal()">📥 インポート</button>
  <button class="tb-btn red" onclick="openExportCsvModal()">📤 CSV出力</button>
  <div class="tb-sep"></div>
  <button class="tb-btn green" onclick="saveToDrive()">💾 Drive保存</button>
  <button class="tb-btn green" onclick="loadFromDrive()">📂 Drive読込</button>
  <button class="tb-btn green" onclick="exportSVG()">🖼 SVG出力</button>
  <button class="tb-btn" onclick="clearAll()">🗑 クリア</button>
</div>

<div id="statusbar">
  <span id="conn-hint">⚡ 接続元選択済 — 接続先をクリック（Escでキャンセル）</span>
  <span id="stat-info">ドラッグ: 移動 ｜ ダブルクリック: 編集 ｜ 接続モード: 2ノードを順にクリック ｜ Delete: 削除</span>
  <span id="stat-right">ノード: 0 ／ エッジ: 0</span>
</div>

<div id="canvas-wrap">
  <svg id="main-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="edgelabel-popup">
  <div style="font-size:12px;color:#64748b;margin-bottom:8px">矢印ラベル（任意）</div>
  <input id="elabel-input" placeholder="例: 承認済み" onkeydown="if(event.key==='Enter')confirmEdge()">
  <div class="btns">
    <button class="btn-cancel" style="padding:5px 12px" onclick="cancelEdge()">キャンセル</button>
    <button class="btn-save" style="padding:5px 12px" onclick="confirmEdge()">追加</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// DESIGN TOKENS
// ============================================================
var LANE_PALETTE = [
  { header:"#2980b9", bg:"#ebf5fb", nodeBg:"#ffffff", nodeStroke:"#2980b9", textDark:"#2c3e50", textLight:"#ffffff", subColor:"#2980b9" },
  { header:"#27ae60", bg:"#eafaf1", nodeBg:"#ffffff", nodeStroke:"#27ae60", textDark:"#2c3e50", textLight:"#ffffff", subColor:"#27ae60" },
  { header:"#e67e22", bg:"#fef5e7", nodeBg:"#ffffff", nodeStroke:"#e67e22", textDark:"#2c3e50", textLight:"#ffffff", subColor:"#e67e22" },
  { header:"#8e44ad", bg:"#f5eef8", nodeBg:"#ffffff", nodeStroke:"#8e44ad", textDark:"#2c3e50", textLight:"#ffffff", subColor:"#8e44ad" },
  { header:"#2c3e50", bg:"#f8f9fa", nodeBg:"#ffffff", nodeStroke:"#2c3e50", textDark:"#2c3e50", textLight:"#ffffff", subColor:"#2c3e50" },
  { header:"#c0392b", bg:"#fdf2f2", nodeBg:"#ffffff", nodeStroke:"#c0392b", textDark:"#2c3e50", textLight:"#ffffff", subColor:"#c0392b" },
  { header:"#16a085", bg:"#e8f8f5", nodeBg:"#ffffff", nodeStroke:"#16a085", textDark:"#2c3e50", textLight:"#ffffff", subColor:"#16a085" },
  { header:"#d35400", bg:"#fef0e7", nodeBg:"#ffffff", nodeStroke:"#d35400", textDark:"#2c3e50", textLight:"#ffffff", subColor:"#d35400" },
];

// ============================================================
// DEFAULT & CUSTOM TYPE SYSTEM
// ============================================================
var DEFAULT_TYPES = {
  phase:    { label:"フェーズ",    icon:"📋", isDefault:true },
  process:  { label:"処理",       icon:"⚙️",  isDefault:true },
  decision: { label:"判断",       icon:"🔀",  isDefault:true },
  start:    { label:"開始",       icon:"▶️",  isDefault:true },
  end:      { label:"終了",       icon:"⏹️",  isDefault:true },
  system:   { label:"システム",   icon:"💻",  isDefault:true },
  mail:     { label:"メール",     icon:"📧",  isDefault:true },
  person:   { label:"担当者",     icon:"👤",  isDefault:true },
  document: { label:"書類/図面",  icon:"📄",  isDefault:true },
  approval: { label:"承認/検査",  icon:"✅",  isDefault:true },
};

// カスタム種別（ユーザーが追加可能）
var customTypes = {};

function getAllTypes(){
  var result = {};
  Object.keys(DEFAULT_TYPES).forEach(function(k){ result[k] = DEFAULT_TYPES[k]; });
  Object.keys(customTypes).forEach(function(k){ result[k] = customTypes[k]; });
  return result;
}

function getTypeLabel(type){
  var all = getAllTypes();
  return all[type] ? all[type].label : type;
}

function getTypeIcon(type){
  var all = getAllTypes();
  return all[type] ? all[type].icon : "🔷";
}

// ============================================================
// STATE
// ============================================================
var S = {
  lanes: [
    {id:"l1", name:"①設計課"},
    {id:"l2", name:"②資材購買課"},
    {id:"l3", name:"③営業課"},
    {id:"l4", name:"④品質管理"}
  ],
  nodes: [
    {id:"n1", laneId:"l3", x: 50,  y: 80,  type:"process",  label:"受注・仕様確認", sub:"営業担当"},
    {id:"n2", laneId:"l1", x: 300, y: 80,  type:"process",  label:"設計・図面作成", sub:"CAD設計"},
    {id:"n3", laneId:"l1", x: 300, y: 180, type:"document", label:"出図",            sub:"図面管理サーバー"},
    {id:"n4", laneId:"l2", x: 550, y: 180, type:"process",  label:"部品・材料発注", sub:"購買システム"},
    {id:"n5", laneId:"l4", x: 800, y: 180, type:"process",  label:"受入検査",        sub:"品質基準確認"},
    {id:"n6", laneId:"l4", x: 800, y: 280, type:"decision", label:"合格判定",        sub:"基準クリア"}
  ],
  edges: [
    {id:"e1", from:"n1", to:"n2", label:"", dash:false},
    {id:"e2", from:"n2", to:"n3", label:"", dash:false},
    {id:"e3", from:"n3", to:"n4", label:"", dash:false},
    {id:"e4", from:"n4", to:"n5", label:"", dash:false},
    {id:"e5", from:"n5", to:"n6", label:"", dash:false}
  ]
};

var LW = 250, LHH = 44, NW = 150, NH = 52, PAD = 32;
var mode = "select", selId = null, connFrom = null, pendingEdge = null;
var dragNode = null, offset = {x:0, y:0};
var idCnt = 300;
function uid(){ return "x"+(idCnt++); }

// ============================================================
// NODE GEOMETRY
// ============================================================
function laneIndex(laneId){
  return S.lanes.findIndex(function(l){ return l.id===laneId; });
}

function nodePos(n){
  if(typeof n.x === 'number' && typeof n.y === 'number') return {x: n.x, y: n.y};
  var li = laneIndex(n.laneId); if(li<0) li=0;
  var lx = PAD + li*LW;
  n.x = Math.round(lx + (LW-NW)/2);
  n.y = PAD + LHH + 20;
  return {x: n.x, y: n.y};
}

function nodeCenter(n){
  var p = nodePos(n);
  return {x: p.x+NW/2, y: p.y+NH/2};
}

function canvasSize(){
  var maxX = PAD*2 + S.lanes.length*LW;
  var maxY = 600;
  S.nodes.forEach(function(n){
    if((n.x||0)+NW+50 > maxX) maxX = n.x+NW+50;
    if((n.y||0)+NH+50 > maxY) maxY = n.y+NH+50;
  });
  return { w: Math.max(maxX, 500), h: Math.max(maxY, 400) };
}

// ============================================================
// RENDER
// ============================================================
function render(){
  var svg = document.getElementById("main-svg");
  var sz = canvasSize();
  svg.setAttribute("width", sz.w);
  svg.setAttribute("height", sz.h);
  svg.innerHTML = "";

  var defs = el("defs");
  ["arr","arr-dash"].forEach(function(mid){
    var mk = el("marker");
    mk.setAttribute("id",mid); mk.setAttribute("markerWidth","8"); mk.setAttribute("markerHeight","6");
    mk.setAttribute("refX","7"); mk.setAttribute("refY","3"); mk.setAttribute("orient","auto");
    var mp = el("path"); mp.setAttribute("d","M0,0 L0,6 L8,3 z");
    mp.setAttribute("fill", mid==="arr" ? "#888780" : "#aaa");
    mk.appendChild(mp); defs.appendChild(mk);
  });
  var pat = el("pattern"); pat.setAttribute("id","g"); pat.setAttribute("width","40"); pat.setAttribute("height","40"); pat.setAttribute("patternUnits","userSpaceOnUse");
  var gp = el("path"); gp.setAttribute("d","M 40 0 L 0 0 0 40"); gp.setAttribute("fill","none"); gp.setAttribute("stroke","#c8d5e8"); gp.setAttribute("stroke-width","0.4");
  pat.appendChild(gp); defs.appendChild(pat);
  svg.appendChild(defs);
  svg.appendChild(rect(0,0,sz.w,sz.h,"url(#g)","none",0));

  S.lanes.forEach(function(lane,i){
    var lc = LANE_PALETTE[i % LANE_PALETTE.length];
    var lx = PAD + i*LW;
    var bg = rect(lx, PAD, LW, sz.h-PAD, lc.bg, "none", 0);
    bg.setAttribute("opacity","0.55"); svg.appendChild(bg);
    svg.appendChild(rect(lx, PAD, LW, LHH, lc.header, "none", 0));
    var ht = txt(lx+LW/2, PAD+LHH/2, lane.name, "#fff", 13, 700, "middle", "central");
    svg.appendChild(ht);
    var bl = el("line");
    bl.setAttribute("x1",lx+LW); bl.setAttribute("y1",PAD);
    bl.setAttribute("x2",lx+LW); bl.setAttribute("y2",sz.h);
    bl.setAttribute("stroke","#b0bcd4"); bl.setAttribute("stroke-width","1");
    svg.appendChild(bl);
  });

  S.edges.forEach(function(e){ renderEdge(svg, e); });
  S.nodes.forEach(function(n){ renderNode(svg, n); });

  document.getElementById("stat-right").textContent = "ノード: "+S.nodes.length+" ／ エッジ: "+S.edges.length;
  updateLaneSel();
  updateTypeSel();
}

function renderEdge(svg, edge){
  var fn = S.nodes.find(function(n){ return n.id===edge.from; });
  var tn = S.nodes.find(function(n){ return n.id===edge.to; });
  if(!fn||!tn) return;
  var fc=nodeCenter(fn), tc=nodeCenter(tn);
  var p=el("path");
  p.setAttribute("d","M"+fc.x+","+fc.y+" L"+tc.x+","+tc.y);
  p.setAttribute("stroke", edge.dash?"#aaa":"#888780");
  p.setAttribute("stroke-width","2"); p.setAttribute("fill","none");
  if(edge.dash) p.setAttribute("stroke-dasharray","5,3");
  p.setAttribute("marker-end","url(#"+(edge.dash?"arr-dash":"arr")+")");
  p.setAttribute("data-eid",edge.id); p.style.cursor="pointer";
  p.addEventListener("dblclick",function(e){ e.stopPropagation(); deleteEdge(edge.id); });
  svg.appendChild(p);

  if(edge.label){
    var mx=(fc.x+tc.x)/2, my=(fc.y+tc.y)/2;
    var bg2=rect(mx-24,my-10,48,16,"#fff","#d1d9e6",0.5); bg2.setAttribute("rx","4"); svg.appendChild(bg2);
    svg.appendChild(txt(mx,my+1,edge.label,"#64748b",9,400,"middle","central"));
  }
}

function renderNode(svg, node){
  var pos=nodePos(node);
  var li=laneIndex(node.laneId); if(li<0) li=0;
  var lc=LANE_PALETTE[li%LANE_PALETTE.length];
  var isSel=(selId===node.id||connFrom===node.id);
  var isPhase=node.type==="phase";
  var isCustom=!!customTypes[node.type];
  var g=el("g");
  g.setAttribute("transform","translate("+pos.x+","+pos.y+")");
  g.setAttribute("data-nid",node.id);
  g.style.cursor=mode==="select"?"move":"pointer";

  if(isSel){
    var sr=rect(-4,-4,NW+8,NH+8,"none",lc.nodeStroke,2);
    sr.setAttribute("rx","10"); sr.setAttribute("stroke-dasharray","5,3"); sr.setAttribute("opacity","0.7");
    g.appendChild(sr);
  }

  var fill, stroke, mainTextFill, subTextFill;
  if(isPhase){ fill=lc.header; stroke=lc.header; mainTextFill=lc.textLight; subTextFill=lc.bg; }
  else { fill=lc.nodeBg; stroke=lc.nodeStroke; mainTextFill=lc.textDark; subTextFill=lc.subColor; }

  if(node.type==="start"||node.type==="end"){
    var c=el("circle"); c.setAttribute("cx",NW/2); c.setAttribute("cy",NH/2); c.setAttribute("r",NH/2-2);
    c.setAttribute("fill",fill); c.setAttribute("stroke",stroke); c.setAttribute("stroke-width",isSel?"2.5":"1.5"); g.appendChild(c);
  } else if(node.type==="decision"){
    var py=el("polygon"); py.setAttribute("points",(NW/2)+",2 "+(NW-2)+","+(NH/2)+" "+(NW/2)+","+(NH-2)+" 2,"+(NH/2));
    py.setAttribute("fill",fill); py.setAttribute("stroke",stroke); py.setAttribute("stroke-width",isSel?"2.5":"1.5"); g.appendChild(py);
  } else if(node.type==="system"){
    var sr2=rect(1,1,NW-2,NH-2,fill,stroke,isSel?2.5:1.5); sr2.setAttribute("rx","4"); sr2.setAttribute("stroke-dasharray",isSel?"none":"5,3"); g.appendChild(sr2);
  } else if(node.type==="person"){
    var hd=el("circle"); hd.setAttribute("cx",NW/2); hd.setAttribute("cy","16"); hd.setAttribute("r","10"); hd.setAttribute("fill",fill); hd.setAttribute("stroke",stroke); hd.setAttribute("stroke-width","1.5"); g.appendChild(hd);
    var bd=el("path"); bd.setAttribute("d","M"+(NW/2-15)+","+(NH-2)+" Q"+(NW/2-15)+",30 "+NW/2+",30 Q"+(NW/2+15)+",30 "+(NW/2+15)+","+(NH-2)); bd.setAttribute("fill",fill); bd.setAttribute("stroke",stroke); bd.setAttribute("stroke-width","1.5"); g.appendChild(bd);
  } else if(node.type==="mail"){
    var mr=rect(1,8,NW-2,NH-10,fill,stroke,isSel?2.5:1.5); mr.setAttribute("rx","3"); g.appendChild(mr);
    var env=el("polyline"); env.setAttribute("points","1,8 "+(NW/2)+","+(NH/2)+" "+(NW-1)+",8"); env.setAttribute("fill","none"); env.setAttribute("stroke",stroke); env.setAttribute("stroke-width","1.2"); g.appendChild(env);
  } else if(node.type==="document"){
    var dp=el("path"); dp.setAttribute("d","M2,2 H"+(NW-2)+" V"+(NH-8)+" Q"+(NW/2)+","+(NH+2)+" 2,"+(NH-8)+" Z"); dp.setAttribute("fill",fill); dp.setAttribute("stroke",stroke); dp.setAttribute("stroke-width",isSel?"2.5":"1.5"); g.appendChild(dp);
  } else if(isCustom){
    // カスタム種別: 六角形風の角丸矩形
    var cr=rect(1,1,NW-2,NH-2,fill,stroke,isSel?2.5:1.5); cr.setAttribute("rx","12"); g.appendChild(cr);
    // アイコン表示
    var icon=txt(16, NH/2, getTypeIcon(node.type), fill==="white"?stroke:fill, 14, 400, "middle","central");
    icon.style.pointerEvents="none"; g.appendChild(icon);
  } else {
    var nr=rect(1,1,NW-2,NH-2,fill,stroke,isSel?2.5:1.5); nr.setAttribute("rx",isPhase?"4":"7"); g.appendChild(nr);
  }

  var lines=(node.label||"").split("\n");
  var lby=node.sub ? NH/2-5 : NH/2;
  var xOff = isCustom ? NW/2+8 : NW/2;
  lines.forEach(function(line,idx){
    g.appendChild(txt(xOff, lby-(lines.length-1)*6+idx*13, line, mainTextFill, isPhase?12:11, isPhase?700:500, "middle","central"));
  });
  if(node.sub) g.appendChild(txt(xOff, NH-6, node.sub, subTextFill, 9, 400, "middle","auto"));

  g.addEventListener("mousedown",function(e){ e.stopPropagation(); handleNodeMouseDown(e, node.id); });
  g.addEventListener("dblclick",function(e){ e.stopPropagation(); openEditModal(node.id); });
  svg.appendChild(g);
}

// INTERACTION & DRAG
// ============================================================
function setMode(m){
  mode=m; connFrom=null; pendingEdge=null;
  document.getElementById("btn-sel").classList.toggle("active",m==="select");
  document.getElementById("btn-con").classList.toggle("active",m==="connect");
  document.getElementById("conn-hint").style.display=m==="connect"?"block":"none";
  document.getElementById("stat-info").style.display=m==="select"?"block":"none";
  document.getElementById("edgelabel-popup").style.display="none";
  render();
}

function getMousePos(e){
  var svg=document.getElementById("main-svg");
  var pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
  var loc=pt.matrixTransform(svg.getScreenCTM().inverse());
  return {x:loc.x, y:loc.y};
}

function handleNodeMouseDown(e, id){
  if(mode==="connect"){
    if(!connFrom){ connFrom=id; render(); }
    else if(connFrom!==id){ pendingEdge={from:connFrom,to:id}; connFrom=null; showEdgeLabelPopup(); }
    return;
  }
  selId=id;
  var n=S.nodes.find(function(node){ return node.id===id; });
  if(n){ dragNode=n; var pt=getMousePos(e); offset.x=pt.x-n.x; offset.y=pt.y-n.y; }
  render();
}

document.getElementById("main-svg").addEventListener("mousemove",function(e){
  if(dragNode&&mode==="select"){
    var pt=getMousePos(e);
    dragNode.x=Math.round(pt.x-offset.x);
    dragNode.y=Math.round(pt.y-offset.y);
    render();
  }
});

document.addEventListener("mouseup",function(){ dragNode=null; });
document.getElementById("main-svg").addEventListener("click",function(e){
  if(e.target.id==="main-svg"){ selId=null; render(); }
});

// ============================================================
function showEdgeLabelPopup(){
  var pop=document.getElementById("edgelabel-popup");
  pop.style.display="block"; pop.style.left="50%"; pop.style.top="50%"; pop.style.transform="translate(-50%,-50%)";
  document.getElementById("elabel-input").value=""; document.getElementById("elabel-input").focus();
}

function confirmEdge(){
  if(!pendingEdge) return;
  var label=document.getElementById("elabel-input").value.trim();
  var exists=S.edges.some(function(e){ return e.from===pendingEdge.from&&e.to===pendingEdge.to; });
  if(!exists) S.edges.push({id:"e"+uid(),from:pendingEdge.from,to:pendingEdge.to,label:label,dash:false});
  pendingEdge=null; document.getElementById("edgelabel-popup").style.display="none"; render();
}

function cancelEdge(){
  pendingEdge=null; document.getElementById("edgelabel-popup").style.display="none"; render();
}

function deleteEdge(eid){
  if(!confirm("この矢印を削除しますか？")) return;
  S.edges=S.edges.filter(function(e){ return e.id!==eid; }); render();
}

document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){ setMode("select"); cancelEdge(); }
  if((e.key==="Delete"||e.key==="Backspace")&&selId&&document.activeElement.tagName!=="INPUT"&&document.activeElement.tagName!=="TEXTAREA"){
    if(confirm("選択ノードを削除しますか？")) deleteSelectedNode();
  }
});

function deleteSelectedNode(){
  if(!selId) return;
  S.nodes=S.nodes.filter(function(n){ return n.id!==selId; });
  S.edges=S.edges.filter(function(e){ return e.from!==selId&&e.to!==selId; });
  selId=null; render();
}

function bulkAddLanes(){
  var text=document.getElementById("bulk-lanes").value.trim();
  if(!text) return;
  var lines=text.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
  lines.forEach(function(name){

  });
  closeLaneModal(); openLaneModal(); showToast("✅ "+lines.length+"部門を追加しました");
}

function addLane(){
  if(S.lanes.length>=8) return;
  S.lanes.push({id:"l"+uid(),name:"新部門"+(S.lanes.length+1)});
  closeLaneModal(); openLaneModal();
}

function deleteLane(id){
  if(S.lanes.length<=1||!confirm("この部門と所属ノードを削除しますか？")) return;
  S.lanes=S.lanes.filter(function(l){ return l.id!==id; });
  var delNodes=S.nodes.filter(function(n){ return n.laneId===id; }).map(function(n){ return n.id; });
  S.nodes=S.nodes.filter(function(n){ return n.laneId!==id; });
  S.edges=S.edges.filter(function(e){ return delNodes.indexOf(e.from)<0&&delNodes.indexOf(e.to)<0; });
  closeLaneModal(); openLaneModal();
}

function saveLanes(){
  S.lanes.forEach(function(l){ var el2=document.getElementById("ln-"+l.id); if(el2) l.name=el2.value; });
  closeLaneModal(); render();
}
function closeLaneModal(){ var ov=document.getElementById("lane-ov"); if(ov) ov.remove(); }

  html+='<div style="display:flex;gap:8px;margin-top:8px">';

  html+='</div></div>';

function addCustomType(){
  var key=(document.getElementById("ct-key").value||"").trim().replace(/[^a-zA-Z0-9_]/g,"");
  var icon=(document.getElementById("ct-icon").value||"🔷").trim();
  var name=(document.getElementById("ct-name").value||"").trim();
  if(!key||!name){ showToast("❌ キーと表示名は必須です"); return; }
  if(DEFAULT_TYPES[key]){ showToast("❌ そのキーは既定種別と重複しています"); return; }
  customTypes[key]={label:name, icon:icon, isDefault:false};
  closeTypeManager(); openTypeManager(); render(); showToast("✅ '"+name+"'を追加しました");
}

function bulkAddCustomTypes(){
  var lines=(document.getElementById("ct-bulk").value||"").split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
  var added=0;
  lines.forEach(function(line){
    var parts=line.split(",");
    if(parts.length>=3){
      var k=parts[0].trim().replace(/[^a-zA-Z0-9_]/g,"");
      var i=parts[1].trim();
      var n=parts.slice(2).join(",").trim();
      if(k&&n&&!DEFAULT_TYPES[k]){ customTypes[k]={label:n,icon:i||"🔷",isDefault:false}; added++; }
    }
  });
  closeTypeManager(); openTypeManager(); render();
  showToast("✅ "+added+"種別を追加しました");
}

function deleteCustomType(key){
  if(!confirm("この種別を削除しますか？（使用中のノードはそのまま残ります）")) return;
  delete customTypes[key];
  closeTypeManager(); openTypeManager(); render();
}

function pickType(t,btn){
  editType=t;

function saveNodeEdit(){
  var node=S.nodes.find(function(n){ return n.id===editId; });

  node.label=document.getElementById("e-label").value;
  node.sub=document.getElementById("e-sub").value;

  node.x=parseInt(document.getElementById("e-x").value)||0;
  node.y=parseInt(document.getElementById("e-y").value)||0;
  node.laneId=document.getElementById("e-lane").value;
  closeEditModal(); render();
}

function deleteNodeModal(){

  S.edges=S.edges.filter(function(e){ return e.from!==editId&&e.to!==editId; });
  selId=null; render();

function loadCsvFile(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){ document.getElementById("csv-text").value=e.target.result; previewCsv(); };
  reader.readAsText(file,"UTF-8");
}

function parseCsv(text){
  var lines=text.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
  if(lines.length===0) return [];
  // ヘッダー行を除外（1行目がヘッダーっぽければスキップ）
  var start=0;
  if(lines[0].match(/^(部門|部署|担当|業務|工程|名前|name|dept)/i)) start=1;
  var rows=[];
  for(var i=start;i<lines.length;i++){
    var cols=splitCsvLine(lines[i]);
    if(cols.length>=2) rows.push(cols);
  }
  return rows;
}

function splitCsvLine(line){
  var result=[]; var cur=""; var inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===','&&!inQ){ result.push(cur.trim()); cur=""; }
    else { cur+=c; }
  }
  result.push(cur.trim());
  return result;
}

function previewCsv(){
  var text=document.getElementById("csv-text").value.trim();
  var rows=parseCsv(text);
  if(!rows.length){ document.getElementById("csv-preview").innerHTML='<div class="info-box red">データが見つかりません</div>'; return; }
  var html='<div class="csv-table-wrap"><table class="csv-table"><thead><tr><th>部門</th><th>業務内容</th><th>担当者</th><th>種別</th><th>接続先</th></tr></thead><tbody>';

  });
  if(rows.length>20) html+='<tr><td colspan="5" style="color:#94a3b8;text-align:center">...他'+(rows.length-20)+'行</td></tr>';
  html+='</tbody></table></div>';
  html+='<div style="font-size:11px;color:#64748b;margin-top:6px">'+rows.length+'行のデータを検出</div>';
  document.getElementById("csv-preview").innerHTML=html;
}

function importCsv(replace){

function buildFlowFromCsvRows(rows, fresh){
  var laneMap={}, nodeMap={}, newLanes=[], newNodes=[], newEdges=[];
  var startLanes = fresh ? [] : S.lanes.map(function(l){ return l; });
  var startNodes = fresh ? [] : S.nodes.map(function(n){ return n; });
  var startEdges = fresh ? [] : S.edges.map(function(e){ return e; });

  // 既存レーン名マップ
  S.lanes.forEach(function(l){ laneMap[l.name]=l.id; });

  var laneYCounter={};

  rows.forEach(function(row){
    var dept=row[0]||"未分類", label=row[1]||"処理", sub=row[2]||"", type=row[3]||"process", nexts=(row[4]||"").split("|").map(function(s){ return s.trim(); }).filter(Boolean);
    if(!nexts.length&&row[4]) nexts=[row[4].trim()];

    // レーン確保
    if(!laneMap[dept]){
      var lid="l"+uid();
      laneMap[dept]=lid;
      newLanes.push({id:lid, name:dept});
    }

    // ノード確保（同一ラベルは共有）
    var nodeKey=dept+":"+label;
    if(!nodeMap[nodeKey]){
      var laneId=laneMap[dept];
      if(!laneYCounter[laneId]) laneYCounter[laneId]=PAD+LHH+20;
      var laneIdx=fresh ? newLanes.findIndex(function(l){ return l.id===laneId; }) : laneIndex(laneId);
      if(laneIdx<0) laneIdx=newLanes.length-1;
      var allLanes=fresh?newLanes:S.lanes.concat(newLanes);
      var li=allLanes.findIndex(function(l){ return l.id===laneId; });
      if(li<0) li=0;
      var nx=PAD+li*LW+(LW-NW)/2;
      var ny=laneYCounter[laneId];
      laneYCounter[laneId]+=NH+20;
      var nid="n"+uid();
      nodeMap[nodeKey]={id:nid, laneId:laneId, x:Math.round(nx), y:Math.round(ny), type:type, label:label, sub:sub};
      newNodes.push(nodeMap[nodeKey]);
    }

    // エッジ
    nexts.forEach(function(nextLabel){
      if(nextLabel) {
        // 次のノードは同部門か検索
        var nextKey=dept+":"+nextLabel;
        if(!nodeMap[nextKey]){
          // 他部門も検索
          Object.keys(nodeMap).forEach(function(k){ if(k.split(":")[1]===nextLabel) nextKey=k; });
        }
        if(!nodeMap[nextKey]){
          // 仮ノード登録
          var laneId2=laneMap[dept];
          if(!laneYCounter[laneId2]) laneYCounter[laneId2]=PAD+LHH+20;
          var li2=newLanes.findIndex(function(l){ return l.id===laneId2; });
          if(li2<0) li2=0;
          var nx2=PAD+li2*LW+(LW-NW)/2;
          var ny2=laneYCounter[laneId2];
          laneYCounter[laneId2]+=NH+20;
          var nid2="n"+uid();
          nodeMap[nextKey]={id:nid2, laneId:laneId2, x:Math.round(nx2), y:Math.round(ny2), type:"process", label:nextLabel, sub:""};
          newNodes.push(nodeMap[nextKey]);
        }
        var eid="e"+uid();
        var duplicate=newEdges.some(function(e){ return e.from===nodeMap[nodeKey].id&&e.to===nodeMap[nextKey].id; });
        if(!duplicate) newEdges.push({id:eid, from:nodeMap[nodeKey].id, to:nodeMap[nextKey].id, label:"", dash:false});
      }
    });
  });

  return {lanes:newLanes, nodes:newNodes, edges:newEdges};
}

var _textResult=null;

function previewText(){
  var text=document.getElementById("text-flow").value.trim();
  var result=parseTextFlow(text);
  _textResult=result;
  var html='<div class="info-box green" style="margin-top:8px">';
  html+='📊 解析結果: <b>'+result.lanes.length+'部門</b> / <b>'+result.nodes.length+'ノード</b> / <b>'+result.edges.length+'接続</b></div>';

function parseTextFlow(text){
  var lines=text.split("\n").map(function(l){ return l.trim(); }).filter(function(l){ return l&&!l.startsWith("#")&&!l.startsWith("//")&&!l.startsWith("※"); });
  var laneMap={}, nodeMap={}, newLanes=[], newNodes=[], newEdges=[];
  var laneYCounter={}, currentLane="未分類";

  lines.forEach(function(line){
    // 【部門名】を含む行を分割しながらパース
    var parts=line.split("→").map(function(p){ return p.trim(); });
    var prevNodeId=null;

    parts.forEach(function(part){
      if(!part) return;
      // 部門タグ抽出
      var laneMatch=part.match(/^【(.+?)】(.*)$/);
      var label=part, laneName=currentLane;
      if(laneMatch){ laneName=laneMatch[1].trim(); label=laneMatch[2].trim(); currentLane=laneName; }
      if(!label) return;

      // レーン確保
      if(!laneMap[laneName]){
        var lid="l"+uid(); laneMap[laneName]=lid;
        newLanes.push({id:lid, name:laneName});
      }
      var laneId=laneMap[laneName];
      if(!laneYCounter[laneId]) laneYCounter[laneId]=PAD+LHH+20;

      // ノード確保（同ラベルは共有）
      var nodeKey=label;
      if(!nodeMap[nodeKey]){
        var li=newLanes.findIndex(function(l){ return l.id===laneId; });
        if(li<0) li=0;
        var nx=PAD+li*LW+(LW-NW)/2;
        var ny=laneYCounter[laneId];
        laneYCounter[laneId]+=NH+24;
        var nid="n"+uid();
        nodeMap[nodeKey]={id:nid, laneId:laneId, x:Math.round(nx), y:Math.round(ny), type:"process", label:label, sub:""};
        newNodes.push(nodeMap[nodeKey]);
      }

      if(prevNodeId&&prevNodeId!==nodeMap[nodeKey].id){
        var dup=newEdges.some(function(e){ return e.from===prevNodeId&&e.to===nodeMap[nodeKey].id; });
        if(!dup) newEdges.push({id:"e"+uid(), from:prevNodeId, to:nodeMap[nodeKey].id, label:"", dash:false});
      }
      prevNodeId=nodeMap[nodeKey].id;
    });
  });

  return {lanes:newLanes, nodes:newNodes, edges:newEdges};
}

function importText(replace){
  var text=document.getElementById("text-flow").value.trim();
  var result=parseTextFlow(text);
  if(!result.nodes.length){ showToast("❌ インポートできるデータがありません"); return; }
  if(replace&&!confirm("現在のフローを置き換えますか？")) return;
  if(replace){ S.lanes=result.lanes; S.nodes=result.nodes; S.edges=result.edges; }
  else { mergeFLowData(result); }
  closeImportModal(); render();
  showToast("✅ "+result.nodes.length+"ノードをインポートしました");
}

  var prog=10; var timer=setInterval(function(){ prog=Math.min(prog+8,85); var bar=document.getElementById("ai-progress"); if(bar) bar.style.width=prog+"%"; },400);

  google.script.run
    .withSuccessHandler(function(r){
      clearInterval(timer);

      setTimeout(function(){
        if(r.success){

          } catch(e){
            document.getElementById("ai-result").innerHTML='<div class="info-box red">❌ データ解析エラー: '+esc(e.message)+'</div>';
          }
        } else {
          document.getElementById("ai-result").innerHTML='<div class="info-box red">❌ '+esc(r.message||"AIエラーが発生しました")+'</div>';
        }
      }, 300);
    })
    .withFailureHandler(function(e){
      clearInterval(timer);
      document.getElementById("ai-result").innerHTML='<div class="info-box red">❌ '+esc(e.message)+'</div>';
    })
    .analyzeFlowWithAI(text);
}

function buildFromAiData(data){
  var laneMap={}, newLanes=[], newNodes=[], newEdges=[];
  var laneYCounter={};
  (data.departments||[]).forEach(function(d){
    var lid="l"+uid(); laneMap[d]=lid;
    newLanes.push({id:lid, name:d});
  });
  (data.nodes||[]).forEach(function(n){
    var dept=n.department||"未分類";
    if(!laneMap[dept]){ var lid="l"+uid(); laneMap[dept]=lid; newLanes.push({id:lid, name:dept}); }
    var laneId=laneMap[dept];
    if(!laneYCounter[laneId]) laneYCounter[laneId]=PAD+LHH+20;
    var li=newLanes.findIndex(function(l){ return l.id===laneId; });
    if(li<0) li=0;
    var nx=PAD+li*LW+(LW-NW)/2;
    var ny=laneYCounter[laneId]; laneYCounter[laneId]+=NH+24;
    newNodes.push({id:n.id, laneId:laneId, x:Math.round(nx), y:Math.round(ny), type:n.type||"process", label:n.label, sub:n.sub||""});
  });
  (data.edges||[]).forEach(function(e){
    newEdges.push({id:"e"+uid(), from:e.from, to:e.to, label:e.label||"", dash:false});
  });
  return {lanes:newLanes, nodes:newNodes, edges:newEdges};
}

function applyAiResult(replace){
  if(!_aiResult){ showToast("❌ まずAI解析を実行してください"); return; }
  if(replace&&!confirm("現在のフローを置き換えますか？")) return;
  if(replace){ S.lanes=_aiResult.lanes; S.nodes=_aiResult.nodes; S.edges=_aiResult.edges; }
  else { mergeFLowData(_aiResult); }
  closeImportModal(); render();
  showToast("✅ AIインポート完了: "+_aiResult.nodes.length+"ノード");
}

function mergeFLowData(result){
  var laneIdMap={};
  result.lanes.forEach(function(newL){
    var exist=S.lanes.find(function(l){ return l.name===newL.name; });
    if(exist){ laneIdMap[newL.id]=exist.id; }
    else { S.lanes.push(newL); laneIdMap[newL.id]=newL.id; }
  });
  result.nodes.forEach(function(n){
    n.laneId=laneIdMap[n.laneId]||n.laneId;
    S.nodes.push(n);
  });
  result.edges.forEach(function(e){ S.edges.push(e); });
}

function generateCsvData(){
  var rows=[];
  S.nodes.forEach(function(n){
    var lane=S.lanes.find(function(l){ return l.id===n.laneId; });
    var laneName=lane?lane.name:"";
    var nexts=S.edges.filter(function(e){ return e.from===n.id; }).map(function(e){
      var tn=S.nodes.find(function(nd){ return nd.id===e.to; });
      return tn?tn.label:"";
    }).filter(Boolean);
    rows.push([laneName, n.label, n.sub||"", n.type, nexts.join("|")]);
  });
  return rows;
}

function rowsToCSVString(rows){
  var header="部門名,業務内容,担当者,種別,接続先\n";
  var lines=rows.map(function(r){
    return r.map(function(c){
      var s=String(c||"");
      if(s.includes(",")|| s.includes('"')|| s.includes("\n")) s='"'+s.replace(/"/g,'""')+'"';
      return s;
    }).join(",");
  });
  return header+lines.join("\n");
}

function downloadCsv(){
  var csvStr=rowsToCSVString(generateCsvData());
  var bom="\uFEFF"; // BOM for Excel
  var blob=new Blob([bom+csvStr],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download="業務フロー.csv"; a.click();
  URL.revokeObjectURL(url);
  showToast("✅ CSVをダウンロードしました");
}

  var csvStr=rowsToCSVString(generateCsvData());

}

function el(tag){ return document.createElementNS("http://www.w3.org/2000/svg",tag); }
function rect(x,y,w,h,fill,stroke,sw){
  var r=el("rect"); r.setAttribute("x",x); r.setAttribute("y",y); r.setAttribute("width",w); r.setAttribute("height",h); r.setAttribute("fill",fill||"none");
  if(stroke&&stroke!=="none"){ r.setAttribute("stroke",stroke); r.setAttribute("stroke-width",sw||1); } return r;
}
function txt(x,y,content,fill,size,weight,anchor,baseline){
  var t=el("text"); t.setAttribute("x",x); t.setAttribute("y",y); t.setAttribute("fill",fill||"#1e2a3a"); t.setAttribute("font-size",size||12); t.setAttribute("font-weight",weight||400); t.setAttribute("font-family","'Noto Sans JP',sans-serif");
  if(anchor) t.setAttribute("text-anchor",anchor); if(baseline) t.setAttribute("dominant-baseline",baseline);
  t.style.pointerEvents="none"; t.style.userSelect="none"; t.textContent=content; return t;
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
var _tt=null;
function showToast(msg,dur){
  var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  if(_tt) clearTimeout(_tt); if(dur!==0) _tt=setTimeout(function(){ t.classList.remove("show"); },dur||3500);
}

// INIT
updateLaneSel(); updateTypeSel(); render();
</script>
